<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>អាជីវករខ្មែរឆ្លាតវៃ - ប្រព័ន្ធគ្រប់គ្រងហិរញ្ញវត្ថុ</title>

    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Battambang:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * { font-family: 'Battambang', 'Khmer', sans-serif; }
        body { background: linear-gradient(135deg, #f0f2f5 0%, #e8ecf1 100%); min-height: 100vh; }
        .card-hover:hover { transform: translateY(-4px); transition: all 0.3s ease; box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 10px; }
        
        .toast {
            position: fixed; bottom: 24px; right: 24px; padding: 16px 24px;
            border-radius: 16px; color: white; font-weight: 600; z-index: 1000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: slideUp 0.4s ease;
            max-width: 400px;
        }
        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .toast-info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); display: flex; align-items: center;
            justify-content: center; z-index: 999;
        }
        .modal-box {
            background: white; border-radius: 20px; padding: 24px;
            max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #6366f1); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4); }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4); }
        .btn-purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .btn-purple:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4); }
        
        .balance-box {
            background: linear-gradient(135deg, #1e3a5f, #2d6da8);
            border-radius: 20px; padding: 24px; color: white; min-height: 140px;
        }
        .balance-big { font-size: 2.8rem; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        @media (max-width: 640px) { .balance-big { font-size: 1.8rem; } }
        
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 0.8s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .status-pending { color: #f59e0b; }
        .status-approved { color: #10b981; }
        .status-rejected { color: #ef4444; }
        
        .screenshot-thumb {
            width: 60px; height: 60px; object-fit: cover; border-radius: 8px;
            border: 2px solid #e2e8f0; cursor: pointer; transition: all 0.3s ease;
        }
        .screenshot-thumb:hover { transform: scale(1.05); border-color: #3b82f6; }
        
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 44px; }
        .password-toggle {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #94a3b8;
        }
        .password-toggle:hover { color: #3b82f6; }
        
        .member-id-badge {
            background: #dbeafe; color: #1e40af; padding: 2px 12px;
            border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        
        .scrollable-box { max-height: 250px; overflow-y: auto; border-radius: 12px; }
        .scrollable-box::-webkit-scrollbar { width: 4px; }
        .scrollable-box::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .scrollable-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .deposit-info {
            background: #f8fafc; border: 1px dashed #94a3b8;
            border-radius: 12px; padding: 16px;
        }
        .qr-placeholder {
            width: 120px; height: 120px; background: #e2e8f0;
            border: 2px dashed #94a3b8; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden;
        }
        .qr-placeholder:hover { transform: scale(1.05); border-color: #3b82f6; }
        .qr-placeholder img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
        
        .success-box {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border: 2px solid #10b981; border-radius: 16px; padding: 16px; margin-top: 16px;
        }
        .withdraw-box {
            background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
            border: 2px solid #8b5cf6; border-radius: 16px; padding: 16px; margin-top: 16px;
        }
        .reward-box {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border: 2px solid #f59e0b; border-radius: 16px; padding: 16px; margin-top: 16px;
        }
        .income-box {
            background: linear-gradient(135deg, #dbeafe, #93c5fd);
            border: 2px solid #3b82f6; border-radius: 16px; padding: 16px; margin-top: 16px;
        }
        .telegram-btn {
            display: inline-flex; align-items: center; gap: 10px; padding: 12px 24px;
            background: #0088cc; color: white; border-radius: 50px; font-weight: 600;
            text-decoration: none; transition: all 0.3s ease; border: none; cursor: pointer;
        }
        .telegram-btn:hover { background: #006699; transform: scale(1.05); }
        
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
            background: #e2e8f0; border-radius: 12px; font-weight: 600; color: #475569;
            border: none; cursor: pointer; font-size: 14px;
        }
        .back-btn:hover { background: #cbd5e1; transform: translateX(-4px); }
        
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
            background: white; padding: 8px 0; border-radius: 12px;
        }
        .page-header h2 { font-size: 1.25rem; font-weight: 700; color: #1e293b; margin: 0; }
        
        .danger-btn {
            background: #dc2626; color: white; padding: 6px 12px; border-radius: 8px;
            border: none; cursor: pointer; font-weight: 600; font-size: 12px;
        }
        .danger-btn:hover { background: #b91c1c; transform: scale(1.05); }
        
        .reset-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706); color: white;
            padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: 600; font-size: 13px;
        }
        .reset-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4); }
        
        .member-table-container { max-height: 400px; overflow-y: auto; border-radius: 12px; }
        .member-table-container table { width: 100%; }
        .member-table-container thead { position: sticky; top: 0; z-index: 5; }
        
        .notification-badge {
            position: absolute; top: -6px; right: -6px; background: #ef4444;
            color: white; border-radius: 50%; width: 20px; height: 20px;
            font-size: 10px; font-weight: 700; display: flex; align-items: center;
            justify-content: center; border: 2px solid white;
        }
        .btn-with-badge { position: relative; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        
        .screenshot-preview {
            max-width: 150px; max-height: 150px; border-radius: 8px;
            border: 2px solid #e2e8f0; margin-top: 8px; object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen flex flex-col">
        <!-- NAVBAR -->
        <nav class="bg-white shadow-md border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="bg-gradient-to-r from-blue-600 to-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-store text-white text-xl"></i>
                </div>
                <div>
                    <span class="text-xl font-bold text-gray-800">អាជីវករខ្មែរឆ្លាតវៃ</span>
                    <span class="hidden sm:inline-block text-xs text-gray-400 ml-2">ប្រព័ន្ធគ្រប់គ្រងហិរញ្ញវត្ថុ</span>
                </div>
            </div>
            <div id="navUser" class="flex items-center gap-3"></div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="flex-1 max-w-7xl mx-auto w-full p-4">
            <div id="pageContent"></div>
        </div>

        <!-- Modal Container -->
        <div id="modalContainer"></div>

        <!-- Toast Container -->
        <div id="toastContainer"></div>

        <footer class="bg-white border-t border-gray-200 text-center text-sm text-gray-400 py-4">
            © 2026 អាជីវករខ្មែរឆ្លាតវៃ — ប្រព័ន្ធគ្រប់គ្រងហិរញ្ញវត្ថុឆ្លាតវៃ
        </footer>
    </div>

    <script>
        // ============================================================
        //  DATA LAYER
        // ============================================================
        const DB = {
            get(key, def) {
                try {
                    const raw = localStorage.getItem('ak_' + key);
                    return raw ? JSON.parse(raw) : def;
                } catch { return def; }
            },
            set(key, val) {
                localStorage.setItem('ak_' + key, JSON.stringify(val));
            },
            remove(key) {
                localStorage.removeItem('ak_' + key);
            },
            getUsers() { return this.get('users', []); },
            setUsers(u) { this.set('users', u); },
            getTx() { return this.get('tx', []); },
            setTx(t) { this.set('tx', t); },
            getWithdraws() { return this.get('withdraws', []); },
            setWithdraws(w) { this.set('withdraws', w); },
            getDeposits() { return this.get('deposits', []); },
            setDeposits(d) { this.set('deposits', d); },
            getRewards() { return this.get('rewards', []); },
            setRewards(r) { this.set('rewards', r); },
            getSession() { return this.get('session', null); },
            setSession(s) { this.set('session', s); },
            clearSession() { this.remove('session'); },
            getAdminBankInfo() { return this.get('adminBankInfo', { bank: 'ABA', account: '001 234 567', qrData: '' }); },
            setAdminBankInfo(info) { this.set('adminBankInfo', info); },
            deleteMember(phone) {
                let users = this.getUsers().filter(u => u.phone !== phone);
                this.setUsers(users);
                this.setTx(this.getTx().filter(t => t.phone !== phone));
                this.setDeposits(this.getDeposits().filter(d => d.phone !== phone));
                this.setWithdraws(this.getWithdraws().filter(w => w.phone !== phone));
                this.setRewards(this.getRewards().filter(r => r.phone !== phone));
            },
            resetAll() {
                const admin = this.getUsers().find(u => u.role === 'admin');
                this.remove('users');
                this.remove('tx');
                this.remove('withdraws');
                this.remove('deposits');
                this.remove('rewards');
                this.remove('adminBankInfo');
                this.remove('session');
                if (admin) this.setUsers([admin]);
            }
        };

        // ============================================================
        //  HELPERS
        // ============================================================
        function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

        function formatMoney(n) {
            if (n === undefined || n === null || isNaN(n) || n <= 0) return '0.00 ៛';
            return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',') + ' ៛';
        }

        function getDate() {
            return new Date().toLocaleString('km-KH', { timeZone: 'Asia/Phnom_Penh' });
        }

        // ============================================================
        //  TOAST & MODAL
        // ============================================================
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        function showModal(title, message, onConfirm, onCancel = true) {
            document.getElementById('modalContainer').innerHTML = `
                <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
                    <div class="modal-box">
                        <h3 class="text-xl font-bold text-gray-800 mb-2">${title}</h3>
                        <div class="text-gray-600 mb-4">${message}</div>
                        <div class="flex gap-3 justify-end">
                            ${onCancel ? `<button onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded-xl hover:bg-gray-300 transition">បោះបង់</button>` : ''}
                            ${onConfirm ? `<button onclick="closeModal(); ${onConfirm}()" class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition">យល់ព្រម</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('modalContainer').innerHTML = '';
        }

        // ============================================================
        //  AUTH
        // ============================================================
        function registerUser(phone, name, password, memberId) {
            let users = DB.getUsers();
            if (users.find(u => u.phone === phone)) return { ok: false, msg: 'លេខទូរសព្ទមានរួចហើយ!' };
            if (users.find(u => u.memberId === parseInt(memberId))) return { ok: false, msg: 'លេខ ID នេះមានរួចហើយ!' };
            users.push({ phone, name, password, balance: 0, status: 'active', role: 'user', memberId: parseInt(memberId) });
            DB.setUsers(users);
            return { ok: true, memberId };
        }

        function loginUser(phone, password) {
            let users = DB.getUsers();
            let u = users.find(u => u.phone === phone && u.password === password);
            if (!u) return { ok: false, msg: 'លេខទូរសព្ទ ឬ ពាក្យសម្ងាត់មិនត្រឹមត្រូវ' };
            if (u.status === 'suspended') return { ok: false, msg: 'គណនីត្រូវបានផ្អាក!' };
            DB.setSession({ phone: u.phone, name: u.name, role: u.role || 'user' });
            return { ok: true };
        }

        function getCurrentUser() {
            const sess = DB.getSession();
            if (!sess) return null;
            return DB.getUsers().find(u => u.phone === sess.phone) || null;
        }

        function logout() {
            DB.clearSession();
            renderPage('login');
        }

        // ============================================================
        //  TRANSACTIONS - UPDATES BOTH MEMBER AND ADMIN BALANCE
        // ============================================================
        function addTransaction(phone, type, amount, note = '', account = '') {
            let tx = DB.getTx();
            tx.push({ id: genId(), phone, type, amount, status: 'completed', date: getDate(), note, account });
            DB.setTx(tx);

            let users = DB.getUsers();
            let member = users.find(u => u.phone === phone);
            let admin = users.find(u => u.role === 'admin');

            if (member) {
                member.balance = (member.balance || 0) + (type === 'deposit' ? amount : -amount);
            }
            if (admin) {
                admin.balance = (admin.balance || 0) + (type === 'deposit' ? amount : -amount);
            }
            DB.setUsers(users);
        }

        // ============================================================
        //  RENDER ENGINE
        // ============================================================
        function renderPage(page) {
            const container = document.getElementById('pageContent');
            const user = getCurrentUser();

            const navUser = document.getElementById('navUser');
            if (user) {
                navUser.innerHTML = `
                    <span class="text-sm text-gray-600 hidden sm:inline"><i class="fas fa-user-circle mr-1"></i> ${user.name}</span>
                    <span class="member-id-badge">ID: ${user.memberId || 'N/A'}</span>
                    <span class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">${user.role === 'admin' ? 'Admin' : user.phone}</span>
                    <span class="text-sm font-bold ${user.balance === 0 ? 'text-red-500' : 'text-green-600'}">${formatMoney(user.balance)}</span>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-sign-out-alt"></i></button>
                `;
            } else {
                navUser.innerHTML = `<button onclick="renderPage('login')" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-4 py-1 rounded-xl text-sm hover:shadow-lg transition">ចូលប្រើ</button>`;
            }

            switch (page) {
                case 'login': renderLogin(container); break;
                case 'dashboard': renderDashboard(container, user); break;
                case 'deposit': renderDeposit(container, user); break;
                case 'withdraw': renderWithdraw(container, user); break;
                case 'admin': renderAdmin(container, user); break;
                case 'adminDeposit': renderAdminDeposit(container, user); break;
                case 'adminWithdraw': renderAdminWithdraw(container, user); break;
                case 'adminHistory': renderAdminHistory(container, user); break;
                case 'adminReward': renderAdminReward(container, user); break;
                case 'adminIncome': renderAdminIncome(container, user); break;
                default: renderLogin(container);
            }
        }

        // ============================================================
        //  PAGE: LOGIN
        // ============================================================
        function renderLogin(container) {
            container.innerHTML = `
            <div class="flex items-center justify-center min-h-[70vh]">
                <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
                    <div class="text-center mb-6">
                        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg">
                            <i class="fas fa-store text-white text-3xl"></i>
                        </div>
                        <h1 class="text-2xl font-bold text-gray-800">អាជីវករខ្មែរឆ្លាតវៃ</h1>
                        <p class="text-gray-500 text-sm">ប្រព័ន្ធគ្រប់គ្រងហិរញ្ញវត្ថុ</p>
                    </div>

                    <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
                        <button id="loginTab" class="flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-md text-blue-600">ចូលប្រើ</button>
                        <button id="registerTab" class="flex-1 py-2 rounded-lg text-sm font-semibold text-gray-500">ចុះឈ្មោះ</button>
                    </div>

                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-phone text-blue-500 mr-2"></i>លេខទូរសព្ទ</label>
                            <input type="text" id="loginPhone" placeholder="012345678" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-lock text-blue-500 mr-2"></i>ពាក្យសម្ងាត់</label>
                            <div class="password-wrapper">
                                <input type="password" id="loginPass" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                                <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPass', this)"></i>
                            </div>
                        </div>
                        <button type="submit" class="w-full btn-primary text-white font-semibold py-3 rounded-xl transition">ចូលប្រើ</button>
                    </form>

                    <form id="registerForm" class="hidden mt-4">
                        <div class="mb-3">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-id-card text-blue-500 mr-2"></i>លេខ ID (៥ខ្ទង់)</label>
                            <input type="number" id="regMemberId" placeholder="10001" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <div class="mb-3">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-user text-blue-500 mr-2"></i>ឈ្មោះពេញ</label>
                            <input type="text" id="regName" placeholder="សុខ សុខា" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <div class="mb-3">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-phone text-blue-500 mr-2"></i>លេខទូរសព្ទ</label>
                            <input type="text" id="regPhone" placeholder="012345678" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <div class="mb-3">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-lock text-blue-500 mr-2"></i>ពាក្យសម្ងាត់</label>
                            <div class="password-wrapper">
                                <input type="password" id="regPass" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                                <i class="fas fa-eye password-toggle" onclick="togglePassword('regPass', this)"></i>
                            </div>

                const bank = document.getElementById('wdBank').value;
                const accName = document.getElementById('wdName').value.trim();
                const account = document.getElementById('wdAccount').value.trim();
                const amount = parseInt(document.getElementById('wdAmount').value.trim());

        // ============================================================

        function showImageViewer(src) {

            const viewer = document.createElement('div');
            viewer.className = 'image-viewer';
            viewer.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:1001;cursor:pointer;';
            viewer.innerHTML = `
                <div style="position:absolute;top:20px;right:20px;color:white;font-size:32px;cursor:pointer;background:rgba(0,0,0,0.3);width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </div>
                <img src="${src}" style="max-width:90%;max-height:90%;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.5);" onclick="event.stopPropagation()" />
            `;
            viewer.onclick = () => viewer.remove();
            document.body.appendChild(viewer);
        }

            if (!user || user.role !== 'admin') { renderPage('login'); return; }
            const allUsers = DB.getUsers().filter(u => u.role !== 'admin');

            container.innerHTML = `
            <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow p-6">
                <div class="page-header">
                    <h2><i class="fas fa-hand-holding-usd text-blue-500 mr-2"></i>ផ្ដល់ប្រាក់ចំណូល</h2>
                    <button onclick="renderPage('admin')" class="back-btn"><i class="fas fa-arrow-left"></i> ត្រឡប់</button>
                </div>
                <p class="text-gray-500 text-sm mb-4">សូមបំពេញព័ត៌មានខាងក្រោមដើម្បីផ្ដល់ប្រាក់ចំណូលដល់សមាជិក</p>

                <form id="incomeForm">
                    <div class="mb-3">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-user text-blue-500 mr-2"></i>ជ្រើសរើសសមាជិក</label>
                        <select id="incomeMember" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
                            ${allUsers.map(u => `<option value="${u.phone}">${u.name} (ID: ${u.memberId}) - ${formatMoney(u.balance)}</option>`).join('')}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-dollar-sign text-blue-500 mr-2"></i>ចំនួនប្រាក់ចំណូល (៛)</label>
                        <input type="number" id="incomeAmount" placeholder="50000" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-pen text-blue-500 mr-2"></i>កំណត់សម្គាល់ (ស្រេចចិត្ត)</label>
                        <input type="text" id="incomeNote" placeholder="ឧទាហរណ៍: ចំណូលប្រចាំខែ" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                    </div>
                    <button type="submit" id="incomeSubmitBtn" class="w-full btn-primary text-white font-semibold py-3 rounded-xl transition">
                        <i class="fas fa-hand-holding-usd mr-2"></i> ផ្ដល់ប្រាក់ចំណូល
                    </button>
                </form>
            </div>
            `;

            document.getElementById('incomeForm').onsubmit = (e) => {
                e.preventDefault();
                const btn = document.getElementById('incomeSubmitBtn');
                const phone = document.getElementById('incomeMember').value;
                const amount = parseInt(document.getElementById('incomeAmount').value.trim());
                const note = document.getElementById('incomeNote').value.trim() || 'ប្រាក់ចំណូលពី Admin';

                if (!amount || amount <= 0) { showToast('សូមបញ្ចូលចំនួនទឹកប្រាក់ឲ្យបានត្រឹមត្រូវ!', 'error'); return; }

                const users = DB.getUsers();
                const admin = users.find(u => u.role === 'admin');
                const member = users.find(u => u.phone === phone);

                if (!member) { showToast('មិនរកឃើញសមាជិក!', 'error'); return; }
                if (admin.balance < amount) { showToast('❌ សមតុល្យ Admin មិនគ្រប់គ្រាន់!', 'error'); return; }

                admin.balance -= amount;
                member.balance += amount;
                DB.setUsers(users);
                addTransaction(member.phone, 'deposit', amount, `ប្រាក់ចំណូល: ${note}`);

                showToast(`✅ បានផ្ដល់ប្រាក់ចំណូល ${formatMoney(amount)} ដល់ ${member.name}`, 'success');
                renderPage('adminIncome');
            };
        }

        // ============================================================
        //  ADMIN ACTIONS - Approve/Reject
        // ============================================================
        window.approveDeposit = function(id) {
            const deposits = DB.getDeposits();
            const idx = deposits.findIndex(d => d.id === id);
            if (idx === -1) return;
            const d = deposits[idx];
            d.status = 'approved';
            DB.setDeposits(deposits);

            const users = DB.getUsers();
            const member = users.find(u => u.phone === d.phone);
            const admin = users.find(u => u.role === 'admin');

            if (member) {
                member.balance += d.amount;
                if (admin) admin.balance += d.amount;
                DB.setUsers(users);
                addTransaction(d.phone, 'deposit', d.amount, `បញ្ចូលតាម Admin (${d.bank})`, d.account || '');
                showToast(`✅ បានអនុម័តបញ្ចូល ${formatMoney(d.amount)}`, 'success');
            }
            renderPage('adminDeposit');
        };

        window.rejectDeposit = function(id) {
            const deposits = DB.getDeposits();
            const idx = deposits.findIndex(d => d.id === id);
            if (idx === -1) return;
            deposits[idx].status = 'rejected';
            DB.setDeposits(deposits);
            showToast('❌ បានបដិសេធ', 'error');
            renderPage('adminDeposit');
        };

        window.approveWithdraw = function(id) {
            const withdraws = DB.getWithdraws();
            const idx = withdraws.findIndex(w => w.id === id);
            if (idx === -1) return;
            const w = withdraws[idx];
            w.status = 'approved';
            DB.setWithdraws(withdraws);

            const users = DB.getUsers();
            const member = users.find(u => u.phone === w.phone);
            const admin = users.find(u => u.role === 'admin');

            if (member) {
                if (member.balance >= w.amount) {
                    member.balance -= w.amount;
                    if (admin) admin.balance -= w.amount;
                    DB.setUsers(users);
                    addTransaction(w.phone, 'withdraw', w.amount, `ដកតាម Admin (${w.bank})`, w.account || '');
                    showToast(`✅ បានអនុម័តដក ${formatMoney(w.amount)}`, 'success');
                } else {
                    showToast('❌ សមតុល្យមិនគ្រប់!', 'error');
                }
            }
            renderPage('adminWithdraw');
        };

        window.rejectWithdraw = function(id) {
            const withdraws = DB.getWithdraws();
            const idx = withdraws.findIndex(w => w.id === id);
            if (idx === -1) return;
            withdraws[idx].status = 'rejected';
            DB.setWithdraws(withdraws);
            showToast('❌ បានបដិសេធ', 'error');
            renderPage('adminWithdraw');
        };

        // ============================================================
        //  INIT
        // ============================================================
        (function init() {
            let users = DB.getUsers();
            if (!users.find(u => u.role === 'admin')) {
                users.push({
                    phone: '0987654321',
                    name: 'Admin',
                    password: 'admin123',
                    balance: 0,
                    status: 'active',
                    role: 'admin',
                    memberId: 0
                });
                DB.setUsers(users);
            }
            const sess = DB.getSession();
            if (sess) {
                const user = getCurrentUser();
                if (user) {
                    renderPage(user.role === 'admin' ? 'admin' : 'dashboard');
                    return;
                }
            }
            renderPage('login');
        })();

        // Make functions globally accessible
        window.renderPage = renderPage;
        window.logout = logout;
        window.closeModal = closeModal;
        window.showToast = showToast;
        window.showImageViewer = showImageViewer;
        window.showAdminDepositModal = showAdminDepositModal;
        window.processAdminDeposit = processAdminDeposit;
        window.showAdminDeleteBalanceModal = showAdminDeleteBalanceModal;
        window.processAdminDeleteBalance = processAdminDeleteBalance;
        window.confirmDeleteMember = confirmDeleteMember;
        window.deleteMember = deleteMember;
        window.confirmReset = confirmReset;
        window.resetSystem = resetSystem;
        window.approveDeposit = approveDeposit;
        window.rejectDeposit = rejectDeposit;
        window.approveWithdraw = approveWithdraw;
        window.rejectWithdraw = rejectWithdraw;
        window.togglePassword = togglePassword;
        window.previewDepositScreenshot = function() {};
        window.previewWithdrawScreenshot = function() {};
        window.previewAdminQR = function() {};
    </script>
</body>
</html>
