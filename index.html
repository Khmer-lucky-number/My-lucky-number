<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិក និង Admin</title>
    <style>
        /* ===== CSS ទាំងអស់ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Khmer OS', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 900px;
            animation: fadeInUp 0.6s ease-out;
            max-height: 98vh;
            overflow-y: auto;
            margin: 5px auto;
        }

        .container::-webkit-scrollbar {
            width: 5px;
        }
        .container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1, h2, h3 {
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h2 {
            font-size: 1.3rem;
            color: #fff;
        }
        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            line-height: 1.6;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 5px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }
        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.15);
        }
        select option {
            background: #1a1a2e;
            color: #fff;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .input-group {
            position: relative;
        }
        .input-group input {
            padding-right: 45px;
        }
        .input-group .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }
        .input-group .toggle-pwd:hover {
            color: #fff;
        }

        .btn {
            display: inline-block;
            padding: 11px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 3px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #48bb78, #38a169);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 12px 35px rgba(72, 187, 120, 0.5);
        }
        .btn-danger {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            box-shadow: 0 8px 25px rgba(252, 129, 129, 0.3);
        }
        .btn-danger:hover {
            box-shadow: 0 12px 35px rgba(252, 129, 129, 0.5);
        }
        .btn-warning {
            background: linear-gradient(135deg, #f6ad55, #ed8936);
            box-shadow: 0 8px 25px rgba(246, 173, 85, 0.3);
        }
        .btn-warning:hover {
            box-shadow: 0 12px 35px rgba(246, 173, 85, 0.5);
        }
        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            color: #1a1a2e;
        }
        .btn-gold:hover {
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
        }
        .btn-xs {
            padding: 3px 10px;
            font-size: 11px;
        }
        .btn-block {
            width: 100%;
            text-align: center;
        }

        .btn-super {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
            padding: 4px 14px;
            font-size: 12px;
            border-radius: 20px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.25);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-super:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }

        .back-link {
            font-size: 16px !important;
            font-weight: 700 !important;
            color: rgba(255, 255, 255, 0.8) !important;
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            cursor: pointer;
        }
        .back-link:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #fff !important;
            transform: translateX(-3px);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .clear-btn {
            background: rgba(255, 80, 80, 0.15);
            border: 1px solid rgba(255, 80, 80, 0.3);
            color: #fc8181;
            padding: 11px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 48px;
        }
        .clear-btn:hover {
            background: rgba(255, 80, 80, 0.25);
            transform: scale(1.03);
            border-color: #fc8181;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 12px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 16px;
            margin: 10px 0;
            text-align: left;
            transition: all 0.3s ease;
        }
        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }
        .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .amount {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #48bb78, #38a169);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
        }
        .badge-green {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: #fff;
        }
        .badge-red {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            color: #fff;
        }
        .badge-purple {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            color: #fff;
        }

        .admin-panel {
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
        }
        .admin-panel h3 {
            color: #ffd700;
        }

        .list-container {
            max-height: 250px;
            overflow-y: auto;
            margin-top: 6px;
        }
        .list-container::-webkit-scrollbar {
            width: 4px;
        }
        .list-container::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 10px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 13px;
        }
        .list-item .info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex: 1;
            min-width: 100px;
        }
        .list-item .info .name {
            color: #fff;
            font-weight: 600;
        }
        .list-item .info .sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }
        .list-item .info .id {
            font-size: 10px;
            color: rgba(255, 215, 0, 0.5);
        }
        .list-item .info .pwd {
            font-size: 11px;
            color: #48bb78;
        }
        .list-item .info .admin-name {
            font-size: 11px;
            color: #ffd700;
        }
        .list-item .balance {
            color: #48bb78;
            font-weight: 600;
            font-size: 14px;
        }
        .list-item .actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .notification-item {
            background: rgba(246, 173, 85, 0.1);
            border-left: 4px solid #f6ad55;
            padding: 10px 14px;
            border-radius: 10px;
            margin: 5px 0;
            font-size: 13px;
        }
        .notification-item .time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 6px;
            margin: 6px 0;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }
        .stat-box .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 12px 0;
        }
        .role-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .role-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }
        .role-card .icon {
            font-size: 30px;
            display: block;
            margin-bottom: 4px;
        }
        .role-card .title {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
        }
        .role-card .desc {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            margin-top: 2px;
        }
        .role-card.admin-card {
            border-color: rgba(255, 215, 0, 0.2);
        }
        .role-card.admin-card:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }
        .role-card.super-card {
            border-color: rgba(255, 215, 0, 0.1);
            background: rgba(255, 215, 0, 0.03);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .top-bar .left-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }
        .top-bar .right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        .top-bar h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        /* ===== Clock / Time Display ===== */
        .clock-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .clock-display {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
            min-width: 180px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .clock-display .date-part {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            font-size: 11px;
        }
        .clock-display .time-part {
            color: #ffd700;
            font-weight: 700;
            font-size: 15px;
        }
        .clock-display .seconds {
            color: rgba(255, 215, 0, 0.5);
            font-size: 12px;
        }

        .btn-logout {
            background: rgba(252, 129, 129, 0.15);
            border: 1px solid rgba(252, 129, 129, 0.2);
            color: #fc8181;
            padding: 3px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            background: rgba(252, 129, 129, 0.25);
            transform: scale(1.05);
            border-color: #fc8181;
        }

        /* ===== Payment Styles ===== */
        .payment-section {
            margin: 15px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.15);
        }
        .payment-section h4 {
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bank-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }
        .bank-info .info-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 14px;
            border-radius: 10px;
            border-left: 3px solid #ffd700;
        }
        .bank-info .info-item .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }
        .bank-info .info-item .value {
            font-size: 15px;
            color: #fff;
            font-weight: 600;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 2px dashed rgba(255, 215, 0, 0.15);
            min-height: 120px;
            margin: 10px 0;
        }
        .qr-container img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 10px;
        }
        .qr-container .qr-placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
        }

        .amount-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        .amount-btn {
            padding: 6px 14px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 8px;
            color: #ffd700;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
        }
        .amount-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
        }
        .amount-btn.active {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
        }

        .withdraw-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .withdraw-form .form-row .full-width {
            grid-column: 1 / -1;
        }

        .file-upload {
            position: relative;
            padding: 15px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            margin: 5px 0;
        }
        .file-upload:hover {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.05);
        }
        .file-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-upload .upload-icon {
            font-size: 25px;
            display: block;
            margin-bottom: 5px;
        }
        .file-upload .upload-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }
        .file-upload .file-name {
            color: #48bb78;
            font-size: 12px;
            margin-top: 5px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 120px;
            border-radius: 10px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ===== Search for Super Admin ===== */
        .search-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .search-tab {
            padding: 5px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        .search-tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .search-tab.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: #ffd700;
            color: #ffd700;
        }

        /* ===== Transaction History ===== */
        .transaction-list {
            max-height: 250px;
            overflow-y: auto;
            margin-top: 8px;
        }
        .transaction-list::-webkit-scrollbar {
            width: 4px;
        }
        .transaction-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #667eea;
            font-size: 12px;
            flex-wrap: wrap;
            gap: 5px;
        }
        .transaction-item .tx-type {
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
        }
        .tx-type.deposit {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }
        .tx-type.withdraw {
            background: rgba(252, 129, 129, 0.2);
            color: #fc8181;
        }
        .tx-type.transfer {
            background: rgba(246, 173, 85, 0.2);
            color: #f6ad55;
        }
        .tx-type.pending {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
        }
        .tx-type.completed {
            background: rgba(72, 187, 120, 0.15);
            color: #48bb78;
        }
        .tx-type.rejected {
            background: rgba(252, 129, 129, 0.15);
            color: #fc8181;
        }

        .transaction-item .tx-amount {
            font-weight: 700;
            font-size: 14px;
        }
        .transaction-item .tx-amount.positive {
            color: #48bb78;
        }
        .transaction-item .tx-amount.negative {
            color: #fc8181;
        }
        .transaction-item .tx-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .transaction-item .tx-info .tx-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }
        .transaction-item .tx-info .tx-time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
        }
        .transaction-item .tx-status {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
        }
        .tx-status.pending {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
        }
        .tx-status.completed {
            background: rgba(72, 187, 120, 0.15);
            color: #48bb78;
        }
        .tx-status.rejected {
            background: rgba(252, 129, 129, 0.15);
            color: #fc8181;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin: 8px 0;
        }
        .summary-stats .summary-box {
            background: rgba(255, 255, 255, 0.04);
            padding: 8px;
            border-radius: 10px;
            text-align: center;
        }
        .summary-stats .summary-box .number {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

<body>

    <div class="container" id="app">
        <div id="pageContent"></div>
    </div>

    <script>
        // ================================================================
        // ===== DATA LAYER =====
        // ================================================================

        let data = JSON.parse(localStorage.getItem('memberSystemData')) || {
            superAdmins: {},
            subAdmins: {},
            members: {},
            activityLogs: [],
            transactions: [],
            memberCounter: 0,
            adminCounter: 0,
            otpStore: {},
            superAdminOTP: null,
            superAdminOTPTime: null
        };

        function saveData() {
            localStorage.setItem('memberSystemData', JSON.stringify(data));
        }

        function generateAdminId() {
            data.adminCounter++;
            saveData();
            return 'A-' + String(data.adminCounter).padStart(4, '0');
        }

        function generateMemberId() {
            data.memberCounter++;
            saveData();
            return 'M-' + String(data.memberCounter).padStart(4, '0');
        }

        function generateOTP() {
            return String(Math.floor(100000 + Math.random() * 900000));
        }

        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('currentUser') || 'null');
        }

        function setCurrentUser(user) {
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
            } else {
                localStorage.removeItem('currentUser');
            }
        }

        function logoutUser() {
            if (confirm('តើអ្នកចង់ចាកចេញមែនទេ?')) {
                setCurrentUser(null);
                renderPage('home');
            }
        }

        function logActivity(adminId, adminName, action, actionType, target, amount, details) {
            const log = {
                id: 'LOG-' + String(data.activityLogs.length + 1).padStart(4, '0'),
                adminId: adminId || 'unknown',
                adminName: adminName || 'Unknown',
                action: action || 'unknown',
                actionType: actionType || 'general',
                target: target || null,
                amount: amount || null,
                ip: 'local',
                device: navigator.userAgent || 'Unknown',
                timestamp: new Date().toISOString(),
                status: 'success',
                details: details || ''
            };
            data.activityLogs.unshift(log);
            if (data.activityLogs.length > 500) data.activityLogs = data.activityLogs.slice(0, 500);
            saveData();
            return log;
        }

        // ================================================================
        // ===== TRANSACTION SYSTEM =====
        // ================================================================

        function createTransaction(type, memberPhone, adminId, amount, status, description, screenshot) {
            if (!data.transactions) data.transactions = [];
            
            const tx = {
                id: 'TX-' + String(data.transactions.length + 1).padStart(6, '0'),
                type: type,
                memberPhone: memberPhone,
                adminId: adminId || null,
                amount: amount || 0,
                status: status || 'pending',
                description: description || '',
                screenshot: screenshot || null,
                timestamp: new Date().toISOString()
            };
            
            data.transactions.unshift(tx);
            saveData();
            return tx;
        }

        function updateTransactionStatus(txId, newStatus) {
            if (!data.transactions) return;
            const tx = data.transactions.find(t => t.id === txId);
            if (!tx) return;
            tx.status = newStatus;
            saveData();
            return tx;
        }

        function getMemberTransactions(phone) {
            if (!data.transactions) return [];
            return data.transactions.filter(t => t.memberPhone === phone);
        }

        function getAdminTransactions(adminId) {
            if (!data.transactions) return [];
            return data.transactions.filter(t => t.adminId === adminId);
        }

        function calculateTotals(transactions) {
            let totalDeposits = 0, totalWithdraws = 0, totalTransfers = 0;
            transactions.forEach(t => {
                if (t.status === 'completed') {
                    if (t.type === 'deposit') totalDeposits += t.amount;
                    else if (t.type === 'withdraw') totalWithdraws += t.amount;
                    else if (t.type === 'transfer') totalTransfers += t.amount;
                }
            });
            return { totalDeposits, totalWithdraws, totalTransfers, netBalance: totalDeposits - totalWithdraws };
        }

        // ================================================================
        // ===== CLOCK FUNCTION =====
        // ================================================================

        let clockInterval = null;

        function startClock() {
            if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
            function updateClock() {
                const now = new Date();
                const days = ['អាទិត្យ', 'ចន្ទ', 'អង្គារ', 'ពុធ', 'ព្រហស្បតិ៍', 'សុក្រ', 'សៅរ៍'];
                const dayName = days[now.getDay()];
                const dateStr = now.getDate().toString().padStart(2, '0');
                const monthStr = (now.getMonth() + 1).toString().padStart(2, '0');
                const yearStr = now.getFullYear();
                const fullDate = `${dayName} ${dateStr}/${monthStr}/${yearStr}`;
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const seconds = now.getSeconds().toString().padStart(2, '0');

                const dateEl = document.getElementById('clockDate');
                const timeEl = document.getElementById('clockTime');
                const secEl = document.getElementById('clockSeconds');
                if (dateEl) dateEl.textContent = fullDate;
                if (timeEl) timeEl.textContent = `${hours}:${minutes}`;
                if (secEl) secEl.textContent = seconds;
            }
            updateClock();
            clockInterval = setInterval(updateClock, 1000);
        }

        // ================================================================
        // ===== RENDER ENGINE =====
        // ================================================================

        function renderPage(page, params) {
            const container = document.getElementById('pageContent');
            let html = '';

            const showClock = !['home', 'role-select', 'login', 'register', 'super-login', 'super-otp'].includes(page);
            
            let clockHtml = '';
            if (showClock) {
                clockHtml = `
                    <div class="clock-container">
                        <div class="clock-display" id="clockDisplay">
                            <span class="date-part" id="clockDate">--/--/----</span>
                            <span class="time-part" id="clockTime">--:--:--</span>
                            <span class="seconds" id="clockSeconds">--</span>
                        </div>
                        <button onclick="logoutUser()" class="btn-logout">🚪 ចាកចេញ</button>
                    </div>
                `;
            }

            switch (page) {
                case 'home': html = getHomePage(); break;
                case 'role-select': html = getRoleSelectPage(); break;
                case 'login': html = getLoginPage(params); break;
                case 'register': html = getRegisterPage(); break;
                case 'dashboard': html = getDashboardPage(); break;
                case 'admin-dashboard': html = getAdminDashboardPage(); break;
                case 'super-dashboard': html = getSuperDashboardPage(); break;
                case 'super-login': html = getSuperLoginPage(); break;
                case 'super-otp': html = getSuperOTPPage(params); break;
                case 'transfer-money': html = getTransferMoneyPage(params); break;
                case 'activity-log': html = getActivityLogPage(); break;
                case 'edit-member': html = getEditMemberPage(params); break;
                case 'edit-admin': html = getEditAdminPage(params); break;
                default: html = getHomePage();
            }

            if (showClock) {
                html = html.replace(/<button onclick="logoutUser\(\)" class="btn btn-danger btn-sm">🚪 ចាកចេញ<\/button>/g, '');
                html = html.replace(/(<div class="top-bar">)/, '$1<div class="right-section">' + clockHtml + '</div>');
            }

            container.innerHTML = html;
            attachEvents(page, params);
            if (showClock) startClock();
        }
        // ================================================================
        // ===== PAGE BUILDERS =====
        // ================================================================

        function getHomePage() {
            const totalMembers = Object.keys(data.members).length;
            const totalAdmins = Object.keys(data.subAdmins).length;
            const totalBalance = Object.values(data.members).reduce((s, m) => s + m.balance, 0) +
                Object.values(data.subAdmins).reduce((s, a) => s + a.balance, 0);

            return `
                <div class="text-center">
                    <div style="margin-bottom:6px;"><span class="badge badge-gold">🚀 v3.0</span></div>
                    <h1>ស្វាគមន៍!</h1>
                    <p style="font-size:0.95rem;color:rgba(255,255,255,0.5);">ប្រព័ន្ធគ្រប់គ្រងសមាជិក និង Admin</p>
                    <div style="height:2px;width:50px;background:linear-gradient(90deg,#667eea,transparent);margin:12px auto;"></div>

                    <div class="stats">
                        <div class="stat-box"><div class="number">${totalMembers}</div><div class="label">សមាជិក</div></div>
                        <div class="stat-box"><div class="number">${totalAdmins}</div><div class="label">Sub Admin</div></div>
                        <div class="stat-box"><div class="number">$${totalBalance.toFixed(0)}</div><div class="label">ប្រាក់សរុប</div></div>
                        <div class="stat-box"><div class="number">${Object.keys(data.members).filter(k => data.members[k].balance > 0).length}</div><div class="label">សកម្ម</div></div>
                    </div>

                    <div class="buttons">
                        <button onclick="renderPage('role-select')" class="btn">🔑 ចូលប្រើ</button>
                        <button onclick="renderPage('register')" class="btn btn-secondary">📝 ចុះឈ្មោះ</button>
                    </div>

                    <div style="margin-top:12px;">
                        <button onclick="renderPage('super-login')" class="btn-super">⭐ Super Admin</button>
                    </div>
                </div>
            `;
        }

        function getRoleSelectPage() {
            return `
                <div class="top-bar">
                    <h2>🔑 ជ្រើសរើសប្រភេទ</h2>
                    <span class="back-link" onclick="renderPage('home')">← ត្រឡប់</span>
                </div>
                <p style="font-size:13px;">សូមជ្រើសរើសប្រភេទអ្នកប្រើប្រាស់</p>

        function getSuperOTPPage(params) {

            return `

                    </div>
                `;
            }
            
            const totals = calculateTotals(transactions);
            let html = `
                <div class="card">
                    <h3>📋 ប្រវត្តិប្រតិបត្តិការ</h3>

                            <div class="label">បានដាក់</div>
                        </div>
                        <div class="summary-box">
                            <div class="number red">$${totals.totalWithdraws.toFixed(2)}</div>
                            <div class="label">បានដក</div>
                        </div>
                        <div class="summary-box">
                            <div class="number gold">$${totals.netBalance.toFixed(2)}</div>
                            <div class="label">សល់</div>
                        </div>
                    </div>
                    <div class="transaction-list">
            `;
            
            transactions.slice(0, 20).forEach(tx => {
                const date = new Date(tx.timestamp);
                const dateStr = date.toLocaleDateString('km-KH', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const timeStr = date.toLocaleTimeString('km-KH', { hour: '2-digit', minute: '2-digit' });
                const typeLabel = tx.type === 'deposit' ? 'ដាក់ប្រាក់' : tx.type === 'withdraw' ? 'ដកប្រាក់' : 'ផ្ទេរ';
                const typeClass = tx.type === 'deposit' ? 'deposit' : tx.type === 'withdraw' ? 'withdraw' : 'transfer';
                const amountClass = tx.type === 'deposit' ? 'positive' : 'negative';
                const amountSign = tx.type === 'deposit' ? '+' : '-';
                const statusText = tx.status === 'pending' ? '⏳ រង់ចាំ' : tx.status === 'completed' ? '✅ បានបញ្ចប់' : '❌ បដិសេធ';
                
                html += `
                    <div class="transaction-item">
                        <div class="tx-info">
                            <div>
                                <span class="tx-type ${typeClass}">${typeLabel}</span>
                                <span class="tx-status ${tx.status}">${statusText}</span>
                            </div>
                            <div class="tx-desc">${tx.description || ''}</div>
                            <div class="tx-time">${dateStr} ${timeStr}</div>
                        </div>
                        <div class="tx-amount ${amountClass}">${amountSign}$${tx.amount.toFixed(2)}</div>
                    </div>
                `;
            });
            
            html += `
                    </div>
                    ${transactions.length > 20 ? `<p style="text-align:center;font-size:11px;color:rgba(255,255,255,0.2);padding-top:8px;">បង្ហាញ ២០ ចុងក្រោយ (សរុប ${transactions.length})</p>` : ''}
                </div>
            `;
            
            return html;
        }

        function clearSearchResult(elementId) {

            const input = document.getElementById(inputId);

            document.getElementById('superSearchInput').value = '';
            document.getElementById('superSearchResult').innerHTML = '';

        function clearFundSearch() {
            document.getElementById('superFundInput').value = '';
            document.getElementById('superFundResult').innerHTML = '';
        }

        let superSearchType = 'member';

        function switchSuperSearch(type, btn) {
            superSearchType = type;
            document.querySelectorAll('.search-tab').forEach(t => t.classList.remove('active'));
            if (btn) btn.classList.add('active');
            document.getElementById('superSearchResult').innerHTML = '';
            document.getElementById('superSearchInput').value = '';
        }

        function superSearch() {
            const input = document.getElementById('superSearchInput').value.trim();
            const resultDiv = document.getElementById('superSearchResult');
            
            if (!input) {
                resultDiv.innerHTML = `<div class="error">សូមបញ្ចូលព័ត៌មានដើម្បីស្វែងរក!</div>`;
                return;
            }

            let results = [];
            
            if (superSearchType === 'member') {
                Object.values(data.members).forEach(m => {
                    if (m.id === input || m.phone === input || (m.username && m.username.toLowerCase().includes(input.toLowerCase()))) {
                        const admin = data.subAdmins[m.adminId];
                        results.push({ type: 'member', data: m, adminName: admin ? admin.username : 'មិនទាន់មាន Admin' });
                    }
                });
            } else {
                Object.values(data.subAdmins).forEach(a => {
                    if (a.id === input || a.phone === input || a.username.toLowerCase().includes(input.toLowerCase())) {
                        results.push({ type: 'admin', data: a, memberCount: (a.members || []).length });
                    }
                });
            }

            if (results.length === 0) {
                resultDiv.innerHTML = `<div class="error">❌ រកមិនឃើញលទ្ធផលសម្រាប់ "${input}"</div>`;

            results.forEach(r => {

                                <button onclick="assignAdmin('${m.phone}')" class="btn btn-gold btn-xs">👑</button>

        // ===== SEARCH SUB ADMIN FOR FUND =====
        function searchSubAdminForFund() {
            const input = document.getElementById('superFundInput').value.trim();
            const resultDiv = document.getElementById('superFundResult');
            
            if (!input) {
                resultDiv.innerHTML = `<div class="error">សូមបញ្ចូល ID ឬ លេខទូរសព្ទ!</div>`;
                return;
            }

            let foundAdmin = null;
            Object.values(data.subAdmins).forEach(a => {
                if (a.id === input || a.phone === input) foundAdmin = a;
            });

            if (!foundAdmin) {
                resultDiv.innerHTML = `<div class="error">❌ រកមិនឃើញ Sub Admin!</div>`;
                return;
            }

            resultDiv.innerHTML = `
                <div class="search-result-box">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
                        <div>
                            <div style="color:#ffd700;font-weight:600;">👑 ${foundAdmin.username}</div>
                            <div style="font-size:12px;color:rgba(255,255,255,0.5);">🆔 ${foundAdmin.id} | 📱 ${foundAdmin.phone}</div>
                            <div style="font-size:14px;color:#48bb78;">💰 $${foundAdmin.balance.toFixed(2)}</div>
                        </div>
                        <div>
                            <form id="superFundAdminForm" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                                <input type="hidden" name="adminPhone" value="${foundAdmin.phone}">
                                <input type="number" name="fundAmount" placeholder="$$$" min="0.01" step="0.01" style="width:120px;padding:8px 12px;margin:0;" required>
                                <button type="submit" class="btn btn-gold btn-sm">💳 បញ្ចូល</button>
                            </form>
                        </div>
                    </div>
                </div>
            `;

            const fundForm = document.getElementById('superFundAdminForm');
            if (fundForm) {
                fundForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const phone = this.querySelector('[name="adminPhone"]').value;
                    const amount = parseFloat(this.querySelector('[name="fundAmount"]').value);
                    
                    if (!amount || amount <= 0) {
                        alert('សូមបញ្ចូលចំនួនត្រឹមត្រូវ!');
                        return;
                    }

                    const admin = data.subAdmins[phone];
                    if (!admin) { alert('មិនឃើញ Admin!'); return; }

                    admin.balance += amount;
                    admin.totalReceived = (admin.totalReceived || 0) + amount;
                    saveData();
                    logActivity('SUPER-001', 'Super Admin', 'fund_admin', 'financial', phone, amount,
                        'បញ្ចូល $' + amount.toFixed(2) + ' ទៅ ' + admin.username);

                    alert('✅ បញ្ចូល $' + amount.toFixed(2) + ' ជោគជ័យ!');
                    renderPage('super-dashboard');
                });
            }
        }

        function submitWithdraw() {
            const name = document.getElementById('withdrawName').value.trim();
            const phone = document.getElementById('withdrawPhone').value.trim();
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const qrInput = document.getElementById('withdrawQRInput');

            if (!name) { alert('សូមបញ្ចូលឈ្មោះ!'); return; }

            if (!amount || amount <= 0) { alert('សូមបញ្ចូលចំនួនប្រាក់ត្រឹមត្រូវ!'); return; }

                        alert('ប្រាក់របស់អ្នកមិនគ្រប់គ្រាន់! (នៅសល់ $' + member.balance.toFixed(2) + ')');

                    const phone = document.getElementById('loginPhone').value.trim();
                    const password = document.getElementById('loginPassword').value.trim();
                    const msg = document.getElementById('message');

                    if (!phone || !password) {
                        msg.innerHTML = `<div class="error">សូមបំពេញព័ត៌មាន!</div>`;
                        return;
                    }

                    if (role === 'sub_admin') {
                        const admin = data.subAdmins[phone];
                        if (!admin || admin.password !== password) {
                            msg.innerHTML = `<div class="error">❌ មិនត្រឹមត្រូវ!</div>`;
                            return;
                        }
                        setCurrentUser({ phone: phone, role: 'sub_admin', name: admin.username });
                        logActivity(admin.id, admin.username, 'login', 'authentication', null, null, 'ចូលប្រើជា Sub Admin');
                        renderPage('admin-dashboard');
                    } else {
                        const member = data.members[phone];
                        if (!member || member.password !== password) {
                            msg.innerHTML = `<div class="error">❌ មិនត្រឹមត្រូវ!</div>`;
                            return;
                        }
                        setCurrentUser({ phone: phone, role: 'member', name: member.username || phone });
                        logActivity(member.id, member.username || phone, 'login', 'authentication', null, null, 'ចូលប្រើជាសមាជិក');
                        renderPage('dashboard');
                    }
                });
            }

            // ---- REGISTER ----
            const registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const username = document.getElementById('regUsername').value.trim();
                    const phone = document.getElementById('regPhone').value.trim();
                    const password = document.getElementById('regPassword').value.trim();
                    const confirm = document.getElementById('regConfirmPassword').value.trim();
                    const msg = document.getElementById('message');

                    if (!phone || !password || !confirm) {
                        msg.innerHTML = `<div class="error">សូមបំពេញព័ត៌មាន!</div>`;
                        return;
                    }
                    if (!/^\d{9,}$/.test(phone)) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទមិនត្រឹមត្រូវ!</div>`;
                        return;
                    }
                    if (password !== confirm) {
                        msg.innerHTML = `<div class="error">ពាក្យសម្ងាត់មិនដូចគ្នា!</div>`;
                        return;
                    }
                    if (data.members[phone]) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទមានរួចហើយ!</div>`;
                        return;
                    }

                    const newId = generateMemberId();
                    data.members[phone] = {
                        username: username || phone,
                        password: password,
                        phone: phone,
                        id: newId,
                        role: 'member',
                        balance: 0,
                        benefits: ['✨ សមាជិកថ្មី'],
                        adminId: null,
                        createdAt: new Date().toISOString()
                    };
                    saveData();
                    msg.innerHTML = `<div class="success">✅ ចុះឈ្មោះជោគជ័យ! 🆔 ${newId}<br><span onclick="renderPage('role-select')" style="color:#667eea;cursor:pointer;">🔑 ចូលប្រើ</span></div>`;
                    registerForm.reset();
                });
            }

            // ---- CREATE ADMIN ----
            const createAdminForm = document.getElementById('createAdminForm');
            if (createAdminForm) {
                createAdminForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('newAdminName').value.trim();
                    const phone = document.getElementById('newAdminPhone').value.trim();
                    const password = document.getElementById('newAdminPassword').value.trim();
                    const balance = parseFloat(document.getElementById('newAdminBalance').value) || 0;
                    const msg = document.getElementById('createAdminMessage');

                    if (!name || !phone || !password) {
                        msg.innerHTML = `<div class="error">សូមបំពេញព័ត៌មាន!</div>`;
                        return;
                    }
                    if (!/^\d{9,}$/.test(phone)) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទមិនត្រឹមត្រូវ!</div>`;
                        return;
                    }
                    if (data.subAdmins[phone]) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទមានរួចហើយ!</div>`;
                        return;
                    }

                    const newId = generateAdminId();
                    data.subAdmins[phone] = {
                        username: name,
                        password: password,
                        phone: phone,
                        id: newId,
                        role: 'sub_admin',
                        balance: balance,
                        totalReceived: balance,
                        totalTransferred: 0,
                        members: [],
                        createdBy: 'super_admin',
                        createdAt: new Date().toISOString()
                    };
                    saveData();
                    logActivity('SUPER-001', 'Super Admin', 'create_admin', 'administration', phone, null, 'បង្កើត Sub Admin "' + name + '" (' + newId + ')');
                    msg.innerHTML = `<div class="success">✅ បង្កើតជោគជ័យ! 🆔 ${newId}<br>🔒 ${password}</div>`;
                    createAdminForm.reset();
                    setTimeout(() => renderPage('super-dashboard'), 2000);
                });
            }

            // ---- TRANSFER MONEY ----
            const transferForm = document.getElementById('transferForm');
            if (transferForm) {
                transferForm.addEventListener('submit', function(e) {
                    // ... (same as before)
                });
            }

            // ---- EDIT MEMBER (Super Admin) ----
            const editMemberForm = document.getElementById('editMemberForm');
            if (editMemberForm) {
                editMemberForm.addEventListener('submit', function(e) {
                    // ... (same as before)
                });
            }

            // ---- EDIT ADMIN ----
            const editAdminForm = document.getElementById('editAdminForm');
            if (editAdminForm) {
                editAdminForm.addEventListener('submit', function(e) {
                    // ... (same as before)
                });
            }
        }

        // ================================================================
        // ===== INIT =====
        // ================================================================

        if (!data.superAdminExists) {
            data.superAdmins['066817407'] = {
                username: 'Super Admin',
                password: 'super123',
                phone: '066817407',
                email: 'narith128080@gmail.com',
                id: 'SUPER-001',
                role: 'super_admin',
                balance: 10000,
                createdAt: new Date().toISOString()
            };
            data.superAdminExists = true;
            saveData();
            logActivity('SUPER-001', 'Super Admin', 'system_init', 'system', null, null, 'បង្កើតប្រព័ន្ធ Super Admin');
        }

        const currentUser = getCurrentUser();
        if (currentUser) {
            if (currentUser.role === 'super_admin') renderPage('super-dashboard');
            else if (currentUser.role === 'sub_admin' && data.subAdmins[currentUser.phone]) renderPage('admin-dashboard');
            else if (currentUser.role === 'member' && data.members[currentUser.phone]) renderPage('dashboard');
            else { setCurrentUser(null); renderPage('home'); }
        } else {
            renderPage('home');
        }
    </script>
</body>
</html>
