<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1000 lucky number prediction tables</title>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Battambang', 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #0f0c20 0%, #15102a 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 35px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        .main-title {
            color: #fbd38d; 
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .sub-title {
            color: #a0aec0;
            font-size: 0.85rem;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .live-time-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2b6cb0; 
            border-radius: 30px;
            padding: 6px 18px;
            font-size: 0.9rem;
            font-weight: 400;
            margin-bottom: 25px;
            box-shadow: 0 4px 12px rgba(43, 108, 176, 0.3);
        }

        .balance-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            border: 1px solid rgba(246, 173, 85, 0.2);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .balance-info {
            text-align: left;
        }

        .balance-label {
            font-size: 0.8rem;
            color: #a0aec0;
            margin-bottom: 4px;
        }

        .balance-amount {
            font-size: 1.4rem;
            font-weight: 700;
            color: #4ade80;
            font-family: 'Poppins', sans-serif;
        }

        .deposit-btn {
            background: #4ade80;
            color: #0f0c20;
            border: none;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .deposit-btn:hover {
            background: #22c55e;
            transform: translateY(-1px);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #15102a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .modal-overlay.show .modal-box {
            transform: scale(1);
        }

        .modal-title {
            font-size: 1.1rem;
            color: #fbd38d;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .modal-desc {
            font-size: 0.8rem;
            color: #a0aec0;
            margin-bottom: 15px;
        }

        .pin-input, .amount-input {
            width: 100%;
            background: #0b0816;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px;
            color: #ffffff;
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 20px;
            font-family: 'Poppins', sans-serif;
        }

        .pin-input:focus, .amount-input:focus {
            outline: none;
            border-color: #4ade80;
        }

        .amount-input-wrapper {
            position: relative;
        }
        .amount-input-wrapper::before {
            content: "$";
            position: absolute;
            left: 20px;
            top: 10px;
            font-size: 1.3rem;
            color: #4ade80;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
        }
        .amount-input {
            padding-left: 40px;
            color: #4ade80;
            font-weight: 700;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-cancel {
            background: #4a5568;
            color: #ffffff;
        }
        .btn-cancel:hover { background: #3e4654; }

        .btn-confirm {
            background: #3182ce;
            color: #ffffff;
        }
        .btn-confirm:hover { background: #2b6cb0; }

        .btn-success {
            background: #4ade80;
            color: #0f0c20;
        }
        .btn-success:hover { background: #22c55e; }

        .section-indicator {
            color: #4ade80; 
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .lucky-circle {
            min-width: 150px;
            max-width: fit-content;
            height: 80px;
            background: radial-gradient(circle, #f6ad55 0%, #dd6b20 100%);
            border-radius: 50px;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 0 25px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            box-shadow: 0 0 35px rgba(221, 107, 32, 0.4);
            border: 3px solid #ffffff;
        }

        .countdown-box {
            font-size: 0.9rem;
            color: #e2e8f0;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            display: inline-block;
            padding: 6px 14px;
            border-radius: 10px;
        }

        .countdown-time {
            color: #fc8181; 
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
        }

        .zodiac-box-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .zodiac-big-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px;
        }

        .zodiac-box-title {
            font-size: 0.8rem;
            color: #fbd38d;
            text-align: left;
            margin-bottom: 8px;
            padding-left: 4px;
            font-weight: bold;
        }

        .zodiac-grid-4 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .zodiac-card {
            background: #0b0816;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .zodiac-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffffff;
        }

        .zodiac-card-icon {
            font-size: 1.4rem;
        }

        .zodiac-card-order {
            font-size: 0.75rem;
            color: #a0aec0;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .history-box {
            background: #0b0816;
            border-radius: 16px;
            padding: 20px 10px;
            text-align: left;
            max-height: 380px;
            overflow-y: auto;
            margin-bottom: 25px;
        }

        .history-box::-webkit-scrollbar {
            width: 6px;
        }
        .history-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .history-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #cbd5e1;
            padding-left: 5px;
        }

        .time-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .time-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time-item.active {
            background: rgba(74, 222, 128, 0.05);
            border-color: #4ade80;
            border-left: 4px solid #4ade80;
        }
