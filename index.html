<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>អាជីវករខ្មែរ - វេទិកាហិរញ្ញវត្ថុ</title>

    <!-- Font ខ្មែរ -->
    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Battambang:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * {
            font-family: 'Battambang', 'Khmer', sans-serif;
        }
        body {
            background: #f0f2f5;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .success-box {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border: 2px solid #10b981;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        .deposit-info {
            background: #f8fafc;
            border: 1px dashed #94a3b8;
            border-radius: 12px;
            padding: 16px;
        }
        .qr-placeholder {
            width: 120px;
            height: 120px;
            background: #e2e8f0;
            border: 2px dashed #94a3b8;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #64748b;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .qr-placeholder:hover {
            transform: scale(1.05);
            border-color: #3b82f6;
        }
        .qr-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        .withdraw-box {
            background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
            border: 2px solid #8b5cf6;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }
        .modal-box img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 12px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            animation: slideUp 0.4s ease;
            max-width: 400px;
        }
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        .toast-info { background: #3b82f6; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
        }
        .password-toggle:hover {
            color: #3b82f6;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 44px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #e2e8f0;
            border-radius: 12px;
            font-weight: 600;
            color: #475569;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 14px;
            flex-shrink: 0;
        }
        .back-btn:hover {
            background: #cbd5e1;
            transform: translateX(-4px);
        }
        .back-btn i {
            font-size: 16px;
        }
        .member-id-badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .page-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e293b;
            margin: 0;
        }
        .reward-box {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border: 2px solid #f59e0b;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        .image-viewer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }
        .image-viewer img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .image-viewer .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 32px;
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .image-viewer .close-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen flex flex-col">

        <!-- NAVBAR -->
        <nav class="bg-white shadow-md border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center shadow">
                    <i class="fas fa-store text-white text-xl"></i>
                </div>
                <span class="text-xl font-bold text-gray-800">អាជីវករខ្មែរ</span>
            </div>
            <div id="navUser" class="flex items-center gap-3"></div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="flex-1 max-w-7xl mx-auto w-full p-4">
            <div id="pageContent"></div>
        </div>

        <!-- Modal Container -->
        <div id="modalContainer"></div>

        <!-- Image Viewer -->
        <div id="imageViewer" class="hidden"></div>

        <!-- Toast Container -->
        <div id="toastContainer"></div>

        <!-- FOOTER -->
        <footer class="bg-white border-t border-gray-200 text-center text-sm text-gray-400 py-4">
            © 2026 អាជីវករខ្មែរ — គ្រប់គ្រងហិរញ្ញវត្ថុឆ្លាតវៃ
        </footer>
    </div>

    <script>
        // ============================================================
        //  1. DATA LAYER
        // ============================================================
        const DB = {
            get(key, def) {
                try {
                    const raw = localStorage.getItem('ak_' + key);
                    return raw ? JSON.parse(raw) : def;
                } catch { return def; }
            },
            set(key, val) {
                localStorage.setItem('ak_' + key, JSON.stringify(val));
            },
            getUsers() { return this.get('users', []); },
            setUsers(u) { this.set('users', u); },
            getTx() { return this.get('tx', []); },
            setTx(t) { this.set('tx', t); },
            getWithdraws() { return this.get('withdraws', []); },
            setWithdraws(w) { this.set('withdraws', w); },
            getDeposits() { return this.get('deposits', []); },
            setDeposits(d) { this.set('deposits', d); },
            getSession() { return this.get('session', null); },
            setSession(s) { this.set('session', s); },
            clearSession() { localStorage.removeItem('ak_session'); },
            getNextId() {
                let current = this.get('nextId', 1000);
                this.set('nextId', current + 1);
                return current;
            }
        };

        // ============================================================
        //  2. HELPERS
        // ============================================================
        function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

        function formatMoney(n) {
            return n.toLocaleString('km-KH') + ' ៛';
        }

        function getDate() {
            return new Date().toLocaleString('km-KH', { timeZone: 'Asia/Phnom_Penh' });
        }

        function sendTelegram(msg) {
            console.log('📱 [Telegram] ' + msg);
            showToast('📱 បានផ្ញើទៅ Telegram', 'info');
            playNotificationSound();
        }

        function playNotificationSound() {
            try {
                const audio = new Audio('data:audio/wav;base64,UklGRnoAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoAAACBhYqFh4OIg4yGjoeOh5GKlJCVjZaQlo6akZ+WoqOdp6Kkq6+rs7Gxtbe3u7m6vL6+wMDCxMTGx8nLy87Q0tLU1tfZ29ve4OLk5ufp6+zu8PL09vf5+/z9//8=');
                audio.play().catch(() => {});
            } catch(e) {}
        }

        // ============================================================
        //  3. TOAST & MODAL
        // ============================================================
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        function showModal(title, message, onConfirm = null, onCancel = null) {
            const container = document.getElementById('modalContainer');
            container.innerHTML = `
                <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
                    <div class="modal-box">
                        <h3 class="text-xl font-bold text-gray-800 mb-2">${title}</h3>
                        <div class="text-gray-600 mb-4">${message}</div>
                        <div class="flex gap-3 justify-end">
                            ${onCancel ? `<button onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded-xl hover:bg-gray-300 transition">បោះបង់</button>` : ''}
                            ${onConfirm ? `<button onclick="closeModal(); ${onConfirm}()" class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition">យល់ព្រម</button>` : `<button onclick="closeModal()" class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition">យល់ព្រម</button>`}
                        </div>
                    </div>
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('modalContainer').innerHTML = '';
        }

        // ============================================================
        //  4. IMAGE VIEWER
        // ============================================================
        function showImageViewer(imageSrc) {
            const viewer = document.getElementById('imageViewer');
            viewer.innerHTML = `
                <div class="image-viewer" onclick="closeImageViewer()">
                    <div class="close-btn" onclick="event.stopPropagation(); closeImageViewer()">
                        <i class="fas fa-times"></i>
                    </div>
                    <img src="${imageSrc}" alt="QR Code" onclick="event.stopPropagation()" />
                </div>
            `;
            viewer.classList.remove('hidden');
        }

        function closeImageViewer() {
            document.getElementById('imageViewer').classList.add('hidden');
        }

        // ============================================================
        //  5. AUTH
        // ============================================================
        function registerUser(phone, name, password) {
            let users = DB.getUsers();
            if (users.find(u => u.phone === phone)) return { ok: false, msg: 'លេខទូរសព្ទមានរួចហើយ!' };
            const memberId = DB.getNextId();
            users.push({ 
                phone, 
                name, 
                password, 
                balance: 0, 
                status: 'active', 
                role: 'user',
                memberId: memberId
            });
            DB.setUsers(users);
            return { ok: true, memberId };
        }

        function loginUser(phone, password) {
            let users = DB.getUsers();
            let u = users.find(u => u.phone === phone && u.password === password);
            if (!u) return { ok: false, msg: 'លេខទូរសព្ទ ឬ ពាក្យសម្ងាត់មិនត្រឹមត្រូវ' };
            if (u.status === 'suspended') return { ok: false, msg: 'គណនីត្រូវបានផ្អាក!' };
            DB.setSession({ phone: u.phone, name: u.name, role: u.role || 'user' });
            return { ok: true };
        }

        function getCurrentUser() {
            const sess = DB.getSession();
            if (!sess) return null;
            const users = DB.getUsers();
            return users.find(u => u.phone === sess.phone) || null;
        }

        function logout() {
            DB.clearSession();
            renderPage('login');
        }

        // ============================================================
        //  6. TRANSACTIONS
        // ============================================================
        function addTransaction(phone, type, amount, note = '') {
            let tx = DB.getTx();
            tx.push({
                id: genId(),
                phone,
                type,
                amount,
                status: 'completed',
                date: getDate(),
                note
            });
            DB.setTx(tx);
            let users = DB.getUsers();
            let u = users.find(u => u.phone === phone);
            if (u) {
                if (type === 'deposit') u.balance += amount;
                else if (type === 'withdraw') u.balance -= amount;
                DB.setUsers(users);
            }
        }

        // ============================================================
        //  7. RENDER ENGINE
        // ============================================================
        function renderPage(page, data = null) {
            const container = document.getElementById('pageContent');
            const user = getCurrentUser();

            const navUser = document.getElementById('navUser');
            if (user) {
                const memberId = user.memberId || 'N/A';
                navUser.innerHTML = `
                    <span class="text-sm text-gray-600 hidden sm:inline"><i class="fas fa-user-circle mr-1"></i> ${user.name}</span>
                    <span class="member-id-badge">ID: ${memberId}</span>
                    <span class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">${user.role === 'admin' ? 'Admin' : user.phone}</span>
                    <span class="text-sm font-bold text-green-600">${formatMoney(user.balance)}</span>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-sign-out-alt"></i></button>
                `;
            } else {
                navUser.innerHTML = `<button onclick="renderPage('login')" class="bg-blue-600 text-white px-4 py-1 rounded-xl text-sm hover:bg-blue-700">ចូលប្រើ</button>`;
            }

            switch (page) {
                case 'login': renderLogin(container); break;
                case 'dashboard': renderDashboard(container, user); break;
                case 'deposit': renderDeposit(container, user); break;
                case 'withdraw': renderWithdraw(container, user); break;
                case 'admin': renderAdmin(container, user); break;
                case 'adminDeposit': renderAdminDeposit(container, user); break;
                case 'adminWithdraw': renderAdminWithdraw(container, user); break;
                case 'adminHistory': renderAdminHistory(container, user); break;
                case 'adminReward': renderAdminReward(container, user); break;
                default: renderLogin(container);
            }
        }

        // ============================================================
        //  8. PAGE: LOGIN / REGISTER
        // ============================================================
        function renderLogin(container) {
            container.innerHTML = `
            <div class="flex items-center justify-center min-h-[70vh]">
                <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
                    <div class="text-center mb-6">
                        <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-store text-white text-3xl"></i>
                        </div>
                        <h1 class="text-2xl font-bold text-gray-800">អាជីវករខ្មែរ</h1>
                        <p class="text-gray-500 text-sm">ចូលប្រើ ឬ ចុះឈ្មោះ</p>
                    </div>

                    <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
                        <button id="loginTab" class="flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-md text-blue-600">ចូលប្រើ</button>
                        <button id="registerTab" class="flex-1 py-2 rounded-lg text-sm font-semibold text-gray-500">ចុះឈ្មោះ</button>
                    </div>

                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-phone text-blue-500 mr-2"></i>លេខទូរសព្ទ</label>
                            <input type="tel" id="loginPhone" placeholder="០៩៧ ៨៧ ៦៥ ៤៣" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-lock text-blue-500 mr-2"></i>ពាក្យសម្ងាត់</label>
                            <div class="password-wrapper">
                                <input type="password" id="loginPass" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                                <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPass', this)"></i>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">ចូលប្រើ</button>
                    </form>

                    <form id="registerForm" class="hidden mt-4">
                        <div class="mb-3">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-user text-blue-500 mr-2"></i>ឈ្មោះពេញ</label>
                            <input type="text" id="regName" placeholder="សុខ សុខា" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <div class="mb-3">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-phone text-blue-500 mr-2"></i>លេខទូរសព្ទ</label>
                            <input type="tel" id="regPhone" placeholder="០៩៧ ៨៧ ៦៥ ៤៣" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <div class="mb-3">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-lock text-blue-500 mr-2"></i>ពាក្យសម្ងាត់</label>
                            <div class="password-wrapper">
                                <input type="password" id="regPass" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                                <i class="fas fa-eye password-toggle" onclick="togglePassword('regPass', this)"></i>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition">ចុះឈ្មោះ</button>
                    </form>
                </div>
            </div>
            `;

            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            loginTab.onclick = () => {
                loginTab.className = 'flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-md text-blue-600';
                registerTab.className = 'flex-1 py-2 rounded-lg text-sm font-semibold text-gray-500';
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            };
            registerTab.onclick = () => {
                registerTab.className = 'flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-md text-blue-600';
                loginTab.className = 'flex-1 py-2 rounded-lg text-sm font-semibold text-gray-500';
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            };

            loginForm.onsubmit = (e) => {
                e.preventDefault();
                const phone = document.getElementById('loginPhone').value.trim();
                const pass = document.getElementById('loginPass').value.trim();
                const result = loginUser(phone, pass);
                if (result.ok) {
                    const user = getCurrentUser();
                    if (user.role === 'admin') renderPage('admin');
                    else renderPage('dashboard');
                    showToast('✅ ចូលប្រើជោគជ័យ!', 'success');
                } else {
                    showToast('❌ ' + result.msg, 'error');
                }
            };

            registerForm.onsubmit = (e) => {
                e.preventDefault();
                const name = document.getElementById('regName').value.trim();
                const phone = document.getElementById('regPhone').value.trim();
                const pass = document.getElementById('regPass').value.trim();
                if (!name || !phone || !pass) {
                    showToast('សូមបំពេញព័ត៌មានឲ្យពេញលេញ!', 'error');
                    return;
                }
                const result = registerUser(phone, name, pass);
                if (result.ok) {
                    showToast(`✅ ចុះឈ្មោះជោគជ័យ! ID: ${result.memberId} សូមចូលប្រើ។`, 'success');
                    loginTab.click();
                } else {
                    showToast('❌ ' + result.msg, 'error');
                }
            };
        }

        // ============================================================
        //  9. TOGGLE PASSWORD
        // ============================================================
        window.togglePassword = function(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };

        // ============================================================
        //  10. PAGE: DASHBOARD (User)
        // ============================================================
        function renderDashboard(container, user) {

        // ============================================================

        // ============================================================
        window.approveDeposit = function(id) {
            let deposits = DB.getDeposits();
            const idx = deposits.findIndex(d => d.id === id);
            if (idx === -1) return;
            const d = deposits[idx];
            d.status = 'approved';
            DB.setDeposits(deposits);

            let users = DB.getUsers();
            const u = users.find(u => u.phone === d.phone);
            if (u) {
                u.balance += d.amount;
                DB.setUsers(users);
                addTransaction(d.phone, 'deposit', d.amount, `បញ្ចូលតាម Admin (${d.bank})`);

                const admin = users.find(u => u.role === 'admin');
                if (admin) {
                    admin.balance += d.amount;
                    DB.setUsers(users);
                }

                playNotificationSound();
                sendTelegram(`✅ បញ្ចូលប្រាក់ជោគជ័យ!
        អ្នកប្រើ: ${d.name} (ID: ${d.memberId || 'N/A'})
        ចំនួន: ${formatMoney(d.amount)}`);
                showToast(`✅ បានអនុម័តបញ្ចូល ${formatMoney(d.amount)}`, 'success');
            }
            renderPage('adminDeposit');
        };

        window.rejectDeposit = function(id) {
            let deposits = DB.getDeposits();
            const idx = deposits.findIndex(d => d.id === id);
            if (idx === -1) return;
            deposits[idx].status = 'rejected';
            DB.setDeposits(deposits);
            showToast('❌ បានបដិសេធ', 'error');
            renderPage('adminDeposit');
        };

        window.approveWithdraw = function(id) {
            let withdraws = DB.getWithdraws();
            const idx = withdraws.findIndex(w => w.id === id);
            if (idx === -1) return;
            const w = withdraws[idx];
            w.status = 'approved';
            DB.setWithdraws(withdraws);

            let users = DB.getUsers();
            const u = users.find(u => u.phone === w.phone);
            if (u) {
                if (u.balance >= w.amount) {
                    u.balance -= w.amount;
                    DB.setUsers(users);
                    addTransaction(w.phone, 'withdraw', w.amount, `ដកតាម Admin (${w.bank})`);

                    const admin = users.find(u => u.role === 'admin');
                    if (admin) {
                        admin.balance -= w.amount;
                        DB.setUsers(users);
                    }

                    playNotificationSound();
                    sendTelegram(`✅ ដកប្រាក់ជោគជ័យ!
        អ្នកប្រើ: ${w.name} (ID: ${w.memberId || 'N/A'})
        ចំនួន: ${formatMoney(w.amount)}`);
                    showToast(`✅ បានអនុម័តដក ${formatMoney(w.amount)}`, 'success');
                } else {
                    showToast('❌ សមតុល្យមិនគ្រប់!', 'error');
                    return;
                }
            }
            renderPage('adminWithdraw');
        };

        window.rejectWithdraw = function(id) {
            let withdraws = DB.getWithdraws();
            const idx = withdraws.findIndex(w => w.id === id);
            if (idx === -1) return;
            withdraws[idx].status = 'rejected';
            DB.setWithdraws(withdraws);
            showToast('❌ បានបដិសេធ', 'error');
            renderPage('adminWithdraw');
        };

        // ============================================================
        //  20. INIT
        // ============================================================
        (function init() {
            let users = DB.getUsers();
            if (!users.find(u => u.role === 'admin')) {
                users.push({
                    phone: '0987654321',
                    name: 'Admin',
                    password: 'admin123',
                    balance: 0,
                    status: 'active',
                    role: 'admin',
                    memberId: 0
                });
                DB.setUsers(users);
            }
            const sess = DB.getSession();
            if (sess) {
                const user = getCurrentUser();
                if (user) {
                    if (user.role === 'admin') renderPage('admin');
                    else renderPage('dashboard');
                    return;
                }
            }
            renderPage('login');
        })();

        window.renderPage = renderPage;
        window.logout = logout;
        window.showModal = showModal;
        window.closeModal = closeModal;
        window.showToast = showToast;
        window.playNotificationSound = playNotificationSound;
        window.showImageViewer = showImageViewer;
        window.closeImageViewer = closeImageViewer;
    </script>
</body>
</html>
