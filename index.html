<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិក និងហិរញ្ញវត្ថុទំនើប</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome Icons CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SheetJS CDN (សម្រាប់ Export Excel) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Google Fonts (Khmer & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:ital,wght@0,100..700;1,100..700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Kantumruy Pro', 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px; height: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; border-radius: 10px;
        }
        .balance-box {
            background: linear-gradient(135deg, #1e40af 0%, #312e81 100%);
            color: white; position: relative; overflow: hidden;
            border-radius: 24px; padding: 1.5rem;
        }
        .floating-emoji {
            position: absolute; font-size: 3rem; opacity: 0.04; pointer-events: none;
        }
        .floating-emoji:nth-child(1) { top: -10px; left: -10px; }
        .floating-emoji:nth-child(2) { bottom: -10px; right: -10px; }
        .floating-emoji:nth-child(3) { top: 40%; left: 50%; }
        .floating-emoji:nth-child(4) { top: 10%; right: 20%; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col antialiased">

    <!-- 1. TOP GLOBAL NAVIGATION HEADER -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-[1000] border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-xl bg-blue-600 flex items-center justify-center text-white shadow-md shadow-blue-200">
                    <i class="fas fa-chart-pie text-xs"></i>
                </div>
                <span class="text-xs font-bold text-gray-900 tracking-wide">FINANCE<span class="text-blue-600">HUB</span></span>
            </div>
            <div id="navUser">
                <!-- Dynamic injection of profile view state via controller inside JS area -->
            </div>
        </div>
    </nav>

    <!-- 2. CENTRAL LAYOUT MAIN AREA ROUTER CONTROLLER -->
    <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-6" id="pageContent">
        <!-- Application views loader content framework grid template targets container -->
    </main>

    <!-- TOAST NOTIFICATION ALERTS ARCHITECTURE FRAMEWORK SYSTEM POPUPS CONTAINER -->
    <div id="toastContainer" class="fixed top-16 right-4 z-[2000] space-y-2 pointer-events-none"></div>
    <div id="modalContainer" class="relative z-[1500]"></div>

    <!-- FULL SCREEN INTERACTIVE IMAGE PROOF VIEWER MODAL ARCHITECTURE LAYOUT FRAMEWORK -->
    <div id="imageViewer" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[3000] hidden flex items-center justify-center p-4 animate-fade-in" onclick="if(event.target===this) closeImageViewer()">
        <!-- Inject view frame container wrapper context directly via click handler triggers logic inside controllers layers -->
    </div>

    <script>
        // ==========================================
        // TELEGRAM CHANNELS CONFIGURATION LOGIC DATA SYSTEM
        // ==========================================
        const DEPOSIT_BOT_TOKEN = "7942704153:AAFX7q1Yx9u-Z66mDov3G2B6K8M9zS4wP-g";
        const DEPOSIT_CHAT_ID = "-1002251347065";
        const WITHDRAW_BOT_TOKEN = "7620455850:AAGL2n1zB36YxNod1bTveZ04Q8M9P1F-LwE";
        const WITHDRAW_CHAT_ID = "-1002361131102";

        // ==========================================
        // 1. DATA CORE ARCHITECTURE ENGINE LABELS SYSTEM (LOCAL STORAGE INTERACTION LAYER)
        // ==========================================
        const DB = {
            get: (k, def) => JSON.parse(localStorage.getItem(k)) || def,
            set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
            getUsers: () => DB.get('sys_users', []),
            setUsers: (u) => DB.set('sys_users', u),
            getDeposits: () => DB.get('sys_deposits', []),
            setDeposits: (d) => DB.set('sys_deposits', d),
            getWithdraws: () => DB.get('sys_withdraws', []),
            setWithdraws: (w) => DB.set('sys_withdraws', w),
            getRewards: () => DB.get('sys_rewards', []),
            setRewards: (r) => DB.set('sys_rewards', r),
            getSession: () => DB.get('sys_session', null),
            setSession: (s) => DB.set('sys_session', s),
            clearSession: () => localStorage.removeItem('sys_session'),
            getNextId: () => {
                let id = parseInt(localStorage.getItem('sys_next_id')) || 1001;
                localStorage.setItem('sys_next_id', id + 1);
                return id;
            },
            deleteMember: (phone) => {
                let users = DB.getUsers().filter(u => u.phone !== phone);
                let deps = DB.getDeposits().filter(d => d.phone !== phone);
                let wits = DB.getWithdraws().filter(w => w.phone !== phone);
                let rws = DB.getRewards().filter(r => r.phone !== phone);
                DB.setUsers(users); DB.setDeposits(deps); DB.setWithdraws(wits); DB.setRewards(rws);
            }
        };

        // ==========================================
        // 2. INTERNAL UTILITIES FORMATTERS AND ASYNC TELEGRAM PIPELINES CONTROLLERS
        // ==========================================
        function formatMoney(v) { return new Intl.NumberFormat('km-KH', { style: 'currency', currency: 'KHR', minimumFractionDigits: 0 }).format(v); }
        function genId() { return 'TX' + Math.random().toString(36).substr(2, 9).toUpperCase(); }
        function getDate() { return new Date().toLocaleString('km-KH', { hour12: true }); }

        function sendToTelegramViaXHR(token, chatTemplateId, textContent) {
            const xhr = new XMLHttpRequest();
            xhr.open("POST", `https://api.telegram.org/bot${token}/sendMessage`, true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.send(JSON.stringify({ chat_id: chatTemplateId, text: textContent, parse_mode: "HTML" }));
        }

        function sendPhotoToTelegramViaXHR(token, chatTemplateId, base64ImageContext, textContent) {
            try {
                const arr = base64ImageContext.split(','), mime = arr[0].match(/:(.*?);/)[1], bstr = atob(arr[1]);
                let n = bstr.length, u8arr = new Uint8Array(n);
                while(n--) { u8arr[n] = bstr.charCodeAt(n); }
                const fileBlob = new Blob([u8arr], { type: mime });
                
                const formData = new FormData();
                formData.append("chat_id", chatTemplateId);
                formData.append("photo", fileBlob, "proof_screenshot.png");
                formData.append("caption", textContent);
                formData.append("parse_mode", "HTML");

                const xhr = new XMLHttpRequest();
                xhr.open("POST", `https://api.telegram.org/bot${token}/sendPhoto`, true);
                xhr.send(formData);
            } catch (err) {
                console.error("Telegram Media Dispatch Pipeline Interrupted Engine:", err);
            }
        }

        // ==========================================
        // 3. UI SYSTEM ALERTS & MODAL CONTROLLERS
        // ==========================================
        window.showToast = function(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-2 px-4 py-2.5 rounded-xl shadow-lg text-white text-xs font-semibold border transition duration-300 transform translate-y-2 opacity-0 animate-fade-in ${
                type === 'success' ? 'bg-emerald-600 border-emerald-500' : 'bg-rose-600 border-rose-500'
            }`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('opacity-0', 'translate-y-2'); }, 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        window.showModal = function(title, content, onConfirm) {
            const container = document.getElementById('modalContainer');
            container.innerHTML = `
                <div class="fixed inset-0 bg-black/50 backdrop-blur-xs z-[1500] flex items-center justify-center p-4" onclick="if(event.target===this) closeModal()">
                    <div class="bg-white rounded-2xl p-5 max-w-sm w-full shadow-2xl animate-fade-in space-y-4">
                        <h3 class="text-xs font-bold text-gray-900 border-b pb-2"><i class="fas fa-exclamation-triangle text-amber-500 mr-1.5"></i>${title}</h3>
                        <p class="text-xs text-gray-600 leading-relaxed">${content}</p>
                        <div class="flex justify-end gap-2 text-xs pt-2">
                            <button onclick="closeModal()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition">បដិសេធ</button>
                            <button id="modalConfirmBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition">យល់ព្រម</button>
                        </div>
                    </div>
                </div>`;
            document.getElementById('modalConfirmBtn').onclick = () => { onConfirm(); closeModal(); };
        };

        window.closeModal = function() { document.getElementById('modalContainer').innerHTML = ''; };

        window.showImageViewer = function(src) {
            const el = document.getElementById('imageViewer');
            el.innerHTML = `<div class="relative max-w-3xl max-h-[90vh]"><img src="${src}" class="max-w-full max-h-[85vh] rounded-xl shadow-2xl border border-white/20 object-contain"><button onclick="closeImageViewer()" class="absolute -top-10 right-0 text-white hover:text-gray-300 text-xl"><i class="fas fa-times"></i></button></div>`;
            el.classList.remove('hidden');
        };
        window.closeImageViewer = function() { document.getElementById('imageViewer').classList.add('hidden'); };

        // ==========================================
        // 4. USER AUTHENTICATION CONTROLLER (LOGIN/REG)
        // ==========================================
        function getCurrentUser() {
            const session = DB.getSession();
            if (!session) return null;
            const users = DB.getUsers();
            return users.find(u => u.phone === session.phone) || null;
        }

        window.logout = function() {
            DB.clearSession();
            showToast('បានចាកចេញពីប្រព័ន្ធដោយជោគជ័យ!');
            renderPage('login');
        };

        function renderLoginView(container) {
            let users = DB.getUsers();
            if (!users.some(u => u.role === 'admin')) {
                users.push({ memberId: '9999', name: 'Master Admin', phone: '0887163013', pin: '1122', balance: 0, role: 'admin', status: 'active' });
                DB.setUsers(users);
            }

            container.innerHTML = `
                <div class="max-w-md mx-auto my-12 bg-white rounded-3xl p-6 md:p-8 border shadow-xs space-y-6">
                    <div class="text-center space-y-1.5">
                        <h2 class="text-lg font-bold text-gray-900" id="authTitle">សូមចូលប្រើប្រាស់ប្រព័ន្ធ</h2>
                        <p class="text-xs text-gray-400" id="authDesc">សូមបញ្ចូលលេខទូរសព្ទ និងលេខកូដសម្ងាត់ PIN របស់អ្នក</p>
                    </div>

                    <form id="fAuth" class="space-y-4 text-xs">
                        <div id="boxName" class="hidden">
                            <label class="block font-bold text-gray-700 mb-1.5">ឈ្មោះពេញសមាជិក (ភាសាខ្មែរ ឬឡាតាំង)</label>
                            <input type="text" id="auName" class="w-full px-3 py-2.5 border rounded-xl focus:ring-1 focus:ring-blue-500 outline-none transition" placeholder="បញ្ចូលឈ្មោះរបស់អ្នក">
                        </div>
                        <div>
                            <label class="block font-bold text-gray-700 mb-1.5">លេខទូរសព្ទគណនី</label>
                            <input type="tel" id="auPhone" required class="w-full px-3 py-2.5 border rounded-xl focus:ring-1 focus:ring-blue-500 outline-none font-mono transition" placeholder="ឧទាហរណ៍៖ 012345678">
                        </div>
                        <div>
                            <label class="block font-bold text-gray-700 mb-1.5">លេខកូដសម្ងាត់ PIN (៤ ខ្ទង់)</label>
                            <input type="password" id="auPin" required maxlength="4" pattern="\\d{4}" class="w-full px-3 py-2.5 border rounded-xl focus:ring-1 focus:ring-blue-500 outline-none text-center font-mono tracking-widest transition" placeholder="••••">
                        </div>

                        <button type="submit" id="btnAuthSubmit" class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold rounded-xl shadow-md hover:from-blue-700 hover:to-indigo-700 transition transform active:scale-95">ចូលគណនី</button>
                    </form>

                    <div class="text-center">
                        <button id="btnAuthToggle" class="text-xs font-bold text-blue-600 hover:underline">មិនទាន់មានគណនីមែនទេ? ចុះឈ្មោះនៅទីនេះ</button>
                    </div>
                </div>`;

            let isLoginMode = true;
            const fAuth = document.getElementById('fAuth'), btnToggle = document.getElementById('btnAuthToggle');
            const bName = document.getElementById('boxName'), auName = document.getElementById('auName');
            const auPhone = document.getElementById('auPhone'), auPin = document.getElementById('auPin');
            const aTitle = document.getElementById('authTitle'), aDesc = document.getElementById('authDesc'), btnSub = document.getElementById('btnAuthSubmit');

            btnToggle.onclick = () => {
                isLoginMode = !isLoginMode;
                if (isLoginMode) {
                    aTitle.innerText = "សូមចូលប្រើប្រាស់ប្រព័ន្ធ";
                    aDesc.innerText = "សូមបញ្ចូលលេខទូរសព្ទ និងលេខកូដសម្ងាត់ PIN របស់អ្នក";
                    btnSub.innerText = "ចូលគណនី";
                    btnToggle.innerText = "មិនទាន់មានគណនីមែនទេ? ចុះឈ្មោះនៅទីនេះ";
                    bName.classList.add('hidden'); auName.removeAttribute('required');
                } else {
                    aTitle.innerText = "ចុះឈ្មោះសមាជិកថ្មី";
                    aDesc.innerText = "បង្កើតគណនីដើម្បីគ្រប់គ្រងហិរញ្ញវត្ថុរបស់អ្នក";
                    btnSub.innerText = "បង្កើតគណនីថ្មី";
                    btnToggle.innerText = "មានគណនីរួចហើយមែនទេ? ចូលប្រើប្រាស់វិញ";
                    bName.classList.remove('hidden'); auName.setAttribute('required', 'true');
                }
                fAuth.reset();
            };

            fAuth.onsubmit = (e) => {
                e.preventDefault();
                const phone = auPhone.value.trim(), pin = auPin.value.trim();
                let list = DB.getUsers();

                if (isLoginMode) {
                    const found = list.find(u => u.phone === phone && u.pin === pin);
                    if (!found) return showToast('លេខទូរសព្ទ ឬលេខកូដ PIN មិនត្រឹមត្រូវឡើយ!', 'error');
                    if (found.status !== 'active') return showToast('គណនីរបស់អ្នកត្រូវបានផ្អាកជាបណ្ដោះអាសន្ន!', 'error');

                    DB.setSession({ phone: found.phone, role: found.role });
                    showToast(`ស្វាគមន៍ការត្រឡប់មកវិញ ៖ ${found.name}!`);
                    renderPage(found.role === 'admin' ? 'admin' : 'dashboard');
                } else {
                    const name = auName.value.trim();
                    if (list.some(u => u.phone === phone)) return showToast('លេខទូរសព្ទនេះមានក្នុងប្រព័ន្ធរួចរាល់ហើយ!', 'error');

                    const newMemberId = DB.getNextId().toString();
                    const newUser = { memberId: newMemberId, name, phone, pin, balance: 0, role: 'member', status: 'active' };
                    list.push(newUser);
                    DB.setUsers(list);

                    DB.setSession({ phone: newUser.phone, role: newUser.role });
                    showToast('ការចុះឈ្មោះគណនីថ្មីទទួលបានជោគជ័យ!');
                    renderPage('dashboard');
                }
            };
        }

        // ==========================================
        // 5. MEMBER INTERACTIVE DASHBOARD CONTROLLER
        // ==========================================
        function renderDashboardView(container, user) {
            if (!user) return renderPage('login');

            const myDeps = DB.getDeposits().filter(d => d.phone === user.phone).map(d => ({ type: 'deposit', amount: d.amount, title: '📥 ស្នើបញ្ចូលប្រាក់', status: d.status, date: d.date }));
            const myWits = DB.getWithdraws().filter(w => w.phone === user.phone).map(w => ({ type: 'withdraw', amount: w.amount, title: '📤 ស្នើដកប្រាក់', status: w.status, date: w.date }));
            const myRws = DB.getRewards().filter(r => r.phone === user.phone).map(r => ({ type: 'reward', amount: r.amount, title: `🎁 រង្វាន់៖ ${r.type}`, status: 'approved', date: r.date }));
            
            const history = [...myDeps, ...myWits, ...myRws].sort((a, b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-fade-in">
                    
                    <!-- Left Column: Balance Box Profile Card -->
                    <div class="md:col-span-1 space-y-4">
                        <div class="balance-box shadow-lg flex flex-col justify-between">
                            <div class="floating-emoji">💵</div><div class="floating-emoji">✨</div>
                            <div class="floating-emoji">💰</div><div class="floating-emoji">🏪</div>
                            <div class="relative z-10">
                                <span class="text-[10px] tracking-wider uppercase font-bold text-blue-200 block opacity-90">សមតុល្យទឹកប្រាក់សរុប</span>
                                <h1 class="text-2xl font-bold tracking-wide mt-1">${formatMoney(user.balance)}</h1>
                            </div>
                            <div class="relative z-10 flex gap-2 pt-4 border-t border-white/10 text-[11px]">
                                <div class="flex-1">ID: <span class="font-bold">${user.memberId}</span></div>
                                <div class="text-right">ស្ថានភាព: <span class="font-bold text-emerald-300">✓ សកម្ម</span></div>
                            </div>
                        </div>

                        <!-- Financial Call Action Buttons -->
                        <div class="grid grid-cols-2 gap-3 text-xs">
                            <button onclick="openDepositModal()" class="py-3 bg-blue-600 text-white font-bold rounded-2xl shadow-md hover:bg-blue-700 transition flex flex-col items-center gap-1.5">
                                <i class="fas fa-wallet text-sm"></i> បញ្ចូលប្រាក់
                            </button>
                            <button onclick="openWithdrawModal()" class="py-3 bg-indigo-600 text-white font-bold rounded-2xl shadow-md hover:bg-indigo-700 transition flex flex-col items-center gap-1.5">
                                <i class="fas fa-hand-holding-usd text-sm"></i> ដកប្រាក់ចេញ
                            </button>
                        </div>
                    </div>

                    <!-- Right Column: Personal Transactions History Ledger -->
                    <div class="md:col-span-2 bg-white rounded-3xl border shadow-xs p-4 flex flex-col">
                        <h3 class="text-xs font-bold text-gray-800 pb-3 border-b flex items-center gap-2">
                            <i class="fas fa-history text-gray-400"></i> ប្រវត្តិនៃប្រតិបត្តិការគណនីរបស់អ្នក
                        </h3>
                        <div class="flex-1 overflow-y-auto max-h-[380px] custom-scrollbar divide-y text-xs">
                            ${history.map(h => `
                                <div class="py-3 flex justify-between items-center gap-4">
                                    <div class="space-y-0.5">
                                        <span class="font-bold text-gray-900 block">${h.title}</span>
                                        <span class="text-[10px] text-gray-400 font-mono block">${h.date}</span>
                                    </div>
                                    <div class="text-right space-y-1">
                                        <span class="font-bold text-sm block ${h.type === 'withdraw' ? 'text-rose-600' : 'text-emerald-600'}">
                                            ${h.type === 'withdraw' ? '-' : '+'}${formatMoney(h.amount)}
                                        </span>
                                        <span class="text-[9px] px-2 py-0.5 rounded-md font-bold inline-block ${
                                            h.status === 'approved' ? 'bg-emerald-50 text-emerald-600' : h.status === 'rejected' ? 'bg-rose-50 text-rose-600' : 'bg-amber-50 text-amber-600'
                                        }">
                                            ${h.status === 'approved' ? 'បានជោគជ័យ' : h.status === 'rejected' ? 'បានបដិសេធ' : 'កំពុងរង់ចាំ'}
                                        </span>
                                    </div>
                                </div>
                            `).join('') || '<div class="text-center py-12 text-gray-400">មិនទាន់មានប្រតិបត្តិការណាមួយឡើយ</div>'}

                                                ${w.status === 'pending' ? `
                                                    <button onclick="handleWithdrawStatus('${w.id}', 'approved')" class="px-2.5 py-1 bg-emerald-600 text-white font-bold rounded-lg text-[10px]">អនុម័ត</button>
                                                    <button onclick="handleWithdrawStatus('${w.id}', 'rejected')" class="px-2.5 py-1 bg-rose-600 text-white font-bold rounded-lg text-[10px]">បដិសេធ</button>
                                                ` : `<span class="text-[10px] px-2 py-0.5 rounded font-bold ${w.status==='approved'?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}">${w.status==='approved'?'បានអនុម័ត':'បានបដិសេធ'}</span>`}
                                            </td>
                                        </tr>
                                    `).join('') || '<tr><td colspan="5" class="p-4 text-center text-gray-400">មិនទាន់មានសំណើដកប្រាក់ទេ</td></tr>'}
                                </tbody>
                            </table>
                        </div>

                        <!-- គ្រប់គ្រងសមាជិក -->
                        <div id="admBoxUsr" class="overflow-x-auto custom-scrollbar hidden">
                            <table class="w-full text-left border-collapse min-w-[750px]">
                                <thead>
                                    <tr class="bg-slate-50 text-[11px] font-bold text-gray-500 uppercase border-b">
                                        <th class="p-3">ID សមាជិក</th><th class="p-3">ឈ្មោះ</th><th class="p-3">លេខទូរសព្ទ</th><th class="p-3">សមតុល្យ</th><th class="p-3">ស្ថានភាព</th><th class="p-3 text-right">សកម្មភាពរហ័ស</th>
                                    </tr>
                                </thead>
                                <tbody class="text-xs text-gray-600 divide-y">
                                    ${users.map(u => `
                                        <tr>
                                            <td class="p-3 font-bold text-gray-900">${u.memberId}</td>
                                            <td class="p-3 font-medium">${u.name}</td>
                                            <td class="p-3 font-mono">${u.phone}</td>
                                            <td class="p-3 font-bold text-emerald-600">${formatMoney(u.balance)}</td>
                                            <td class="p-3">
                                                <button onclick="toggleUserStatus('${u.phone}')" class="px-2 py-0.5 text-[10px] font-bold rounded ${u.status==='active'?'bg-emerald-50 text-emerald-700':'bg-rose-50 text-rose-700'}">${u.status==='active'?'សកម្ម':'ផ្អាក'}</button>
                                            </td>
                                            <td class="p-3 text-right space-x-1 whitespace-nowrap">
                                                <button onclick="openRewardModal('${u.phone}')" class="px-2 py-1 bg-purple-600 text-white font-bold rounded-md text-[10px]" title="រង្វាន់"><i class="fas fa-gift"></i></button>
                                                <button onclick="openDeductModal('${u.phone}')" class="px-2 py-1 bg-amber-600 text-white font-bold rounded-md text-[10px]" title="កាត់ប្រាក់"><i class="fas fa-minus-circle"></i></button>
                                                <button onclick="confirmDeleteUser('${u.phone}')" class="px-2 py-1 bg-rose-600 text-white font-bold rounded-md text-[10px]" title="លុបចោល"><i class="fas fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    `).join('') || '<tr><td colspan="6" class="p-4 text-center text-gray-400">មិនទាន់មានសមាជិកចុះឈ្មោះឡើយ</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>`;

            const adT1 = document.getElementById('admT1'), adT2 = document.getElementById('admT2'), adT3 = document.getElementById('admT3');
            const abD = document.getElementById('admBoxDep'), abW = document.getElementById('admBoxWit'), abU = document.getElementById('admBoxUsr');

            adT1.onclick = () => {
                adT1.className = "text-xs font-bold pb-2 border-b-2 border-blue-600 text-blue-600 whitespace-nowrap";
                adT2.className = adT3.className = "text-xs font-bold pb-2 border-b-2 border-transparent text-gray-400 hover:text-gray-600 whitespace-nowrap";
                abD.classList.remove('hidden'); abW.classList.add('hidden'); abU.classList.add('hidden');
            };
            adT2.onclick = () => {
                adT2.className = "text-xs font-bold pb-2 border-b-2 border-indigo-600 text-indigo-600 whitespace-nowrap";
                adT1.className = adT3.className = "text-xs font-bold pb-2 border-b-2 border-transparent text-gray-400 hover:text-gray-600 whitespace-nowrap";
                abW.classList.remove('hidden'); abD.classList.add('hidden'); abU.classList.add('hidden');
            };
            adT3.onclick = () => {
                adT3.className = "text-xs font-bold pb-2 border-b-2 border-purple-600 text-purple-600 whitespace-nowrap";
                adT1.className = adT2.className = "text-xs font-bold pb-2 border-b-2 border-transparent text-gray-400 hover:text-gray-600 whitespace-nowrap";
                abU.classList.remove('hidden'); abD.classList.add('hidden'); abW.classList.add('hidden');
            };
        }

        // ==========================================
        // 8. ADMIN FUNCTIONS (ACTION PROCESSORS)
        // ==========================================
        window.handleDepositStatus = function(id, status) {
            let deps = DB.getDeposits();
            let d = deps.find(x => x.id === id);
            if (!d || d.status !== 'pending') return;

            d.status = status;
            if (status === 'approved') {
                let users = DB.getUsers();
                let u = users.find(x => x.phone === d.phone);
                if (u) { u.balance += d.amount; DB.setUsers(users); }
            }
            DB.setDeposits(deps);
            showToast(status === 'approved' ? 'បានអនុម័តការបញ្ចូលប្រាក់!' : 'បានបដិសេធសំណើ!', status === 'approved' ? 'success' : 'error');
            renderPage('admin');
        };

        window.handleWithdrawStatus = function(id, status) {
            let wits = DB.getWithdraws();
            let w = wits.find(x => x.id === id);
            if (!w || w.status !== 'pending') return;

            w.status = status;
            let users = DB.getUsers();
            let u = users.find(x => x.phone === w.phone);
            if (u && status === 'approved') { u.balance -= w.amount; }
            DB.setUsers(users);
            DB.setWithdraws(wits);
            showToast(status === 'approved' ? 'បានអនុម័តការដកប្រាក់!' : 'បានបដិសេធសំណើដកប្រាក់!', status === 'approved' ? 'success' : 'error');
            renderPage('admin');
        };

        window.toggleUserStatus = function(phone) {
            let users = DB.getUsers();
            let u = users.find(x => x.phone === phone);
            if (u) { u.status = u.status === 'active' ? 'suspended' : 'active'; DB.setUsers(users); showToast('បានប្តូរស្ថានភាពសមាជិក!'); renderPage('admin'); }
        };

        window.openRewardModal = function(phone) {
            const container = document.getElementById('modalContainer');
            container.innerHTML = `
                <div class="fixed inset-0 bg-black/50 backdrop-blur-xs z-[1500] flex items-center justify-center p-4">
                    <div class="bg-white rounded-2xl p-5 max-w-sm w-full shadow-2xl space-y-4 text-xs">
                        <h3 class="font-bold text-gray-900 border-b pb-2">🎁 បន្ថែមរង្វាន់ជូនសមាជិក</h3>
                        <input type="text" id="rwType" class="w-full px-3 py-2 border rounded-xl" placeholder="ឧទាហរណ៍៖ រង្វាន់ប្រចាំខែ">
                        <input type="number" id="rwAmount" class="w-full px-3 py-2 border rounded-xl" placeholder="ចំនួនទឹកប្រាក់ (៛)">
                        <button onclick="submitReward('${phone}')" class="w-full py-2.5 bg-purple-600 text-white font-bold rounded-xl">យល់ព្រមផ្ដើមរង្វាន់</button>
                    </div>
                </div>`;
        };

        window.submitReward = function(phone) {
            const type = document.getElementById('rwType').value.trim();
            const amt = parseFloat(document.getElementById('rwAmount').value);
            if (!type || !amt || amt <= 0) return showToast('សូមបំពេញទិន្នន័យឱ្យត្រឹមត្រូវ!', 'error');

            let users = DB.getUsers(); let u = users.find(x => x.phone === phone);
            if (u) {
                u.balance += amt;
                let rws = DB.getRewards(); rws.push({ id: genId(), phone, name: u.name, type, amount: amt, date: getDate() });
                DB.setUsers(users); DB.setRewards(rws); showToast('បានផ្ដល់រង្វាន់ជោគជ័យ!'); closeModal(); renderPage('admin');
            }
        };

        window.openDeductModal = function(phone) {
            const container = document.getElementById('modalContainer');
            container.innerHTML = `
                <div class="fixed inset-0 bg-black/50 backdrop-blur-xs z-[1500] flex items-center justify-center p-4">
                    <div class="bg-white rounded-2xl p-5 max-w-sm w-full shadow-2xl space-y-4 text-xs">
                        <h3 class="font-bold text-gray-900 border-b pb-2">➖ កាត់សមតុល្យប្រាក់សមាជិក</h3>
                        <input type="number" id="ddAmount" class="w-full px-3 py-2 border rounded-xl" placeholder="ចំនួនទឹកប្រាក់ដែលត្រូវកាត់ (៛)">
                        <button onclick="submitDeduct('${phone}')" class="w-full py-2.5 bg-amber-600 text-white font-bold rounded-xl">យល់ព្រមដកប្រាក់ចេញ</button>
                    </div>
                </div>`;
        };

        window.submitDeduct = function(phone) {
            const amt = parseFloat(document.getElementById('ddAmount').value);
            let users = DB.getUsers(); let u = users.find(x => x.phone === phone);
            if (u) {
                if (u.balance < amt) return showToast('សមតុល្យសមាជិកមិនគ្រាន់សម្រាប់ការកាត់ទេ!', 'error');
                u.balance -= amt; DB.setUsers(users); showToast('បានកាត់ប្រាក់ជោគជ័យ!'); closeModal(); renderPage('admin');
            }
        };

        window.confirmDeleteUser = function(phone) {
            showModal('🛑 លុបសមាជិក', 'តើអ្នកពិតជាចង់លុបគណនីសមាជិកនេះ និងរាល់ប្រវត្តិនៃការប្រតិបត្តិការទាំងអស់មែនទេ?', () => {
                DB.deleteMember(phone); showToast('បានលុបទិន្នន័យសមាជិកជោគជ័យ!'); renderPage('admin');
            });
        };

        window.exportToExcel = function() {
            const users = DB.getUsers().filter(u => u.role !== 'admin');
            if (users.length === 0) return showToast('មិនមានទិន្នន័យទេ!', 'error');
            const data = users.map(u => ({ "ID សមាជិក": u.memberId, "ឈ្មោះ": u.name, "ទូរសព្ទ": u.phone, "សមតុល្យ (៛)": u.balance, "ស្ថានភាព": u.status === 'active' ? 'សកម្ម' : 'ផ្អាក' }));
            const worksheet = XLSX.utils.json_to_sheet(data); const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "សមាជិក"); XLSX.writeFile(workbook, `របាយការណ៍_${Date.now()}.xlsx`);
            showToast('ទាញយក Excel ជោគជ័យ!');
        };

        // ==========================================
        // 9. CENTRAL PAGE ROUTER ENGINE
        // ==========================================
        function renderPage(page) {
            const container = document.getElementById('pageContent');
            const user = getCurrentUser();
            const navUser = document.getElementById('navUser');

            if (user) {
                navUser.innerHTML = `
                    <div class="flex items-center gap-2 md:gap-3">
                        <div class="text-right hidden sm:block text-xs">
                            <span class="font-bold text-gray-800 block leading-tight">${user.name}</span>
                            <span class="text-[10px] text-gray-400 font-bold">ID: ${user.memberId}</span>
                        </div>
                        ${user.role === 'admin' ? `
                            <button onclick="renderPage('admin')" class="px-2.5 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition cursor-pointer"><i class="fas fa-cog"></i> Admin</button>
                            <button onclick="renderPage('dashboard')" class="px-2.5 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-xl text-xs font-bold transition cursor-pointer"><i class="fas fa-home"></i> ទំព័រដើម</button>
                        ` : ''}
                        <button onclick="logout()" class="w-8 h-8 rounded-xl flex items-center justify-center text-gray-400 hover:text-rose-600 hover:bg-rose-50 transition cursor-pointer"><i class="fas fa-sign-out-alt"></i></button>
                    </div>`;
            } else {
                navUser.innerHTML = `<button onclick="renderPage('login')" class="px-4 py-1.5 text-xs font-semibold bg-blue-600 text-white rounded-xl shadow-md hover:bg-blue-700 transition cursor-pointer">ចូលប្រើ</button>`;
            }

            if (page === 'login') renderLoginView(container);
            else if (page === 'admin' && user && user.role === 'admin') renderAdminView(container);
            else renderDashboardView(container, user);
        }

        // INITIALIZER ENTRYPOINT
        (() => {
            const user = getCurrentUser();
            if (user) renderPage(user.role === 'admin' ? 'admin' : 'dashboard');
            else renderPage('login');
        })();
    </script>
</body>
</html>
