<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិក v8.0</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>

    <style>
        /* ===== CSS Styles ===== */
        @font-face {
            font-family: 'Khmer OS Battambang';
            src: local('Khmer OS Battambang'), local('KhmerOSBattambang');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Khmer OS Battambang';
            src: local('Khmer OS Battambang Bold'), local('KhmerOSBattambang-Bold');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Khmer OS Battambang', 'Khmer OS', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            transition: background 0.5s ease;
            padding-top: 15px;
        }

        body.light-mode {
            background: #f0f2f5;
        }

        body.light-mode .container {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        body.light-mode h2,
        body.light-mode .card h3,
        body.light-mode .list-item .info .name {
            color: #1a1a2e;
        }

        body.light-mode p {
            color: rgba(0, 0, 0, 0.6);
        }

        body.light-mode .card {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        body.light-mode input,
        body.light-mode select,
        body.light-mode textarea {
            background: rgba(0, 0, 0, 0.05);
            color: #1a1a2e;
            border-color: rgba(0, 0, 0, 0.1);
        }

        body.light-mode .list-item {
            background: rgba(0, 0, 0, 0.04);
            border-left-color: #667eea;
        }

        body.light-mode .notification-item {
            background: rgba(0, 0, 0, 0.04);
        }

        body.light-mode .payment-info-card {
            background: rgba(0, 0, 0, 0.03);
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            max-height: 98vh;
            overflow-y: auto;
            animation: fadeInUp 0.6s ease-out;
        }

        .container::-webkit-scrollbar {
            width: 4px;
        }
        .container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes glow {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
            }
            50% {
                box-shadow: 0 0 40px rgba(102, 126, 234, 0.6);
            }
        }

        @keyframes notificationPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .animate-glow {
            animation: glow 2s ease-in-out infinite;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 6px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            line-height: 1.6;
            font-size: 14px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            margin: 4px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.15);
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 50px;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            padding-right: 45px;
        }

        .input-group .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .input-group .toggle-pwd:hover {
            color: #fff;
            transform: translateY(-50%) scale(1.1);
        }

        .btn {
            display: inline-block;
            padding: 10px 22px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: 0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 3px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s ease;
            opacity: 0;
        }

        .btn:hover::after {
            opacity: 1;
            transform: rotate(45deg) translateX(100%);
        }

        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            color: #1a1a2e;
        }

        .btn-gold:hover {
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
        }

        .btn-green {
            background: linear-gradient(135deg, #48bb78, #38a169);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.3);
            color: #fff;
        }

        .btn-green:hover {
            box-shadow: 0 12px 35px rgba(72, 187, 120, 0.5);
        }

        .btn-red {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            box-shadow: 0 8px 25px rgba(252, 129, 129, 0.3);
            color: #fff;
        }

        .btn-red:hover {
            box-shadow: 0 12px 35px rgba(252, 129, 129, 0.5);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f6ad55, #ed8936);
            box-shadow: 0 8px 25px rgba(246, 173, 85, 0.3);
            color: #fff;
        }

        .btn-warning:hover {
            box-shadow: 0 12px 35px rgba(246, 173, 85, 0.5);
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 11px;
            width: auto;
        }

        .btn-purple {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            box-shadow: 0 8px 25px rgba(159, 122, 234, 0.3);
            color: #fff;
        }

        .btn-purple:hover {
            box-shadow: 0 12px 35px rgba(159, 122, 234, 0.5);
        }

        .btn-cloud {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.3);
            color: #fff;
        }

        .btn-cloud:hover {
            box-shadow: 0 12px 35px rgba(0, 210, 255, 0.5);
        }

        .btn-commission {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
            color: #fff;
        }

        .btn-commission:hover {
            box-shadow: 0 12px 35px rgba(245, 87, 108, 0.5);
        }

        .btn-payment {
            background: linear-gradient(135deg, #fa709a, #fee140);
            box-shadow: 0 8px 25px rgba(250, 112, 154, 0.3);
            color: #1a1a2e;
        }

        .btn-payment:hover {
            box-shadow: 0 12px 35px rgba(250, 112, 154, 0.5);
        }

        .btn-notification {
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            box-shadow: 0 8px 25px rgba(168, 237, 234, 0.3);
            color: #1a1a2e;
        }

        .btn-notification:hover {
            box-shadow: 0 12px 35px rgba(168, 237, 234, 0.5);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: none;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: none;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.06);
            box-shadow: none;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: auto;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(-3px);
            box-shadow: none;
            color: #fff;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px;
            border-radius: 16px;
            margin: 8px 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideInRight 0.5s ease-out;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
        }

        .card h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
        }

        .badge-purple {
            background: #9f7aea;
            color: #fff;
        }

        .badge-green {
            background: #48bb78;
            color: #fff;
        }

        .badge-red {
            background: #fc8181;
            color: #fff;
        }

        .admin-panel {
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
        }

        .admin-panel h3 {
            color: #ffd700;
        }

        .super-panel {
            border: 1px solid rgba(255, 215, 0, 0.3);
            background: rgba(255, 215, 0, 0.08);
        }

        .super-panel h3 {
            color: #ffd700;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .top-bar .left-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .top-bar .right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .top-bar h2 {
            margin: 0;
            font-size: 1.1rem;
        }

        .btn-logout {
            background: rgba(252, 129, 129, 0.15);
            border: 1px solid rgba(252, 129, 129, 0.2);
            color: #fc8181;
            padding: 3px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(252, 129, 129, 0.25);
            transform: scale(1.05);
            border-color: #fc8181;
        }

        .login-container {
            padding: 10px 0;
        }

        .login-container .login-logo {
            font-size: 60px;
            text-align: center;
            margin-bottom: 10px;
        }

        .login-container .login-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .login-container .login-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .login-container .login-option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }

        .login-container .login-option:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px) scale(1.02);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .login-container .login-option .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }

        .login-container .login-option .title {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }

        .login-container .login-option .desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 2px;
        }

        .login-container .login-option.admin-option {
            border-color: rgba(255, 215, 0, 0.2);
        }

        .login-container .login-option.admin-option:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }

        .login-container .login-option.super-option {
            border-color: rgba(255, 215, 0, 0.1);
            background: rgba(255, 215, 0, 0.03);
        }

        .login-container .login-option.super-option:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        .file-upload {
            position: relative;
            padding: 15px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            margin: 5px 0;
        }

        .file-upload:hover {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.01);
        }

        .file-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload .upload-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        .file-upload .upload-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .file-upload .file-name {
            color: #48bb78;
            font-size: 12px;
            margin-top: 4px;
        }

        .image-viewer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }

        .image-viewer-overlay.show {
            display: flex;
        }

        .image-viewer-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s ease;
        }

        .image-viewer-overlay .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            transition: .3s;
            z-index: 1;
        }

        .image-viewer-overlay .close-btn:hover {
            transform: scale(1.2);
            color: #ffd700;
        }

        .preview-image {
            max-width: 100%;
            max-height: 100px;
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .preview-image:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .list-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 10px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .list-item .info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex: 1;
            min-width: 100px;
        }

        .list-item .info .name {
            color: #fff;
            font-weight: 600;
        }

        .list-item .info .sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .list-item .info .id {
            font-size: 10px;
            color: rgba(255, 215, 0, 0.5);
        }

        .list-item .info .pwd {
            font-size: 11px;
            color: #48bb78;
            font-family: monospace;
            letter-spacing: 1px;
            cursor: pointer;
            user-select: all;
        }

        .list-item .info .pwd:hover {
            color: #ffd700;
        }

        .list-item .balance {
            color: #48bb78;
            font-weight: 600;
            font-size: 14px;
        }

        .list-item .actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .transaction-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 6px;
        }

        .transaction-list::-webkit-scrollbar {
            width: 4px;
        }

        .transaction-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            flex-wrap: wrap;
            gap: 4px;
            transition: all 0.3s ease;
        }

        .transaction-item:hover {
            background: rgba(255, 255, 255, 0.03);
            padding-left: 10px;
        }

        .payment-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 12px;
            border-radius: 10px;
            margin: 6px 0;
            border-left: 3px solid #fa709a;
            transition: all 0.3s ease;
        }

        .payment-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .payment-item .amount {
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
        }

        .payment-item .status-pending {
            color: #f6ad55;
            font-size: 11px;
        }

        .payment-item .status-approved {
            color: #48bb78;
            font-size: 11px;
        }

        .payment-item .status-rejected {
            color: #fc8181;
            font-size: 11px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin: 6px 0;
        }

        .summary-stats .summary-box {
            background: rgba(255, 255, 255, 0.04);
            padding: 6px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .summary-stats .summary-box:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.08);
        }

        .summary-stats .summary-box .number {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .summary-stats .summary-box .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .summary-stats .summary-box .number.green {
            color: #48bb78;
        }

        .summary-stats .summary-box .number.red {
            color: #fc8181;
        }

        .summary-stats .summary-box .number.gold {
            color: #ffd700;
        }

        .notification-item {
            background: rgba(255, 215, 0, 0.08);
            border-left: 4px solid #ffd700;

                }
            }
            for (var key2 in localData.subAdmins) {

            for (var key3 in localData.superAdmins) {

        function calculateTotals(transactions) {
            var totalDeposits = 0,
                totalWithdraws = 0;
            if (!transactions) return { totalDeposits: 0, totalWithdraws: 0, netBalance: 0 };
            for (var i = 0; i < transactions.length; i++) {
                var t = transactions[i];
                if (t.status === 'completed' || t.status === 'approved') {
                    if (t.type === 'deposit') totalDeposits += t.amount;
                    else if (t.type === 'withdraw') totalWithdraws += t.amount;
                }
            }
            return { totalDeposits: totalDeposits, totalWithdraws: totalWithdraws, netBalance: totalDeposits - totalWithdraws };
        }

        function showLoginForm(role) {
            var container = document.getElementById('loginFormContainer');

            if (!container || !title || !roleInput) return;

            var roleNames = { 'member': 'សមាជិក', 'sub_admin': 'Sub Admin', 'super_admin': 'Super Admin' };
            title.textContent = '🔑 ចូលប្រើជា ' + (roleNames[role] || role);
            roleInput.value = role;
            container.style.display = 'block';
            container.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.getElementById('loginMsg').innerHTML = '';
        }

            } else {
                var displayComms = commHistory.slice(0, 5);
                for (var j = 0; j < displayComms.length; j++) {
                    var c = displayComms[j];
                    var d = new Date(c.timestamp);

            var txs = getMemberTransactions(user.phone);

                txHtml = '<p style="opacity:0.4;font-size:12px;">មិនទាន់មានប្រតិបត្តិការ</p>';
            } else {
                var tot = calculateTotals(txs);

                    `;

                    var sign = tx.type === 'deposit' ? '+' : '-';
                    var color = tx.type === 'deposit' ? '#48bb78' : '#fc8181';
                    var status = tx.status === 'pending' ? '⏳' : tx.status === 'completed' ? '✅' : '❌';
                    txHtml += `
                            <div class="transaction-item">
                                <div>
                                    <span style="font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,0.06);">${typeLabel}</span>
                                    <span style="font-size:10px;opacity:0.4;">${status}</span>
                                    <span style="opacity:0.5;font-size:11px;">${tx.description || ''}</span>
                                </div>
                                <div style="color:${color};font-weight:600;">${sign}${formatCurrency(tx.amount, curr)}</div>
                            </div>
                        `;
                }
                txHtml += '</div>';
                if (txs.length > 10) txHtml +=
                    '<p style="text-align:center;font-size:10px;color:rgba(255,255,255,0.2);padding-top:4px;">បង្ហាញ ១០ ចុងក្រោយ</p>';
            }

            var benHtml = '';
            if (member.benefits && member.benefits.length > 0) {
                for (var b = 0; b < member.benefits.length; b++) {
                    benHtml +=
                        '<div style="padding:4px 10px;background:rgba(255,255,255,0.04);border-radius:6px;margin:3px 0;font-size:13px;border-left:3px solid #667eea;">' +
                        member.benefits[b] + '</div>';

                benHtml = '<p style="opacity:0.4;font-size:12px;">មិនទាន់មាន</p>';
            }

            var notiBadge = unreadCount > 0 ? `<span class="notification-badge">${unreadCount}</span>` : '';

                    <div class="top-bar">

                    <div class="balance-card">

                            <span class="icon">💳</span>

                        <div class="content">

                            <div class="amount">${formatCurrency(member.balance, curr)}</div>
                            ${totalComm > 0 ? '<div class="sub-info">🎁 កម្រៃសរុប: ' + formatCurrency(totalComm, curr) + '</div>' : ''}
                            <div class="sub-info">🆔 ${member.id} | 📱 ${member.phone}</div>
                        </div>
                    </div>

                    ${paymentInfoHtml}

                    <div class="card">
                        <h3>🔔 ការជូនដំណឹង ${notiBadge}</h3>
                        ${notiHtml}
                    </div>

                    <div class="card">
                        <h3>🎁 កម្រៃជើងសារ</h3>
                        <div class="commission-total">
                            <div class="label">កម្រៃសរុប</div>
                            <div class="amount">${formatCurrency(totalComm, curr)}</div>
                        </div>
                        ${commHtml}
                    </div>

                    <div class="menu-grid">
                        <div class="menu-item" onclick="showDepositForm()">
                            <span class="menu-icon">💳</span>
                            <span class="menu-label">ដាក់ប្រាក់</span>
                        </div>
                        <div class="menu-item" onclick="showWithdrawForm()">
                            <span class="menu-icon">🏦</span>
                            <span class="menu-label">ដកប្រាក់</span>
                        </div>
                        <div class="menu-item" onclick="renderPage('payment-requests')">
                            <span class="menu-icon">📋</span>
                            <span class="menu-label">សំណើទូទាត់</span>

                    </div>

                    <div class="card">
                        <h3>💳 សំណើទូទាត់</h3>

                    <div class="card">
                        <h3>📋 ប្រវត្តិប្រតិបត្តិការ</h3>

        // ================================================================
        // ADMIN DASHBOARD
        // ================================================================

        function renderAdminDashboard() {
            var user = getCurrentUser();
            if (!user || user.role !== 'sub_admin') {
                renderPage('login');
                return '';
            }

            var admin = localData.subAdmins[user.phone];
            if (!admin) {
                showToast('មិនឃើញព័ត៌មាន Admin!', 'error');
                renderPage('login');
                return '';
            }

            var mk = Object.keys(localData.members);
            var paymentInfo = getPaymentInfo(user.phone, 'sub_admin');

            var filteredMembers = [];
            for (var i = 0; i < mk.length; i++) {
                var m = localData.members[mk[i]];
                if (m && m.phone !== '066817407') {
                    filteredMembers.push(m);
                }
            }

            var memHtml = '';
            if (filteredMembers.length === 0) {
                memHtml = '<p style="opacity:0.4;font-size:12px;">មិនទាន់មានសមាជិក</p>';
            } else {
                for (var i = 0; i < filteredMembers.length; i++) {
                    var m = filteredMembers[i];
                    var curr = m.currency || 'usd';
                    var pwdDisplay = '••••••••••';
                    memHtml += `
                            <div class="list-item member-item" data-phone="${m.phone}">
                                <div class="info">
                                    <span class="name">${m.name || m.phone}</span>
                                    <span class="sub">🆔 ${m.id} | 📱 ${m.phone}</span>
                                    <span class="sub">🔑 <span class="pwd-text" data-real-pwd="${m.password}" onclick="togglePasswordDisplay(this)">${pwdDisplay}</span> <span style="font-size:9px;opacity:0.3;cursor:pointer;" onclick="togglePasswordDisplay(this.parentElement.querySelector('.pwd-text'))">👁️</span></span>
                                </div>
                                <div><span class="balance">${formatCurrency(m.balance, curr)}</span></div>
                                <div class="actions">
                                    <button onclick="approveMemberRequests('${m.phone}')" class="btn btn-gold btn-sm" title="អនុម័ត">✅</button>
                                    <button onclick="addCommissionToMember('${m.phone}')" class="btn btn-commission btn-sm" title="កម្រៃ">🎁</button>
                                    <button onclick="sendNotificationForm('${m.phone}')" class="btn btn-notification btn-sm" title="ផ្ញើការជូនដំណឹង">🔔</button>
                                    <button onclick="addMoneyToMember('${m.phone}')" class="btn btn-green btn-sm" title="បញ្ចូលប្រាក់">💰</button>
                                    <button onclick="editMemberBalance('${m.phone}')" class="btn btn-warning btn-sm" title="កែសម្រួល">✏️</button>
                                </div>
                            </div>
                        `;
                }
            }

            // Payment Requests for Admin
            var prs = [];
            for (var j = 0; j < mk.length; j++) {
                var prList = getPaymentRequestsByUser(mk[j]);
                for (var k = 0; k < prList.length; k++) {
                    if (prList[k].to === user.phone || prList[k].from === user.phone) {
                        prs.push(prList[k]);
                    }
                }
            }
            prs.sort(function(a, b) { return new Date(b.timestamp) - new Date(a.timestamp); });

            var prHtml = '';
            if (prs.length === 0) {
                prHtml = '<p style="opacity:0.4;font-size:12px;">មិនទាន់មានសំណើទូទាត់</p>';
            } else {
                var pendingPrs = prs.filter(function(p) { return p.status === 'pending'; });
                if (pendingPrs.length > 0) {
                    prHtml +=
                        '<div style="margin-bottom:8px;color:#ffd700;font-weight:600;">⏳ សំណើរង់ចាំការអនុម័ត (' +
                        pendingPrs.length + ')</div>';
                }
                for (var l = 0; l < Math.min(prs.length, 10); l++) {

        function renderPaymentRequests() {
            var user = getCurrentUser();
            if (!user) {
                renderPage('login');
                return '';
            }

            var prs = getPaymentRequestsByUser(user.phone);
            var html = `
                    <div class="top-bar">
                        <h2>💳 សំណើទូទាត់</h2>
                        <span class="btn-back" onclick="goBack()">← ត្រឡប់</span>
                    </div>
                    <p style="font-size:12px;color:rgba(255,255,255,0.3);">សរុប ${prs.length} សំណើ</p>
                `;

            if (prs.length === 0) {
                html += '<p style="opacity:0.4;font-size:13px;padding:5px 0;">មិនទាន់មានសំណើទូទាត់</p>';
            } else {
                for (var i = 0; i < prs.length; i++) {
                    var pr = prs[i];
                    var d = new Date(pr.timestamp);
                    var statusClass = pr.status === 'pending' ? 'status-pending' : pr.status === 'approved' ? 'status-approved' :
                    'status-rejected';
                    var statusText = pr.status === 'pending' ? '⏳ រង់ចាំ' : pr.status === 'approved' ? '✅ អនុម័ត' :
                        '❌ បដិសេធ';
                    var typeText = pr.type === 'deposit' ? 'ដាក់ប្រាក់' : 'ដកប្រាក់';
                    var fromTo = pr.from === user.phone ? 'ផ្ញើទៅ' : 'ទទួលពី';
                    var target = pr.from === user.phone ? pr.to : pr.from;
                    var targetName = '';
                    if (localData.members[target]) targetName = localData.members[target].name || target;
                    else if (localData.subAdmins[target]) targetName = localData.subAdmins[target].name || target;

        function generateReport(period) {
            var container = document.getElementById('reportContent');
            if (!container) return;

            var now = new Date();
            var start = new Date();

            if (period === 'daily') {
                start.setHours(0, 0, 0, 0);
            } else if (period === 'weekly') {
                start.setDate(now.getDate() - 7);
            } else if (period === 'monthly') {
                start.setMonth(now.getMonth() - 1);
            }

            var filtered = [];
            for (var i = 0; i < localData.transactions.length; i++) {
                var t = localData.transactions[i];
                if (new Date(t.timestamp) >= start && new Date(t.timestamp) <= now && (t.status === 'completed' || t.status ===
                        'approved')) {
                    filtered.push(t);
                }
            }

            var totals = { totalDeposits: 0, totalWithdraws: 0 };
            for (var j = 0; j < filtered.length; j++) {
                if (filtered[j].type === 'deposit') totals.totalDeposits += filtered[j].amount;
                else if (filtered[j].type === 'withdraw') totals.totalWithdraws += filtered[j].amount;
            }

            var tc = 0;
            for (var k = 0; k < localData.commissions.length; k++) {
                tc += localData.commissions[k].commission || 0;
            }

            var html = `
                    <div class="card">
                        <h3>📊 របាយការណ៍ ${period === 'daily' ? 'ប្រចាំថ្ងៃ' : period === 'weekly' ? 'ប្រចាំសប្តាហ៍' : 'ប្រចាំខែ'}</h3>
                        <div style="font-size:12px;color:rgba(255,255,255,0.3);">
                            ពី ${start.toLocaleDateString('km-KH')} ដល់ ${now.toLocaleDateString('km-KH')}
                        </div>
                        <div class="summary-stats" style="margin-top:10px;">
                            <div class="summary-box"><div class="number green">$${totals.totalDeposits.toFixed(2)}</div><div class="label">ដាក់</div></div>
                            <div class="summary-box"><div class="number red">$${totals.totalWithdraws.toFixed(2)}</div><div class="label">ដក</div></div>
                            <div class="summary-box"><div class="number gold">$${(totals.totalDeposits - totals.totalWithdraws).toFixed(2)}</div><div class="label">សល់</div></div>
                            <div class="summary-box"><div class="number gold">${Object.keys(localData.members).length}</div><div class="label">សមាជិក</div></div>
                            <div class="summary-box"><div class="number gold">${filtered.length}</div><div class="label">ប្រតិបត្តិការ</div></div>
                            <div class="summary-box"><div class="number gold">$${tc.toFixed(2)}</div><div class="label">កម្រៃ</div></div>
                        </div>
                        <div style="max-height:150px;overflow-y:auto;margin-top:8px;">
                            ${filtered.slice(0, 10).map(function(tx) {
                                return '<div class="transaction-item"><div>' + tx.type + ' - ' + (tx.description || '') + '</div><div style="color:' + (tx.type === 'deposit' ? '#48bb78' : '#fc8181') + ';">' + (tx.type === 'deposit' ? '+' : '-') + '$' + tx.amount.toFixed(2) + '</div></div>';
                            }).join('')}
                            ${filtered.length > 10 ? '<p style="text-align:center;font-size:10px;color:rgba(255,255,255,0.2);padding-top:4px;">បង្ហាញ ១០ ចុងក្រោយ</p>' : ''}
                        </div>
                    </div>
                `;

            container.innerHTML = html;
        }

        function searchMembers(query) {
            var items = document.querySelectorAll('.member-item');
            var results = document.getElementById('adminSearchResults');
            var list = document.getElementById('adminMemberList');

            if (!query || query.trim() === '') {
                if (results) results.innerHTML = '';
                if (list) list.style.display = 'block';
                return;
            }

            query = query.toLowerCase().trim();
            var found = false;

            items.forEach(function(item) {
                var text = item.textContent.toLowerCase();
                if (text.includes(query)) {
                    item.style.display = 'flex';
                    found = true;
                } else {
                    item.style.display = 'none';
                }
            });

            if (results) {
                if (!found) {
                    results.innerHTML =
                        '<p style="opacity:0.4;font-size:12px;padding:5px 0;">មិនឃើញសមាជិកដែលស្វែងរក</p>';
                } else {
                    results.innerHTML = '';
                }
            }
            if (list) list.style.display = 'block';
        }

        function approvePaymentRequest(prId) {
            var prs = localData.paymentRequests || [];
            for (var i = 0; i < prs.length; i++) {
                if (prs[i].id === prId) {
                    prs[i].status = 'approved';
                    var pr = prs[i];

                    if (pr.type === 'deposit') {
                        var member = localData.members[pr.from];
                        if (member) {
                            member.balance += pr.amount;
                            if (!member.benefits) member.benefits = [];
                            member.benefits.push('💰 ដាក់ប្រាក់ ' + formatCurrency(pr.amount, pr.currency) +
                                ' ត្រូវបានអនុម័ត');
                        }
                    } else if (pr.type === 'withdraw') {
                        var member = localData.members[pr.from];
                        if (member) {
                            member.balance -= pr.amount;
                            if (!member.benefits) member.benefits = [];
                            member.benefits.push('🏦 ដកប្រាក់ ' + formatCurrency(pr.amount, pr.currency) +
                                ' ត្រូវបានអនុម័ត');
                        }
                    }

                    createTransaction(pr.type, pr.from, 'system', pr.amount, 'completed',
                        pr.description || 'ប្រតិបត្តិការត្រូវបានអនុម័ត', pr.screenshot);

                    sendMemberNotification(pr.from, 'payment', 'សំណើទូទាត់ត្រូវបានអនុម័ត',
                        'សំណើ ' + (pr.type === 'deposit' ? 'ដាក់ប្រាក់' : 'ដកប្រាក់') + ' ' + formatCurrency(pr
                            .amount, pr.currency) + ' ត្រូវបានអនុម័ត! ✅', '✅');

                    logActivity('system', 'System', 'approve_payment', 'financial', pr.from, pr.amount,
                        'អនុម័តសំណើទូទាត់ ' + pr.id);

                    saveToFirebase();
                    showToast('✅ អនុម័តជោគជ័យ!', 'success');
                    refreshCurrentPage();
                    return;
                }
            }
            showToast('⚠️ មិនឃើញសំណើ!', 'error');
        }

                if (fn) fn.textContent = '✅ ' + file.name;
                var pv = document.getElementById('depositPreview');
                if (pv) pv.innerHTML = '<img src="' + e.target.result +
                    '" class="preview-image" alt="Screenshot" onclick="event.stopPropagation();openImageViewer(\'' +
                    e.target.result + '\')">';
                input.dataset.imageData = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ================================================================
        // EVENT ATTACHMENT
        // ================================================================

        function attachEvents(page) {
            // Register
            var registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.onsubmit = function(e) {
                    e.preventDefault();
                    var name = document.getElementById('regName').value.trim();
                    var phone = document.getElementById('regPhone').value.trim();
                    var password = document.getElementById('regPassword').value.trim();
                    var confirm = document.getElementById('regConfirm').value.trim();
                    var currency = document.getElementById('regCurrency').value;
                    var msg = document.getElementById('regMsg');

                    if (!phone || !password || !confirm) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }
                    if (password !== confirm) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">ពាក្យសម្ងាត់មិនដូចគ្នា!</div>';
                        return;
                    }
                    if (localData.members[phone]) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">លេខទូរសព្ទមានរួចហើយ!</div>';
                        return;
                    }

                    var id = generateMemberId();
                    localData.members[phone] = {
                        name: name || phone,
                        phone: phone,
                        password: password,
                        id: id,
                        currency: currency,
                        balance: 0,
                        commissionRate: 0.05,
                        totalCommission: 0,
                        benefits: ['✨ សមាជិកថ្មី'],
                        date: new Date().toISOString(),
                        bankName: '',
                        bankAccount: '',
                        qrCode: null
                    };

                    addMemberRegistration(name || phone, phone, id, 'member');

                    if (Object.keys(localData.subAdmins).length === 0) {
                        var adminId = generateAdminId();
                        localData.subAdmins[phone] = {
                            name: name || phone,
                            phone: phone,
                            password: password,
                            id: adminId,
                            balance: 0,
                            totalReceived: 0,
                            totalTransferred: 0,
                            members: [phone],
                            bankName: '',
                            bankAccount: '',
                            qrCode: null
                        };
                        addMemberRegistration(name || phone, phone, adminId, 'sub_admin');
                    }

                    logActivity('system', 'System', 'register', 'authentication', phone, null, 'សមាជិកថ្មី ' + phone);
                    saveToFirebase();

                    setCurrentUser({ phone: phone, role: 'member', name: name || phone });
                    msg.innerHTML =
                        '<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ ចុះឈ្មោះជោគជ័យ!<br>🆔 ' +
                        id + '<br>📱 ' + phone + '</div>';
                    setTimeout(function() { renderPage('dashboard'); }, 1500);
                };
            }

            // Login
            var loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.onsubmit = function(e) {
                    e.preventDefault();
                    var role = document.getElementById('loginRole').value;
                    var phone = document.getElementById('loginPhone').value.trim();
                    var password = document.getElementById('loginPassword').value.trim();
                    var msg = document.getElementById('loginMsg');

                    if (!phone || !password) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }

                    if (role === 'super_admin') {
                        if (localData.superAdmins[phone] && localData.superAdmins[phone].password === password) {
                            setCurrentUser({ phone: phone, role: 'super_admin', name: 'Super Admin' });
                            logActivity('SUPER-001', 'Super Admin', 'login', 'authentication', null, null,
                                'ចូលប្រើ Super Admin');
                            renderPage('super-dashboard');
                            return;
                        }
                    }

                    if (role === 'sub_admin') {
                        if (localData.subAdmins[phone] && localData.subAdmins[phone].password === password) {
                            setCurrentUser({ phone: phone, role: 'sub_admin', name: localData.subAdmins[phone]
                                    .name || localData.subAdmins[phone].username });
                            logActivity(localData.subAdmins[phone].id, localData.subAdmins[phone].name ||
                                localData.subAdmins[phone].username, 'login', 'authentication', null, null,
                                'ចូលប្រើ Sub Admin');
                            renderPage('admin-dashboard');
                            return;
                        }
                    }

                    if (role === 'member') {
                        if (localData.members[phone] && localData.members[phone].password === password) {
                            setCurrentUser({ phone: phone, role: 'member', name: localData.members[phone].name ||
                                    phone });
                            logActivity(localData.members[phone].id, localData.members[phone].name || phone,
                                'login', 'authentication', null, null, 'ចូលប្រើជាសមាជិក');
                            renderPage('dashboard');
                            return;
                        }
                    }

                    msg.innerHTML =
                        '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">❌ មិនត្រឹមត្រូវ!</div>';
                };
            }

            // Payment Info
            var paymentInfoForm = document.getElementById('paymentInfoForm');
            if (paymentInfoForm) {
                paymentInfoForm.onsubmit = function(e) {
                    e.preventDefault();
                    var user = getCurrentUser();
                    if (!user) { showToast('សូមចូលប្រើជាមុន!', 'error'); return; }

                    var bankName = document.getElementById('piBankName').value.trim();
                    var bankAccount = document.getElementById('piBankAccount').value.trim();
                    var fileInput = document.getElementById('piFile');
                    var qrData = fileInput.dataset.imageData || null;
                    var msg = document.getElementById('piMsg');

                    updatePaymentInfo(user.phone, user.role, bankName, bankAccount, qrData);

                    logActivity(user.phone, user.name || user.phone, 'update_payment_info', 'administration', null,
                        null,
                        'ធ្វើបច្ចុប្បន្នភាពព័ត៌មានទូទាត់');

                    msg.innerHTML =
                        '<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ រក្សាទុកជោគជ័យ!</div>';
                    setTimeout(function() { goBack(); }, 1500);
                };
            }

            // Bank Info
            var bankInfoForm = document.getElementById('bankInfoForm');
            if (bankInfoForm) {
                bankInfoForm.onsubmit = function(e) {
                    e.preventDefault();
                    var user = getCurrentUser();
                    if (!user || user.role !== 'sub_admin') {
                        showToast('សូមចូលប្រើជា Sub Admin!', 'error');
                        return;
                    }

                    var admin = localData.subAdmins[user.phone];
                    if (!admin) { showToast('មិនឃើញព័ត៌មាន Admin!', 'error'); return; }

                    var bankName = document.getElementById('bankName').value.trim();
                    var bankAccount = document.getElementById('bankAccount').value.trim();
                    var qrInput = document.getElementById('qrAdminInput');
                    var qrData = qrInput ? qrInput.dataset.imageData : null;

                    updatePaymentInfo(user.phone, 'sub_admin', bankName, bankAccount, qrData);

                    logActivity(admin.id, admin.name || admin.username, 'update_bank_info', 'administration', null,
                        null, 'ធ្វើបច្ចុប្បន្នភាពព័ត៌មានទូទាត់');

                    var msg = document.getElementById('bankInfoMsg');
                    msg.innerHTML =
                        '<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ រក្សាទុកជោគជ័យ!</div>';
                    setTimeout(function() { msg.innerHTML = ''; }, 3000);
                };
            }
        }

        // ================================================================
        // INIT
        // ================================================================

        loadFromFirebase(function() {
            setupRealtimeListeners();

            var cu = getCurrentUser();
            if (cu) {
                if (cu.role === 'super_admin') renderPage('super-dashboard');
                else if (cu.role === 'sub_admin' && localData.subAdmins[cu.phone]) renderPage('admin-dashboard');
                else if (cu.role === 'member' && localData.members[cu.phone]) renderPage('dashboard');
                else { setCurrentUser(null);
                    renderPage('login'); }
            } else {
                renderPage('login');
            }

            database.ref('.info/connected').on('value', function(snap) {
                updateCloudStatus(snap.val());
                if (snap.val()) {
                    loadFromFirebase();
                }
            });

            document.addEventListener('click', resetSessionTimer);
            document.addEventListener('keydown', resetSessionTimer);
            document.addEventListener('touchstart', resetSessionTimer);

            console.log('🚀 ប្រព័ន្ធគ្រប់គ្រងសមាជិក v8.0 បានដំណើរការ!');
            console.log('📊 ទិន្នន័យបច្ចុប្បន្ន:', localData);
            console.log('👤 អ្នកប្រើបច្ចុប្បន្ន:', cu);
        });

        setInterval(function() {
            if (dataLoaded) {
                saveToFirebase();
            }
        }, 30000);
    </script>
</body>
</html>
