<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>សមាគមន៍ផលិតផលខ្មែរ v1.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* (រក្សារចនាបថដើមដដែល ដើម្បីរក្សាភាពស្អាតនៃ UI) */
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; }
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background-color: #fff; padding: 30px; border-radius: 12px; width: 100%; max-width: 650px; position: relative; max-height: 95vh; overflow-y: auto; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; }
        .submit-btn-gold { width: 100%; padding: 14px; background: #0f172a; color: #d4af37; border: 1px solid #d4af37; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .form-group { margin-bottom: 16px; }
        .form-group input { width: 100%; padding: 11px; border: 1px solid #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body>

    <header style="padding: 20px; background: #0f172a; color: #d4af37; display: flex; justify-content: space-between;">
        <h1>សមាគមន៍ផលិតផលខ្មែរ</h1>
        <button class="admin-btn" onclick="openAdminModal()" style="padding: 10px; cursor: pointer;">🛠️ ចូលកែសម្រួល</button>
    </header>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('adminModal')">&times;</span>
            <h2>🛠️ ផ្ទាំងគ្រប់គ្រងទិន្នន័យ</h2>
            <p>កែសម្រួល KHQR និងទិន្នន័យនៅទីនេះ</p>
            </div>
    </div>

    <script>
        const BOT_TOKEN = '8832988912:AAHopQQf21daUcFIzM4Bl20h9Gzd4IbQ_pI';
        const CHAT_ID = '-5387523552';

        function openAdminModal() { document.getElementById("adminModal").style.display="flex"; }
        function closeModal(id) { document.getElementById(id).style.display="none"; }

        // កែសម្រួលមុខងារផ្ញើទៅ Telegram ជាមួយ Error Handling
        async function submitOrder(ev) {
            ev.preventDefault();
            const btn = ev.target.querySelector('button');
            btn.innerText = "កំពុងបញ្ជូន...";
            btn.disabled = true;

            const n = document.getElementById("orderName").value;
            const t = document.getElementById("orderTel").value;
            const f = document.getElementById("orderReceipt").files[0];

            if (!f) { alert("សូមបញ្ចូលរូបភាពបង្កាន់ដៃ!"); btn.disabled = false; btn.innerText = "✅ យល់ព្រមទិញ"; return; }

            const fd = new FormData();
            fd.append("chat_id", CHAT_ID);
            fd.append("photo", f);
            fd.append("caption", `🛍️ កម្ម៉ង់ថ្មី\nឈ្មោះ: ${n}\nលេខ: ${t}`);

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: "POST",
                    body: fd
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    alert("បញ្ជូនព័ត៌មានជោគជ័យ!");
                    closeModal('detailModal');
                } else {
                    console.error("Telegram Error:", result);
                    alert("មានបញ្ហាក្នុងការផ្ញើទៅ Telegram: " + result.description);
                }
            } catch (error) {
                console.error("Network Error:", error);
                alert("មិនអាចភ្ជាប់ទៅកាន់ Telegram បានទេ សូមពិនិត្យអ៊ីនធឺណិតរបស់អ្នក។");
            } finally {
                btn.disabled = false;
                btn.innerText = "✅ យល់ព្រមទិញ";
            }
        }
    </script>
</body>
</html>
