<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ហាងលក់ទំនិញអនឡាញ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
        }

        header {
            background-color: #1a1a1a;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 22px;
        }

        .distributor-btn {
            background-color: #ff9900;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .distributor-btn:hover {
            background-color: #e68a00;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 20px;
            font-weight: 700;
            color: #e44d26;
            margin-bottom: 15px;
        }

        .buy-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: #fff;
            text-align: center;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #fff;
            padding: 25px 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
        }

        .modal h2 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #ff9900;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #ff9900;
        }

        .address-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-address-box {
            background-color: #f8f9fa;
            border: 1px dashed #ff9900;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #2b2b2b;
            min-height: 44px;
            word-break: break-word;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            padding: 30px;
            background-color: #1a1a1a;
            color: #888;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>ហាងលក់ទំនិញអនឡាញ</h1>
        <button class="distributor-btn" onclick="openModal()">ចុះឈ្មោះជាតំណាងចែកចាយ</button>
    </header>

    <div class="container">
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="https://via.placeholder.com/300x250?text=Product" alt="ផលិតផល">
                </div>
                <div class="product-info">
                    <div class="product-title">ផលិតផលលក់ដាច់</div>
                    <div class="product-price">$0.00</div>
                    <button class="buy-btn">បញ្ជាទិញឥឡូវនេះ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>ចុះឈ្មោះជាតំណាងចែកចាយ</h2>
            
            <form id="regForm" onsubmit="submitToTelegram(event)">
                <div class="form-group">
                    <label for="fullName">ឈ្មោះពេញ៖</label>
                    <input type="text" id="fullName" placeholder="បញ្ចូលឈ្មោះពេញរបស់អ្នក" required>
                </div>

                <div class="address-grid">
                    <div class="form-group">
                        <label for="age">អាយុ៖</label>
                        <input type="number" id="age" placeholder="បញ្ចូលអាយុ" required>
                    </div>
                    <div class="form-group">
                        <label for="job">មុខរបរបច្ចុប្បន្ន៖</label>
                        <input type="text" id="job" placeholder="បញ្ចូលមុខរបរ" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="telegramPhone">លេខតេឡេក្រាម ឬ Username Telegram៖</label>
                    <input type="text" id="telegramPhone" placeholder="បញ្ចូលលេខទូរសព្ទ ឬឈ្មោះអ្នកប្រើប្រាស់តេឡេក្រាម" required>
                </div>
                
                <h3 style="font-size: 15px; margin: 15px 0 10px 0; color: #ff9900; border-bottom: 1px dashed #ccc; padding-bottom: 5px;">អាសយដ្ឋានរស់នៅបច្ចុប្បន្ន</h3>
                
                <div class="address-grid">
                    <div class="form-group">
                        <label for="province">រាជធានី/ខេត្ត៖</label>
                        <select id="province" onchange="updateDistricts(); generateFullAddress();" required>
                            <option value="" disabled selected>--- ជ្រើសរើសខេត្ត ---</option>
                            <option value="ភ្នំពេញ">ភ្នំពេញ</option>
                            <option value="កណ្តាល">កណ្តាល</option>
                            <option value="សៀមរាប">សៀមរាប</option>
                            <option value="ព្រះសីហនុ">ព្រះសីហនុ</option>
                            <option value="បាត់ដំបង">បាត់ដំបង</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="district">ក្រុង/ស្រុក/ខណ្ឌ៖</label>
                        <select id="district" onchange="generateFullAddress();" required>
                            <option value="" disabled selected>--- ជ្រើសរើសស្រុក ---</option>
                        </select>
                    </div>
                </div>

                <div class="address-grid">
                    <div class="form-group">
                        <label for="commune">ឃុំ/សង្កាត់៖</label>
                        <input type="text" id="commune" oninput="generateFullAddress();" placeholder="បញ្ចូលឃុំ ឬសង្កាត់" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="village">ភូមិ/ផ្លូវ/ផ្ទះ៖</label>
                        <input type="text" id="village" oninput="generateFullAddress();" placeholder="បញ្ចូលភូមិ ផ្លូវ ឬលេខផ្ទះ" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>អាសយដ្ឋានពេញលេញ (ប្រព័ន្ធផ្គុំជូនស្វ័យប្រវត្ត)៖</label>
                    <div id="fullAddressBox" class="full-address-box">សូមបំពេញព័ត៌មានអាសយដ្ឋានខាងលើ...</div>
                </div>

                <div class="form-group">
                    <label for="experience">ធ្លាប់មានបទពិសោធន៍លក់ដែរឬទេ?៖</label>
                    <select id="experience">
                        <option value="មិនធ្លាប់មាន">មិនធ្លាប់មានបទពិសោធន៍</option>
                        <option value="ធ្លាប់មាន">ធ្លាប់មានបទពិសោធន៍លក់អនឡាញ</option>
                    </select>
                </div>
                
                <button type="submit" id="btnSubmit" class="submit-btn">បញ្ជូនព័ត៌មានផ្លូវការ</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 រក្សាសិទ្ធិគ្រប់យ៉ាងដោយ ហាងអនឡាញ</p>
    </footer>

    <script>
        const modal = document.getElementById("registerModal");
        function openModal() { modal.style.display = "flex"; }
        function closeModal() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

        const districtsByProvince = {
            "ភ្នំពេញ": ["ខណ្ឌដូនពេញ", "ខណ្ឌចំការមន", "ខណ្ឌ៧មករា", "ខណ្ឌទួលគោក", "ខណ្ឌមានជ័យ", "ខណ្ឌឫស្សីកែវ", "ខណ្ឌសែនសុខ", "ខណ្ឌពោធិ៍សែនជ័យ", "ខណ្ឌជ្រោយចង្វារ", "ខណ្ឌព្រែកព្នៅ", "ខណ្ឌច្បារអំពៅ", "ខណ្ឌដង្កោ", "ខណ្ឌកំបូល", "ខណ្ឌបឹងកេងកង"],
            "កណ្តាល": ["ក្រុងតាខ្មៅ", "ស្រុកកណ្តាលស្ទឹង", "ស្រុកគៀនស្វាយ", "ស្រុកខ្សាច់កណ្តាល", "ស្រុកកោះធំ", "ស្រុកពញាឮ", "ស្រុកល្វាឯម", "ស្រុកមុខកំពូល", "ស្រុកអង្គស្នួល", "ស្រុកស្អាង"],
            "សៀមរាប": ["ក្រុងសៀមរាប", "ស្រុកពួក", "ស្រ求សូទ្រនិគម", "ស្រុកប្រាសាទបាគង", "ស្រុកស្រឡាញ់", "ស្រុកបន្ទាយស្រី", "ស្រុកស្វាយលើ", "ស្រុកវ៉ារិន", "ស្រុកអង្គរធំ", "ស្រុកអង្គរជុំ", "ស្រុកជីក្រែង", "ស្រុកក្រឡាញ់"],
            "ព្រះសីហនុ": ["ក្រុងព្រះសីហនុ", "ស្រុកព្រៃនប់", "ស្រុកស្ទឹងហាវ", "ស្រុកកំពង់សីលា", "ក្រុងកោះរុង"],
            "បាត់ដំបង": ["ក្រុងបាត់ដំបង", "ស្រុកបាណន់", "ស្រុកថ្មគោល", "ស្រុកបវេល", "ស្រុកឯកភ្នំ", "ស្រុកសង្កែ", "ស្រុកគាស់ក្រឡ", "ស្រុកសំឡូត", "ស្រុកសំពៅលូន", "ស្រុកភ្នំព្រឹក", "ស្រុកកំរៀង", "ស្រុកមោងឫស្សី", "ស្រុក រតនមណ្ឌល"]
        };

        function updateDistricts() {
            const provinceSelect = document.getElementById("province");
            const districtSelect = document.getElementById("district");
            const selectedProvince = provinceSelect.value;

            districtSelect.innerHTML = '<option value="" disabled selected>--- ជ្រើសរើសស្រុក ---</option>';

            if (districtsByProvince[selectedProvince]) {
                districtsByProvince[selectedProvince].forEach(function(district) {
                    const option = document.createElement("option");
                    option.value = district;
                    option.text = district;
                    districtSelect.appendChild(option);
                });
            }
        }

        function generateFullAddress() {
            const province = document.getElementById("province").value || "";
            const district = document.getElementById("district").value || "";
            const commune = document.getElementById("commune").value || "";
            const village = document.getElementById("village").value || "";
            const box = document.getElementById("fullAddressBox");

            if (province || district || commune || village) {
                let fullText = "";
                if(village) fullText += `ភូមិ/ផ្លូវ/ផ្ទះ ${village}, `;
                if(commune) fullText += `ឃុំ/សង្កាត់ ${commune}, `;
                if(district) fullText += `${district}, `;
                if(province) fullText += `រាជធានី/ខេត្ត ${province}`;
                
                fullText = fullText.replace(/,\s*$/, "");
                box.innerText = fullText;
                return fullText;
            } else {
                box.innerText = "សូមបំពេញព័ត៌មានអាសយដ្ឋានខាងលើ...";
                return "";
            }
        }

        // ========================================================
        // វិធីសាស្ត្រថ្មី៖ ដោះស្រាយបញ្ហា CORS ដោយការបង្កើត Form បោះទៅកាន់ Telegram
        // ========================================================
        function submitToTelegram(event) {
            event.preventDefault();

            // ⚠️ ជំហានសំខាន់៖ សូមដាក់ Bot Token និង Chat ID ពិតប្រាកដរបស់អ្នកនៅទីនេះ
            const TELEGRAM_BOT_TOKEN = '746283921:AAHxF_exampleToken123'; 
            const TELEGRAM_CHAT_ID = '-100123456789'; 

            const name = document.getElementById("fullName").value;
            const age = document.getElementById("age").value;
            const job = document.getElementById("job").value;
            const telegramPhone = document.getElementById("telegramPhone").value;
            const fullAddress = generateFullAddress();
            const experience = document.getElementById("experience").value;

            const message = `🔔 *មានសមាជិកចុះឈ្មោះថ្មី!*\n\n` +
                            `👤 *ឈ្មោះពេញ៖* ${name}\n` +
                            `🎂 *អាយុ៖* ${age} ឆ្នាំ\n` +
                            `💼 *មុខរបរ៖* ${job}\n` +
                            `📞 *តេឡេក្រាម/Username៖* ${telegramPhone}\n` +
                            `📍 *អាសយដ្ឋានពិតប្រាកដ៖* ${fullAddress}\n` +
                            `📈 *បទពិសោធន៍៖* ${experience}`;

            // បង្កើតទម្រង់ Form បណ្តោះអាសន្នមួយលាក់ពីក្រោយខ្នង ដើម្បីបន្លំប្រព័ន្ធការពាររបស់ Browser
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            form.target = 'hidden_iframe'; // កុំឱ្យវាលោតផ្លាស់ប្តូរទំព័រ

            // បង្កើត Iframe លាក់មួយ ដើម្បីកុំឱ្យ Refresh ទំព័រ
            let iframe = document.getElementById('hidden_iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.id = 'hidden_iframe';
                iframe.name = 'hidden_iframe';
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
            }

            // ភ្ជាប់ទិន្នន័យ Chat ID
            const chatIdInput = document.createElement('input');
            chatIdInput.type = 'hidden';
            chatIdInput.name = 'chat_id';
            chatIdInput.value = TELEGRAM_CHAT_ID;
            form.appendChild(chatIdInput);

            // ភ្ជាប់ទិន្នន័យសារ
            const textInput = document.createElement('input');
            textInput.type = 'hidden';
            textInput.name = 'text';
            textInput.value = message;
            form.appendChild(textInput);

            // កំណត់ទម្រង់អក្សរដិត
            const parseModeInput = document.createElement('input');
            parseModeInput.type = 'hidden';
            parseModeInput.name = 'parse_mode';
            parseModeInput.value = 'Markdown';
            form.appendChild(parseModeInput);

            // បញ្ជូន Form ទៅកាន់ Telegram
            document.body.appendChild(form);
            form.submit();
            
            // លុប Form ចោលវិញក្រោយពេលផ្ញើរួច
            document.body.removeChild(form);

            // បង្ហាញសារជោគជ័យភ្លាមៗទៅកាន់អ្នកប្រើប្រាស់
            alert("🎉 ការចុះឈ្មោះត្រូវបានបញ្ជូនទៅកាន់ប្រព័ន្ធតេឡេក្រាមដោយជោគជ័យ!");
            document.getElementById("regForm").reset();
            document.getElementById("fullAddressBox").innerText = "សូមបំពេញព័ត៌មានអាសយដ្ឋានខាងលើ...";
