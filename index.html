<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>🎯 ប្រព័ន្ធទស្សន៍ទាយលេខ</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        /* ===== CSS Styles ===== */
        @import url('https://fonts.googleapis.com/css2?family=Khmer&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Khmer', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 10px;
            padding-top: 15px;
        }

        body.light-mode {
            background: #f0f2f5;
        }

        body.light-mode .container {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        body.light-mode h1, body.light-mode h2, body.light-mode h3 {
            color: #1a1a2e;
        }

        body.light-mode p, body.light-mode .label {
            color: rgba(0, 0, 0, 0.6);
        }

        body.light-mode .card {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        body.light-mode input, body.light-mode select {
            background: rgba(0, 0, 0, 0.05);
            color: #1a1a2e;
            border-color: rgba(0, 0, 0, 0.1);
        }

        body.light-mode .prediction-card {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-color: rgba(102, 126, 234, 0.3);
        }

        body.light-mode .result-card {
            background: linear-gradient(135deg, #f093fb15, #f5576c15);
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 20px;
            min-height: 95vh;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.2); }
            50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.6); }
        }

        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        h1 {
            font-size: 1.6rem;
            text-align: center;
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        h2 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        h3 {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            line-height: 1.6;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-bottom: 12px;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 14px;
            margin: 8px 0;
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        input, select {
            width: 100%;
            padding: 10px 14px;
            margin: 4px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus, select:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.15);
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        .btn {
            display: inline-block;
            padding: 10px 22px;
            border: 0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 3px 0;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .btn-success {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: #fff;
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.3);
        }

        .btn-success:hover {
            box-shadow: 0 12px 35px rgba(72, 187, 120, 0.5);
        }

        .btn-danger {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            color: #fff;
            box-shadow: 0 8px 25px rgba(252, 129, 129, 0.3);
        }

        .btn-danger:hover {
            box-shadow: 0 12px 35px rgba(252, 129, 129, 0.5);
        }

        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
        }

        .btn-gold:hover {
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
        }

        .btn-purple {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            color: #fff;
            box-shadow: 0 8px 25px rgba(159, 122, 234, 0.3);
        }

        .btn-purple:hover {
            box-shadow: 0 12px 35px rgba(159, 122, 234, 0.5);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 11px;
            width: auto;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn-logout {
            background: rgba(252, 129, 129, 0.15);
            border: 1px solid rgba(252, 129, 129, 0.2);
            color: #fc8181;
            padding: 4px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(252, 129, 129, 0.25);
            transform: scale(1.05);
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: auto;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .top-bar .user-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .top-bar .user-info .name {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
        }

        .top-bar .user-info .role {
            font-size: 10px;
            color: rgba(255, 215, 0, 0.6);
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
        }

        .badge-purple {
            background: #9f7aea;
            color: #fff;
        }

        .badge-green {
            background: #48bb78;
            color: #fff;
        }

        /* Prediction Grid */
        .prediction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 8px 0;
        }

        .prediction-card {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .prediction-card:hover {
            transform: translateY(-3px);
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
        }

        .prediction-card.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }

        .prediction-card .letter {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            display: block;
        }

        .prediction-card .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .prediction-card .result {
            font-size: 22px;
            font-weight: 700;
            color: #ffd700;
            margin-top: 4px;
            display: none;
        }

        .prediction-card .result.show {
            display: block;
            animation: pulse 1s ease-in-out infinite;
        }

        .prediction-card.winner {
            border-color: #48bb78;
            background: rgba(72, 187, 120, 0.15);
            animation: glow 1.5s ease-in-out infinite;
        }

        .prediction-card.winner .result {
            color: #48bb78;
        }

        .prediction-card.loser {
            border-color: #fc8181;
            background: rgba(252, 129, 129, 0.1);
        }

        .prediction-card.loser .result {
            color: #fc8181;
        }

        /* Number Input */
        .number-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
            margin: 8px 0;
        }

        .number-input-group input {
            flex: 1;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 12px;
        }

        .number-input-group .prefix {
            font-size: 18px;
            font-weight: 700;
            color: #ffd700;
            padding: 8px;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin: 6px 0;
        }

        .stats-box {
            background: rgba(255, 255, 255, 0.04);
            padding: 8px;
            border-radius: 10px;
            text-align: center;
        }

        .stats-box .number {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .stats-box .number.gold {
            color: #ffd700;
        }

        .stats-box .number.green {
            color: #48bb78;
        }

        .stats-box .number.red {
            color: #fc8181;
        }

        .stats-box .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Prediction History */
        .history-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 10px;
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #667eea;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(3px);
        }

        .history-item .prediction-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .history-item .prediction-info .main {
            color: #fff;
            font-weight: 600;
        }

        .history-item .prediction-info .sub {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
        }

        .history-item .status {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
        }

        .history-item .status.win {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }

        .history-item .status.lose {
            background: rgba(252, 129, 129, 0.2);
            color: #fc8181;
        }

        .history-item .status.pending {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
        }

        /* Result Display */
        .result-display {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.08), rgba(102, 126, 234, 0.08));
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin: 12px 0;
            position: relative;
            overflow: hidden;
        }

        .result-display .big-number {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .result-display .big-letter {
            font-size: 36px;
            font-weight: 800;
            color: #ffd700;
            display: block;
            margin-bottom: 4px;
        }

        .result-display .result-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .result-display .confetti {
            position: absolute;
            font-size: 24px;
            animation: confetti 1.5s ease-out forwards;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            z-index: 10000;
            animation: slideIn 0.5s ease-out;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 300px;
        }

        .toast-success { background: linear-gradient(135deg, #48bb78, #38a169); }
        .toast-error { background: linear-gradient(135deg, #fc8181, #e53e3e); }
        .toast-info { background: linear-gradient(135deg, #667eea, #764ba2); }
        .toast-warning { background: linear-gradient(135deg, #f6ad55, #ed8936); }

        /* Modal */
        #modalOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        #modalContent {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #modalContent.show {
            transform: scale(1);
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 999;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .theme-toggle:hover {
            transform: rotate(30deg) scale(1.1);
            background: rgba(255, 255, 255, 0.2);
        }

        body.light-mode .theme-toggle {
            background: rgba(0, 0, 0, 0.1);
            color: #1a1a2e;
        }

        body.light-mode .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        .cloud-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: 600;
        }

        .cloud-status.connected {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
            border: 1px solid rgba(72, 187, 120, 0.3);
        }

        .cloud-status.disconnected {
            background: rgba(252, 129, 129, 0.2);
            color: #fc8181;
            border: 1px solid rgba(252, 129, 129, 0.3);
        }

        /* Responsive */
        @media(max-width:480px) {
            .container { padding: 12px; }
            h1 { font-size: 1.3rem; }
            .prediction-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
            .prediction-card .letter { font-size: 22px; }
            .result-display .big-number { font-size: 36px; }
            .stats-grid { grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
            .theme-toggle { width: 36px; height: 36px; font-size: 16px; bottom: 10px; left: 10px; }
            #modalContent { padding: 18px; }
            .number-input-group input { font-size: 16px; padding: 10px; }
        }

        @media(min-width:481px) and (max-width:768px) {
            .container { max-width: 90%; }
        }

        @media(min-width:769px) {
            .container { max-width: 480px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <div id="modalOverlay">
        <div id="modalContent">
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="container" id="app">
        <div id="pageContent"></div>
        <div class="text-center mt-10" style="font-size:9px;color:rgba(255,255,255,0.15);">
            <span id="cloudStatus"><span class="cloud-status disconnected">⏳ កំពុងភ្ជាប់...</span></span>
            <span style="margin-left:6px;opacity:0.5;">v1.0</span>
        </div>
    </div>

    <script>
        // ================================================================
        // FIREBASE CONFIG
        // ================================================================

        const firebaseConfig = {
            apiKey: "AIzaSyDY6EzS_tUgma7z5z8LpK4Te5WcF3msqx4",
            authDomain: "access-and-management-system.firebaseapp.com",
            databaseURL: "https://access-and-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "access-and-management-system",
            storageBucket: "access-and-management-system.firebasestorage.app",
            messagingSenderId: "183584626258",
            appId: "1:183584626258:web:c87cc50820672aea12318b"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ================================================================
        // DATA LAYER
        // ================================================================

        let appData = {
            members: {},          // phone -> { name, password, balance, predictions, wins, totalPredictions }
            predictions: [],      // { id, memberPhone, letter, number, timestamp, result, win }
            results: [],          // { id, letter, number, timestamp, round }
            rounds: [],           // { id, date, letter, number, status }
            config: {
                maxPredictionsPerDay: 2,
                letters: ['A', 'B', 'C', 'D'],
                numberDigits: [2, 3],
                roundStart: '08:00',
                roundEnd: '20:00'
            },
            currentRound: null,
            roundCounter: 0
        };

        let currentUser = null;
        let isConnected = false;
        let isLoading = false;
        let isSaving = false;
        let dataLoaded = false;

        // ================================================================
        // FIREBASE FUNCTIONS
        // ================================================================

        function updateCloudStatus(connected) {
            isConnected = connected;
            const el = document.getElementById('cloudStatus');
            if (el) {
                el.innerHTML = connected ?
                    '<span class="cloud-status connected">✅ ដំណើរការ</span>' :
                    '<span class="cloud-status disconnected">⏳ កំពុងភ្ជាប់...</span>';
            }
        }

        function saveToFirebase() {
            if (isSaving) return;
            isSaving = true;

            const dataToSave = {
                members: appData.members || {},
                predictions: appData.predictions || [],
                results: appData.results || [],
                rounds: appData.rounds || [],
                config: appData.config || {},
                currentRound: appData.currentRound || null,
                roundCounter: appData.roundCounter || 0,
                lastUpdated: new Date().toISOString()
            };

            database.ref('predictionSystem').set(dataToSave)
                .then(() => {
                    updateCloudStatus(true);
                    dataLoaded = true;
                    isSaving = false;
                    console.log('💾 រក្សាទុកជោគជ័យ');
                })
                .catch((error) => {
                    showToast('⚠️ ' + error.message, 'error');
                    updateCloudStatus(false);
                    isSaving = false;
                });
        }

        function loadFromFirebase(callback) {
            if (isLoading) return;
            isLoading = true;

            database.ref('predictionSystem').once('value')
                .then((snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        appData.members = data.members || {};
                        appData.predictions = data.predictions || [];
                        appData.results = data.results || [];
                        appData.rounds = data.rounds || [];
                        appData.config = data.config || { maxPredictionsPerDay: 2, letters: ['A', 'B', 'C', 'D'],
                            numberDigits: [2, 3] };
                        appData.currentRound = data.currentRound || null;
                        appData.roundCounter = data.roundCounter || 0;

                        updateCloudStatus(true);
                        dataLoaded = true;
                        if (callback) callback();
                        refreshPage();
                    } else {
                        initializeDefaultData();
                        saveToFirebase();
                        dataLoaded = true;
                        if (callback) callback();
                    }
                    isLoading = false;
                })
                .catch((error) => {

        function setupRealtimeListeners() {
            database.ref('predictionSystem').on('value', (snapshot) => {
                if (isSaving) return;
                const data = snapshot.val();
                if (data && dataLoaded) {
                    const oldData = JSON.stringify(appData);
                    appData.members = data.members || {};
                    appData.predictions = data.predictions || [];
                    appData.results = data.results || [];
                    appData.rounds = data.rounds || [];
                    appData.config = data.config || {};
                    appData.currentRound = data.currentRound || null;
                    appData.roundCounter = data.roundCounter || 0;
                    updateCloudStatus(true);

                    if (JSON.stringify(appData) !== oldData) {

                    }

        function showToast(message, type) {
            const old = document.querySelector('.toast');
            if (old) old.remove();
            const t = document.createElement('div');
            t.className = 'toast toast-' + (type || 'info');
            t.textContent = message;
            document.body.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translateX(100px)';
                setTimeout(() => t.remove(), 500);
            }, 4000);
        }

        function showModal(html) {
            const overlay = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');
            const content = document.getElementById('modalContent');
            body.innerHTML = html;
            overlay.style.display = 'flex';
            setTimeout(() => content.classList.add('show'), 10);
            overlay.onclick = (e) => { if (e.target === overlay) hideModal(); };
        }

        function hideModal() {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            content.classList.remove('show');
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }

        function getToday() {
            return new Date().toISOString().slice(0, 10);
        }

        function getCurrentRound() {
            const today = getToday();
            let round = appData.rounds.find(r => r.date === today && r.status === 'pending');
            if (!round) {
                const roundId = 'R-' + String(appData.roundCounter + 1).padStart(4, '0');
                round = {
                    id: roundId,
                    date: today,
                    letter: null,
                    number: null,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                };
                appData.rounds.push(round);
                appData.roundCounter++;
                saveToFirebase();
            }
            return round;
        }

            const today = getToday();
            return appData.predictions.filter(p =>

            } else {
                predictions.forEach(p => {
                    const status = p.win ? 'win' : p.win === false ? 'lose' : 'pending';
                    const statusText = status === 'win' ? '✅ ឈ្នះ' : status === 'lose' ? '❌ ចាញ់' : '⏳ រង់ចាំ';
                    const statusClass = status === 'win' ? 'win' : status === 'lose' ? 'lose' : 'pending';
                    const d = new Date(p.timestamp);
                    html += `
                        <div class="history-item">
                            <div class="prediction-info">
                                <div class="main">${p.letter} - ${p.number}</div>
                                <div class="sub">${d.toLocaleDateString('km-KH')} ${d.toLocaleTimeString('km-KH')}</div>
                            </div>
                            <span class="status ${statusClass}">${statusText}</span>
                        </div>
                    `;
                });
            }

            return html;
        }

        function renderResults() {
            const user = getCurrentUser();
            if (!user) {
                renderPage('login');
                return '';
            }

            const results = appData.results.slice(0, 20);

            let html = `
                <div class="top-bar">
                    <h2>📊 លទ្ធផលថ្ងៃមុនៗ</h2>
                    <span class="btn-back" onclick="goBack()">← ត្រឡប់</span>
                </div>
            `;

            if (results.length === 0) {
                html += '<p style="opacity:0.4;text-align:center;padding:20px 0;">មិនទាន់មានលទ្ធផល</p>';
            } else {
                results.forEach(r => {
                    const d = new Date(r.timestamp);
                    html += `
                        <div class="result-display" style="margin:8px 0;padding:12px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div>
                                    <span class="big-letter" style="font-size:24px;">${r.letter}</span>
                                    <span class="big-number" style="font-size:24px;">${r.number}</span>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-size:11px;color:rgba(255,255,255,0.3);">វគ្គ ${r.round}</div>
                                    <div style="font-size:10px;color:rgba(255,255,255,0.2);">${d.toLocaleDateString('km-KH')}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            return html;
        }

        function goBack() {
            const user = getCurrentUser();
            if (user) {
                if (user.role === 'super_admin' || user.role === 'admin') {
                    renderPage('admin');
                } else {
                    renderPage('dashboard');
                }
            } else {
                renderPage('login');
            }
        }

        // ================================================================
        // PREDICTION FUNCTIONS
        // ================================================================

        let selectedLetter = null;

        function selectLetter(letter) {
            const user = getCurrentUser();
            if (!user) {
                showToast('សូមចូលប្រើជាមុន!', 'error');
                return;
            }

            const todayPredictions = getTodayPredictions(user.phone);
            const remaining = appData.config.maxPredictionsPerDay - todayPredictions.length;

            if (remaining <= 0) {
                showToast('⚠️ អ្នកបានទស្សន៍ទាយអស់ហើយថ្ងៃនេះ!', 'warning');
                return;
            }

            const round = getCurrentRound();
            if (round.letter && round.number) {
                showToast('⏳ លទ្ធផលថ្ងៃនេះត្រូវបានប្រកាសហើយ!', 'warning');
                return;
            }

            selectedLetter = letter;

            // Update UI
            document.querySelectorAll('.prediction-card').forEach(el => {
                el.classList.remove('selected');
            });
            const selectedEl = document.querySelector(`.prediction-card[data-letter="${letter}"]`);
            if (selectedEl) selectedEl.classList.add('selected');

            document.getElementById('predictionMsg').innerHTML = `✅ បានជ្រើសរើស ${letter}`;
        }

        function submitPrediction() {
            const user = getCurrentUser();
            if (!user) {
                showToast('សូមចូលប្រើជាមុន!', 'error');
                return;
            }

            const member = appData.members[user.phone];
            if (!member) {
                showToast('មិនឃើញព័ត៌មាន!', 'error');
                return;
            }

            if (!selectedLetter) {
                showToast('សូមជ្រើសរើសអក្សរ A-D!', 'warning');
                return;
            }

            const numberInput = document.getElementById('predictionNumber');
            let number = numberInput.value.trim();

            if (!number || number.length < 2 || number.length > 3 || !/^\d+$/.test(number)) {
                showToast('សូមបញ្ចូលលេខ 2-3 ខ្ទង់!', 'warning');
                return;
            }

            const todayPredictions = getTodayPredictions(user.phone);
            const remaining = appData.config.maxPredictionsPerDay - todayPredictions.length;

            if (remaining <= 0) {
                showToast('⚠️ អ្នកបានទស្សន៍ទាយអស់ហើយថ្ងៃនេះ!', 'warning');
                return;
            }

            const round = getCurrentRound();
            if (round.letter && round.number) {
                showToast('⏳ លទ្ធផលថ្ងៃនេះត្រូវបានប្រកាសហើយ!', 'warning');
                return;
            }

            // Save prediction
            const prediction = {
                id: generatePredictionId(),
                memberPhone: user.phone,
                letter: selectedLetter,
                number: number,
                timestamp: new Date().toISOString(),
                round: round.id,
                win: null
            };

            appData.predictions.push(prediction);
            member.totalPredictions = (member.totalPredictions || 0) + 1;

            // Add to member's predictions list
            if (!member.predictions) member.predictions = [];
            member.predictions.push(prediction.id);

            saveToFirebase();

            // Show success
            const msgEl = document.getElementById('predictionMsg');
            msgEl.innerHTML = `<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">
                ✅ ទស្សន៍ទាយជោគជ័យ!<br>
                ${selectedLetter} - ${number} (នៅសល់ ${remaining - 1} ដង)
            </div>`;

            // Reset selection
            selectedLetter = null;
            document.querySelectorAll('.prediction-card').forEach(el => {
                el.classList.remove('selected');
            });
            numberInput.value = '';

            setTimeout(() => { refreshPage(); }, 1500);
        }

        // ================================================================
        // ADMIN FUNCTIONS
        // ================================================================

        let adminSelectedLetter = null;

        function adminSelectLetter(letter) {
            adminSelectedLetter = letter;
            document.querySelectorAll('#adminPredictionGrid .prediction-card').forEach(el => {
                el.classList.remove('selected');
            });
            const el = document.querySelector(`#adminPredictionGrid .prediction-card[data-letter="${letter}"]`);
            if (el) el.classList.add('selected');
            document.getElementById('adminResultMsg').innerHTML = `✅ បានជ្រើសរើស ${letter}`;
        }

        function adminPublishResult() {
            const user = getCurrentUser();
            if (!user || (user.role !== 'super_admin' && user.role !== 'admin')) {
                showToast('អ្នកមិនមានសិទ្ធិ!', 'error');
                return;
            }

            const numberInput = document.getElementById('adminResultNumber');
            let number = numberInput.value.trim();

            if (!adminSelectedLetter) {
                showToast('សូមជ្រើសរើសអក្សរឈ្នះ!', 'warning');
                return;
            }

            if (!number || number.length < 2 || number.length > 3 || !/^\d+$/.test(number)) {
                showToast('សូមបញ្ចូលលេខឈ្នះ 2-3 ខ្ទង់!', 'warning');
                return;
            }

            const round = getCurrentRound();
            if (round.letter && round.number) {
                showToast('លទ្ធផលថ្ងៃនេះត្រូវបានប្រកាសរួចហើយ!', 'warning');
                return;
            }

            // Update round
            round.letter = adminSelectedLetter;
            round.number = number;
            round.status = 'completed';

            // Save result
            appData.results.push({
                id: 'RES-' + String(appData.results.length + 1).padStart(4, '0'),
                letter: adminSelectedLetter,
                number: number,
                round: round.id,
                timestamp: new Date().toISOString()
            });

            // Check predictions
            const todayPredictions = appData.predictions.filter(p =>
                p.timestamp.startsWith(getToday()) &&
                p.round === round.id
            );

            let winners = 0;
            todayPredictions.forEach(p => {
                if (p.letter === adminSelectedLetter && p.number === number) {
                    p.win = true;
                    winners++;
                    const member = appData.members[p.memberPhone];
                    if (member) {
                        member.wins = (member.wins || 0) + 1;
                    }
                } else {
                    p.win = false;
                }
            });

            saveToFirebase();

            document.getElementById('adminResultMsg').innerHTML = `
                <div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">
                    ✅ ប្រកាសលទ្ធផលជោគជ័យ!<br>
                    ${adminSelectedLetter} - ${number} | 🏆 ${winners} នាក់ឈ្នះ
                </div>
            `;

            // Reset selection
            adminSelectedLetter = null;
            document.querySelectorAll('#adminPredictionGrid .prediction-card').forEach(el => {
                el.classList.remove('selected');
            });

            showToast(`🎯 លទ្ធផល ${adminSelectedLetter} - ${number} ប្រកាសរួចរាល់!`, 'success');
            setTimeout(() => refreshPage(), 2000);
        }

        // ================================================================
        // EVENT ATTACHMENT
        // ================================================================

        function attachEvents(page) {
            // Register
            const registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.onsubmit = (e) => {
                    e.preventDefault();
                    const name = document.getElementById('regName').value.trim();
                    const phone = document.getElementById('regPhone').value.trim();
                    const password = document.getElementById('regPassword').value.trim();
                    const confirm = document.getElementById('regConfirm').value.trim();
                    const msg = document.getElementById('regMsg');

                    if (!name || !phone || !password || !confirm) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }
                    if (password !== confirm) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">ពាក្យសម្ងាត់មិនដូចគ្នា!</div>';
                        return;
                    }
                    if (password.length < 4) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">ពាក្យសម្ងាត់ត្រូវមានយ៉ាងតិច ៤ តួ!</div>';
                        return;
                    }
                    if (appData.members[phone]) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">លេខទូរសព្ទមានរួចហើយ!</div>';
                        return;
                    }

                    appData.members[phone] = {
                        name: name,
                        password: password,
                        balance: 0,
                        predictions: [],
                        wins: 0,
                        totalPredictions: 0,
                        role: 'member'
                    };

                    saveToFirebase();
                    setCurrentUser({ phone: phone, name: name, role: 'member' });
                    msg.innerHTML =
                        `<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ ចុះឈ្មោះជោគជ័យ!<br>📱 ${phone}</div>`;
                    setTimeout(() => renderPage('dashboard'), 1500);
                };
            }

            // Login
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.onsubmit = (e) => {
                    e.preventDefault();
                    const role = document.getElementById('loginRole').value;
                    const phone = document.getElementById('loginPhone').value.trim();
                    const password = document.getElementById('loginPassword').value.trim();
                    const msg = document.getElementById('loginMsg');

                    if (!phone || !password) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }

                    const member = appData.members[phone];
                    if (!member || member.password !== password) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">❌ មិនត្រឹមត្រូវ!</div>';
                        return;
                    }

                    if (role === 'admin' && member.role !== 'super_admin' && member.role !== 'admin') {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">❌ អ្នកមិនមែនជាអ្នកគ្រប់គ្រង!</div>';
                        return;
                    }

                    if (role === 'member' && (member.role === 'super_admin' || member.role === 'admin')) {
                        // Allow admin to login as member too
                    }

                    setCurrentUser({ phone: phone, name: member.name, role: member.role || 'member' });
                    renderPage(member.role === 'super_admin' || member.role === 'admin' ? 'admin' : 'dashboard');
                    showToast('👋 ស្វាគមន៍!', 'success');
                };
            }
        }

        // ================================================================
        // INIT
        // ================================================================

        loadFromFirebase(() => {
            setupRealtimeListeners();

            const user = getCurrentUser();
            if (user) {
                const member = appData.members[user.phone];
                if (member) {
                    renderPage(member.role === 'super_admin' || member.role === 'admin' ? 'admin' : 'dashboard');
                } else {
                    setCurrentUser(null);
                    renderPage('login');
                }
            } else {
                renderPage('login');
            }

            database.ref('.info/connected').on('value', (snap) => {
                updateCloudStatus(snap.val());
                if (snap.val()) loadFromFirebase();
            });

            console.log('🎯 ប្រព័ន្ធទស្សន៍ទាយលេខ v1.0 បានដំណើរការ!');
            console.log('📊 ទិន្នន័យ:', appData);
        });

        // Auto save every 30 seconds
        setInterval(() => {
            if (dataLoaded) saveToFirebase();
        }, 30000);
    </script>
</body>
</html>
