<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិកលើ Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Khmer OS', system-ui, sans-serif; margin: 0; padding: 0; }
        body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #1e293b; padding: 25px; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 15px; color: #38bdf8; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 14px; }
        input { background: #334155; color: white; outline: none; }
        button { background: #0ea5e9; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0284c7; }
        .box { background: #334155; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .item { background: #1e293b; padding: 10px; margin: 5px 0; border-radius: 6px; display: flex; justify-content: space-between; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>☁️ ប្រព័ន្ធសមាជិក Cloud</h2>
    
    <div id="regBox">
        <p style="font-size: 13px; color: #94a3b8;">ចុះឈ្មោះសមាជិកថ្មី៖</p>
        <input type="text" id="regName" placeholder="👤 ឈ្មោះសមាជិក">
        <input type="tel" id="regPhone" placeholder="📱 លេខទូរសព្ទ">
        <button onclick="registerMember()">📝 ចុះឈ្មោះសមាជិក</button>
    </div>

    <div class="box">
        <h4 style="color: #f43f5e; margin-bottom: 8px;">📊 បញ្ជីសមាជិកទាំងអស់ (Sync គ្រប់គ្នា)</h4>
        <div id="memberList">📋 កំពុងទាញទិន្នន័យពី Cloud...</div>
    </div>
</div>

<script>
    // 🔗 ជំហានសំខាន់៖ យកព័ត៌មានពី Firebase Console មកដាក់ជំនួសត្រង់នេះ
    const firebaseConfig = {
        databaseURL: "https://your-project-id-default-rtdb.firebaseio.com/"
    };
    
    // ចាប់ផ្តើមដំណើរការ Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // មុខងារចុះឈ្មោះ និងបញ្ជូនទៅ Cloud ភ្លាមៗ
    function registerMember() {
        var name = document.getElementById('regName').value;
        var phone = document.getElementById('regPhone').value;

        if(!name || !phone) { alert("សូមបំពេញព័ត៌មានឱ្យគ្រប់!"); return; }

        // រក្សាទុកទៅ Firebase Cloud Database
        database.ref('cloud_members/' + phone).set({
            name: name,
            phone: phone,
            joinedAt: new Date().toLocaleString()
        }).then(() => {
            alert("🎯 បានរក្សាទុកលើ Cloud រួចរាល់!");
            document.getElementById('regName').value = '';
            document.getElementById('regPhone').value = '';
        });
    }

    // មុខងារទាញទិន្នន័យ Real-time (ឱ្យតែមានម្នាក់កែប្រែ គ្រប់គ្នានឹងឃើញដូចគ្នាភ្លាមៗ)
    database.ref('cloud_members').on('value', (snapshot) => {
        var listDiv = document.getElementById('memberList');
        listDiv.innerHTML = '';
        
        var data = snapshot.val();
        if(!data) {
            listDiv.innerHTML = 'មិនទាន់មានសមាជិកនៅឡើយទេ';
            return;
        }

        // បង្ហាញទិន្នន័យសមាជិកនៅលើអេក្រង់
        for(var key in data) {
            var member = data[key];
            listDiv.innerHTML += `
                <div class="item">
                    <span><b>${member.name}</b> (${member.phone})</span>
                    <span style="color: #38bdf8;">✔ Online</span>
                </div>
            `;
        }
    });
</script>

</body>
</html>
