<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ហាងលក់ទំនិញអនឡាញរបស់ខ្ញុំ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
        }

        header {
            background-color: #1a1a1a;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .distributor-btn {
            background-color: #ff9900;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #fff;
            padding: 25px 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
        }

        .modal h2 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #ff9900;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        /* រៀបចំប្រអប់អាសយដ្ឋានឱ្យដើរទន្ទឹមគ្នា ២ជួរផ្ដេក */
        .address-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .submit-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <h1>ហាងលក់ទំនិញអនឡាញ</h1>
        <button class="distributor-btn" onclick="openModal()">ចុះឈ្មោះជាតំណាងចែកចាយ</button>
    </header>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>ចុះឈ្មោះជាតំណាងចែកចាយ</h2>
            
            <form id="regForm" onsubmit="submitToTelegram(event)">
                <div class="form-group">
                    <label for="fullName">ឈ្មោះពេញ៖</label>
                    <input type="text" id="fullName" placeholder="ឧទាហរណ៍៖ សុខ ជា" required>
                </div>

                <div class="address-grid">
                    <div class="form-group">
                        <label for="age">អាយុ៖</label>
                        <input type="number" id="age" placeholder="អាយុ" required>
                    </div>
                    <div class="form-group">
                        <label for="job">មុខរបរបច្ចុប្បន្ន៖</label>
                        <input type="text" id="job" placeholder="មុខរបរ" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="telegramPhone">លេខតេឡេក្រាម (Telegram)៖</label>
                    <input type="tel" id="telegramPhone" placeholder="ឧទាហរណ៍៖ 012345678" required>
                </div>
                
                <h3 style="font-size: 15px; margin: 15px 0 10px 0; color: #ff9900; border-bottom: 1px dashed #ccc; padding-bottom: 5px;">អាសយដ្ឋានរស់នៅបច្ចុប្បន្ន</h3>
                
                <div class="address-grid">
                    <div class="form-group">
                        <label for="province">រាជធានី/ខេត្ត៖</label>
                        <select id="province" onchange="updateDistricts()" required>
                            <option value="" disabled selected>--- ជ្រើសរើសខេត្ត ---</option>
                            <option value="ភ្នំពេញ">ភ្នំពេញ</option>
                            <option value="កណ្តាល">កណ្តាល</option>
                            <option value="សៀមរាប">សៀមរាប</option>
                            <option value="ព្រះសីហនុ">ព្រះសីហនុ</option>
                            <option value="បាត់ដំបង">បាត់ដំបង</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="district">ក្រុង/ស្រុក/ខណ្ឌ៖</label>
                        <select id="district" required>
                            <option value="" disabled selected>--- ជ្រើសរើសស្រុក ---</option>
                        </select>
                    </div>
                </div>

                <div class="address-grid">
                    <div class="form-group">
                        <label for="commune">ឃុំ/សង្កាត់៖</label>
                        <input type="text" id="commune" placeholder="ឧទាហរណ៍៖ ចោមចៅ" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="village">ភូមិ/ផ្លូវ/ផ្ទះ៖</label>
                        <input type="text" id="village" placeholder="ឧទាហរណ៍៖ ភូមិ៣ ឬ ផ្ទះលេខ១០" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="experience">ធ្លាប់មានបទពិសោធន៍លក់ដែរឬទេ?៖</label>
                    <select id="experience">
                        <option value="មិនធ្លាប់មាន">មិនធ្លាប់មានបទពិសោធន៍</option>
                        <option value="ធ្លាប់មាន">ធ្លាប់មានបទពិសោធន៍លក់អនឡាញ</option>
                    </select>
                </div>
                
                <button type="submit" id="btnSubmit" class="submit-btn">បញ្ជូនព័ត៌មាន</button>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById("registerModal");
        function openModal() { modal.style.display = "flex"; }
        function closeModal() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

        // ទិន្នន័យស្រុក/ខណ្ឌ ផ្អែកលើខេត្តនីមួយៗ (អាចបន្ថែមខេត្តផ្សេងទៀតតាមទម្រង់នេះបាន)
        const districtsByProvince = {
            "ភ្នំពេញ": ["ខណ្ឌដូនពេញ", "ខណ្ឌចំការមន", "ខណ្ឌ៧មករា", "ខណ្ឌទួលគោក", "ខណ្ឌមានជ័យ", "ខណ្ឌឫស្សីកែវ", "ខណ្ឌសែនសុខ", "ខណ្ឌពោធិ៍សែនជ័យ", "ខណ្ឌជ្រោយចង្វារ", "ខណ្ឌព្រែកព្នៅ", "ខណ្ឌច្បារអំពៅ", "ខណ្ឌដង្កោ", "ខណ្ឌកំបូល", "ខណ្ឌបឹងកេងកង"],
            "កណ្តាល": ["ក្រុងតាខ្មៅ", "ស្រុកកណ្តាលស្ទឹង", "ស្រុកគៀនស្វាយ", "ស្រុកខ្សាច់កណ្តាល", "ស្រុកកោះធំ", "ស្រុកពញាឮ", "ស្រុកល្វាឯម", "ស្រុកមុខកំពូល", "ស្រុកអង្គស្នួល", "ស្រុកស្អាង"],
            "សៀមរាប": ["ក្រុងសៀមរាប", "ស្រុកពួក", "ស្រុកសូទ្រនិគម", "ស្រុកប្រាសាទបាគង", "ស្រុកស្រឡាញ់", "ស្រុកបន្ទាយស្រី", "ស្រុកស្វាយលើ", "ស្រុកវ៉ារិន", "ស្រុកអង្គរធំ", "ស្រុកអង្គរជុំ", "ស្រុកជីក្រែង", "ស្រុកក្រឡាញ់"],
            "ព្រះសីហនុ": ["ក្រុងព្រះសីហនុ", "ស្រុកព្រៃនប់", "ស្រុកស្ទឹងហាវ", "ស្រុកកំពង់សីលា", "ក្រុងកោះរុង"],
            "បាត់ដំបង": ["ក្រុងបាត់ដំបង", "ស្រុកបាណន់", "ស្រុកថ្មគោល", "ស្រុកបវេល", "ស្រុកឯកភ្នំ", "ស្រុកសង្កែ", "ស្រុកគាស់ក្រឡ", "ស្រុកសំឡូត", "ស្រុកសំពៅលូន", "ស្រុកភ្នំព្រឹក", "ស្រុកកំរៀង", "ស្រុកមោងឫស្សី", "ស្រុក រតនមណ្ឌល"]
        };

        // មុខងារធ្វើបច្ចុប្បន្នភាពប្រអប់ស្រុក នៅពេលប្តូរខេត្ត
        function updateDistricts() {
            const provinceSelect = document.getElementById("province");
            const districtSelect = document.getElementById("district");
            const selectedProvince = provinceSelect.value;

            // លុបជម្រើសស្រុកចាស់ៗចោលសិន
            districtSelect.innerHTML = '<option value="" disabled selected>--- ជ្រើសរើសស្រុក ---</option>';

            if (districtsByProvince[selectedProvince]) {
                districtsByProvince[selectedProvince].forEach(function(district) {
                    const option = document.createElement("option");
                    option.value = district;
                    option.text = district;
                    districtSelect.appendChild(option);
                });
            }
        }

        // មុខងារផ្ញើទិន្នន័យទៅ Telegram
        function submitToTelegram(event) {
            event.preventDefault();
            const btnSubmit = document.getElementById("btnSubmit");
            btnSubmit.disabled = true;
            btnSubmit.innerText = "កំពុងផ្ញើ...";

            const TELEGRAM_BOT_TOKEN = 'សូមដាក់_BOT_TOKEN_របស់អ្នកនៅទីនេះ'; 
            const TELEGRAM_CHAT_ID = 'សូមដាក់_CHAT_ID_របស់អ្នកនៅទីនេះ'; 

            const name = document.getElementById("fullName").value;
            const age = document.getElementById("age").value;
            const job = document.getElementById("job").value;
            const telegramPhone = document.getElementById("telegramPhone").value;
            
            // ទាញទិន្នន័យអាសយដ្ឋានលម្អិត
            const province = document.getElementById("province").value;
            const district = document.getElementById("district").value;
            const commune = document.getElementById("commune").value;
            const village = document.getElementById("village").value;
            
            const experience = document.getElementById("experience").value;

            // រៀបចំអត្ថបទផ្ញើទៅ Telegram ឱ្យមានរបៀបរៀបរយគ្រប់ជ្រុងជ្រោយ
            const message = `🔔 *មានសមាជិកចុះឈ្មោះថ្មី!*\n\n` +
                            `👤 *ឈ្មោះពេញ៖* ${name}\n` +
                            `🎂 *អាយុ៖* ${age} ឆ្នាំ | *មុខរបរ៖* ${job}\n` +
                            `📞 *លេខតេឡេក្រាម៖* ${telegramPhone}\n` +
                            `📈 *បទពិសោធន៍៖* ${experience}\n\n` +
                            `📍 *អាសយដ្ឋានបច្ចុប្បន្ន៖*\n` +
                            ` - ភូមិ/ផ្លូវ៖ ${village}\n` +
                            ` - ឃុំ/សង្កាត់៖ ${commune}\n` +
                            ` - ស្រុក/ខណ្ឌ៖ ${district}\n` +
                            ` - រាជធានី/ខេត្ត៖ ${province}`;

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: 'Markdown' })
            })
            .then(response => {
                if (response.ok) {
                    alert("🎉 ការចុះឈ្មោះបានជោគជ័យ!");
                    document.getElementById("regForm").reset();
                    closeModal();
                } else {
                    alert("❌ មានបញ្ហា Bot Token ឬ Chat ID!");
                }
            })
            .catch(error => {
                alert("❌ មិនអាចភ្ជាប់ទៅកាន់ប្រព័ន្ធបានទេ!");
            })
            .finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "បញ្ជូនព័ត៌មាន";
            });
        }
    </script>
</body>
</html>
