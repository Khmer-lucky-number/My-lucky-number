<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិក v5.1</title>
    <style>
        /* ===== CSS Styles ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Khmer OS', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            transition: background 0.5s ease;
        }

        body.light-mode {
            background: #f0f2f5;
        }

        body.light-mode .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: none;
            border: 1px solid rgba(0,0,0,0.1);
        }

        body.light-mode h2,
        body.light-mode .card h3,
        body.light-mode .list-item .info .name,
        body.light-mode .clock-display .time-part,
        body.light-mode .clock-display .date-part {
            color: #1a1a2e;
        }

        body.light-mode p,
        body.light-mode .clock-display {
            color: rgba(0,0,0,0.6);
        }

        body.light-mode .card {
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.08);
        }

        body.light-mode input, 
        body.light-mode select, 
        body.light-mode textarea {
            background: rgba(0,0,0,0.05);
            color: #1a1a2e;
            border-color: rgba(0,0,0,0.1);
        }

        body.light-mode .list-item {
            background: rgba(0,0,0,0.04);
            border-left-color: #667eea;
        }

        body.light-mode .role-card {
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.08);
        }

        body.light-mode .role-card:hover {
            background: rgba(0,0,0,0.08);
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 560px;
            max-height: 98vh;
            overflow-y: auto;
            animation: fadeInUp 0.6s ease-out;
            transition: all 0.3s ease;
        }

        .container::-webkit-scrollbar {
            width: 4px;
        }
        .container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.2); }
            50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.6); }
        }

        @keyframes moneyFloat {
            0%, 100% { transform: translateY(0) rotate(0); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(10deg); opacity: 0.6; }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .animate-glow {
            animation: glow 2s ease-in-out infinite;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
            line-height: 1.6;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 5px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.15);
            transform: scale(1.01);
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 50px;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            padding-right: 45px;
        }

        .input-group .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: all 0.3s ease;
        }

        .input-group .toggle-pwd:hover {
            color: #fff;
            transform: translateY(-50%) scale(1.1);
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 3px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s ease;
            opacity: 0;
        }

        .btn:hover::after {
            opacity: 1;
            transform: rotate(45deg) translateX(100%);
        }

        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            color: #1a1a2e;
        }

        .btn-gold:hover {
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #48bb78, #38a169);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.3);
        }

        .btn-secondary:hover {
            box-shadow: 0 12px 35px rgba(72, 187, 120, 0.5);
        }

        .btn-danger {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            box-shadow: 0 8px 25px rgba(252, 129, 129, 0.3);
        }

        .btn-danger:hover {
            box-shadow: 0 12px 35px rgba(252, 129, 129, 0.5);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f6ad55, #ed8936);
            box-shadow: 0 8px 25px rgba(246, 173, 85, 0.3);
            color: #fff;
        }

        .btn-warning:hover {
            box-shadow: 0 12px 35px rgba(246, 173, 85, 0.5);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
            width: auto;
        }

        .btn-purple {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            box-shadow: 0 8px 25px rgba(159, 122, 234, 0.3);
        }

        .btn-purple:hover {
            box-shadow: 0 12px 35px rgba(159, 122, 234, 0.5);
        }

        .btn-commission {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
            color: #fff;
        }

        .btn-commission:hover {
            box-shadow: 0 12px 35px rgba(245, 87, 108, 0.5);
        }

        .btn-backup {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.3);
            color: #fff;
        }

        .btn-backup:hover {
            box-shadow: 0 12px 35px rgba(79, 172, 254, 0.5);
        }

        .btn-restore {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            box-shadow: 0 8px 25px rgba(67, 233, 123, 0.3);
            color: #1a1a2e;
        }

        .btn-restore:hover {
            box-shadow: 0 12px 35px rgba(67, 233, 123, 0.5);
        }

        .btn-payment {
            background: linear-gradient(135deg, #fa709a, #fee140);
            box-shadow: 0 8px 25px rgba(250, 112, 154, 0.3);
            color: #1a1a2e;
        }

        .btn-payment:hover {
            box-shadow: 0 12px 35px rgba(250, 112, 154, 0.5);
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 16px;
            margin: 10px 0;
            text-align: left;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideInRight 0.5s ease-out;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
        }

        .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
        }

        .badge-purple {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            color: #fff;
        }

        .badge-green {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: #fff;
        }

        .badge-red {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            color: #fff;
        }

        .badge-commission {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
        }

        .badge-online {
            background: #48bb78;
            color: #fff;
            animation: pulse 1s ease-in-out infinite;
        }

        .badge-payment {
            background: linear-gradient(135deg, #fa709a, #fee140);
            color: #1a1a2e;
        }

        .admin-panel {
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
        }

        .admin-panel h3 {
            color: #ffd700;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .top-bar .left-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .top-bar .right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .top-bar h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .back-link {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: translateX(-3px);
        }

        .clock-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .clock-display {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.06);
            padding: 3px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 6px;
            font-variant-numeric: tabular-nums;
            flex-wrap: wrap;
        }

        .clock-display .date-part {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            font-size: 10px;
        }

        .clock-display .time-part {
            color: #ffd700;
            font-weight: 700;
            font-size: 14px;
        }

        .clock-display .seconds {
            color: rgba(255, 215, 0, 0.4);
            font-size: 11px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .status-dot.online {
            background: #48bb78;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-dot.offline {
            background: #fc8181;
        }

        .btn-logout {
            background: rgba(252, 129, 129, 0.15);
            border: 1px solid rgba(252, 129, 129, 0.2);
            color: #fc8181;
            padding: 3px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(252, 129, 129, 0.25);
            transform: scale(1.05);
            border-color: #fc8181;
        }

        .role-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }

        .role-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideInLeft 0.5s ease-out;
        }

        .role-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-8px) scale(1.02);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .role-card .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }

        .role-card .title {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }

        .role-card .desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 2px;
        }

        .role-card.admin-card {
            border-color: rgba(255, 215, 0, 0.2);
        }

        .role-card.admin-card:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }

        .role-card.super-card {
            border-color: rgba(255, 215, 0, 0.1);
            background: rgba(255, 215, 0, 0.03);
        }

        .role-card.super-card:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        .payment-section {
            margin: 12px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            animation: fadeIn 0.6s ease-out;
        }

        .payment-section h4 {
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .payment-section .payment-item {
            background: rgba(255,255,255,0.04);
            padding: 10px 12px;
            border-radius: 10px;
            margin: 6px 0;
            border-left: 3px solid #fa709a;
            transition: all 0.3s ease;
        }

        .payment-section .payment-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(5px);
        }

        .payment-section .payment-item .amount {
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
        }

        .payment-section .payment-item .status-pending {
            color: #f6ad55;
            font-size: 11px;
        }

        .payment-section .payment-item .status-approved {
            color: #48bb78;
            font-size: 11px;
        }

        .payment-section .payment-item .status-rejected {
            color: #fc8181;
            font-size: 11px;
        }

        .bank-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }

        .bank-info .info-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 14px;
            border-radius: 10px;
            border-left: 3px solid #ffd700;
            transition: all 0.3s ease;
        }

        .bank-info .info-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .bank-info .info-item .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        .bank-info .info-item .value {
            font-size: 15px;
            color: #fff;
            font-weight: 600;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 2px dashed rgba(255, 215, 0, 0.15);
            min-height: 100px;
            margin: 10px 0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .qr-container:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.05);
            transform: scale(1.02);
        }

        .qr-container img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .qr-container img:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .qr-container .qr-placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
        }

        .file-upload {
            position: relative;
            padding: 15px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            margin: 5px 0;
        }

        .file-upload:hover {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.01);
        }

        .file-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload .upload-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        .file-upload .upload-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .file-upload .file-name {
            color: #48bb78;
            font-size: 12px;
            margin-top: 4px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 100px;
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .preview-image:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .amount-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0;
        }

        .amount-btn {
            padding: 6px 14px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 8px;
            color: #ffd700;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .amount-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
        }

        .amount-btn.active {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .list-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 10px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

<body>

    <!-- ===== NETLIFY BADGE ===== -->
    <div class="netlify-badge">
        🚀 Deployed on <a href="#" target="_blank">Netlify</a>
    </div>

    <!-- ===== IMAGE VIEWER ===== -->
    <div class="image-viewer-overlay" id="imageViewer" onclick="closeImageViewer()">
        <span class="close-btn" onclick="closeImageViewer()">×</span>
        <img id="viewerImage" src="" alt="View Image">
    </div>

    <!-- ===== THEME TOGGLE ===== -->
    <button class="theme-toggle" onclick="toggleTheme()" title="ប្តូរពណ៌">🌓</button>

    <!-- ===== MODAL ===== -->
    <div id="modalOverlay">
        <div id="modalContent">
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div class="container" id="app">
        <div id="pageContent"></div>
        <div class="storage-info" id="storageInfo">
            💾 <span class="used" id="storageUsed">0</span> KB / <span class="total">5 MB</span> used
        </div>
    </div>

    <script>
        // ================================================================
        // ===== DATA LAYER =====
        // ================================================================

        var data = JSON.parse(localStorage.getItem('memberSystemData')) || {
            superAdmins: {},
            subAdmins: {},
            members: {},
            activityLogs: [],
            transactions: [],
            commissions: [],
            notifications: [],
            paymentRequests: [],
            memberCounter: 0,
            adminCounter: 0,
            superAdminOTP: null,
            superAdminOTPTime: null,
            exchangeRate: 4000,
            systemName: 'ប្រព័ន្ធគ្រប់គ្រងសមាជិក',
            version: '5.1',
            lastBackup: null,
            onlineUsers: []
        };

        if (!data.transactions) data.transactions = [];
        if (!data.commissions) data.commissions = [];
        if (!data.notifications) data.notifications = [];
        if (!data.activityLogs) data.activityLogs = [];
        if (!data.onlineUsers) data.onlineUsers = [];
        if (!data.paymentRequests) data.paymentRequests = [];

        // ===== AUTO BACKUP =====
        var backupInterval = null;

        function autoBackup() {
            var backup = {
                timestamp: new Date().toISOString(),
                version: data.version,
                data: JSON.parse(JSON.stringify(data))
            };
            try {
                localStorage.setItem('autoBackup', JSON.stringify(backup));
                data.lastBackup = backup.timestamp;
                saveData();
                updateStorageInfo();
            } catch (e) {
                console.warn('Auto backup failed:', e);
            }
        }

        function updateStorageInfo() {
            var used = document.getElementById('storageUsed');
            if (used) {
                var total = 0;
                for (var key in localStorage) {
                    if (localStorage.hasOwnProperty(key)) {
                        total += localStorage[key].length * 2;
                    }
                }
                var kb = Math.round(total / 1024);
                used.textContent = kb;
            }
        }

        setInterval(autoBackup, 300000);

        function saveData() {
            localStorage.setItem('memberSystemData', JSON.stringify(data));
            updateStorageInfo();
        }

        function generateMemberId() {
            data.memberCounter = data.memberCounter + 1;
            saveData();
            var num = data.memberCounter;
            var str = String(num);
            while (str.length < 4) str = '0' + str;
            return 'M-' + str;
        }

        function generateAdminId() {
            data.adminCounter = data.adminCounter + 1;
            saveData();
            var num = data.adminCounter;
            var str = String(num);
            while (str.length < 4) str = '0' + str;
            return 'A-' + str;
        }

        function generateOTP() {
            return String(Math.floor(100000 + Math.random() * 900000));
        }

        function getCurrentUser() {
            var user = localStorage.getItem('currentUser');
            if (user) {
                return JSON.parse(user);
            }
            return null;
        }

        function setCurrentUser(user) {
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
            } else {
                localStorage.removeItem('currentUser');
            }
        }

        function logoutUser() {
            showModal(`
                <div style="text-align:center;">
                    <div style="font-size:48px;margin-bottom:10px;">🚪</div>
                    <h3 style="color:#fff;margin-bottom:10px;">ចាកចេញ</h3>
                    <p style="color:rgba(255,255,255,0.6);">តើអ្នកចង់ចាកចេញមែនទេ?</p>
                    <div style="display:flex;gap:10px;margin-top:20px;">
                        <button onclick="hideModal();setCurrentUser(null);renderPage('home');" class="btn btn-danger" style="flex:1;">✅ ចាកចេញ</button>
                        <button onclick="hideModal()" class="btn" style="flex:1;background:rgba(255,255,255,0.1);">❌ បោះបង់</button>
                    </div>
                </div>
            `);
        }

        function logActivity(adminId, adminName, action, actionType, target, amount, details) {
            if (!data.activityLogs) data.activityLogs = [];
            var log = {
                id: 'LOG-' + String(data.activityLogs.length + 1).padStart(4, '0'),
                adminId: adminId || 'unknown',
                adminName: adminName || 'Unknown',
                action: action || 'unknown',
                actionType: actionType || 'general',
                target: target || null,
                amount: amount || null,
                timestamp: new Date().toISOString(),
                status: 'success',
                details: details || ''
            };
            data.activityLogs.unshift(log);
            if (data.activityLogs.length > 500) data.activityLogs = data.activityLogs.slice(0, 500);
            saveData();
            return log;
        }

        function createTransaction(type, memberPhone, adminId, amount, status, description, screenshot) {
            if (!data.transactions) data.transactions = [];
            var tx = {
                id: 'TX-' + String(data.transactions.length + 1).padStart(6, '0'),
                type: type,
                memberPhone: memberPhone,
                adminId: adminId || null,
                amount: amount || 0,
                status: status || 'pending',
                description: description || '',
                screenshot: screenshot || null,
                timestamp: new Date().toISOString()
            };
            data.transactions.unshift(tx);
            saveData();
            return tx;
        }

        function createPaymentRequest(type, from, to, amount, currency, description, screenshot, status) {
            if (!data.paymentRequests) data.paymentRequests = [];
            var pr = {
                id: 'PR-' + String(data.paymentRequests.length + 1).padStart(6, '0'),
                type: type,
                from: from,
                to: to,
                amount: amount || 0,
                currency: currency || 'usd',
                description: description || '',
                screenshot: screenshot || null,
                status: status || 'pending',
                timestamp: new Date().toISOString()
            };
            data.paymentRequests.unshift(pr);
            saveData();
            return pr;
        }

        function getPaymentRequestsByUser(phone) {
            if (!data.paymentRequests) return [];
            var result = [];
            for (var i = 0; i < data.paymentRequests.length; i++) {
                var pr = data.paymentRequests[i];
                if (pr.from === phone || pr.to === phone) {
                    result.push(pr);
                }
            }
            return result;
        }

        function getMemberTransactions(phone) {
            if (!data.transactions) return [];
            var result = [];
            for (var i = 0; i < data.transactions.length; i++) {
                if (data.transactions[i].memberPhone === phone) {
                    result.push(data.transactions[i]);
                }
            }
            return result;
        }

        function calculateTotals(transactions) {
            var totalDeposits = 0, totalWithdraws = 0;
            if (!transactions) return { totalDeposits: 0, totalWithdraws: 0, netBalance: 0 };
            for (var i = 0; i < transactions.length; i++) {
                var t = transactions[i];
                if (t.status === 'completed') {
                    if (t.type === 'deposit') totalDeposits += t.amount;
                    else if (t.type === 'withdraw') totalWithdraws += t.amount;
                }
            }
            return { totalDeposits: totalDeposits, totalWithdraws: totalWithdraws, netBalance: totalDeposits - totalWithdraws };
        }

        function addCommission(memberPhone, transactionId, amount) {
            if (!data.commissions) data.commissions = [];
            var member = data.members[memberPhone];
            if (!member) return null;
            var rate = member.commissionRate || 0.05;
            var commission = amount * rate;
            if (commission <= 0) return null;
            member.totalCommission = (member.totalCommission || 0) + commission;
            var rec = {
                id: 'C-' + String(data.commissions.length + 1).padStart(4, '0'),
                memberPhone: memberPhone,
                transactionId: transactionId,
                amount: amount,
                commission: commission,
                rate: rate,
                timestamp: new Date().toISOString(),
                status: 'approved'
            };
            data.commissions.push(rec);
            saveData();
            return rec;
        }

        function formatCurrency(amount, currency) {
            if (currency === 'riel') {
                var r = Math.round(amount * (data.exchangeRate || 4000));
                return r.toLocaleString('km-KH') + ' ៛';
            }
            return '$' + amount.toFixed(2);
        }

        function convertToRiel(usd) {
            return usd * (data.exchangeRate || 4000);
        }

        function convertToUSD(riel) {
            return riel / (data.exchangeRate || 4000);
        }

        function sendNotification(type, recipient, message) {
            if (!data.notifications) data.notifications = [];
            data.notifications.push({
                id: 'N-' + String(data.notifications.length + 1).padStart(4, '0'),
                type: type,
                recipient: recipient,
                message: message,
                read: false,
                timestamp: new Date().toISOString()
            });
            saveData();
            showToast(message, 'info');

        function showToast(message, type) {
            var old = document.querySelector('.toast');
            if (old) old.remove();
            var t = document.createElement('div');
            t.className = 'toast ' + (type || 'info');
            t.textContent = message;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                t.style.transform = 'translateX(100px)';
                setTimeout(function() { t.remove(); }, 500);
            }, 4000);

        function exportFullBackup() {
            try {
                var backup = {
                    timestamp: new Date().toISOString(),
                    version: data.version,
                    systemName: data.systemName,
                    data: JSON.parse(JSON.stringify(data))
                };
                var str = JSON.stringify(backup, null, 2);
                var blob = new Blob([str], { type: 'application/json' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'backup_' + new Date().toISOString().slice(0,10) + '.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('📤 នាំចេញបាក់ឡឺបជោគជ័យ!', 'success');
            } catch (err) {

        // ===== CLOCK =====
        var clockInterval = null;

        function startClock() {
            if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }

            function updateClock() {
                var n = new Date();
                var d = ['អាទិត្យ', 'ចន្ទ', 'អង្គារ', 'ពុធ', 'ព្រហស្បតិ៍', 'សុក្រ', 'សៅរ៍'];
                var day = d[n.getDay()];
                var dt = n.getDate().toString().padStart(2, '0');
                var m = (n.getMonth() + 1).toString().padStart(2, '0');
                var y = n.getFullYear();
                var fd = day + ' ' + dt + '/' + m + '/' + y;
                var h = n.getHours().toString().padStart(2, '0');
                var min = n.getMinutes().toString().padStart(2, '0');
                var s = n.getSeconds().toString().padStart(2, '0');
                var de = document.getElementById('clockDate');
                var te = document.getElementById('clockTime');
                var se = document.getElementById('clockSeconds');
                if (de) de.textContent = fd;
                if (te) te.textContent = h + ':' + min;
                if (se) se.textContent = s;
            }
            updateClock();
            clockInterval = setInterval(updateClock, 1000);
        }

        // ===== MODAL =====
        function showModal(html, options) {
            var overlay = document.getElementById('modalOverlay');
            var body = document.getElementById('modalBody');
            var content = document.getElementById('modalContent');
            body.innerHTML = html;
            overlay.style.display = 'flex';
            setTimeout(function() {
                content.classList.add('show');
            }, 10);
            if (options && options.closeOnOverlay !== false) {
                overlay.onclick = function(e) {
                    if (e.target === overlay) hideModal();
                };
            }
            document.addEventListener('keydown', function handler(e) {
                if (e.key === 'Escape') {
                    hideModal();
                    document.removeEventListener('keydown', handler);
                }
            });
        }

        function hideModal() {
            var overlay = document.getElementById('modalOverlay');
            var content = document.getElementById('modalContent');
            content.classList.remove('show');
            setTimeout(function() {
                overlay.style.display = 'none';
            }, 300);
        }

        function showPaymentRequestForm(type, targetPhone) {
            var user = getCurrentUser();
            if (!user) { showToast('សូមចូលប្រើជាមុន!', 'error'); return; }

            var targetName = '';
            var isMember = type === 'member';
            if (isMember) {
                var member = data.members[targetPhone];
                if (!member) { showToast('មិនឃើញសមាជិក!', 'error'); return; }
                targetName = member.username || member.phone;
            } else {
                var admin = data.subAdmins[targetPhone];
                if (!admin) { showToast('មិនឃើញ Sub Admin!', 'error'); return; }
                targetName = admin.username;
            }

            var actionType = user.role === 'member' ? 'deposit' : 'withdraw';
            var title = user.role === 'member' ? '💳 ស្នើសុំទូទាត់' : '💳 បញ្ចូលទូទាត់';

            showModal(`
                <div style="text-align:center;">
                    <h3 style="color:#fa709a;margin-bottom:15px;">${title}</h3>
                    <p style="color:rgba(255,255,255,0.6);">${isMember ? 'សមាជិក' : 'Sub Admin'}: <strong>${targetName}</strong></p>

                        <input type="hidden" id="prTargetType" value="${type}">
                        <div style="display:flex;gap:8px;flex-wrap:wrap;margin:5px 0;">
                            <select id="prCurrency" style="flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.1);min-width:80px;">
                                <option value="usd">$ USD</option>
                                <option value="riel">៛ Riel</option>
                            </select>
                            <input type="number" id="prAmount" placeholder="💰 ចំនួនប្រាក់" min="0.01" step="0.01" required style="flex:2;">
                        </div>
                        <textarea id="prDescription" placeholder="📝 ការពិពណ៌នា (ស្រេចចិត្ត)" rows="2"></textarea>
                        <div style="margin:10px 0;">
                            <label style="font-size:12px;color:rgba(255,255,255,0.4);">📸 បញ្ចូលរូបភាព</label>
                            <div class="file-upload" id="prUpload">
                                <span class="upload-icon">📸</span>
                                <span class="upload-text">ចុចដើម្បីបញ្ចូលរូបភាព</span>
                                <div class="file-name" id="prFileName"></div>
                                <div id="prPreview"></div>
                                <input type="file" id="prFile" accept="image/*" onchange="handlePRFile(this)">
                            </div>
                        </div>
                        <div style="display:flex;gap:10px;margin-top:15px;">
                            <button type="submit" class="btn btn-payment" style="flex:1;">💳 ផ្ញើសំណើ</button>
                            <button onclick="hideModal()" class="btn" style="flex:1;background:rgba(255,255,255,0.1);">❌ បោះបង់</button>
                        </div>
                    </form>
                    <div id="prMessage"></div>
                </div>
            `);

            document.getElementById('paymentRequestForm').addEventListener('submit', function(e) {
                e.preventDefault();
                var targetPhone = document.getElementById('prTargetPhone').value;
                var targetType = document.getElementById('prTargetType').value;
                var amount = parseFloat(document.getElementById('prAmount').value);
                var currency = document.getElementById('prCurrency').value;
                var description = document.getElementById('prDescription').value.trim();
                var fileInput = document.getElementById('prFile');
                var screenshot = fileInput.dataset.qrData || null;
                var msg = document.getElementById('prMessage');

                if (!amount || amount <= 0) {
                    msg.innerHTML = '<div class="error">សូមបញ្ចូលចំនួនត្រឹមត្រូវ!</div>';
                    return;
                }

                var user = getCurrentUser();
                var from = user.phone;
                var to = targetPhone;
                var type = user.role === 'member' ? 'deposit' : 'withdraw';

                var pr = createPaymentRequest(type, from, to, amount, currency, description, screenshot, 'pending');

                logActivity(user.phone, user.name || user.phone, 'payment_request', 'financial', targetPhone, amount,
                    'សំណើទូទាត់ ' + formatCurrency(amount, currency) + ' ទៅ ' + targetPhone);

                sendNotification('email', targetPhone + '@example.com',
                    'អ្នកបានទទួលសំណើទូទាត់ ' + formatCurrency(amount, currency) + ' ពី ' + user.phone);

                msg.innerHTML = '<div class="success">✅ សំណើទូទាត់ត្រូវបានផ្ញើរួច!<br>លេខ: ' + pr.id + '</div>';
                setTimeout(function() {
                    hideModal();
                    var cu = getCurrentUser();
                    if (cu) {
                        if (cu.role === 'super_admin') renderPage('super-dashboard');
                        else if (cu.role === 'sub_admin') renderPage('admin-dashboard');
                        else renderPage('dashboard');
                    }
                }, 2000);
            });
        }

        function handlePRFile(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var fn = document.getElementById('prFileName');
                if (fn) fn.textContent = '✅ ' + file.name;
                var pv = document.getElementById('prPreview');
                if (pv) pv.innerHTML = '<img src="' + e.target.result + '" class="preview-image" alt="Preview" onclick="event.stopPropagation();openImageViewer(\'' + e.target.result + '\')">';
                input.dataset.qrData = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function approvePaymentRequest(prId) {
            showModal(`
                <div style="text-align:center;">
                    <div style="font-size:48px;margin-bottom:10px;">✅</div>
                    <h3 style="color:#fff;margin-bottom:10px;">យល់ព្រមសំណើទូទាត់</h3>
                    <p style="color:rgba(255,255,255,0.6);">តើអ្នកចង់យល់ព្រមសំណើនេះមែនទេ?</p>
                    <div style="display:flex;gap:10px;margin-top:20px;">
                        <button onclick="hideModal();confirmApprovePayment('${prId}');" class="btn btn-gold" style="flex:1;">✅ យល់ព្រម</button>
                        <button onclick="hideModal()" class="btn" style="flex:1;background:rgba(255,255,255,0.1);">❌ បោះបង់</button>
                    </div>
                </div>
            `);
        }

        function confirmApprovePayment(prId) {
            var pr = null;
            for (var i = 0; i < data.paymentRequests.length; i++) {
                if (data.paymentRequests[i].id === prId) {
                    pr = data.paymentRequests[i];
                    break;
                }
            }
            if (!pr) { showToast('មិនឃើញសំណើ!', 'error'); return; }

            pr.status = 'approved';

            var amountUSD = pr.currency === 'riel' ? convertToUSD(pr.amount) : pr.amount;

            // Update balances based on type
            if (pr.type === 'deposit') {
                // Add money to target (member receiving)
                var target = data.members[pr.to];
                if (target) {
                    target.balance += amountUSD;
                    target.benefits.push('💳 បានទទួលទូទាត់ ' + formatCurrency(amountUSD, target.preferredCurrency || 'usd') + ' (សំណើ: ' + pr.id + ')');
                }
                // Subtract from source (sub admin or member sending)
                var source = data.members[pr.from] || data.subAdmins[pr.from];
                if (source) {
                    source.balance -= amountUSD;
                }
            } else if (pr.type === 'withdraw') {
                // Withdraw from target (member sending)
                var target = data.members[pr.from];
                if (target) {
                    target.balance -= amountUSD;
                    target.benefits.push('🏦 បានដកប្រាក់ ' + formatCurrency(amountUSD, target.preferredCurrency || 'usd') + ' (សំណើ: ' + pr.id + ')');
                }
                // Add to source (sub admin or super admin receiving)
                var source = data.subAdmins[pr.to] || data.superAdmins[pr.to];
                if (source) {
                    source.balance += amountUSD;
                }
            }

            saveData();
            logActivity('system', 'អនុម័តសំណើទូទាត់', 'អនុម័ត ' + pr.id + ' ($' + amountUSD.toFixed(2) + ')');
            sendNotification('email', pr.from + '@example.com', 'សំណើទូទាត់ ' + pr.id + ' ត្រូវបានអនុម័ត!');
            showToast('✅ សំណើទូទាត់ត្រូវបានអនុម័ត!', 'success');

            var cu = getCurrentUser();
            if (cu) {
                if (cu.role === 'super_admin') renderPage('super-dashboard');
                else renderPage('admin-dashboard');
            }
        }

        function rejectPaymentRequest(prId) {
            showModal(`
                <div style="text-align:center;">

                    <h3 style="color:#fff;margin-bottom:10px;">បដិសេធសំណើទូទាត់</h3>

        function confirmRejectPayment(prId) {
            var pr = null;
            for (var i = 0; i < data.paymentRequests.length; i++) {
                if (data.paymentRequests[i].id === prId) {
                    pr = data.paymentRequests[i];

                if (cu.role === 'super_admin') renderPage('super-dashboard');

        function searchAdminMembers(q) {
            var container = document.getElementById('adminMemberList');
            var res = document.getElementById('adminMemberResults');
            if (!container) return;

            var query = q.toLowerCase().trim();

            if (!query) {
                if (res) { res.innerHTML = ''; res.style.display = 'none'; }
                container.style.display = 'block';
                return;
            }

            var members = Object.values(data.members);
            var filtered = [];
            for (var i = 0; i < members.length; i++) {
                var m = members[i];
                if ((m.username && m.username.toLowerCase().indexOf(query) !== -1) ||
                    m.phone.indexOf(query) !== -1 ||
                    m.id.toLowerCase().indexOf(query) !== -1) {
                    filtered.push(m);
                }
            }

            if (res) {
                res.style.display = 'block';
                container.style.display = 'none';
                if (filtered.length === 0) {
                    res.innerHTML = '<p style="opacity:0.4;padding:10px;text-align:center;">មិនឃើញលទ្ធផល</p>';
                } else {
                    var html = '';
                    for (var j = 0; j < filtered.length; j++) {
                        var m = filtered[j];
                        var curr = m.preferredCurrency || 'usd';
                        html += `
                            <div class="list-item">
                                <div class="info">
                                    <span class="name">${m.username || m.phone}</span>
                                    <span class="id">🆔 ${m.id}</span>
                                    <span class="sub">📱 ${m.phone}</span>
                                </div>
                                <div><span class="balance">${formatCurrency(m.balance, curr)}</span></div>
                                <div class="actions">
                                    <button onclick="renderPage('transfer-money',{phone:'${m.phone}'})" class="btn btn-warning btn-sm">💸 ផ្ទេរ</button>
                                    <button onclick="addCommissionToMember('${m.phone}')" class="btn btn-commission btn-sm">🎁 កម្រៃ</button>
                                    <button onclick="showPaymentRequestForm('member','${m.phone}')" class="btn btn-payment btn-sm">💳</button>
                                </div>
                            </div>
                        `;
                    }
                    res.innerHTML = html;
                }
            }
        }

        function confirmApprove(txId) {
            var tx = null;
            for (var i = 0; i < data.transactions.length; i++) {
                if (data.transactions[i].id === txId) {
                    tx = data.transactions[i];
                    break;
                }
            }
            if (!tx) { showToast('មិនឃើញប្រតិបត្តិការ!', 'error'); return; }

            tx.status = 'completed';

            var member = data.members[tx.memberPhone];
            if (member) {
                if (tx.type === 'deposit') {
                    member.balance += tx.amount;
                    member.benefits.push('💰 បានដាក់ប្រាក់ $' + tx.amount.toFixed(2) + ' នៅថ្ងៃ ' + new Date().toLocaleDateString('km-KH'));

                    var comm = addCommission(tx.memberPhone, tx.id, tx.amount);
                    if (comm) {
                        member.benefits.push('🎁 បានទទួលកម្រៃ $' + comm.commission.toFixed(2));
                    }
                } else if (tx.type === 'withdraw') {
                    member.balance -= tx.amount;
                    member.benefits.push('🏦 បានដកប្រាក់ $' + tx.amount.toFixed(2) + ' នៅថ្ងៃ ' + new Date().toLocaleDateString('km-KH'));
                }
            }

            saveData();

            var au = getCurrentUser();
            if (au) {
                var ad = data.subAdmins[au.phone];
                if (ad) {
                    logActivity(ad.id, ad.username, 'approve_transaction', 'financial', tx.memberPhone, tx.amount,
                        'យល់ព្រមលើប្រតិបត្តិការ ' + tx.id + ' ($' + tx.amount.toFixed(2) + ')');
                }
            }

            sendNotification('email', tx.memberPhone + '@example.com',
                'ប្រតិបត្តិការ ' + tx.id + ' ត្រូវបានអនុម័ត! ចំនួន: $' + tx.amount.toFixed(2));

            showToast('✅ ប្រតិបត្តិការត្រូវបានយល់ព្រម!', 'success');
            renderPage('admin-dashboard');
        }

        function generateReport(period) {
            var now = new Date();
            var start = new Date();

            if (period === 'daily') {
                start.setHours(0, 0, 0, 0);
            } else if (period === 'weekly') {
                start.setDate(now.getDate() - 7);
            } else if (period === 'monthly') {
                start.setMonth(now.getMonth() - 1);
            }

            var filtered = [];
            for (var i = 0; i < data.transactions.length; i++) {
                var t = data.transactions[i];
                if (new Date(t.timestamp) >= start && new Date(t.timestamp) <= now && t.status === 'completed') {
                    filtered.push(t);
                }
            }

            var totals = calculateTotals(filtered);
            var tc = 0;
            for (var j = 0; j < data.commissions.length; j++) {
                tc += data.commissions[j].commission;
            }

            return {
                period: period,
                startDate: start,
                endDate: now,
                transactions: filtered,
                totalDeposits: totals.totalDeposits,
                totalWithdraws: totals.totalWithdraws,
                netBalance: totals.netBalance,
                totalMembers: Object.keys(data.members).length,
                totalCommissions: tc
            };
        }

                    data.superAdminOTPTime = Date.now();
                    saveData();

                    console.log('📤 OTP: ' + otp);
                    msg.innerHTML = `
                        <div class="success">
                            ✅ OTP ត្រូវបានផ្ញើរួច!<br>
                            📱 ${phone} | 📧 ${email}<br>
                            ⏱️ ផុតកំណត់ ៥ នាទី<br>
                            <span style="font-size:12px;opacity:0.5;">(សាកល្បង: ${otp})</span>
                        </div>
                    `;
                    renderPage('super-otp', { phone: phone });
                });
            }

            // ---- SUPER OTP ----
            var sof = document.getElementById('superOTPForm');
            if (sof) {
                var digs = document.querySelectorAll('.otp-digit');
                for (var i = 0; i < digs.length; i++) {
                    (function(idx, arr) {
                        digs[idx].addEventListener('input', function() {
                            if (this.value.length === 1 && idx < arr.length - 1) {
                                arr[idx + 1].focus();
                            }
                        });
                        digs[idx].addEventListener('keydown', function(e) {
                            if (e.key === 'Backspace' && this.value.length === 0 && idx > 0) {
                                arr[idx - 1].focus();
                            }
                        });
                    })(i, digs);
                }

                sof.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var phone = document.getElementById('otpPhone').value;
                    var msg = document.getElementById('message');

                    var otp = '';
                    var digits = document.querySelectorAll('.otp-digit');
                    for (var j = 0; j < digits.length; j++) otp += digits[j].value;

                    if (otp.length !== 6) {
                        msg.innerHTML = '<div class="error">សូមបញ្ចូល ៦ ខ្ទង់!</div>';
                        return;
                    }

                    var sa = Object.values(data.superAdmins)[0];
                    if (!sa) {
                        msg.innerHTML = '<div class="error">មិនឃើញ Super Admin!</div>';
                        return;
                    }

                    var stored = data.superAdminOTP;
                    var time = data.superAdminOTPTime || 0;
                    var now = Date.now();

                    if (!stored || now - time > 5 * 60 * 1000) {
                        msg.innerHTML = '<div class="error">⏱️ OTP ផុតកំណត់!</div>';
                        return;
                    }

                    if (otp !== stored) {
                        msg.innerHTML = '<div class="error">❌ OTP មិនត្រឹមត្រូវ!</div>';
                        return;
                    }

                    setCurrentUser({
                        phone: sa.phone,
                        role: 'super_admin',
                        name: 'Super Admin'
                    });
                    logActivity('SUPER-001', 'Super Admin', 'login', 'authentication', null, null, 'ចូលប្រើដោយ OTP');
                    data.superAdminOTP = null;
                    data.superAdminOTPTime = null;
                    saveData();
                    renderPage('super-dashboard');
                });
            }

            // ---- LOGIN ----
            var lf = document.getElementById('loginForm');
            if (lf) {
                lf.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var role = document.getElementById('loginRole').value;
                    var phone = document.getElementById('loginPhone').value.trim();
                    var password = document.getElementById('loginPassword').value.trim();
                    var msg = document.getElementById('message');

                    if (!phone || !password) {
                        msg.innerHTML = '<div class="error">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }

                    if (!verifyCaptcha()) {
                        msg.innerHTML = '<div class="error">❌ Captcha មិនត្រឹមត្រូវ!</div>';
                        refreshCaptcha();
                        return;
                    }

                    if (role === 'sub_admin') {
                        var admin = data.subAdmins[phone];
                        if (!admin || admin.password !== password) {
                            msg.innerHTML = '<div class="error">❌ មិនត្រឹមត្រូវ!</div>';
                            return;
                        }
                        setCurrentUser({ phone: phone, role: 'sub_admin', name: admin.username });
                        logActivity(admin.id, admin.username, 'login', 'authentication', null, null, 'ចូលប្រើជា Sub Admin');
                        renderPage('admin-dashboard');
                    } else {
                        var member = data.members[phone];
                        if (!member || member.password !== password) {
                            msg.innerHTML = '<div class="error">❌ មិនត្រឹមត្រូវ!</div>';
                            return;
                        }
                        setCurrentUser({ phone: phone, role: 'member', name: member.username || phone });
                        logActivity(member.id, member.username || phone, 'login', 'authentication', null, null, 'ចូលប្រើជាសមាជិក');
                        renderPage('dashboard');
                    }
                });
            }

            // ---- REGISTER ----
            var rf = document.getElementById('registerForm');
            if (rf) {
                rf.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var username = document.getElementById('regUsername').value.trim();
                    var phone = document.getElementById('regPhone').value.trim();
                    var password = document.getElementById('regPassword').value.trim();
                    var confirm = document.getElementById('regConfirmPassword').value.trim();
                    var curr = document.getElementById('regCurrency').value;
                    var msg = document.getElementById('message');

                    if (!phone || !password || !confirm) {
                        msg.innerHTML = '<div class="error">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }

                    if (!verifyCaptcha()) {
                        msg.innerHTML = '<div class="error">❌ Captcha មិនត្រឹមត្រូវ!</div>';
                        refreshCaptcha();
                        return;
                    }

                    if (!/^\d{9,}$/.test(phone)) {
                        msg.innerHTML = '<div class="error">លេខទូរសព្ទមិនត្រឹមត្រូវ!</div>';
                        return;
                    }
                    if (password !== confirm) {
                        msg.innerHTML = '<div class="error">ពាក្យសម្ងាត់មិនដូចគ្នា!</div>';
                        return;
                    }
                    if (data.members[phone]) {
                        msg.innerHTML = '<div class="error">លេខទូរសព្ទមានរួចហើយ!</div>';
                        return;
                    }

                    var admin = Object.values(data.subAdmins)[0];
                    var aid = admin ? admin.id : null;
                    if (admin && admin.members.indexOf(phone) === -1) {
                        admin.members.push(phone);
                    }

                    var id = generateMemberId();
                    data.members[phone] = {
                        username: username || phone,
                        password: password,
                        phone: phone,
                        id: id,
                        role: 'member',
                        balance: 0,
                        benefits: ['✨ សមាជិកថ្មី'],
                        adminId: aid,
                        preferredCurrency: curr || 'usd',
                        createdAt: new Date().toISOString(),
                        commissionRate: 0.05,
                        totalCommission: 0
                    };
                    saveData();

                    setCurrentUser({
                        phone: phone,
                        role: 'member',
                        name: username || phone,
                        preferredCurrency: curr || 'usd'
                    });

                    msg.innerHTML = `
                        <div class="success">
                            ✅ ចុះឈ្មោះជោគជ័យ!<br>
                            🆔 ${id}<br>
                            📱 ${phone}<br>
                            🔑 ${password}<br>
                            <span style="color:#ffd700;">⚠️ សូមចំណាំលេខទូរសព្ទ និងពាក្យសម្ងាត់សម្រាប់ចូលប្រើនៅពេលក្រោយ!</span>
                        </div>
                    `;
                    rf.reset();

                    sendNotification('email', phone + '@example.com',
                        'ស្វាគមន៍ ' + (username || phone) + '! អ្នកបានចុះឈ្មោះជោគជ័យ។');

                    setTimeout(function() {
                        renderPage('dashboard');
                    }, 2000);
                });
            }

            // ---- CREATE ADMIN ----
            var caf = document.getElementById('createAdminForm');
            if (caf) {
                caf.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var name = document.getElementById('newAdminName').value.trim();
                    var phone = document.getElementById('newAdminPhone').value.trim();
                    var password = document.getElementById('newAdminPassword').value.trim();
                    var msg = document.getElementById('createAdminMessage');

                    if (!name || !phone || !password) {
                        msg.innerHTML = '<div class="error">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }
                    if (!/^\d{9,}$/.test(phone)) {
                        msg.innerHTML = '<div class="error">លេខទូរសព្ទមិនត្រឹមត្រូវ!</div>';
                        return;
                    }
                    if (data.subAdmins[phone]) {
                        msg.innerHTML = '<div class="error">លេខទូរសព្ទមានរួចហើយ!</div>';
                        return;
                    }

                    var id = generateAdminId();
                    data.subAdmins[phone] = {
                        username: name,
                        password: password,
                        phone: phone,
                        id: id,
                        role: 'sub_admin',
                        balance: 0,
                        totalReceived: 0,
                        totalTransferred: 0,
                        members: Object.keys(data.members),
                        createdBy: 'super_admin',
                        createdAt: new Date().toISOString(),
                        commissionRate: 0.05,
                        bankName: '',
                        bankAccount: '',
                        qrCode: ''
                    };

                    var mk = Object.keys(data.members);
                    for (var i = 0; i < mk.length; i++) {
                        data.members[mk[i]].adminId = id;
                    }

                    saveData();
                    logActivity('SUPER-001', 'Super Admin', 'create_admin', 'administration', phone, null, 'បង្កើត Sub Admin "' + name + '" (' + id + ')');

                    sendNotification('email', phone + '@example.com',
                        'អ្នកត្រូវបានតែងតាំងជា Sub Admin! ឈ្មោះ: ' + name + ', ពាក្យសម្ងាត់: ' + password);

                    msg.innerHTML = '<div class="success">✅ បង្កើតជោគជ័យ! 🆔 ' + id + '<br>🔒 ' + password + '</div>';
                    caf.reset();
                    setTimeout(function() { renderPage('super-dashboard'); }, 2000);
                });
            }

            // ---- TRANSFER MONEY ----
            var tf = document.getElementById('transferForm');
            if (tf) {
                tf.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var user = getCurrentUser();
                    if (!user || user.role !== 'sub_admin') {
                        showToast('សូមចូលប្រើជា Sub Admin!', 'error');
                        return;
                    }

                    var admin = data.subAdmins[user.phone];
                    if (!admin) {
                        showToast('មិនឃើញព័ត៌មាន Admin!', 'error');
                        return;
                    }

                    var phone = document.getElementById('transferPhone').value;
                    var amount = parseFloat(document.getElementById('transferAmount').value);
                    var currency = document.getElementById('transferCurrency').value;
                    var msg = document.getElementById('transferMessage');

                    var amountUSD = currency === 'riel' ? convertToUSD(amount) : amount;

                    if (!amountUSD || amountUSD <= 0) {
                        msg.innerHTML = '<div class="error">សូមបញ្ចូលចំនួនត្រឹមត្រូវ!</div>';
                        return;
                    }
                    if (amountUSD > admin.balance) {
                        msg.innerHTML = '<div class="error">មិនគ្រប់គ្រាន់! (នៅសល់ $' + admin.balance.toFixed(2) + ')</div>';
                        return;
                    }

                    var member = data.members[phone];
                    if (!member) {
                        msg.innerHTML = '<div class="error">មិនឃើញសមាជិក!</div>';
                        return;
                    }

                    admin.balance -= amountUSD;
                    admin.totalTransferred = (admin.totalTransferred || 0) + amountUSD;
                    member.balance += amountUSD;
                    var date = new Date().toLocaleDateString('km-KH');
                    member.benefits.push('💰 បានទទួល $' + amountUSD.toFixed(2) + ' នៅថ្ងៃ ' + date);
                    if (admin.members.indexOf(phone) === -1) admin.members.push(phone);

                    saveData();
                    logActivity(admin.id, admin.username, 'member_transfer', 'financial', member.username || member.phone, amountUSD,
                        'ផ្ទេរ $' + amountUSD.toFixed(2) + ' ទៅ ' + (member.username || member.phone));

                    createTransaction(
                        'transfer',
                        member.phone,
                        admin.id,
                        amountUSD,
                        'completed',
                        'ផ្ទេរប្រាក់ $' + amountUSD.toFixed(2) + ' ពី ' + admin.username,
                        null
                    );

                    sendNotification('email', member.phone + '@example.com',
                        'អ្នកបានទទួលប្រាក់ $' + amountUSD.toFixed(2) + ' ពី ' + admin.username);

                    msg.innerHTML = `
                        <div class="success">
                            ✅ ផ្ទេរ $${amountUSD.toFixed(2)} ទៅ ${member.username || member.phone} ជោគជ័យ!<br>
                            💰 ប្រាក់ដែលនៅសល់: $${admin.balance.toFixed(2)}
                        </div>
                    `;
                    document.getElementById('transferAmount').value = '';
                    setTimeout(function() { renderPage('admin-dashboard'); }, 1500);
                });
            }

            // ---- BANK INFO ----
            var bif = document.getElementById('bankInfoForm');
            if (bif) {
                bif.addEventListener('submit', function(e) {
                    e.preventDefault();
                    saveBankInfo();
                });
            }

            // ---- COMMISSION ----
            var cf = document.getElementById('commissionForm');
            if (cf) {
                cf.addEventListener('submit', function(e) {
                    e.preventDefault();
                    saveCommissionSettings();
                });
            }

            // ---- EXCHANGE RATE ----
            var erf = document.getElementById('exchangeRateForm');
            if (erf) {
                erf.addEventListener('submit', function(e) {
                    e.preventDefault();
                    updateExchangeRate();
                });
            }
        }

        // ================================================================
        // ===== INIT =====
        // ================================================================

        if (!data.superAdminExists) {
            data.superAdmins['066817407'] = {
                username: 'Super Admin',
                password: 'super123',
                phone: '066817407',
                email: 'narith128080@gmail.com',
                id: 'SUPER-001',
                role: 'super_admin',
                balance: 10000,
                createdAt: new Date().toISOString()
            };
            data.superAdminExists = true;
            saveData();
            logActivity('SUPER-001', 'Super Admin', 'system_init', 'system', null, null, 'បង្កើតប្រព័ន្ធ Super Admin');
        }

        var cu = getCurrentUser();
        if (cu) {
            if (cu.role === 'super_admin') renderPage('super-dashboard');
            else if (cu.role === 'sub_admin' && data.subAdmins[cu.phone]) renderPage('admin-dashboard');
            else if (cu.role === 'member' && data.members[cu.phone]) renderPage('dashboard');
            else { setCurrentUser(null); renderPage('home'); }
        } else {
            renderPage('home');
        }

        window.addEventListener('beforeunload', function() {
            autoBackup();
        });

        setInterval(function() {
            var pending = data.transactions ? data.transactions.filter(function(t) { return t.status === 'pending'; }) : [];
            if (pending.length > 0) {
                var badge = document.querySelector('.notification-badge');
                if (badge) {
                    badge.textContent = pending.length;
                    badge.style.display = pending.length > 0 ? 'block' : 'none';
                }
            }
        }, 10000);

        updateStorageInfo();

        console.log('🚀 ប្រព័ន្ធគ្រប់គ្រងសមាជិក v5.1 បានដំណើរការ!');
        console.log('📊 ទិន្នន័យបច្ចុប្បន្ន:', data);
        console.log('👤 អ្នកប្រើបច្ចុប្បន្ន:', cu);
    </script>
</body>
</html>
