<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>លេខឆ្នោតខ្មែរ N98</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f9f9f9; }
    header { background:#0078D7; color:white; padding:20px; text-align:center; }
    section { padding:20px; }
    .lottery-box { background:white; padding:20px; margin:20px 0; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .time-box { font-weight:bold; color:#0078D7; }
    .numbers { display:flex; gap:20px; margin-top:10px; }
    .numbers div { background:#eee; padding:15px; border-radius:5px; text-align:center; flex:1; }
    footer { background:#333; color:white; text-align:center; padding:15px; margin-top:20px; }
  </style>
</head>
<body>
  <header>
    <h1>លេខឆ្នោតខ្មែរ N98</h1>
    <p id="datetime"></p>
  </header>

  <section>
    <div class="lottery-box">
      <div class="time-box">លទ្ធផលម៉ោង 12:00 (លេខពីខ្ទង់)</div>
      <div class="numbers" id="twoDigit">
        <div>A: --</div>
        <div>B: --</div>
        <div>C: --</div>
        <div>D: --</div>
      </div>
    </div>

    <div class="lottery-box">
      <div class="time-box">លទ្ធផលម៉ោង 18:00 (លេខបីខ្ទង់)</div>
      <div class="numbers" id="threeDigit">
        <div>A: ---</div>
        <div>B: ---</div>
        <div>C: ---</div>
        <div>D: ---</div>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 Khmer Lottery N98 | ព័ត៌មានសម្រាប់សមាជិក</p>
  </footer>

  <script>
    // បង្ហាញកាលបរិច្ឆេទម៉ោងបច្ចុប្បន្ន
    function updateDateTime() {
      const now = new Date();
      document.getElementById("datetime").innerText = 
        now.toLocaleString("km-KH", { dateStyle: "full", timeStyle: "medium" });
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // Function បង្កើតលេខដោយប្រើ seed ពីកាលបរិច្ឆេទ + ម៉ោង
    function seededRandom(seed) {
      let x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    function generateNumbers(type) {
      const today = new Date();
      const seedBase = parseInt(today.getFullYear().toString() + 
                                (today.getMonth()+1).toString() + 
                                today.getDate().toString());

      if (type === "twoDigit") {
        const twoDigitBox = document.getElementById("twoDigit").children;
        for (let i=0; i<4; i++) {
          let num = Math.floor(seededRandom(seedBase + i + 1200) * 90) + 10;
          twoDigitBox[i].innerText = String.fromCharCode(65+i) + ": " + num;
        }
      }

      if (type === "threeDigit") {
        const threeDigitBox = document.getElementById("threeDigit").children;
        for (let i=0; i<4; i++) {
          let num = Math.floor(seededRandom(seedBase + i + 1800) * 900) + 100;
          threeDigitBox[i].innerText = String.fromCharCode(65+i) + ": " + num;
        }
      }
    }

    // កំណត់ពេលស្វ័យប្រវត្តិ
    function checkTime() {
      const now = new Date();
      const hour = now.getHours();
      const minute = now.getMinutes();

      if (hour === 12 && minute === 0) {
        generateNumbers("twoDigit");
      }
      if (hour === 18 && minute === 0) {
        generateNumbers("threeDigit");
      }
    }

    setInterval(checkTime, 60000); // ពិនិត្យរៀងរាល់ 1 នាទី
  </script>
</body>
</html>
