<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធទស្សន៍ទាយលេខសំណាង 24/7</title>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Battambang', sans-serif; }
        body { background: #0f0c20; color: #ffffff; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: #15102a; border: 1px solid #333; border-radius: 24px; width: 100%; max-width: 440px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .main-title { color: #fbd38d; font-size: 1.5rem; margin-bottom: 10px; }
        .live-clock { background: #2b6cb0; padding: 8px; border-radius: 20px; margin-bottom: 20px; font-size: 0.9rem; }
        .lucky-circle { font-size: 3rem; margin: 20px 0; padding: 30px; background: #311042; border-radius: 50%; display: inline-block; border: 4px solid #fbd38d; }
        .predict-btn { background: #f43f5e; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">ប្រព័ន្ធទស្សន៍ទាយសំណាង</h1>
    <div class="live-clock" id="clock">ថ្ងៃនេះ | 00:00:00</div>
    
    <div class="lucky-circle" id="lucky-number">?</div>
    <div id="status-text">កំពុងរង់ចាំម៉ោងចេញលទ្ធផល...</div>
    <br>
    <button class="predict-btn" onclick="startAlarmTest()">សាកល្បងសំឡេងរោទ៍</button>
</div>

<script>
    // 1. មុខងារលេងសំឡេងរោទ៍ "តេង តេង តេង"
    function playAlarm() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        for(let i = 0; i < 3; i++) {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }, i * 600);
        }
        // ជូនដំណឹងលើ Browser
        if (Notification.permission === "granted") {
            new Notification("ដល់ម៉ោងចេញលទ្ធផល!", { body: "លទ្ធផលថ្មីបានចេញហើយ!" });
        }
    }

    // 2. នាឡិកាដំណើរការ 24 ម៉ោង
    function updateApp() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleString('km-KH');
        
        // ពិនិត្យមើលម៉ោងចេញលទ្ធផល (នាទីទី 0 វិនាទីទី 0)
        if (now.getMinutes() === 0 && now.getSeconds() === 0) {
            playAlarm();
        }
    }

    // ស្នើសុំសិទ្ធិ Notification
    document.addEventListener('click', () => {
        if (Notification.permission !== "granted") Notification.requestPermission();
    }, {once: true});

    setInterval(updateApp, 1000);

    function startAlarmTest() {
        alert("កំពុងធ្វើតេស្តសំឡេង...");
        playAlarm();
    }
</script>

</body>
</html>
