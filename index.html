        .balance-box .floating-emoji:nth-child(3) { bottom: 20%; left: 10%; animation-delay: 2.5s; }
        .balance-box .floating-emoji:nth-child(4) { bottom: 5%; right: 8%; animation-delay: 0.8s; font-size: 2.2rem; }
        .balance-box .floating-emoji:nth-child(5) { top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 1.8s; font-size: 5rem; opacity: 0.07; }
        .balance-box .floating-emoji:nth-child(6) { top: 8%; left: 45%; animation-delay: 3.2s; font-size: 1.8rem; }
        .balance-box .floating-emoji:nth-child(7) { bottom: 30%; right: 15%; animation-delay: 0.4s; font-size: 2rem; }
        .balance-box .floating-emoji:nth-child(8) { top: 60%; left: 5%; animation-delay: 2.0s; font-size: 2.8rem; }
        .balance-box .floating-emoji:nth-child(9) { bottom: 10%; left: 50%; animation-delay: 3.8s; font-size: 2.4rem; }
        .balance-box .floating-emoji:nth-child(10) { top: 30%; right: 30%; animation-delay: 1.0s; font-size: 1.6rem; }

<body>

            © 2026 អាជីវករខ្មែរឆ្លាតវៃ — ប្រព័ន្ធគ្រប់គ្រងហិរញ្ញវត្ថុឆ្លាតវៃ

    <script>
        // ============================================================
        //  1. DATA LAYER
        // ============================================================
        const DB = {
            get(key, def) {
                try {
                    const raw = localStorage.getItem('ak_' + key);
                    return raw ? JSON.parse(raw) : def;
                } catch { return def; }
            },
            set(key, val) {
                localStorage.setItem('ak_' + key, JSON.stringify(val));
            },
            remove(key) {
                localStorage.removeItem('ak_' + key);
            },
            getUsers() { return this.get('users', []); },
            setUsers(u) { this.set('users', u); },
            getTx() { return this.get('tx', []); },
            setTx(t) { this.set('tx', t); },
            getWithdraws() { return this.get('withdraws', []); },
            setWithdraws(w) { this.set('withdraws', w); },
            getDeposits() { return this.get('deposits', []); },
            setDeposits(d) { this.set('deposits', d); },
            getRewards() { return this.get('rewards', []); },
            setRewards(r) { this.set('rewards', r); },
            getSession() { return this.get('session', null); },
            setSession(s) { this.set('session', s); },
            clearSession() { localStorage.removeItem('ak_session'); },
            getNextId() {
                let current = this.get('nextId', 1000);
                this.set('nextId', current + 1);
                return current;
            },
            resetAll() {
                const admin = this.getUsers().find(u => u.role === 'admin');
                this.remove('users');
                this.remove('tx');
                this.remove('withdraws');
                this.remove('deposits');
                this.remove('rewards');
                this.remove('nextId');
                this.remove('adminBankInfo');
                this.remove('session');
                if (admin) {
                    this.setUsers([admin]);
                }
            },
            deleteMember(phone) {
                let users = this.getUsers();
                users = users.filter(u => u.phone !== phone);
                this.setUsers(users);
                let tx = this.getTx();
                tx = tx.filter(t => t.phone !== phone);
                this.setTx(tx);
                let deposits = this.getDeposits();
                deposits = deposits.filter(d => d.phone !== phone);
                this.setDeposits(deposits);
                let withdraws = this.getWithdraws();
                withdraws = withdraws.filter(w => w.phone !== phone);
                this.setWithdraws(withdraws);
                let rewards = this.getRewards();
                rewards = rewards.filter(r => r.phone !== phone);
                this.setRewards(rewards);
            }
        };

        // ============================================================
        //  2. HELPERS
        // ============================================================
        function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

        function formatMoney(n) {
            if (n === undefined || n === null || isNaN(n)) return '0.00 ៛';
            if (n <= 0) return '0.00 ៛';
            return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',') + ' ៛';
        }

        function getDate() {
            return new Date().toLocaleString('km-KH', { timeZone: 'Asia/Phnom_Penh' });
        }

        // ============================================================
        //  2.1 TELEGRAM HELPERS - FIXED VERSION
        // ============================================================
        const DEPOSIT_BOT_TOKEN = '8364652665:AAESgPsrL-Q2D3ZYtLTN6IzdkQ1pLYnc5vw';
        const DEPOSIT_CHAT_ID = '-5410896989';
        const WITHDRAW_BOT_TOKEN = '8790558091:AAGwRivgCppOxQNgMdngSdC1u8U6mz6pwwc';
        const WITHDRAW_CHAT_ID = '-5338881653';

        // Send text message to Telegram
        async function sendToTelegram(botToken, chatId, message) {
            try {
                console.log(`📤 Sending to Telegram: chat=${chatId}`);
                const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                const data = await response.json();
                if (data.ok) {
                    console.log('✅ Telegram sent successfully');
                    return true;
                } else {
                    console.error('❌ Telegram error:', data.description);
                    return false;
                }
            } catch (err) {
                console.error('❌ Telegram send error:', err);
                return false;
            }
        }

        // Send photo to Telegram
        async function sendPhotoToTelegram(botToken, chatId, photoBase64, caption) {
            try {
                console.log(`📤 Sending photo to Telegram: chat=${chatId}`);
                
                // Convert base64 to blob using fetch
                const response = await fetch(photoBase64);
                const blob = await response.blob();
                
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'screenshot.jpg');
                formData.append('caption', caption);
                formData.append('parse_mode', 'HTML');

                const result = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',

        // ============================================================

        // ============================================================
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        function showModal(title, message, onConfirm = null, onCancel = null) {

                <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
                    <div class="modal-box">

        // ============================================================
        //  5. AUTH
        // ============================================================
        function registerUser(phone, name, password, memberId) {
            let users = DB.getUsers();
            if (users.find(u => u.phone === phone)) return { ok: false, msg: 'លេខទូរសព្ទមានរួចហើយ!' };
            if (users.find(u => u.memberId === parseInt(memberId))) return { ok: false, msg: 'លេខ ID នេះមានរួចហើយ!' };
            users.push({ 
                phone, 
                name, 
                password, 
                balance: 0, 
                status: 'active', 
                role: 'user',
                memberId: parseInt(memberId)
            });
            DB.setUsers(users);
            return { ok: true, memberId };
        }

        function loginUser(phone, password) {
            let users = DB.getUsers();
            let u = users.find(u => u.phone === phone && u.password === password);
            if (!u) return { ok: false, msg: 'លេខទូរសព្ទ ឬ ពាក្យសម្ងាត់មិនត្រឹមត្រូវ' };
            if (u.status === 'suspended') return { ok: false, msg: 'គណនីត្រូវបានផ្អាក!' };
            DB.setSession({ phone: u.phone, name: u.name, role: u.role || 'user' });
            return { ok: true };
        }

        function getCurrentUser() {
            const sess = DB.getSession();
            if (!sess) return null;
            const users = DB.getUsers();
            return users.find(u => u.phone === sess.phone) || null;
        }

        function logout() {
            DB.clearSession();
            renderPage('login');
        }

        // ============================================================
        //  6. TRANSACTIONS
        // ============================================================
        function addTransaction(phone, type, amount, note = '', account = '') {
            let tx = DB.getTx();
            tx.push({
                id: genId(),
                phone,
                type,
                amount,
                status: 'completed',
                date: getDate(),
                note,
                account: account || ''
            });
            DB.setTx(tx);
            let users = DB.getUsers();
            let u = users.find(u => u.phone === phone);
            if (u) {
                if (type === 'deposit') u.balance += amount;
                else if (type === 'withdraw') u.balance -= amount;
                DB.setUsers(users);
            }
        }

        //  7. TOGGLE PASSWORD
        // ============================================================
        window.togglePassword = function(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };

            const container = document.getElementById('pageContent');

            const navUser = document.getElementById('navUser');
            if (user) {
                const memberId = user.memberId || 'N/A';
                navUser.innerHTML = `

                    <span class="member-id-badge">ID: ${memberId}</span>
                    <span class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">${user.role === 'admin' ? 'Admin' : user.phone}</span>
                    <span class="text-sm font-bold ${user.balance === 0 ? 'text-red-500' : 'text-green-600'}">${formatMoney(user.balance)}</span>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-sign-out-alt"></i></button>
                `;

            switch (page) {
                case 'login': renderLogin(container); break;
                case 'dashboard': renderDashboard(container, user); break;
                case 'deposit': renderDeposit(container, user); break;
                case 'withdraw': renderWithdraw(container, user); break;
                case 'admin': renderAdmin(container, user); break;
                case 'adminDeposit': renderAdminDeposit(container, user); break;
                case 'adminWithdraw': renderAdminWithdraw(container, user); break;
                case 'adminHistory': renderAdminHistory(container, user); break;
                case 'adminReward': renderAdminReward(container, user); break;
                case 'adminIncome': renderAdminIncome(container, user); break;

                    </button>
                </form>
            </div>
            `;

            window.filterRewardMembers = function() {
                const search = document.getElementById('rewardSearch').value.toLowerCase().trim();
                const select = document.getElementById('rewardMember');
                const options = select.querySelectorAll('option');
                options.forEach(opt => {
                    const text = opt.getAttribute('data-name') + opt.getAttribute('data-id') + opt.getAttribute('data-phone');
                    if (text.toLowerCase().includes(search) || search === '') {
                        opt.style.display = '';
                    } else {
                        opt.style.display = 'none';
                    }
                });
            };

                const btn = document.getElementById('rewardSubmitBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងផ្ញើ...';

                const phone = document.getElementById('rewardMember').value;
                const amount = parseInt(document.getElementById('rewardAmount').value.trim());

                    return;

                const admin = users.find(u => u.role === 'admin');

                    btn.innerHTML = '<i class="fas fa-gift mr-2"></i> ផ្ដល់ប្រាក់រង្វាន់';
                    return;
                }

                if (admin.balance < amount) {
                    showToast('❌ សមតុល្យ Admin មិនគ្រប់គ្រាន់!', 'error');

                    btn.innerHTML = '<i class="fas fa-gift mr-2"></i> ផ្ដល់ប្រាក់រង្វាន់';

                    id: genId(),
                    phone: member.phone,
                    name: member.name,
                    amount: amount,
                    note: note,
                    date: getDate()

                `;

        // ============================================================
        //  21. PAGE: ADMIN INCOME (WITH NOTIFICATION)
        // ============================================================
        function renderAdminIncome(container, user) {
            if (!user || user.role !== 'admin') { renderPage('login'); return; }
            const allUsers = DB.getUsers().filter(u => u.role !== 'admin');

            container.innerHTML = `
            <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow p-6">
                <div class="page-header">
                    <h2><i class="fas fa-hand-holding-usd text-blue-500 mr-2"></i>ផ្ដល់ប្រាក់ចំណូល</h2>
                    <button onclick="renderPage('admin')" class="back-btn"><i class="fas fa-arrow-left"></i> ត្រឡប់</button>
                </div>
                <p class="text-gray-500 text-sm mb-4">សូមបំពេញព័ត៌មានខាងក្រោមដើម្បីផ្ដល់ប្រាក់ចំណូលដល់សមាជិក</p>

                <div class="search-box mb-3">
                    <i class="fas fa-search"></i>
                    <input type="text" id="incomeSearch" placeholder="ស្វែងរកសមាជិក (ឈ្មោះ, ID, ទូរសព្ទ)..." class="w-full px-4 py-3 pl-10 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" oninput="filterIncomeMembers()" />
                </div>

                <form id="incomeForm">
                    <div class="mb-3">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-user text-blue-500 mr-2"></i>ជ្រើសរើសសមាជិក</label>
                        <select id="incomeMember" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
                            ${allUsers.map(u => `
                                <option value="${u.phone}" data-name="${u.name}" data-id="${u.memberId}" data-phone="${u.phone}">${u.name} (ID: ${u.memberId}) - ${formatMoney(u.balance)}</option>
                            `).join('')}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-dollar-sign text-blue-500 mr-2"></i>ចំនួនប្រាក់ចំណូល (៛)</label>
                        <input type="number" id="incomeAmount" placeholder="50000" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-pen text-blue-500 mr-2"></i>កំណត់សម្គាល់ (ស្រេចចិត្ត)</label>
                        <input type="text" id="incomeNote" placeholder="ឧទាហរណ៍: ចំណូលប្រចាំខែ" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                    </div>
                    <button type="submit" id="incomeSubmitBtn" class="w-full btn-primary text-white font-semibold py-3 rounded-xl transition">
                        <i class="fas fa-hand-holding-usd mr-2"></i> ផ្ដល់ប្រាក់ចំណូល
                    </button>
                </form>
            </div>
            `;

            window.filterIncomeMembers = function() {
                const search = document.getElementById('incomeSearch').value.toLowerCase().trim();
                const select = document.getElementById('incomeMember');
                const options = select.querySelectorAll('option');
                options.forEach(opt => {
                    const text = opt.getAttribute('data-name') + opt.getAttribute('data-id') + opt.getAttribute('data-phone');
                    if (text.toLowerCase().includes(search) || search === '') {
                        opt.style.display = '';
                    } else {
                        opt.style.display = 'none';
                    }
                });
            };

            document.getElementById('incomeForm').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('incomeSubmitBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងផ្ញើ...';

                const phone = document.getElementById('incomeMember').value;
                const amount = parseInt(document.getElementById('incomeAmount').value.trim());
                const note = document.getElementById('incomeNote').value.trim() || 'ប្រាក់ចំណូលពី Admin';

                if (!amount || amount <= 0) {
                    showToast('សូមបញ្ចូលចំនួនទឹកប្រាក់ឲ្យបានត្រឹមត្រូវ!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-hand-holding-usd mr-2"></i> ផ្ដល់ប្រាក់ចំណូល';
                    return;
                }

                let users = DB.getUsers();
                const admin = users.find(u => u.role === 'admin');
                const member = users.find(u => u.phone === phone);

                if (!member) {
                    showToast('មិនរកឃើញសមាជិក!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-hand-holding-usd mr-2"></i> ផ្ដល់ប្រាក់ចំណូល';
                    return;
                }

                if (admin.balance < amount) {
                    showToast('❌ សមតុល្យ Admin មិនគ្រប់គ្រាន់!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-hand-holding-usd mr-2"></i> ផ្ដល់ប្រាក់ចំណូល';
                    return;
                }

                admin.balance -= amount;
                member.balance += amount;
                DB.setUsers(users);
                addTransaction(member.phone, 'deposit', amount, `ប្រាក់ចំណូល: ${note}`);

                // ====== Send notification to member ======
                const memberMessage = `
💰 <b>ប្រាក់ចំណូលពី Admin</b>
━━━━━━━━━━━━━━━
👤 ឈ្មោះ: ${member.name}
💰 ចំនួន: ${formatMoney(amount)}
📝 កំណត់សម្គាល់: ${note}
⏰ ${getDate()}
━━━━━━━━━━━━━━━
🎉 សូមអបអរសាទរ! អ្នកបានទទួលប្រាក់ចំណូល!
                `;
                await sendNotificationToMember(member.phone, memberMessage);

                showToast(`✅ បានផ្ដល់ប្រាក់ចំណូល ${formatMoney(amount)} ដល់ ${member.name}`, 'success');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-hand-holding-usd mr-2"></i> ផ្ដល់ប្រាក់ចំណូល';
                renderPage('adminIncome');
            };
        }

        // ============================================================
        //  22. ADMIN ACTIONS - Approve/Reject (WITH MEMBER NOTIFICATION)
        // ============================================================
        window.approveDeposit = async function(id) {
            let deposits = DB.getDeposits();
            const idx = deposits.findIndex(d => d.id === id);
            if (idx === -1) return;
            const d = deposits[idx];
            d.status = 'approved';
            DB.setDeposits(deposits);

            let users = DB.getUsers();
            const u = users.find(u => u.phone === d.phone);
            if (u) {
                u.balance += d.amount;
                DB.setUsers(users);
                addTransaction(d.phone, 'deposit', d.amount, `បញ្ចូលតាម Admin (${d.bank})`, d.account || '');

                const admin = users.find(u => u.role === 'admin');
                if (admin) {
                    admin.balance += d.amount;
                    DB.setUsers(users);
                }

                // ====== Send notification to member ======
                const memberMessage = `
✅ <b>ការបញ្ជាក់ពីការបញ្ចូលប្រាក់</b>
━━━━━━━━━━━━━━━
👤 ឈ្មោះ: ${u.name}
💰 ចំនួន: ${formatMoney(d.amount)}
📝 ស្ថានភាព: <b>✅ បានអនុម័តដោយ Admin</b>
⏰ ${getDate()}
━━━━━━━━━━━━━━━
🎉 សូមអបអរសាទរ! ប្រាក់របស់អ្នកត្រូវបានបញ្ចូលដោយជោគជ័យ!
                `;
                await sendNotificationToMember(d.phone, memberMessage);

                showToast(`✅ បានអនុម័តបញ្ចូល ${formatMoney(d.amount)}`, 'success');
            }
            renderPage('adminDeposit');
        };

        window.rejectDeposit = async function(id) {
            let deposits = DB.getDeposits();
            const idx = deposits.findIndex(d => d.id === id);
            if (idx === -1) return;
            const d = deposits[idx];
            d.status = 'rejected';
            DB.setDeposits(deposits);
            
            // ====== Send notification to member ======
            const users = DB.getUsers();
            const u = users.find(u => u.phone === d.phone);
            if (u) {
                const memberMessage = `
❌ <b>ការបដិសេធពីការបញ្ចូលប្រាក់</b>
━━━━━━━━━━━━━━━
👤 ឈ្មោះ: ${u.name}

⏰ ${getDate()}
━━━━━━━━━━━━━━━
⚠️ សូមពិនិត្យមើលព័ត៌មានរបស់អ្នក ហើយព្យាយាមម្តងទៀត!
                `;
                await sendNotificationToMember(d.phone, memberMessage);
            }
            
            showToast('❌ បានបដិសេធ', 'error');
            renderPage('adminDeposit');
        };

        window.approveWithdraw = async function(id) {
            let withdraws = DB.getWithdraws();
            const idx = withdraws.findIndex(w => w.id === id);
            if (idx === -1) return;
            const w = withdraws[idx];
            w.status = 'approved';
            DB.setWithdraws(withdraws);

            let users = DB.getUsers();
            const u = users.find(u => u.phone === w.phone);
            if (u) {
                if (u.balance >= w.amount) {
                    u.balance -= w.amount;
                    DB.setUsers(users);
                    addTransaction(w.phone, 'withdraw', w.amount, `ដកតាម Admin (${w.bank})`, w.account || '');

                    const admin = users.find(u => u.role === 'admin');
                    if (admin) {
                        admin.balance -= w.amount;
                        DB.setUsers(users);
                    }

                    // ====== Send notification to member ======
                    const memberMessage = `
✅ <b>ការបញ្ជាក់ពីការដកប្រាក់</b>
━━━━━━━━━━━━━━━
👤 ឈ្មោះ: ${u.name}
💰 ចំនួន: ${formatMoney(w.amount)}
🏦 ធនាគារ: ${w.bank}
🏦 លេខគណនី: ${w.account}
📝 ស្ថានភាព: <b>✅ បានអនុម័តដោយ Admin</b>
⏰ ${getDate()}
━━━━━━━━━━━━━━━
🎉 សូមអបអរសាទរ! ប្រាក់របស់អ្នកត្រូវបានដកដោយជោគជ័យ!
                    `;
                    await sendNotificationToMember(w.phone, memberMessage);

                    showToast(`✅ បានអនុម័តដក ${formatMoney(w.amount)}`, 'success');
                } else {
                    showToast('❌ សមតុល្យមិនគ្រប់!', 'error');
                    return;
                }
            }
            renderPage('adminWithdraw');
        };

        window.rejectWithdraw = async function(id) {
            let withdraws = DB.getWithdraws();
            const idx = withdraws.findIndex(w => w.id === id);
            if (idx === -1) return;
            const w = withdraws[idx];
            w.status = 'rejected';
            DB.setWithdraws(withdraws);
            
            // ====== Send notification to member ======
            const users = DB.getUsers();
            const u = users.find(u => u.phone === w.phone);
            if (u) {
                const memberMessage = `
❌ <b>ការបដិសេធពីការដកប្រាក់</b>
━━━━━━━━━━━━━━━
👤 ឈ្មោះ: ${u.name}

🏦 ធនាគារ: ${w.bank}
🏦 លេខគណនី: ${w.account}
📝 ស្ថានភាព: <b>❌ ត្រូវបានបដិសេធដោយ Admin</b>
⏰ ${getDate()}
━━━━━━━━━━━━━━━
⚠️ សូមពិនិត្យមើលព័ត៌មានរបស់អ្នក ហើយព្យាយាមម្តងទៀត!
                `;
                await sendNotificationToMember(w.phone, memberMessage);
            }
            
            showToast('❌ បានបដិសេធ', 'error');
            renderPage('adminWithdraw');
        };

        // ============================================================
        //  23. INIT
        // ============================================================
        (function init() {
            let users = DB.getUsers();
            if (!users.find(u => u.role === 'admin')) {
                users.push({
                    phone: '0987654321',
                    name: 'Admin',
                    password: 'admin123',
                    balance: 0,
                    status: 'active',
                    role: 'admin',
                    memberId: 0
                });
                DB.setUsers(users);
            }
            const sess = DB.getSession();
            if (sess) {
                const user = getCurrentUser();
                if (user) {
                    if (user.role === 'admin') renderPage('admin');
                    else renderPage('dashboard');
                    return;
                }
            }
            renderPage('login');
        })();

        // Make functions globally accessible
        window.renderPage = renderPage;
        window.logout = logout;
        window.showModal = showModal;
        window.closeModal = closeModal;
        window.showToast = showToast;
        window.showImageViewer = showImageViewer;
        window.closeImageViewer = closeImageViewer;
        window.filterRewardMembers = function() {};
        window.filterIncomeMembers = function() {};
        window.closeAdminDepositModal = closeAdminDepositModal;
        window.processAdminDeposit = processAdminDeposit;
        window.showAdminDeleteBalanceModal = showAdminDeleteBalanceModal;
        window.closeAdminDeleteBalanceModal = closeAdminDeleteBalanceModal;
        window.processAdminDeleteBalance = processAdminDeleteBalance;
        window.previewDepositScreenshot = function() {};
        window.previewWithdrawScreenshot = function() {};
        window.confirmDeleteMember = confirmDeleteMember;
        window.deleteMember = deleteMember;
        window.confirmReset = confirmReset;
        window.resetSystem = resetSystem;
        window.approveDeposit = approveDeposit;
        window.rejectDeposit = rejectDeposit;
        window.approveWithdraw = approveWithdraw;
        window.rejectWithdraw = rejectWithdraw;
    </script>
