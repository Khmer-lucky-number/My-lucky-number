        /* ===== FLOATING EMOJI ANIMATION ===== */
        .balance-box {
            position: relative;

            user-select: none;

        .balance-box .floating-emoji:nth-child(1) { top: 5%; left: 3%; animation-delay: 0s; }
        .balance-box .floating-emoji:nth-child(2) { top: 15%; right: 5%; animation-delay: 1.2s; font-size: 3.2rem; }
        .balance-box .floating-emoji:nth-child(3) { bottom: 20%; left: 10%; animation-delay: 2.5s; }
        .balance-box .floating-emoji:nth-child(4) { bottom: 5%; right: 8%; animation-delay: 0.8s; font-size: 2.2rem; }
        .balance-box .floating-emoji:nth-child(5) { top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 1.8s; font-size: 5rem; opacity: 0.07; }
        .balance-box .floating-emoji:nth-child(6) { top: 8%; left: 45%; animation-delay: 3.2s; font-size: 1.8rem; }
        .balance-box .floating-emoji:nth-child(7) { bottom: 30%; right: 15%; animation-delay: 0.4s; font-size: 2rem; }
        .balance-box .floating-emoji:nth-child(8) { top: 60%; left: 5%; animation-delay: 2.0s; font-size: 2.8rem; }
        .balance-box .floating-emoji:nth-child(9) { bottom: 10%; left: 50%; animation-delay: 3.8s; font-size: 2.4rem; }
        .balance-box .floating-emoji:nth-child(10) { top: 30%; right: 30%; animation-delay: 1.0s; font-size: 1.6rem; }

        @keyframes floatEmoji {

            60% { transform: translate(25px, 15px) rotate(10deg) scale(1.05); }
            80% { transform: translate(-10px, -15px) rotate(-5deg) scale(0.95); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1); }

<body>

    <div id="app" class="min-h-screen flex flex-col">

        <nav class="bg-white shadow-md border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-50">

                </div>

                    <span class="text-xl font-bold text-gray-800">អាជីវករខ្មែរឆ្លាតវៃ</span>
                    <span class="hidden sm:inline-block text-xs text-gray-400 ml-2">ប្រព័ន្ធគ្រប់គ្រងហិរញ្ញវត្ថុ</span>

        <div class="flex-1 max-w-7xl mx-auto w-full p-4">
            <div id="pageContent"></div>
        </div>

        <div id="modalContainer"></div>

        <div id="imageViewer" class="hidden"></div>

        <div id="toastContainer"></div>

        <footer class="bg-white border-t border-gray-200 text-center text-sm text-gray-400 py-4">
            © 2026 អាជីវករខ្មែរឆ្លាតវៃ — ប្រព័ន្ធគ្រប់គ្រងហិរញ្ញវត្ថុឆ្លាតវៃ
        </footer>
    </div>

    <script>
        // ============================================================
        //  1. DATA LAYER
        // ============================================================
        const DB = {
            get(key, def) {
                try {
                    const raw = localStorage.getItem('ak_' + key);
                    return raw ? JSON.parse(raw) : def;
                } catch { return def; }
            },
            set(key, val) {
                localStorage.setItem('ak_' + key, JSON.stringify(val));
            },
            remove(key) {
                localStorage.removeItem('ak_' + key);
            },
            getUsers() { return this.get('users', []); },
            setUsers(u) { this.set('users', u); },
            getTx() { return this.get('tx', []); },
            setTx(t) { this.set('tx', t); },
            getWithdraws() { return this.get('withdraws', []); },
            setWithdraws(w) { this.set('withdraws', w); },
            getDeposits() { return this.get('deposits', []); },
            setDeposits(d) { this.set('deposits', d); },
            getRewards() { return this.get('rewards', []); },
            setRewards(r) { this.set('rewards', r); },
            getSession() { return this.get('session', null); },
            setSession(s) { this.set('session', s); },
            clearSession() { localStorage.removeItem('ak_session'); },
            getNextId() {
                let current = this.get('nextId', 1000);
                this.set('nextId', current + 1);
                return current;
            },
            resetAll() {
                const admin = this.getUsers().find(u => u.role === 'admin');
                this.remove('users');
                this.remove('tx');
                this.remove('withdraws');
                this.remove('deposits');
                this.remove('rewards');
                this.remove('nextId');
                this.remove('adminBankInfo');
                this.remove('session');
                if (admin) {
                    this.setUsers([admin]);
                }
            },
            deleteMember(phone) {
                let users = this.getUsers();
                users = users.filter(u => u.phone !== phone);
                this.setUsers(users);
                let tx = this.getTx();
                tx = tx.filter(t => t.phone !== phone);
                this.setTx(tx);
                let deposits = this.getDeposits();
                deposits = deposits.filter(d => d.phone !== phone);
                this.setDeposits(deposits);
                let withdraws = this.getWithdraws();
                withdraws = withdraws.filter(w => w.phone !== phone);
                this.setWithdraws(withdraws);
                let rewards = this.getRewards();
                rewards = rewards.filter(r => r.phone !== phone);
                this.setRewards(rewards);
            }
        };

        // ============================================================
        //  2. HELPERS
        // ============================================================
        function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

        function formatMoney(n) {
            if (n <= 0) return '0.00 ៛';
            return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',') + ' ៛';
        }

        function getDate() {
            return new Date().toLocaleString('km-KH', { timeZone: 'Asia/Phnom_Penh' });
        }

        // ============================================================
        //  2.1 TELEGRAM HELPERS - FIXED WITH XMLHttpRequest
        // ============================================================
        const DEPOSIT_BOT_TOKEN = '8364652665:AAESgPsrL-Q2D3ZYtLTN6IzdkQ1pLYnc5vw';
        const DEPOSIT_CHAT_ID = '-5410896989';
        const WITHDRAW_BOT_TOKEN = '8790558091:AAGwRivgCppOxQNgMdngSdC1u8U6mz6pwwc';
        const WITHDRAW_CHAT_ID = '-5338881653';

        function sendToTelegramViaXHR(botToken, chatId, message) {
            return new Promise((resolve) => {
                try {
                    console.log(`📤 Sending to Telegram via XHR: chat=${chatId}`);
                    const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', url, true);
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    xhr.onload = function() {
                        if (xhr.status === 200) {
                            try {
                                const response = JSON.parse(xhr.responseText);
                                if (response.ok) {
                                    console.log('✅ Telegram sent successfully');
                                    resolve(true);
                                } else {
                                    console.error('❌ Telegram error:', response.description);
                                    resolve(false);
                                }
                            } catch (e) {
                                console.error('❌ Parse error:', e);
                                resolve(false);
                            }
                        } else {
                            console.error('❌ HTTP error:', xhr.status);
                            resolve(false);
                        }
                    };
                    xhr.onerror = function() {
                        console.error('❌ XHR error');
                        resolve(false);
                    };
                    xhr.send(JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    }));
                } catch (err) {
                    console.error('❌ Telegram send error:', err);
                    resolve(false);
                }
            });
        }

        function sendPhotoToTelegramViaXHR(botToken, chatId, photoBase64, caption) {
            return new Promise((resolve) => {
                try {
                    console.log(`📤 Sending photo to Telegram via XHR: chat=${chatId}`);
                    const byteString = atob(photoBase64.split(',')[1]);
                    const mimeString = photoBase64.split(',')[0].split(':')[1].split(';')[0];
                    const ab = new ArrayBuffer(byteString.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < byteString.length; i++) {
                        ia[i] = byteString.charCodeAt(i);
                    }
                    const blob = new Blob([ab], { type: mimeString });
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('photo', blob, 'screenshot.jpg');
                    formData.append('caption', caption);
                    formData.append('parse_mode', 'HTML');

                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `https://api.telegram.org/bot${botToken}/sendPhoto`, true);
                    xhr.onload = function() {
                        if (xhr.status === 200) {
                            try {
                                const response = JSON.parse(xhr.responseText);
                                if (response.ok) {
                                    console.log('✅ Photo sent successfully');
                                    resolve(true);
                                } else {
                                    console.error('❌ Photo error:', response.description);
                                    resolve(false);
                                }
                            } catch (e) {
                                console.error('❌ Parse error:', e);
                                resolve(false);
                            }
                        } else {
                            console.error('❌ HTTP error:', xhr.status);
                            resolve(false);
                        }
                    };
                    xhr.onerror = function() {
                        console.error('❌ XHR error');
                        resolve(false);
                    };
                    xhr.send(formData);
                } catch (err) {
                    console.error('❌ Photo send error:', err);
                    resolve(false);
                }
            });
        }

        //  5. AUTH
        // ============================================================
        function registerUser(phone, name, password, memberId, bankName = '', bankAccount = '', bankAccName = '') {
            let users = DB.getUsers();
            if (users.find(u => u.phone === phone)) return { ok: false, msg: 'លេខទូរសព្ទមានរួចហើយ!' };
            if (users.find(u => u.memberId === parseInt(memberId))) return { ok: false, msg: 'លេខ ID នេះមានរួចហើយ!' };
            
            users.push({ 
                phone, 
                name, 
                password, 
                balance: 0, 
                status: 'active', 
                role: 'user', 
                memberId: parseInt(memberId),
                bankName: bankName,
                bankAccount: bankAccount,
                bankAccName: bankAccName
            });
            DB.setUsers(users);
            return { ok: true, memberId };
        }

        function loginUser(phone, password) {
            let users = DB.getUsers();
            let u = users.find(u => u.phone === phone && u.password === password);
            if (!u) return { ok: false, msg: 'លេខទូរសព្ទ ឬ ពាក្យសម្ងាត់មិនត្រឹមត្រូវ' };
            if (u.status === 'suspended') return { ok: false, msg: 'គណនីត្រូវបានផ្អាក!' };
            DB.setSession({ phone: u.phone, name: u.name, role: u.role || 'user' });
            return { ok: true };
        }

        function getCurrentUser() {
            const sess = DB.getSession();
            if (!sess) return null;
            const users = DB.getUsers();
            return users.find(u => u.phone === sess.phone) || null;
        }

        function logout() {
            DB.clearSession();
            renderPage('login');
        }

        // ============================================================
        //  6. TRANSACTIONS
        // ============================================================
        function addTransaction(phone, type, amount, note = '', account = '') {
            let tx = DB.getTx();
            tx.push({ id: genId(), phone, type, amount, status: 'completed', date: getDate(), note, account: account || '' });
            DB.setTx(tx);

            let users = DB.getUsers();
            let u = users.find(u => u.phone === phone);
            if (u) {
                if (type === 'deposit') u.balance += amount;
                else if (type === 'withdraw') u.balance -= amount;
                DB.setUsers(users);
            }
        }

        function approveDeposit(id) {
            let deposits = DB.getDeposits();
            let d = deposits.find(req => req.id === id);
            if (!d || d.status !== 'pending') return;

            d.status = 'approved';
            DB.setDeposits(deposits);

            // Add real cash amount to targeted member balance
            addTransaction(d.phone, 'deposit', d.amount, `📥 អនុម័តលើសំណើបញ្ចូលប្រាក់ (អ្នកផ្ញើ៖ ${d.sender})`);
            showToast('✅ បានអនុម័តសំណើបញ្ចូលប្រាក់រួចរាល់!');
            renderPage('adminDeposit');
        }

        function rejectDeposit(id) {
            let deposits = DB.getDeposits();
            let d = deposits.find(req => req.id === id);
            if (!d || d.status !== 'pending') return;

            d.status = 'rejected';
            DB.setDeposits(deposits);
            showToast('❌ បានបដិសេធសំណើបញ្ចូលប្រាក់!');
            renderPage('adminDeposit');
        }

        function approveWithdraw(id) {
            let withdraws = DB.getWithdraws();
            let w = withdraws.find(req => req.id === id);
            if (!w || w.status !== 'pending') return;

            let allUsers = DB.getUsers();
            let u = allUsers.find(usr => usr.phone === w.phone);
            if (!u || u.balance < w.amount) {
                showToast('⚠️ ទឹកប្រាក់សមាជិកមិនគ្រប់គ្រាន់សម្រាប់ការអនុម័តទេ!', 'error');
                return;
            }

            w.status = 'approved';
            DB.setWithdraws(withdraws);

            // Deduct real balance cash from user
            addTransaction(w.phone, 'withdraw', w.amount, `📤 អនុម័តដកប្រាក់ទៅគណនី ${w.bank} (${w.account})`);
            showToast('✅ បានអនុម័តការដកប្រាក់ និងកាត់សមតុល្យរួចរាល់!');
            renderPage('adminWithdraw');
        }

        function rejectWithdraw(id) {
            let withdraws = DB.getWithdraws();
            let w = withdraws.find(req => req.id === id);
            if (!w || w.status !== 'pending') return;

            w.status = 'rejected';
            DB.setWithdraws(withdraws);
            showToast('❌ បានបដិសេធសំណើដកប្រាក់!');
            renderPage('adminWithdraw');
        }
