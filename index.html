<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ហាងលក់ទំនិញអនឡាញរបស់ខ្ញុំ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
        }

        header {
            background-color: #1a1a1a;
            color: #fff;
            padding: 15px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 22px;
        }

        .distributor-btn {
            background-color: #ff9900;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .distributor-btn:hover {
            background-color: #e68a00;
            transform: scale(1.05);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 20px;
            font-weight: 700;
            color: #e44d26;
            margin-bottom: 15px;
        }

        .buy-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: #fff;
            text-align: center;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #fff;
            padding: 25px 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto; /* អនុញ្ញាតឱ្យអូសចុះក្រោមបើអេក្រង់ទូរសព្ទតូច */
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
        }

        .modal h2 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #ff9900;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #ff9900;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .submit-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        footer {
            text-align: center;
            padding: 30px;
            background-color: #1a1a1a;
            color: #888;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>ហាងលក់ទំនិញអនឡាញ</h1>
        <button class="distributor-btn" onclick="openModal()">ចុះឈ្មោះជាតំណាងចែកចាយ</button>
    </header>

    <div class="container">
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="https://via.placeholder.com/300x250?text=Product+1" alt="ផលិតផល">
                </div>
                <div class="product-info">
                    <div class="product-title">ឈ្មោះផលិតផលគំរូ</div>
                    <div class="product-price">$25.00</div>
                    <button class="buy-btn">បញ្ជាទិញឥឡូវនេះ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>ចុះឈ្មោះជាតំណាងចែកចាយ</h2>
            
            <form id="regForm" onsubmit="submitToTelegram(event)">
                <div class="form-group">
                    <label for="fullName">ឈ្មោះពេញ៖</label>
                    <input type="text" id="fullName" placeholder="ឧទាហរណ៍៖ សុខ ជា" required>
                </div>

                <div class="form-group">
                    <label for="age">អាយុ៖</label>
                    <input type="number" id="age" placeholder="ឧទាហរណ៍៖ 25" min="15" max="80" required>
                </div>

                <div class="form-group">
                    <label for="job">មុខរបរបច្ចុប្បន្ន៖</label>
                    <input type="text" id="job" placeholder="ឧទាហរណ៍៖ បុគ្គលិកក្រុមហ៊ុន, និស្សិត" required>
                </div>
                
                <div class="form-group">
                    <label for="telegramPhone">លេខតេឡេក្រាម (Telegram)៖</label>
                    <input type="tel" id="telegramPhone" placeholder="ឧទាហរណ៍៖ 012345678" required>
                </div>
                
                <div class="form-group">
                    <label for="location">រាជធានី/ខេត្ត ដែលអ្នករស់នៅ៖</label>
                    <select id="location" required>
                        <option value="" disabled selected>--- សូមជ្រើសរើសរាជធានី/ខេត្ត ---</option>
                        <option value="ភ្នំពេញ">ភ្នំពេញ</option>
                        <option value="កណ្តាល">កណ្តាល</option>
                        <option value="សៀមរាប">សៀមរាប</option>
                        <option value="ព្រះសីហនុ">ព្រះសីហនុ</option>
                        <option value="បាត់ដំបង">បាត់ដំបង</option>
                        <option value="កំពង់ចាម">កំពង់ចាម</option>
                        <option value="កំពង់ស្ពឺ">កំពង់ស្ពឺ</option>
                        <option value="កំពង់ធំ">កំពង់ធំ</option>
                        <option value="កំពត">កំពត</option>
                        <option value="កែប">កែប</option>
                        <option value="កោះកុង">កោះកុង</option>
                        <option value="ក្រចេះ">ក្រចេះ</option>
                        <option value="តាកែវ">តាកែវ</option>
                        <option value="ត្បូងឃ្មុំ">ត្បូងឃ្មុំ</option>
                        <option value="បន្ទាយមានជ័យ">បន្ទាយមានជ័យ</option>
                        <option value="ប៉ៃលិន">ប៉ៃលិន</option>
                        <option value="ពោធិ៍សាត់">ពោធិ៍សាត់</option>
                        <option value="ព្រះវិហារ">ព្រះវិហារ</option>
                        <option value="ព្រៃវែង">ព្រៃវែង</option>
                        <option value="មណ្ឌលគិរី">មណ្ឌលគិរី</option>
                        <option value="រតនគិរី">រតនគិរី</option>
                        <option value="ស្ទឹងត្រែង">ស្ទឹងត្រែង</option>
                        <option value="ស្វាយរៀង">ស្វាយរៀង</option>
                        <option value="ឧត្តរមានជ័យ">ឧត្តរមានជ័យ</option>
                        <option value="ប៉ៃលិន">ប៉ៃលិន</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="experience">ធ្លាប់មានបទពិសោធន៍លក់ដែរឬទេ?៖</label>
                    <select id="experience">
                        <option value="មិនធ្លាប់មាន">មិនធ្លាប់មានបទពិសោធន៍</option>
                        <option value="ធ្លាប់មាន">ធ្លាប់មានបទពិសោធន៍លក់អនឡាញ</option>
                    </select>
                </div>
                
                <button type="submit" id="btnSubmit" class="submit-btn">បញ្ជូនព័ត៌មាន</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 រក្សាសិទ្ធិគ្រប់យ៉ាងដោយ ហាងអនឡាញរបស់ខ្ញុំ</p>
    </footer>

    <script>
        const modal = document.getElementById("registerModal");

        function openModal() { modal.style.display = "flex"; }
        function closeModal() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

        function submitToTelegram(event) {
            event.preventDefault();

            const btnSubmit = document.getElementById("btnSubmit");
            btnSubmit.disabled = true;
            btnSubmit.innerText = "កំពុងផ្ញើ...";

            // កន្លែងប្តូរ Bot Token និង Chat ID របស់អ្នក
            const TELEGRAM_BOT_TOKEN = 'សូមដាក់_BOT_TOKEN_របស់អ្នកនៅទីនេះ'; 
            const TELEGRAM_CHAT_ID = 'សូមដាក់_CHAT_ID_របស់អ្នកនៅទីនេះ'; 

            const name = document.getElementById("fullName").value;
            const age = document.getElementById("age").value;
            const job = document.getElementById("job").value;
            const telegramPhone = document.getElementById("telegramPhone").value;
            const location = document.getElementById("location").value;
            const experience = document.getElementById("experience").value;

            // រៀបចំទម្រង់សារថ្មីសម្រាប់ផ្ញើទៅ Telegram
            const message = `🔔 *មានសមាជិកចុះឈ្មោះថ្មី!*\n\n` +
                            `👤 *ឈ្មោះពេញ៖* ${name}\n` +
                            `🎂 *អាយុ៖* ${age} ឆ្នាំ\n` +
                            `💼 *មុខរបរ៖* ${job}\n` +
                            `📞 *លេខតេឡេក្រាម៖* ${telegramPhone}\n` +
                            `📍 *ទីតាំង៖* ខេត្ត ${location}\n` +
                            `📈 *បទពិសោធន៍៖* ${experience}`;

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(response => {
                if (response.ok) {
                    alert("🎉 ការចុះឈ្មោះបានជោគជ័យ! យើងខ្ញុំនឹងទាក់ទងទៅលោកអ្នកតាមតេឡេក្រាមក្នុងពេលឆាប់ៗ។");
                    document.getElementById("regForm").reset();
                    closeModal();
                } else {
                    alert("❌ មានបញ្ហា! សូមពិនិត្យមើលការកំណត់ Bot Token ឬ Chat ID ម្តងទៀត។");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("❌ មិនអាចភ្ជាប់ទៅកាន់ប្រព័ន្ធបានទេ! សូមពិនិត្យអ៊ីនធឺណិតរបស់អ្នក។");
            })
            .finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "បញ្ជូនព័ត៌មាន";
            });
        }
    </script>

</body>
</html>
