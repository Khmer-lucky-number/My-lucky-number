<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិក v6.1</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Khmer OS', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            transition: background 0.5s ease;
        }

        body.light-mode {
            background: #f0f2f5;
        }

        body.light-mode .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: none;
            border: 1px solid rgba(0,0,0,0.1);
        }

        body.light-mode h2,
        body.light-mode .card h3,
        body.light-mode .list-item .info .name {
            color: #1a1a2e;
        }

        body.light-mode p {
            color: rgba(0,0,0,0.6);
        }

        body.light-mode .card {
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.08);
        }

        body.light-mode input, 
        body.light-mode select, 
        body.light-mode textarea {
            background: rgba(0,0,0,0.05);
            color: #1a1a2e;
            border-color: rgba(0,0,0,0.1);
        }

        body.light-mode .list-item {
            background: rgba(0,0,0,0.04);
            border-left-color: #667eea;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 560px;
            max-height: 98vh;
            overflow-y: auto;
            animation: fadeInUp 0.6s ease-out;
            transition: all 0.3s ease;
        }

        .container::-webkit-scrollbar { width: 4px; }
        .container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .container::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.2); }
            50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.6); }
        }

        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-glow { animation: glow 2s ease-in-out infinite; }

        /* ===== TYPOGRAPHY ===== */
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 5px;
        }

        h2 { color: #ffffff; font-weight: 700; font-size: 1.3rem; margin-bottom: 8px; }
        p { color: rgba(255,255,255,0.7); margin-bottom: 12px; line-height: 1.6; font-size: 14px; }

        /* ===== FORM ELEMENTS ===== */
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 5px 0;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.4); }

        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(102,126,234,0.15);
            transform: scale(1.01);
        }

        select option { background: #1a1a2e; color: #fff; }
        textarea { resize: vertical; min-height: 50px; }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 3px;
            box-shadow: 0 8px 25px rgba(102,126,234,0.3);
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 35px rgba(102,126,234,0.5); }
        .btn:active { transform: scale(0.98); }

        .btn-gold { background: linear-gradient(135deg, #ffd700, #f59e0b); box-shadow: 0 8px 25px rgba(255,215,0,0.3); color: #1a1a2e; }
        .btn-gold:hover { box-shadow: 0 12px 35px rgba(255,215,0,0.5); }

        .btn-green { background: linear-gradient(135deg, #48bb78, #38a169); box-shadow: 0 8px 25px rgba(72,187,120,0.3); color: #fff; }
        .btn-green:hover { box-shadow: 0 12px 35px rgba(72,187,120,0.5); }

        .btn-red { background: linear-gradient(135deg, #fc8181, #e53e3e); box-shadow: 0 8px 25px rgba(252,129,129,0.3); color: #fff; }
        .btn-red:hover { box-shadow: 0 12px 35px rgba(252,129,129,0.5); }

        .btn-warning { background: linear-gradient(135deg, #f6ad55, #ed8936); box-shadow: 0 8px 25px rgba(246,173,85,0.3); color: #fff; }
        .btn-warning:hover { box-shadow: 0 12px 35px rgba(246,173,85,0.5); }

        .btn-sm { padding: 6px 14px; font-size: 12px; width: auto; }
        .btn-purple { background: linear-gradient(135deg, #9f7aea, #805ad5); box-shadow: 0 8px 25px rgba(159,122,234,0.3); color: #fff; }
        .btn-purple:hover { box-shadow: 0 12px 35px rgba(159,122,234,0.5); }

        .btn-cloud { background: linear-gradient(135deg, #00d2ff, #3a7bd5); box-shadow: 0 8px 25px rgba(0,210,255,0.3); color: #fff; }
        .btn-cloud:hover { box-shadow: 0 12px 35px rgba(0,210,255,0.5); }

        .btn-commission { background: linear-gradient(135deg, #f093fb, #f5576c); box-shadow: 0 8px 25px rgba(245,87,108,0.3); color: #fff; }
        .btn-commission:hover { box-shadow: 0 12px 35px rgba(245,87,108,0.5); }

        .btn-payment { background: linear-gradient(135deg, #fa709a, #fee140); box-shadow: 0 8px 25px rgba(250,112,154,0.3); color: #1a1a2e; }
        .btn-payment:hover { box-shadow: 0 12px 35px rgba(250,112,154,0.5); }

        /* ===== CARDS ===== */
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 16px;
            margin: 10px 0;
            text-align: left;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideInRight 0.5s ease-out;
        }

        .card:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.15);
        }

        .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
        }

        /* ===== BADGES ===== */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-gold { background: linear-gradient(135deg, #ffd700, #f59e0b); color: #1a1a2e; }
        .badge-purple { background: #9f7aea; color: #fff; }
        .badge-green { background: #48bb78; color: #fff; }
        .badge-red { background: #fc8181; color: #fff; }

        .admin-panel {
            border: 1px solid rgba(255,215,0,0.2);
            background: rgba(255,215,0,0.05);
        }

        .admin-panel h3 { color: #ffd700; }

        /* ===== TOP BAR ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .top-bar .left-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .top-bar .right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .top-bar h2 { margin: 0; font-size: 1.2rem; }

        .back-link {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            background: rgba(255,255,255,0.06);
            padding: 4px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }

        .back-link:hover { background: rgba(255,255,255,0.12); color: #fff; transform: translateX(-3px); }

        /* ===== CLOCK ===== */
        .clock-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .clock-display {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.06);
            padding: 3px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .clock-display .date-part { color: rgba(255,255,255,0.4); font-weight: 400; font-size: 10px; }
        .clock-display .time-part { color: #ffd700; font-weight: 700; font-size: 14px; }
        .clock-display .seconds { color: rgba(255,215,0,0.4); font-size: 11px; }

        .btn-logout {
            background: rgba(252,129,129,0.15);
            border: 1px solid rgba(252,129,129,0.2);
            color: #fc8181;
            padding: 3px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover { background: rgba(252,129,129,0.25); transform: scale(1.05); border-color: #fc8181; }

        /* ===== LOGIN PAGE ===== */
        .login-container {
            padding: 10px 0;
        }

        .login-container .login-logo {
            font-size: 60px;
            text-align: center;
            margin-bottom: 10px;
        }

        .login-container .login-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .login-container .login-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .login-container .login-option {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 16px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }

        .login-container .login-option:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-5px) scale(1.02);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102,126,234,0.2);
        }

        .login-container .login-option .icon { font-size: 32px; display: block; margin-bottom: 4px; }
        .login-container .login-option .title { color: #fff; font-weight: 600; font-size: 16px; }
        .login-container .login-option .desc { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 2px; }

        .login-container .login-option.admin-option { border-color: rgba(255,215,0,0.2); }
        .login-container .login-option.admin-option:hover { border-color: #ffd700; background: rgba(255,215,0,0.08); }

        .login-container .login-option.super-option { border-color: rgba(255,215,0,0.1); background: rgba(255,215,0,0.03); }
        .login-container .login-option.super-option:hover { border-color: #ffd700; background: rgba(255,215,0,0.1); }

        /* ===== FILE UPLOAD ===== */
        .file-upload {
            position: relative;
            padding: 15px;
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.03);
            margin: 5px 0;
        }

        .file-upload:hover { border-color: #667eea; background: rgba(255,255,255,0.05); transform: scale(1.01); }

        .file-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload .upload-icon { font-size: 24px; display: block; margin-bottom: 4px; }
        .file-upload .upload-text { color: rgba(255,255,255,0.4); font-size: 12px; }
        .file-upload .file-name { color: #48bb78; font-size: 12px; margin-top: 4px; }

        /* ===== IMAGE VIEWER ===== */
        .image-viewer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }

        .image-viewer-overlay.show { display: flex; }

        .image-viewer-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            animation: fadeIn 0.3s ease;
        }

        .image-viewer-overlay .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1;
        }

        .image-viewer-overlay .close-btn:hover { transform: scale(1.2); color: #ffd700; }

        .preview-image {
            max-width: 100%;
            max-height: 100px;
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .preview-image:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* ===== LIST ITEMS ===== */
        .list-item {
            background: rgba(255,255,255,0.04);
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 10px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .list-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }

        .list-item .info { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 100px; }
        .list-item .info .name { color: #fff; font-weight: 600; }
        .list-item .info .sub { font-size: 11px; color: rgba(255,255,255,0.4); }
        .list-item .info .id { font-size: 10px; color: rgba(255,215,0,0.5); }
        .list-item .info .pwd { font-size: 11px; color: #48bb78; }
        .list-item .balance { color: #48bb78; font-weight: 600; font-size: 14px; }
        .list-item .actions { display: flex; gap: 4px; flex-wrap: wrap; }

        /* ===== TRANSACTIONS ===== */
        .transaction-list { max-height: 200px; overflow-y: auto; margin-top: 6px; }
        .transaction-list::-webkit-scrollbar { width: 4px; }
        .transaction-list::-webkit-scrollbar-thumb { background: #667eea; border-radius: 10px; }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
            flex-wrap: wrap;
            gap: 4px;
            transition: all 0.3s ease;
        }

        .transaction-item:hover { background: rgba(255,255,255,0.03); padding-left: 10px; }

        /* ===== PAYMENT ITEMS ===== */
        .payment-item {
            background: rgba(255,255,255,0.04);
            padding: 10px 12px;
            border-radius: 10px;
            margin: 6px 0;
            border-left: 3px solid #fa709a;
            transition: all 0.3s ease;
        }

        .payment-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }

        .payment-item .amount { color: #ffd700; font-weight: 600; font-size: 14px; }
        .payment-item .status-pending { color: #f6ad55; font-size: 11px; }
        .payment-item .status-approved { color: #48bb78; font-size: 11px; }
        .payment-item .status-rejected { color: #fc8181; font-size: 11px; }

        /* ===== SUMMARY ===== */
        .summary-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin: 6px 0;
        }

        .summary-stats .summary-box {
            background: rgba(255,255,255,0.04);
            padding: 6px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .summary-stats .summary-box:hover { transform: translateY(-3px); background: rgba(255,255,255,0.08); }
        .summary-stats .summary-box .number { font-size: 16px; font-weight: 700; color: #fff; }
        .summary-stats .summary-box .label { font-size: 9px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; }
        .summary-stats .summary-box .number.green { color: #48bb78; }
        .summary-stats .summary-box .number.red { color: #fc8181; }
        .summary-stats .summary-box .number.gold { color: #ffd700; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            z-index: 10000;
            animation: slideInRight 0.5s ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 300px;
        }

        .toast-success { background: linear-gradient(135deg, #48bb78, #38a169); }
        .toast-error { background: linear-gradient(135deg, #fc8181, #e53e3e); }
        .toast-info { background: linear-gradient(135deg, #667eea, #764ba2); }
        .toast-warning { background: linear-gradient(135deg, #f6ad55, #ed8936); }

        /* ===== MODAL ===== */
        #modalOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(5px);
        }

        #modalContent {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 30px;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        #modalContent.show { transform: scale(1); }
        #modalContent::-webkit-scrollbar { width: 4px; }
        #modalContent::-webkit-scrollbar-thumb { background: #667eea; border-radius: 10px; }

        /* ===== THEME TOGGLE ===== */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 999;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .theme-toggle:hover { transform: rotate(30deg) scale(1.1); background: rgba(255,255,255,0.2); }

        body.light-mode .theme-toggle { background: rgba(0,0,0,0.1); color: #1a1a2e; }
        body.light-mode .theme-toggle:hover { background: rgba(0,0,0,0.2); }

        /* ===== UTILITY ===== */
        .text-center { text-align: center; }
        .mt-10 { margin-top: 10px; }
        .mt-15 { margin-top: 15px; }
        .mt-20 { margin-top: 20px; }
        .op-3 { opacity: 0.3; }
        .fs-12 { font-size: 12px; }
        .fs-13 { font-size: 13px; }
        .fw-700 { font-weight: 700; }
        .flex { display: flex; gap: 8px; flex-wrap: wrap; }
        .flex .btn { flex: 1; }

        .cloud-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .cloud-status.connected {

</head>
<body>

    <!-- ===== IMAGE VIEWER ===== -->
    <div class="image-viewer-overlay" id="imageViewer" onclick="closeImageViewer()">
        <span class="close-btn" onclick="closeImageViewer()">×</span>
        <img id="viewerImage" src="" alt="View Image">
    </div>

    <!-- ===== THEME TOGGLE ===== -->
    <button class="theme-toggle" onclick="toggleTheme()" title="ប្តូរពណ៌">🌓</button>

    <!-- ===== MODAL ===== -->
    <div id="modalOverlay">
        <div id="modalContent">
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div class="container" id="app">
        <div id="pageContent"></div>
        <div class="text-center mt-10" style="font-size:10px;color:rgba(255,255,255,0.2);">
            🔥 Firebase Realtime Database
            <span style="margin-left:8px;" id="cloudStatus">
                <span class="cloud-status disconnected">☁️ Connecting...</span>
            </span>
        </div>
    </div>

    <script>
        // ================================================================
        // ===== FIREBASE CONFIGURATION =====
        // ================================================================

        const firebaseConfig = {
            apiKey: "AIzaSyDY6EzS_tUgma7z5z8LpK4Te5WcF3msqx4",
            authDomain: "access-and-management-system.firebaseapp.com",
            databaseURL: "https://access-and-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "access-and-management-system",
            storageBucket: "access-and-management-system.firebasestorage.app",
            messagingSenderId: "183584626258",
            appId: "1:183584626258:web:c87cc50820672aea12318b"
        };

        // ================================================================
        // ===== INIT FIREBASE =====
        // ================================================================

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ================================================================
        // ===== DATA LAYER =====
        // ================================================================

        var localData = {
            members: {},
            subAdmins: {},
            superAdmins: {},
            transactions: [],
            paymentRequests: [],
            commissions: [],
            activityLogs: [],
            memberCounter: 0,
            adminCounter: 0,
            exchangeRate: 4000,
            version: '6.1'
        };

        var isConnected = false;
        var isLoading = false;
        var isSaving = false;
        var currentUser = null;

        // ================================================================
        // ===== FIREBASE FUNCTIONS =====
        // ================================================================

        function updateCloudStatus(connected) {
            isConnected = connected;
            var statusEl = document.getElementById('cloudStatus');
            if (statusEl) {
                if (connected) {
                    statusEl.innerHTML = '<span class="cloud-status connected">☁️ Connected</span>';
                } else {
                    statusEl.innerHTML = '<span class="cloud-status disconnected">☁️ Disconnected</span>';
                }
            }
        }

        function saveToFirebase() {
            if (isSaving) {
                showToast('⏳ កំពុងដំណើរការ...', 'info');
                return;
            }

            isSaving = true;
            showToast('⏳ កំពុងរក្សាទុកលើ Cloud...', 'info');

            var dataToSave = {
                members: localData.members,
                subAdmins: localData.subAdmins,
                superAdmins: localData.superAdmins,
                transactions: localData.transactions,
                paymentRequests: localData.paymentRequests,
                commissions: localData.commissions,
                activityLogs: localData.activityLogs,
                memberCounter: localData.memberCounter,
                adminCounter: localData.adminCounter,
                exchangeRate: localData.exchangeRate,
                version: localData.version,
                lastUpdated: new Date().toISOString()
            };

            database.ref('memberSystem').set(dataToSave)
                .then(function() {
                    updateCloudStatus(true);
                    showToast('💾 បានរក្សាទុកលើ Cloud ជោគជ័យ!', 'success');
                    isSaving = false;
                })
                .catch(function(error) {
                    showToast('⚠️ កំហុស: ' + error.message, 'error');
                    updateCloudStatus(false);
                    isSaving = false;
                });
        }

        function loadFromFirebase() {
            if (isLoading) {
                showToast('⏳ កំពុងដំណើរការ...', 'info');
                return;
            }

            isLoading = true;
            showToast('⏳ កំពុងទាញយកពី Cloud...', 'info');

            database.ref('memberSystem').once('value')
                .then(function(snapshot) {
                    var data = snapshot.val();
                    if (data) {
                        localData.members = data.members || {};
                        localData.subAdmins = data.subAdmins || {};
                        localData.superAdmins = data.superAdmins || {};
                        localData.transactions = data.transactions || [];
                        localData.paymentRequests = data.paymentRequests || [];
                        localData.commissions = data.commissions || [];
                        localData.activityLogs = data.activityLogs || [];
                        localData.memberCounter = data.memberCounter || 0;
                        localData.adminCounter = data.adminCounter || 0;
                        localData.exchangeRate = data.exchangeRate || 4000;
                        localData.version = data.version || '6.1';

                        updateCloudStatus(true);
                        showToast('📥 បានទាញយកពី Cloud ជោគជ័យ!', 'success');
                        
                        var user = getCurrentUser();
                        if (user) {
                            if (user.role === 'super_admin') renderPage('super-dashboard');
                            else if (user.role === 'sub_admin') renderPage('admin-dashboard');
                            else renderPage('dashboard');
                        } else {
                            renderPage('login');
                        }
                    } else {
                        showToast('ℹ️ មិនទាន់មានទិន្នន័យក្នុង Cloud', 'info');
                        updateCloudStatus(false);
                    }
                    isLoading = false;
                })
                .catch(function(error) {
                    showToast('⚠️ កំហុស: ' + error.message, 'error');
                    updateCloudStatus(false);
                    isLoading = false;
                });
        }

        function setupRealtimeListeners() {
            database.ref('memberSystem').on('value', function(snapshot) {
                var data = snapshot.val();
                if (data) {
                    var oldMembersCount = Object.keys(localData.members).length;
                    
                    localData.members = data.members || {};
                    localData.subAdmins = data.subAdmins || {};
                    localData.superAdmins = data.superAdmins || {};
                    localData.transactions = data.transactions || [];
                    localData.paymentRequests = data.paymentRequests || [];
                    localData.commissions = data.commissions || [];
                    localData.activityLogs = data.activityLogs || [];
                    localData.memberCounter = data.memberCounter || 0;
                    localData.adminCounter = data.adminCounter || 0;
                    localData.exchangeRate = data.exchangeRate || 4000;
                    localData.version = data.version || '6.1';

                    updateCloudStatus(true);

                    var newMembersCount = Object.keys(localData.members).length;
                    if (newMembersCount !== oldMembersCount && oldMembersCount > 0) {
                        showToast('🔄 ទិន្នន័យត្រូវបានធ្វើបច្ចុប្បន្នភាព!', 'info');
                    }

                    var user = getCurrentUser();
                    if (user) {
                        var currentPage = getCurrentPage();
                        if (currentPage === 'dashboard' || currentPage === 'admin-dashboard' || currentPage === 'super-dashboard') {
                            renderPage(currentPage);
                        }
                    }
                }
            });
        }

        function getCurrentPage() {
            var container = document.getElementById('pageContent');
            if (!container) return 'login';
            var content = container.innerHTML;
            if (content.indexOf('SUPER ADMIN') !== -1) return 'super-dashboard';
            if (content.indexOf('Sub Admin') !== -1 && content.indexOf('សមាជិក') !== -1) return 'admin-dashboard';
            if (content.indexOf('សមតុល្យ') !== -1 || content.indexOf('ដាក់ប្រាក់') !== -1) return 'dashboard';
            return 'login';
        }

        // ================================================================
        // ===== BASIC FUNCTIONS =====
        // ================================================================

        function generateMemberId() {
            localData.memberCounter = localData.memberCounter + 1;
            var num = localData.memberCounter;
            var str = String(num);
            while (str.length < 4) str = '0' + str;
            return 'M-' + str;
        }

        function generateAdminId() {
            localData.adminCounter = localData.adminCounter + 1;
            var num = localData.adminCounter;
            var str = String(num);
            while (str.length < 4) str = '0' + str;
            return 'A-' + str;
        }

        function getCurrentUser() {
            var user = localStorage.getItem('firebaseCurrentUser');
            if (user) {
                return JSON.parse(user);
            }
            return null;
        }

        function setCurrentUser(user) {
            currentUser = user;
            if (user) {
                localStorage.setItem('firebaseCurrentUser', JSON.stringify(user));
            } else {
                localStorage.removeItem('firebaseCurrentUser');
            }
        }

        function showToast(message, type) {
            var old = document.querySelector('.toast');
            if (old) old.remove();
            var t = document.createElement('div');
            t.className = 'toast toast-' + (type || 'info');
            t.textContent = message;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                t.style.transform = 'translateX(100px)';
                setTimeout(function() { t.remove(); }, 500);
            }, 4000);
        }

        function showModal(html, options) {
            var overlay = document.getElementById('modalOverlay');
            var body = document.getElementById('modalBody');
            var content = document.getElementById('modalContent');
            body.innerHTML = html;
            overlay.style.display = 'flex';
            setTimeout(function() {
                content.classList.add('show');
            }, 10);
            if (options && options.closeOnOverlay !== false) {
                overlay.onclick = function(e) {
                    if (e.target === overlay) hideModal();
                };
            }
            document.addEventListener('keydown', function handler(e) {
                if (e.key === 'Escape') {
                    hideModal();
                    document.removeEventListener('keydown', handler);
                }
            });
        }

        function hideModal() {
            var overlay = document.getElementById('modalOverlay');
            var content = document.getElementById('modalContent');
            content.classList.remove('show');
            setTimeout(function() {
                overlay.style.display = 'none';
            }, 300);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            var isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }

        function openImageViewer(src) {
            if (!src || src === 'null' || src === 'undefined') {
                showToast('គ្មានរូបភាព', 'warning');
                return;
            }
            var viewer = document.getElementById('imageViewer');
            var img = document.getElementById('viewerImage');
            img.src = src;
            viewer.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeImageViewer() {
            document.getElementById('imageViewer').classList.remove('show');
            document.body.style.overflow = '';
        }

        function formatCurrency(amount, currency) {
            if (currency === 'riel') {
                var r = Math.round(amount * (localData.exchangeRate || 4000));
                return r.toLocaleString('km-KH') + ' ៛';
            }
            return '$' + amount.toFixed(2);
        }

        function convertToUSD(riel) {
            return riel / (localData.exchangeRate || 4000);
        }

        function convertToRiel(usd) {
            return usd * (localData.exchangeRate || 4000);
        }

        function logActivity(adminId, adminName, action, actionType, target, amount, details) {
            if (!localData.activityLogs) localData.activityLogs = [];
            var log = {
                id: 'LOG-' + String(localData.activityLogs.length + 1).padStart(4, '0'),
                adminId: adminId || 'unknown',
                adminName: adminName || 'Unknown',
                action: action || 'unknown',
                actionType: actionType || 'general',
                target: target || null,
                amount: amount || null,
                timestamp: new Date().toISOString(),
                status: 'success',
                details: details || ''
            };
            localData.activityLogs.unshift(log);
            if (localData.activityLogs.length > 500) localData.activityLogs = localData.activityLogs.slice(0, 500);
            saveToFirebase();
            return log;
        }

        function createPaymentRequest(type, from, to, amount, currency, description, screenshot, status) {
            if (!localData.paymentRequests) localData.paymentRequests = [];
            var pr = {
                id: 'PR-' + String(localData.paymentRequests.length + 1).padStart(6, '0'),
                type: type,
                from: from,
                to: to,
                amount: amount || 0,
                currency: currency || 'usd',
                description: description || '',
                screenshot: screenshot || null,
                status: status || 'pending',
                timestamp: new Date().toISOString()
            };
            localData.paymentRequests.unshift(pr);
            saveToFirebase();
            return pr;
        }

        function getPaymentRequestsByUser(phone) {
            if (!localData.paymentRequests) return [];
            var result = [];
            for (var i = 0; i < localData.paymentRequests.length; i++) {
                var pr = localData.paymentRequests[i];
                if (pr.from === phone || pr.to === phone) {
                    result.push(pr);
                }
            }
            return result;
        }

        function addCommission(memberPhone, transactionId, amount) {
            if (!localData.commissions) localData.commissions = [];
            var member = localData.members[memberPhone];
            if (!member) return null;
            var rate = member.commissionRate || 0.05;
            var commission = amount * rate;
            if (commission <= 0) return null;
            member.totalCommission = (member.totalCommission || 0) + commission;
            var rec = {
                id: 'C-' + String(localData.commissions.length + 1).padStart(4, '0'),
                memberPhone: memberPhone,
                transactionId: transactionId,
                amount: amount,
                commission: commission,
                rate: rate,
                timestamp: new Date().toISOString(),
                status: 'approved'
            };
            localData.commissions.push(rec);
            saveToFirebase();
            return rec;
        }

        // ================================================================
        // ===== RENDER ENGINE =====
        // ================================================================

        function renderPage(page) {
            var container = document.getElementById('pageContent');
            var html = '';

            switch (page) {
                case 'login': html = renderLogin(); break;
                case 'register': html = renderRegister(); break;
                case 'dashboard': html = renderDashboard(); break;
                case 'admin-dashboard': html = renderAdminDashboard(); break;
                case 'super-dashboard': html = renderSuperDashboard(); break;
                case 'payment-requests': html = renderPaymentRequests(); break;
                case 'activity-log': html = renderActivityLog(); break;
                default: html = renderLogin();
            }

            container.innerHTML = html;
            attachEvents(page);
        }

        // ================================================================
        // ===== PAGE BUILDERS =====
        // ================================================================

        function renderLogin() {
            return `
                <div class="login-container">
                    <div class="login-logo animate-float">🏦</div>
                    <div class="login-title">ប្រព័ន្ធគ្រប់គ្រងសមាជិក</div>
                    <div class="login-subtitle">សូមជ្រើសរើសតួនាទីដើម្បីចូលប្រើ</div>

                    <div class="login-option" onclick="showLoginForm('member')">
                        <span class="icon">👤</span>
                        <div class="title">ចូលប្រើជាសមាជិក</div>
                        <div class="desc">សម្រាប់អ្នកប្រើប្រាស់ទូទៅ</div>
                    </div>

                    <div class="login-option admin-option" onclick="showLoginForm('sub_admin')">
                        <span class="icon">👑</span>
                        <div class="title">ចូលប្រើជា Sub Admin</div>
                        <div class="desc">សម្រាប់អ្នកគ្រប់គ្រង</div>
                    </div>

                    <div class="login-option super-option" onclick="showLoginForm('super_admin')">
                        <span class="icon">⭐</span>
                        <div class="title">ចូលប្រើជា Super Admin</div>
                        <div class="desc">សម្រាប់អ្នកគ្រប់គ្រងកំពូល</div>
                    </div>

                    <div style="margin-top:15px;text-align:center;">
                        <span style="color:rgba(255,255,255,0.4);font-size:12px;">មិនទាន់មានគណនី?</span>
                        <span onclick="renderPage('register')" style="color:#667eea;cursor:pointer;font-size:12px;font-weight:600;"> ចុះឈ្មោះ</span>
                    </div>

                    <div id="loginFormContainer" style="display:none;margin-top:15px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                            <span id="loginFormTitle" style="color:#fff;font-weight:600;font-size:14px;"></span>
                            <span class="back-link" onclick="document.getElementById('loginFormContainer').style.display='none';">✕</span>
                        </div>
                        <form id="loginForm">
                            <input type="hidden" id="loginRole">
                            <input type="tel" id="loginPhone" placeholder="📱 លេខទូរសព្ទ" required>
                            <input type="password" id="loginPassword" placeholder="🔒 ពាក្យសម្ងាត់" required>
                            <button type="submit" class="btn btn-primary">🔑 ចូលប្រើ</button>
                        </form>
                        <div id="loginMsg"></div>
                    </div>
                </div>
            `;
        }

        function showLoginForm(role) {
            var container = document.getElementById('loginFormContainer');
            var title = document.getElementById('loginFormTitle');
            var roleInput = document.getElementById('loginRole');
            
            if (!container || !title || !roleInput) return;
            
            var roleNames = {
                'member': 'សមាជិក',
                'sub_admin': 'Sub Admin',
                'super_admin': 'Super Admin'
            };
            
            title.textContent = '🔑 ចូលប្រើជា ' + (roleNames[role] || role);
            roleInput.value = role;
            container.style.display = 'block';
            container.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // Clear previous messages
            document.getElementById('loginMsg').innerHTML = '';
        }

        function renderRegister() {
            return `
                <div class="top-bar">
                    <h2>📝 ចុះឈ្មោះ</h2>
                    <span class="back-link" onclick="renderPage('login')">← ត្រឡប់</span>
                </div>
                <p>បង្កើតគណនីថ្មី</p>

                <form id="registerForm">
                    <input type="text" id="regName" placeholder="👤 ឈ្មោះ">
                    <input type="tel" id="regPhone" placeholder="📱 លេខទូរសព្ទ" required>
                    <input type="password" id="regPassword" placeholder="🔒 ពាក្យសម្ងាត់" required>
                    <input type="password" id="regConfirm" placeholder="🔑 បញ្ជាក់ពាក្យសម្ងាត់" required>
                    <select id="regCurrency">
                        <option value="usd">$ USD</option>
                        <option value="riel">៛ Riel</option>
                    </select>
                    <button type="submit" class="btn btn-green">📝 ចុះឈ្មោះ</button>
                </form>
                <div id="regMsg"></div>
                <p class="text-center mt-10 fs-12 op-3">⚠️ សូមចំណាំលេខទូរសព្ទ និងពាក្យសម្ងាត់!</p>
            `;
        }

        // ================================================================
        // ===== DASHBOARD (MEMBER) =====
        // ================================================================

        function renderDashboard() {
            var user = getCurrentUser();
            if (!user || user.role !== 'member') {
                renderPage('login');
                return '';
            }

            var member = localData.members[user.phone];
            if (!member) {
                showToast('មិនឃើញព័ត៌មាន!', 'error');
                renderPage('login');
                return '';
            }

            var curr = member.currency || 'usd';

            // Payment Requests
            var prs = getPaymentRequestsByUser(user.phone);
            var prHtml = '';
            if (prs.length === 0) {
                prHtml = '<p style="opacity:0.4;font-size:12px;">មិនទាន់មានសំណើទូទាត់</p>';
            } else {
                for (var i = 0; i < Math.min(prs.length, 5); i++) {
                    var pr = prs[i];
                    var d = new Date(pr.timestamp);
                    var statusClass = pr.status === 'pending' ? 'status-pending' : pr.status === 'approved' ? 'status-approved' : 'status-rejected';
                    var statusText = pr.status === 'pending' ? '⏳ រង់ចាំ' : pr.status === 'approved' ? '✅ អនុម័ត' : '❌ បដិសេធ';
                    var typeText = pr.type === 'deposit' ? 'ដាក់ប្រាក់' : 'ដកប្រាក់';
                    prHtml += `
                        <div class="payment-item">
                            <div style="display:flex;justify-content:space-between;">
                                <span>${typeText}</span>
                                <span class="amount">${pr.type === 'deposit' ? '+' : '-'}${formatCurrency(pr.amount, pr.currency)}</span>
                            </div>
                            <div style="font-size:11px;color:rgba(255,255,255,0.4);">
                                ${pr.description || ''} | ${d.toLocaleDateString('km-KH')}

        // ================================================================
        // ===== FUNCTIONS =====
        // ================================================================

        function handleDepositFile(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var fn = document.getElementById('depositFileName');
                if (fn) fn.textContent = '✅ ' + file.name;
                var pv = document.getElementById('depositPreview');
                if (pv) pv.innerHTML = '<img src="' + e.target.result + '" class="preview-image" alt="Deposit" onclick="event.stopPropagation();openImageViewer(\'' + e.target.result + '\')">';
                input.dataset.imageData = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleWithdrawFile(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {

        function approvePaymentRequest(prId) {
            var pr = null;
            for (var i = 0; i < localData.paymentRequests.length; i++) {
                if (localData.paymentRequests[i].id === prId) {
                    pr = localData.paymentRequests[i];
                    break;
                }
            }

            if (!pr) { showToast('មិនឃើញសំណើ!', 'error'); return; }

            pr.status = 'approved';

            var amountUSD = pr.currency === 'riel' ? convertToUSD(pr.amount) : pr.amount;

            if (pr.type === 'deposit') {
                var target = localData.members[pr.to];
                if (target) {
                    target.balance += amountUSD;
                    if (!target.benefits) target.benefits = [];
                    target.benefits.push('💰 បានទទួលទូទាត់ ' + formatCurrency(amountUSD, target.currency || 'usd') + ' (សំណើ: ' + pr.id + ')');
                }
            } else if (pr.type === 'withdraw') {
                var target = localData.members[pr.from];
                if (target) {
                    target.balance -= amountUSD;
                    if (!target.benefits) target.benefits = [];
                    target.benefits.push('🏦 បានដកប្រាក់ ' + formatCurrency(amountUSD, target.currency || 'usd') + ' (សំណើ: ' + pr.id + ')');
                }
            }

            logActivity('admin', 'Admin', 'approve_payment', 'financial', pr.from, amountUSD,
                'អនុម័តសំណើ ' + pr.id + ' ($' + amountUSD.toFixed(2) + ')');

            saveToFirebase();
            showToast('✅ អនុម័តជោគជ័យ!', 'success');
            hideModal();
            
            var user = getCurrentUser();
            if (user && user.role === 'sub_admin') {
                renderPage('admin-dashboard');
            } else {
                renderPage('super-dashboard');
            }
        }

                        <button onclick="hideModal();confirmDeleteMember('${phone}');" class="btn btn-red" style="flex:1;">🗑️ លុប</button>
                        <button onclick="hideModal()" class="btn" style="flex:1;background:rgba(255,255,255,0.1);">បោះបង់</button>
                    </div>
                </div>
            `);
        }

        function confirmDeleteMember(phone) {
            var member = localData.members[phone];
            delete localData.members[phone];
            logActivity('SUPER-001', 'Super Admin', 'delete_member', 'administration', phone, null,
                'លុបសមាជិក ' + (member ? member.name || phone : phone));
            saveToFirebase();
            showToast('✅ លុបជោគជ័យ!', 'success');
            renderPage('super-dashboard');
        }

        function deleteAdmin(phone) {
            showModal(`
                <div style="text-align:center;">
                    <div style="font-size:48px;margin-bottom:10px;">🗑️</div>
                    <h3 style="color:#fff;margin-bottom:10px;">លុប Sub Admin</h3>
                    <p style="color:rgba(255,255,255,0.6);">តើអ្នកចង់លុប Sub Admin នេះមែនទេ?</p>
                    <div class="flex">
                        <button onclick="hideModal();confirmDeleteAdmin('${phone}');" class="btn btn-red" style="flex:1;">🗑️ លុប</button>
                        <button onclick="hideModal()" class="btn" style="flex:1;background:rgba(255,255,255,0.1);">បោះបង់</button>
                    </div>
                </div>
            `);
        }

        function confirmDeleteAdmin(phone) {
            var admin = localData.subAdmins[phone];
            delete localData.subAdmins[phone];
            logActivity('SUPER-001', 'Super Admin', 'delete_admin', 'administration', phone, null,
                'លុប Sub Admin ' + (admin ? admin.name || admin.username : phone));
            saveToFirebase();
            showToast('✅ លុបជោគជ័យ!', 'success');
            renderPage('super-dashboard');
        }

        function resetPassword(phone, type) {
            var newPwd = prompt('ពាក្យសម្ងាត់ថ្មីសម្រាប់ ' + (type === 'admin' ? 'Sub Admin' : 'សមាជិក') + ':');
            if (!newPwd || newPwd.length < 4) {
                showToast('ត្រូវមានយ៉ាងតិច ៤ តួ!', 'error');
                return;
            }

            var entity = type === 'admin' ? localData.subAdmins[phone] : localData.members[phone];
            if (!entity) { showToast('មិនឃើញព័ត៌មាន!', 'error'); return; }

            entity.password = newPwd;
            logActivity('SUPER-001', 'Super Admin', 'reset_password', 'administration', phone, null,
                'កំណត់ពាក្យសម្ងាត់ថ្មីឲ្យ ' + (entity.name || entity.username || phone));
            saveToFirebase();
            showToast('✅ កំណត់ពាក្យសម្ងាត់ថ្មីជោគជ័យ!', 'success');
            renderPage('super-dashboard');
        }

        function logout() {
            setCurrentUser(null);
            renderPage('login');
            showToast('🚪 ចាកចេញជោគជ័យ!', 'info');
        }

        function goBack() {
            var user = getCurrentUser();
            if (user) {
                if (user.role === 'super_admin') renderPage('super-dashboard');
                else if (user.role === 'sub_admin') renderPage('admin-dashboard');
                else renderPage('dashboard');
            } else {
                renderPage('login');
            }
        }

        // ================================================================
        // ===== EVENT ATTACHMENT =====
        // ================================================================

        function attachEvents(page) {
            // Register
            var registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.onsubmit = function(e) {
                    e.preventDefault();
                    var name = document.getElementById('regName').value.trim();
                    var phone = document.getElementById('regPhone').value.trim();
                    var password = document.getElementById('regPassword').value.trim();
                    var confirm = document.getElementById('regConfirm').value.trim();
                    var currency = document.getElementById('regCurrency').value;
                    var msg = document.getElementById('regMsg');

                    if (!phone || !password || !confirm) {
                        msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }
                    if (password !== confirm) {
                        msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">ពាក្យសម្ងាត់មិនដូចគ្នា!</div>';
                        return;
                    }
                    if (localData.members[phone]) {
                        msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">លេខទូរសព្ទមានរួចហើយ!</div>';
                        return;
                    }

                    var id = generateMemberId();
                    localData.members[phone] = {
                        name: name || phone,
                        phone: phone,
                        password: password,
                        id: id,
                        currency: currency,
                        balance: 0,
                        benefits: ['✨ សមាជិកថ្មី'],
                        date: new Date().toISOString()
                    };

                    // Auto create sub admin if none exists
                    if (Object.keys(localData.subAdmins).length === 0) {
                        var adminId = generateAdminId();
                        localData.subAdmins[phone] = {
                            name: name || phone,
                            phone: phone,
                            password: password,
                            id: adminId,
                            balance: 0,
                            totalReceived: 0,
                            totalTransferred: 0,
                            members: [phone]
                        };
                    }

                    logActivity('system', 'System', 'register', 'authentication', phone, null, 'សមាជិកថ្មី ' + phone);
                    saveToFirebase();

                    // Auto login
                    setCurrentUser({ phone: phone, role: 'member', name: name || phone });
                    msg.innerHTML = '<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ ចុះឈ្មោះជោគជ័យ!<br>🆔 ' + id + '<br>📱 ' + phone + '</div>';
                    setTimeout(function() { renderPage('dashboard'); }, 1500);
                };
            }

            // Login
            var loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.onsubmit = function(e) {
                    e.preventDefault();
                    var role = document.getElementById('loginRole').value;
                    var phone = document.getElementById('loginPhone').value.trim();
                    var password = document.getElementById('loginPassword').value.trim();
                    var msg = document.getElementById('loginMsg');

                    if (!phone || !password) {
                        msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }

                    // Check Super Admin
                    if (role === 'super_admin') {
                        if (localData.superAdmins[phone] && localData.superAdmins[phone].password === password) {
                            setCurrentUser({ phone: phone, role: 'super_admin', name: 'Super Admin' });
                            logActivity('SUPER-001', 'Super Admin', 'login', 'authentication', null, null, 'ចូលប្រើ Super Admin');
                            renderPage('super-dashboard');
                            return;
                        }
                    }

                    // Check Sub Admin
                    if (role === 'sub_admin') {
                        if (localData.subAdmins[phone] && localData.subAdmins[phone].password === password) {
                            setCurrentUser({ phone: phone, role: 'sub_admin', name: localData.subAdmins[phone].name || localData.subAdmins[phone].username });
                            logActivity(localData.subAdmins[phone].id, localData.subAdmins[phone].name || localData.subAdmins[phone].username, 'login', 'authentication', null, null, 'ចូលប្រើ Sub Admin');
                            renderPage('admin-dashboard');
                            return;
                        }
                    }

                    // Check Member
                    if (role === 'member') {
                        if (localData.members[phone] && localData.members[phone].password === password) {
                            setCurrentUser({ phone: phone, role: 'member', name: localData.members[phone].name || phone });
                            logActivity(localData.members[phone].id, localData.members[phone].name || phone, 'login', 'authentication', null, null, 'ចូលប្រើជាសមាជិក');
                            renderPage('dashboard');
                            return;
                        }
                    }

                    msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">❌ មិនត្រឹមត្រូវ!<br><span style="font-size:12px;opacity:0.6;">សូមពិនិត្យលេខទូរសព្ទ និងពាក្យសម្ងាត់</span></div>';
                };
            }

            // Create Admin
            var createAdminForm = document.getElementById('createAdminForm');
            if (createAdminForm) {
                createAdminForm.onsubmit = function(e) {
                    e.preventDefault();
                    var name = document.getElementById('newAdminName').value.trim();
                    var phone = document.getElementById('newAdminPhone').value.trim();
                    var password = document.getElementById('newAdminPassword').value.trim();
                    var msg = document.getElementById('createAdminMsg');

                    if (!name || !phone || !password) {
                        msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }
                    if (localData.subAdmins[phone]) {
                        msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">លេខទូរសព្ទមានរួចហើយ!</div>';
                        return;
                    }

                    var id = generateAdminId();
                    localData.subAdmins[phone] = {
                        name: name,
                        phone: phone,
                        password: password,
                        id: id,
                        balance: 0,
                        totalReceived: 0,
                        totalTransferred: 0,
                        members: Object.keys(localData.members)
                    };

                    logActivity('SUPER-001', 'Super Admin', 'create_admin', 'administration', phone, null, 'បង្កើត Sub Admin "' + name + '" (' + id + ')');
                    saveToFirebase();

                    msg.innerHTML = '<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ បង្កើតជោគជ័យ!<br>🆔 ' + id + '<br>🔒 ' + password + '</div>';
                    createAdminForm.reset();
                    setTimeout(function() { renderPage('super-dashboard'); }, 1500);
                };
            }
        }

        // ================================================================
        // ===== INIT =====
        // ================================================================

        // Initialize Super Admin if not exists
        if (Object.keys(localData.superAdmins).length === 0) {
            localData.superAdmins['066817407'] = {
                name: 'Super Admin',
                phone: '066817407',
                password: 'super123',
                id: 'SUPER-001',
                balance: 10000,
                createdAt: new Date().toISOString()
            };
        }

        // Check if there's any member, if not create default
        if (Object.keys(localData.members).length === 0) {
            var defaultId = generateMemberId();
            localData.members['066817407'] = {
                name: 'Super Admin',
                phone: '066817407',
                password: 'super123',
                id: defaultId,
                currency: 'usd',
                balance: 10000,
                benefits: ['⭐ Super Admin'],
                date: new Date().toISOString()
            };
        }

        // Check if there's any sub admin, if not create from first member
        if (Object.keys(localData.subAdmins).length === 0) {
            var firstMember = Object.values(localData.members)[0];
            if (firstMember) {
                var adminId = generateAdminId();
                localData.subAdmins[firstMember.phone] = {
                    name: firstMember.name || firstMember.phone,
                    phone: firstMember.phone,
                    password: firstMember.password,
                    id: adminId,
                    balance: 0,
                    totalReceived: 0,
                    totalTransferred: 0,
                    members: Object.keys(localData.members)
                };
            }
        }

        // Save initial data
        saveToFirebase();

        var cu = getCurrentUser();
        if (cu) {
            if (cu.role === 'super_admin') renderPage('super-dashboard');
            else if (cu.role === 'sub_admin' && localData.subAdmins[cu.phone]) renderPage('admin-dashboard');
            else if (cu.role === 'member' && localData.members[cu.phone]) renderPage('dashboard');
            else { setCurrentUser(null); renderPage('login'); }
        } else {
            renderPage('login');
        }

        // Setup Firebase connection listener
        database.ref('.info/connected').on('value', function(snap) {
            updateCloudStatus(snap.val());
            if (snap.val()) {
                setTimeout(function() {
                    loadFromFirebase();
                }, 1000);
            }
        });

        // Setup real-time listeners
        setupRealtimeListeners();

        console.log('🚀 ប្រព័ន្ធគ្រប់គ្រងសមាជិក v6.1 (Firebase) បានដំណើរការ!');
        console.log('📊 ទិន្នន័យបច្ចុប្បន្ន:', localData);
        console.log('👤 អ្នកប្រើបច្ចុប្បន្ន:', cu);
    </script>
</body>
</html>
