<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិក និង Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Khmer OS', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 800px;
            animation: fadeInUp 0.6s ease-out;
            max-height: 98vh;
            overflow-y: auto;
        }

        .container::-webkit-scrollbar {
            width: 5px;
        }
        .container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1, h2, h3 {
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h2 {
            font-size: 1.5rem;
            color: #fff;
        }
        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
            line-height: 1.6;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            margin: 5px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        input:focus, select:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.15);
        }
        select option {
            background: #1a1a2e;
            color: #fff;
        }

        .input-group {
            position: relative;
        }
        .input-group input {
            padding-right: 45px;
        }
        .input-group .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }
        .input-group .toggle-pwd:hover {
            color: #fff;
        }

        .btn {
            display: inline-block;
            padding: 11px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 3px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #48bb78, #38a169);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 12px 35px rgba(72, 187, 120, 0.5);
        }
        .btn-danger {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            box-shadow: 0 8px 25px rgba(252, 129, 129, 0.3);
        }
        .btn-danger:hover {
            box-shadow: 0 12px 35px rgba(252, 129, 129, 0.5);
        }
        .btn-warning {
            background: linear-gradient(135deg, #f6ad55, #ed8936);
            box-shadow: 0 8px 25px rgba(246, 173, 85, 0.3);
        }
        .btn-warning:hover {
            box-shadow: 0 12px 35px rgba(246, 173, 85, 0.5);
        }
        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            color: #1a1a2e;
        }
        .btn-gold:hover {
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
        }
        .btn-xs {
            padding: 3px 10px;
            font-size: 11px;
        }
        .btn-block {
            width: 100%;
            text-align: center;
        }

        .btn-super {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
            padding: 4px 14px;
            font-size: 12px;
            border-radius: 20px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.25);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-super:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }

        .back-link {
            font-size: 18px !important;
            font-weight: 700 !important;
            color: rgba(255, 255, 255, 0.8) !important;
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 18px;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            cursor: pointer;
        }
        .back-link:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #fff !important;
            transform: translateX(-4px);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .clear-btn {
            background: rgba(255, 80, 80, 0.15);
            border: 1px solid rgba(255, 80, 80, 0.3);
            color: #fc8181;
            padding: 6px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .clear-btn:hover {
            background: rgba(255, 80, 80, 0.25);
            transform: scale(1.05);
            border-color: #fc8181;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 12px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 16px;
            margin: 10px 0;
            text-align: left;
            transition: all 0.3s ease;
        }
        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }
        .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .amount {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #48bb78, #38a169);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
        }
        .badge-green {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: #fff;
        }
        .badge-red {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            color: #fff;
        }
        .badge-purple {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            color: #fff;
        }

        .admin-panel {
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
        }
        .admin-panel h3 {
            color: #ffd700;
        }

        .list-container {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 6px;
        }
        .list-container::-webkit-scrollbar {
            width: 4px;
        }
        .list-container::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 10px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 13px;
        }
        .list-item .info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex: 1;
            min-width: 120px;
        }
        .list-item .info .name {
            color: #fff;
            font-weight: 600;
        }
        .list-item .info .sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }
        .list-item .info .id {
            font-size: 10px;
            color: rgba(255, 215, 0, 0.5);
        }
        .list-item .info .pwd {
            font-size: 11px;
            color: #48bb78;
        }
        .list-item .info .admin-name {
            font-size: 11px;
            color: #ffd700;
        }
        .list-item .balance {
            color: #48bb78;
            font-weight: 600;
            font-size: 14px;
        }
        .list-item .actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .notification-item {
            background: rgba(246, 173, 85, 0.1);
            border-left: 4px solid #f6ad55;
            padding: 10px 14px;
            border-radius: 10px;
            margin: 5px 0;
            font-size: 13px;
        }
        .notification-item .time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 6px;
            margin: 6px 0;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }
        .stat-box .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 12px 0;
        }
        .role-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .role-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }
        .role-card .icon {
            font-size: 30px;
            display: block;
            margin-bottom: 4px;
        }
        .role-card .title {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
        }
        .role-card .desc {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            margin-top: 2px;
        }
        .role-card.admin-card {
            border-color: rgba(255, 215, 0, 0.2);
        }
        .role-card.admin-card:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }
        .role-card.super-card {
            border-color: rgba(255, 215, 0, 0.1);
            background: rgba(255, 215, 0, 0.03);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .top-bar h2 {
            margin: 0;
            font-size: 1.3rem;
        }

        .text-center {
            text-align: center;
        }
        .mt-5 { margin-top: 5px; }
        .mt-10 { margin-top: 10px; }
        .mt-15 { margin-top: 15px; }
        .mb-10 { margin-bottom: 10px; }
        .op-3 { opacity: 0.3; }
        .op-5 { opacity: 0.5; }
        .fs-11 { font-size: 11px; }
        .fs-12 { font-size: 12px; }
        .fs-13 { font-size: 13px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .gap-5 { gap: 5px; }
        .flex-center { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        #message .success {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
            border: 1px solid rgba(72, 187, 120, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin-top: 8px;
            font-size: 13px;
        }
        #message .error {
            background: rgba(252, 129, 129, 0.2);
            color: #fc8181;
            border: 1px solid rgba(252, 129, 129, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin-top: 8px;
            font-size: 13px;
        }
        #message .info {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin-top: 8px;
            font-size: 13px;
        }

        .otp-input {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 8px 0;
        }
        .otp-input input {
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            padding: 0;
            border-radius: 10px;
        }
        .otp-input input:focus {
            border-color: #ffd700;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .modal-box {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .modal-box h3 {
            color: #ffd700;
        }

        .search-result-box {
            background: rgba(255,215,0,0.08);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,215,0,0.2);
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .container { padding: 15px 12px; border-radius: 18px; }
            h1 { font-size: 1.8rem; }
            h2 { font-size: 1.2rem; }
            .amount { font-size: 2rem; }
            .buttons { flex-direction: column; }
            .btn { width: 100%; text-align: center; }
            .stats { grid-template-columns: 1fr 1fr; }
            .role-selector { grid-template-columns: 1fr; }
            .list-item { flex-direction: column; align-items: flex-start; }
            .list-item .actions { width: 100%; justify-content: flex-start; }
            .otp-input input { width: 38px; height: 42px; font-size: 16px; }
            .modal-box { padding: 18px; }
            .back-link { font-size: 14px !important; padding: 6px 12px; }
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div id="pageContent"></div>
    </div>

    <script>
        // ================================================================
        // ===== DATA LAYER =====
        // ================================================================

        let data = JSON.parse(localStorage.getItem('memberSystemData')) || {
            superAdmins: {},
            subAdmins: {},
            members: {},
            activityLogs: [],
            memberCounter: 0,
            adminCounter: 0,
            otpStore: {},
            superAdminOTP: null,
            superAdminOTPTime: null
        };

        function saveData() {
            localStorage.setItem('memberSystemData', JSON.stringify(data));
        }

        function generateAdminId() {
            data.adminCounter++;
            saveData();
            return 'A-' + String(data.adminCounter).padStart(4, '0');
        }

        function generateMemberId() {
            data.memberCounter++;
            saveData();
            return 'M-' + String(data.memberCounter).padStart(4, '0');
        }

        function generateOTP() {
            return String(Math.floor(100000 + Math.random() * 900000));
        }

        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('currentUser') || 'null');
        }

        function setCurrentUser(user) {
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
            } else {
                localStorage.removeItem('currentUser');
            }
        }

        function logoutUser() {
            if (confirm('តើអ្នកចង់ចាកចេញមែនទេ?')) {
                setCurrentUser(null);
                renderPage('home');
            }
        }

        function logActivity(adminId, adminName, action, actionType, target, amount, details) {
            const log = {
                id: 'LOG-' + String(data.activityLogs.length + 1).padStart(4, '0'),
                adminId: adminId || 'unknown',
                adminName: adminName || 'Unknown',
                action: action || 'unknown',
                actionType: actionType || 'general',
                target: target || null,
                amount: amount || null,
                ip: 'local',
                device: navigator.userAgent || 'Unknown',
                timestamp: new Date().toISOString(),
                status: 'success',
                details: details || ''
            };
            data.activityLogs.unshift(log);
            if (data.activityLogs.length > 500) data.activityLogs = data.activityLogs.slice(0, 500);
            saveData();
            return log;
        }

        // ================================================================
        // ===== RENDER ENGINE =====
        // ================================================================

        function renderPage(page, params) {
            const container = document.getElementById('pageContent');
            let html = '';

            switch (page) {
                case 'home': html = getHomePage(); break;
                case 'role-select': html = getRoleSelectPage(); break;
                case 'login': html = getLoginPage(params); break;
                case 'register': html = getRegisterPage(); break;
                case 'dashboard': html = getDashboardPage(); break;
                case 'admin-dashboard': html = getAdminDashboardPage(); break;
                case 'super-dashboard': html = getSuperDashboardPage(); break;
                case 'super-login': html = getSuperLoginPage(); break;
                case 'super-otp': html = getSuperOTPPage(params); break;
                case 'transfer-money': html = getTransferMoneyPage(params); break;
                case 'activity-log': html = getActivityLogPage(); break;
                case 'edit-member': html = getEditMemberPage(params); break;
                case 'edit-admin': html = getEditAdminPage(params); break;
                default: html = getHomePage();
            }

            container.innerHTML = html;
            attachEvents(page, params);
        }

        // ================================================================
        // ===== PAGE BUILDERS =====
        // ================================================================

        function getHomePage() {
            const totalMembers = Object.keys(data.members).length;
            const totalAdmins = Object.keys(data.subAdmins).length;
            const totalBalance = Object.values(data.members).reduce((s, m) => s + m.balance, 0) +
                Object.values(data.subAdmins).reduce((s, a) => s + a.balance, 0);

            return `
                <div class="text-center">
                    <div style="margin-bottom:6px;"><span class="badge badge-gold">🚀 v3.0</span></div>
                    <h1>ស្វាគមន៍!</h1>
                    <p style="font-size:0.95rem;color:rgba(255,255,255,0.5);">ប្រព័ន្ធគ្រប់គ្រងសមាជិក និង Admin</p>
                    <div style="height:2px;width:50px;background:linear-gradient(90deg,#667eea,transparent);margin:12px auto;"></div>

                    <div class="stats">
                        <div class="stat-box"><div class="number">${totalMembers}</div><div class="label">សមាជិក</div></div>
                        <div class="stat-box"><div class="number">${totalAdmins}</div><div class="label">Sub Admin</div></div>
                        <div class="stat-box"><div class="number">$${totalBalance.toFixed(0)}</div><div class="label">ប្រាក់សរុប</div></div>
                        <div class="stat-box"><div class="number">${Object.keys(data.members).filter(k => data.members[k].balance > 0).length}</div><div class="label">សកម្ម</div></div>
                    </div>

                    <div class="buttons">
                        <button onclick="renderPage('role-select')" class="btn">🔑 ចូលប្រើ</button>
                        <button onclick="renderPage('register')" class="btn btn-secondary">📝 ចុះឈ្មោះ</button>
                    </div>

                    <div style="margin-top:12px;">
                        <button onclick="renderPage('super-login')" class="btn-super">⭐ Super Admin</button>
                    </div>
                </div>
            `;
        }

        function getRoleSelectPage() {
            return `
                <div class="top-bar">
                    <h2>🔑 ជ្រើសរើសប្រភេទ</h2>
                    <span class="back-link" onclick="renderPage('home')">← ត្រឡប់</span>
                </div>
                <p style="font-size:13px;">សូមជ្រើសរើសប្រភេទអ្នកប្រើប្រាស់</p>

                <div class="role-selector">
                    <div class="role-card" onclick="renderPage('login', {role:'member'})">
                        <span class="icon">👤</span>
                        <div class="title">សមាជិក</div>
                        <div class="desc">ចូលប្រើជាសមាជិក</div>
                    </div>
                    <div class="role-card admin-card" onclick="renderPage('login', {role:'sub_admin'})">
                        <span class="icon">👑</span>
                        <div class="title">Sub Admin</div>

        function getAdminTransferLogs(adminId) {
            const logs = data.activityLogs.filter(l => l.adminId === adminId && l.actionType === 'member_transfer');

                return '<p style="opacity:0.4;font-size:13px;padding:10px 0;">📭 មិនទាន់មានប្រវត្តិការផ្ទេរប្រាក់</p>';
            }
            
            let html = '';
            logs.slice(0, 20).forEach((l, index) => {
                const d = new Date(l.timestamp);
                const dateStr = d.toLocaleDateString('km-KH', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const timeStr = d.toLocaleTimeString('km-KH', { hour: '2-digit', minute: '2-digit' });
                
                html += `

                        </div>
                    </div>
                `;
            });
            
            if (logs.length > 20) {
                html += `<p style="text-align:center;font-size:11px;color:rgba(255,255,255,0.2);padding-top:8px;">📊 បង្ហាញ ២០ ចុងក្រោយ (សរុប ${logs.length})</p>`;

            return html;
        }

            let foundMember = null;

                            </form>
                            ${!isAssigned ? `<button onclick="requestAssignMember('${foundMember.phone}')" class="btn btn-gold btn-sm mt-5">👑 ស្នើ</button>` : ''}
                        </div>
                    </div>
                </div>
            `;

            const transferForm = document.getElementById('adminTransferSearchForm');
            if (transferForm) {
                transferForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const user = getCurrentUser();
                    if (!user || user.role !== 'sub_admin') {
                        alert('សូមចូលប្រើជា Sub Admin!');
                        return;
                    }

                    const admin = data.subAdmins[user.phone];
                    if (!admin) {
                        alert('មិនឃើញព័ត៌មាន Admin!');
                        return;
                    }

                    const phone = this.querySelector('[name="memberPhone"]').value;
                    const amount = parseFloat(this.querySelector('[name="transferAmount"]').value);
                    
                    if (!amount || amount <= 0) {
                        alert('សូមបញ្ចូលចំនួនត្រឹមត្រូវ!');
                        return;
                    }

                    if (amount > admin.balance) {
                        alert('មិនគ្រប់គ្រាន់! (នៅសល់ $' + admin.balance.toFixed(2) + ')');

                    const member = data.members[phone];
                    if (!member) {

                    admin.balance -= amount;

                    member.benefits.push('💰 បានទទួល $' + amount.toFixed(2) + ' នៅថ្ងៃ ' + date);
                    if (!admin.members.includes(phone)) admin.members.push(phone);
                    if (!member.adminId) member.adminId = admin.id;

                    saveData();

                        'ផ្ទេរ $' + amount.toFixed(2) + ' ទៅ ' + (member.username || member.phone));

                    renderPage('admin-dashboard');
                });
            }

        function editMemberByAdmin(phone) {
            const user = getCurrentUser();
            if (!user || user.role !== 'sub_admin') {
                alert('សូមចូលប្រើជា Sub Admin!');
                return;
            }

            const member = data.members[phone];
            if (!member) { alert('មិនឃើញសមាជិក!'); return; }

            const admin = data.subAdmins[user.phone];
            if (!admin || member.adminId !== admin.id) {
                alert('សមាជិកនេះមិនស្ថិតក្រោមការគ្រប់គ្រងរបស់អ្នកទេ!');
                return;
            }

            const modalHtml = `
                <div class="modal-overlay" id="editMemberModal">
                    <div class="modal-box">
                        <h3>✏️ កែប្រែសមាជិក</h3>
                        <p style="font-size:13px;">សម្រាប់: <strong style="color:#fff;">${member.username || member.phone}</strong></p>
                        <form id="editMemberByAdminForm">
                            <input type="hidden" name="memberPhone" value="${phone}">
                            <input type="text" id="editMemberUsername" value="${member.username || ''}" placeholder="👤 ឈ្មោះ" required>
                            <input type="tel" id="editMemberPhone" value="${member.phone}" placeholder="📱 លេខទូរសព្ទ" required>
                            <div class="input-group">
                                <input type="password" id="editMemberPassword" value="${member.password}" placeholder="🔒 ពាក្យសម្ងាត់" required>
                                <button type="button" class="toggle-pwd" onclick="togglePassword('editMemberPassword', this)">👁️</button>
                            </div>
                            <button type="submit" class="btn btn-warning btn-block mt-10">💾 រក្សាទុក</button>
                            <button type="button" onclick="closeEditMemberModal()" class="btn btn-danger btn-sm mt-5">❌ បោះបង់</button>
                        </form>
                        <div id="editMemberMessage"></div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);

            const form = document.getElementById('editMemberByAdminForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const phone = this.querySelector('[name="memberPhone"]').value;
                    const username = document.getElementById('editMemberUsername').value.trim();
                    const newPhone = document.getElementById('editMemberPhone').value.trim();
                    const password = document.getElementById('editMemberPassword').value.trim();
                    const msg = document.getElementById('editMemberMessage');

                    if (!newPhone || !password) {
                        msg.innerHTML = `<div class="error">សូមបំពេញព័ត៌មាន!</div>`;
                        return;
                    }

                    if (!/^\d{9,}$/.test(newPhone)) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទមិនត្រឹមត្រូវ!</div>`;
                        return;
                    }

                    const member = data.members[phone];
                    if (!member) { msg.innerHTML = `<div class="error">មិនឃើញសមាជិក!</div>`; return; }

                    if (newPhone !== phone && data.members[newPhone]) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទថ្មីមានរួចហើយ!</div>`;
                        return;
                    }

                    if (newPhone !== phone && member.adminId) {
                        const admin = data.subAdmins[member.adminId];
                        if (admin) {
                            admin.members = admin.members.map(p => p === phone ? newPhone : p);
                        }
                    }

                    if (newPhone !== phone) {
                        data.members[newPhone] = { ...member, phone: newPhone, username: username || newPhone, password: password };
                        delete data.members[phone];
                    } else {
                        member.username = username || member.phone;
                        member.password = password;
                    }

                    saveData();
                    logActivity(admin.id, admin.username, 'edit_member', 'administration', newPhone, null,
                        'កែប្រែសមាជិក ' + (username || newPhone));

                    msg.innerHTML = `<div class="success">✅ រក្សាទុកជោគជ័យ!</div>`;
                    setTimeout(() => {
                        closeEditMemberModal();
                        renderPage('admin-dashboard');
                    }, 1500);
                });
            }
        }

        function deleteMemberByAdmin(phone) {
            const user = getCurrentUser();
            if (!user || user.role !== 'sub_admin') {
                alert('សូមចូលប្រើជា Sub Admin!');
                return;
            }

            const member = data.members[phone];
            if (!member) { alert('មិនឃើញសមាជិក!'); return; }

            const admin = data.subAdmins[user.phone];
            if (!admin || member.adminId !== admin.id) {
                alert('សមាជិកនេះមិនស្ថិតក្រោមការគ្រប់គ្រងរបស់អ្នកទេ!');
                return;
            }

            if (!confirm(`តើអ្នកចង់លុប "${member.username || member.phone}" មែនទេ?`)) return;

            admin.members = admin.members.filter(p => p !== phone);
            delete data.members[phone];

            saveData();
            logActivity(admin.id, admin.username, 'delete_member', 'administration', phone, null,
                'លុបសមាជិក ' + (member.username || member.phone));

            alert('✅ លុបជោគជ័យ!');
            renderPage('admin-dashboard');

            else if (currentUser.role === 'sub_admin' && data.subAdmins[currentUser.phone]) renderPage('admin-dashboard');
            else if (currentUser.role === 'member' && data.members[currentUser.phone]) renderPage('dashboard');
            else { setCurrentUser(null); renderPage('home'); }
        } else {
            renderPage('home');
        }
    </script>

</body>
</html>
