<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>លេខឆ្នោតខ្មែរ N98</title>
</head>
<body>
  <h1>លេខឆ្នោតខ្មែរ N98</h1>
  <p id="datetime"></p>

  <button id="enableNotify">អនុញ្ញាតការជូនដំណឹង</button>

  <script>
    // បង្ហាញកាលបរិច្ឆេទម៉ោងបច្ចុប្បន្ន
    function updateDateTime() {
      const now = new Date();
      document.getElementById("datetime").innerText =
        now.toLocaleString("km-KH", { dateStyle: "full", timeStyle: "medium" });
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // Register Service Worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").then(() => {
        console.log("Service Worker Registered");
      });
    }

    // Request Notification Permission
    document.getElementById("enableNotify").addEventListener("click", () => {
      Notification.requestPermission().then(permission => {
        if (permission === "granted") {
          alert("អ្នកបានអនុញ្ញាតការជូនដំណឹង!");
        }
      });
    });

    // Function ផ្ញើ Notification
    function sendNotification(title, body) {
      if (Notification.permission === "granted") {
        navigator.serviceWorker.ready.then(registration => {
          registration.showNotification(title, {
            body: body,
            icon: "icon.png"
          });
        });
      }
    }

    // ពិនិត្យម៉ោងស្វ័យប្រវត្តិ
    function checkTime() {
      const now = new Date();
      const hour = now.getHours();
      const minute = now.getMinutes();

      if (hour === 12 && minute === 0) {
        sendNotification("លទ្ធផលឆ្នោត", "លទ្ធផលម៉ោង 12:00 បានចេញហើយ!");
      }
      if (hour === 18 && minute === 0) {
        sendNotification("លទ្ធផលឆ្នោត", "លទ្ធផលម៉ោង 18:00 បានចេញហើយ!");
      }
    }

    setInterval(checkTime, 60000); // ពិនិត្យរៀងរាល់ 1 នាទី
  </script>
</body>
</html>
