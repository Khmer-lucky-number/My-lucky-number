<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រង និងចុះឈ្មោះសមាជិក</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kantumruy Pro', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">ក្រុមហ៊ុនយើងខ្ញុំ</h1>
            <div class="space-x-4">
                <button onclick="showSection('register-sec')" class="hover:underline font-semibold">ចុះឈ្មោះយក ID</button>
                <button onclick="showSection('job-sec')" class="hover:underline font-semibold">ជ្រើសរើសបុគ្គលិក</button>
                <button onclick="showSection('shop-sec')" class="hover:underline font-semibold">ហាងទំនិញ</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-3xl">

        <section id="register-sec" class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-2xl font-bold text-blue-600 mb-6 border-b pb-2">១. ទម្រង់ចុះឈ្មោះដើម្បីទទួលបានលេខ ID</h2>
            <form id="regForm" onsubmit="submitToTelegram(event, 'ចុះឈ្មោះយក ID')">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-medium">ឈ្មោះពេញ</label>
                        <input type="text" id="reg-name" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium">អាយុ</label>
                        <input type="number" id="reg-age" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium">មុខរបរ</label>
                        <input type="text" id="reg-job" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium">លេខទូរស័ព្ទ / Telegram Username</label>
                        <input type="text" id="reg-contact" placeholder="@username ឬ 012345..." required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-gray-700 font-medium">អាសយដ្ឋាន / ទីលំនៅបច្ចុប្បន្ន</label>
                        <textarea id="reg-address" rows="2" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-blue-400 outline-none"></textarea>
                    </div>
                </div>
                <button type="submit" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded transition duration-200">
                    ផ្ញើទិន្នន័យ និងបង្កើត ID
                </button>
            </form>
            <div id="id-display" class="hidden mt-4 p-4 bg-green-100 text-green-800 rounded text-center font-bold"></div>
        </section>


        <section id="job-sec" class="bg-white p-6 rounded-lg shadow-md mb-8 hidden">
            <h2 class="text-2xl font-bold text-orange-600 mb-6 border-b pb-2">២. ដាក់ពាក្យបម្រើការងារ (Recruitment)</h2>
            <form id="jobForm" onsubmit="submitToTelegram(event, 'ដាក់ពាក្យធ្វើការ')">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-medium">ឈ្មោះពេញ</label>
                        <input type="text" id="job-name" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-orange-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium">តួនាទីចង់ដាក់ពាក្យ</label>
                        <select id="job-position" class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-orange-400 outline-none">
                            <option>បុគ្គលិកផ្នែកលក់ (Sales)</option>
                            <option>អ្នកដឹកជញ្ជូន (Delivery)</option>
                            <option>គណនេយ្យ (Accounting)</option>
                            <option>រដ្ឋបាល (Admin)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium">អាយុ</label>
                        <input type="number" id="job-age" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-orange-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium">លេខទូរស័ព្ទ / Telegram</label>
                        <input type="text" id="job-contact" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-orange-400 outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-gray-700 font-medium">ប្រវត្តិរូបសង្ខេប ឬ បទពិសោធន៍ការងារ</label>
                        <textarea id="job-exp" rows="3" placeholder="រៀបរាប់ពីបទពិសោធន៍របស់អ្នកសង្ខេប..." required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-orange-400 outline-none"></textarea>
                    </div>
                </div>
                <button type="submit" class="w-full mt-4 bg-orange-500 hover:bg-orange-600 text-white font-bold p-3 rounded transition duration-200">
                    ដាក់ពាក្យភ្លាមៗ
                </button>
            </form>
        </section>


        <section id="shop-sec" class="bg-white p-6 rounded-lg shadow-md hidden">
            <h2 class="text-2xl font-bold text-green-600 mb-6 border-b pb-2">៣. បង្ហោះលក់ផលិតផលផ្ទាល់ខ្លួន</h2>
            <form id="shopForm" onsubmit="submitToTelegram(event, 'បង្ហោះលក់ទំនិញ')">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-medium">ឈ្មោះអ្នកលក់</label>
                        <input type="text" id="shop-seller" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-green-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium">លេខទូរស័ព្ទ</label>
                        <input type="text" id="shop-contact" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-green-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium">ឈ្មោះទំនិញ/ផលិតផល</label>
                        <input type="text" id="shop-item" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-green-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium">តម្លៃ ($)</label>
                        <input type="text" id="shop-price" placeholder="ឧទហរណ៍៖ $15" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-green-400 outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-gray-700 font-medium">ព័ត៌មានលម្អិតពីទំនិញ</label>
                        <textarea id="shop-desc" rows="3" required class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-green-400 outline-none"></textarea>
                    </div>
                </div>
                <button type="submit" class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white font-bold p-3 rounded transition duration-200">
                    បង្ហោះលក់ទៅក្នុងគ្រុប
                </button>
            </form>
        </section>

    </div>

    <script>
        // បញ្ចូលព័ត៌មាន Bot របស់អ្នកដែលបានផ្តល់ជូន
        const TELEGRAM_BOT_TOKEN = '8832988912:AAHopQQf21daUcFIzM4Bl20h9Gzd4IbQ_pI';
        const TELEGRAM_CHAT_ID = '-5387523552';

        // មុខងារប្តូរ Menu មើលតាមផ្នែក
        // មុខងារប្តូរ Menu មើលតាមផ្នែក
        function showSection(sectionId) {
            document.getElementById('register-sec').classList.add('hidden');
            document.getElementById('job-sec').classList.add('hidden');
            document.getElementById('shop-sec').classList.add('hidden');
            
            document.getElementById(sectionId).classList.remove('hidden');
        }

        // មុខងារបញ្ជូនទិន្នន័យទៅកាន់ Telegram
        function submitToTelegram(event, type) {
            event.preventDefault();

            let message = `🔔 *មានព័ត៌មានថ្មីពីវេបសាយ (${type})*\n`;
            message += `----------------------------------\n`;

            if (type === 'ចុះឈ្មោះយក ID') {
                const name = document.getElementById('reg-name').value;
                const age = document.getElementById('reg-age').value;
                const job = document.getElementById('reg-job').value;
                const contact = document.getElementById('reg-contact').value;
                const address = document.getElementById('reg-address').value;
                
                // បង្កើតលេខ ID ចៃដន្យ (ឧទាហរណ៍៖ ID-4721)
                const randomID = 'ID-' + Math.floor(1000 + Math.random() * 9000);

                message += `🆔 *លេខសម្គាល់សមាជិក:* ${randomID}\n`;
                message += `👤 *ឈ្មោះ:* ${name}\n`;
                message += `🎂 *អាយុ:* ${age} ឆ្នាំ\n`;
                message += `💼 *មុខរបរ:* ${job}\n`;
                message += `📞 *ទំនាក់ទំនង:* ${contact}\n`;
                message += `📍 *អាសយដ្ឋាន:* ${address}\n`;

                // បង្ហាញ ID លើអេក្រង់ឱ្យអ្នកចុះឈ្មោះឃើញ
                const idDisplay = document.getElementById('id-display');
                idDisplay.innerHTML = `🎉 ចុះឈ្មោះជោគជ័យ! លេខ ID របស់អ្នកគឺ៖ <span class="text-xl text-red-600">${randomID}</span> (ព័ត៌មានត្រូវបានផ្ញើទៅកាន់ក្រុមការងារ)`;
                idDisplay.classList.remove('hidden');
                document.getElementById('regForm').reset();

            } else if (type === 'ដាក់ពាក្យធ្វើការ') {
                message += `👤 *បេក្ខជន:* ${document.getElementById('job-name').value}\n`;
                message += `🎯 *តំណែងចង់បាន:* ${document.getElementById('job-position').value}\n`;
                message += `🎂 *អាយុ:* ${document.getElementById('job-age').value} ឆ្នាំ\n`;
                message += `📞 *ទំនាក់ទំនង:* ${document.getElementById('job-contact').value}\n`;
                message += `📝 *ប្រវត្តិសង្ខេប:* ${document.getElementById('job-exp').value}\n`;
                
                document.getElementById('jobForm').reset();
                alert('ពាក្យសុំធ្វើការរបស់លោកអ្នកត្រូវបានបញ្ជូនទៅហើយ!');

            } else if (type === 'បង្ហោះលក់ទំនិញ') {
                message += `👤 *អ្នកលក់:* ${document.getElementById('shop-seller').value}\n`;
                message += `📞 *ទំនាក់ទំនង:* ${document.getElementById('shop-contact').value}\n`;
                message += `📦 *ទំនិញ:* ${document.getElementById('shop-item').value}\n`;
                message += `💰 *តម្លៃ:* ${document.getElementById('shop-price').value}\n`;
                message += `ℹ️ *ពិពណ៌នា:* ${document.getElementById('shop-desc').value}\n`;
                
                document.getElementById('shopForm').reset();
                alert('ទំនិញរបស់អ្នកត្រូវបានបង្ហោះចូលគ្រុបហើយ!');
            }

            // កូដ API ផ្ញើទៅតេឡេក្រាម
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(response => response.json())
            .then(data => {
                if(!data.ok) {
                    alert('មានបញ្ហាក្នុងការផ្ញើទៅកាន់ Telegram! សូមប្រាកដថា Bot របស់អ្នកត្រូវបានដាក់ចូលជា Admin ក្នុងគ្រុបហើយ។');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('ការតភ្ជាប់មានបញ្ហា!');
            });
        }
    </script>
</body>
</html>
