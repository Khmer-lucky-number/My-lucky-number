<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Year Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-4">

    <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-2xl shadow-xl relative">
        <button onclick="toggleLanguage()" class="absolute top-4 right-4 bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded-lg text-xs font-bold transition">
            🇰🇭/🇬🇧 EN
        </button>

        <h1 id="title" class="text-2xl font-bold text-center mb-2">ឆ្នាំសំណាងទាំង 12 🎁🎉</h1>
        <p id="subtitle" class="text-center text-gray-400 text-sm mb-4">ប្រព័ន្ធទស្សន៍ទាយ និងកត់ត្រាលេខសំណាង</p>
        
        <div class="text-center mt-6 mb-6">
            <h3 id="result-label" class="text-lg font-bold text-gray-300 mb-2">🔮 ឆ្នាំសំណាងសម្រាប់ម៉ោងនេះគឺ៖</h3>
            <div class="bg-gray-700/50 p-4 rounded-2xl border border-gray-600 flex flex-col items-center">
                <span class="text-4xl mb-2">🐔</span>
                <p id="lucky-year" class="text-xl font-bold">ឆ្នាំរកា</p>
            </div>
        </div>

        <button id="predict-btn" class="w-full bg-pink-500 hover:bg-pink-600 py-3 rounded-full font-bold shadow-lg">🎲 ចុចដើម្បីទស្សន៍ទាយ</button>
    </div>

    <script>
        const translations = {
            km: {
                title: "ឆ្នាំសំណាងទាំង 12 🎁🎉",
                subtitle: "ប្រព័ន្ធទស្សន៍ទាយ និងកត់ត្រាលេខសំណាង",
                resultLabel: "🔮 ឆ្នាំសំណាងសម្រាប់ម៉ោងនេះគឺ៖",
                luckyYear: "ឆ្នាំរកា",
                predictBtn: "🎲 ចុចដើម្បីទស្សន៍ទាយ"
            },
            en: {
                title: "12 Lucky Years 🎁🎉",
                subtitle: "Prediction and Lucky Number System",
                resultLabel: "🔮 Lucky year for this hour:",
                luckyYear: "Rooster Year",
                predictBtn: "🎲 Click to Predict"
            }
        };

        let currentLang = 'km';

        function toggleLanguage() {
            currentLang = currentLang === 'km' ? 'en' : 'km';
            document.getElementById('title').innerText = translations[currentLang].title;
            document.getElementById('subtitle').innerText = translations[currentLang].subtitle;
            document.getElementById('result-label').innerText = translations[currentLang].resultLabel;
            document.getElementById('lucky-year').innerText = translations[currentLang].luckyYear;
            document.getElementById('predict-btn').innerText = translations[currentLang].predictBtn;
        }
    </script>
</body>
</html>
