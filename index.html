<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Year System - Full Features</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-4">

    <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-center mb-2">ឆ្នាំសំណាងទាំង 12 🎁🎉</h1>
        
        <div id="server-time" class="bg-blue-900/50 p-2 rounded-lg text-center border border-blue-700 mb-4 text-sm font-mono"></div>

        <div class="bg-purple-900/30 p-4 rounded-xl border border-purple-700 mb-6 flex justify-between items-center">
            <div>
                <p class="text-gray-400 text-xs">សមតុល្យបច្ចុប្បន្ន</p>
                <h2 id="wallet-balance" class="text-xl font-bold text-green-400">$0.00</h2>
            </div>
            <button onclick="showPasswordModal()" class="bg-green-500 px-3 py-1 rounded-lg text-xs font-bold">💰 បញ្ចូលលុយ</button>
        </div>

        <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700 mb-6">
            <h3 class="text-xs font-bold text-gray-400 mb-3 text-center">📅 តារាងឆ្នាំសំណាង</h3>
            <div class="grid grid-cols-4 gap-2 text-center text-[10px]">
                <div class="bg-gray-800 p-1 rounded">🐭ជូត</div><div class="bg-gray-800 p-1 rounded">🐮ឆ្លូវ</div>
                <div class="bg-gray-800 p-1 rounded">🐯ខាល</div><div class="bg-gray-800 p-1 rounded">🐰ថោះ</div>
                <div class="bg-gray-800 p-1 rounded">🐉រោង</div><div class="bg-gray-800 p-1 rounded">🐍ម្សាញ់</div>
                <div class="bg-gray-800 p-1 rounded">🐎មមី</div><div class="bg-gray-800 p-1 rounded">🐐មមែ</div>
                <div class="bg-gray-800 p-1 rounded">🐒វក</div><div class="bg-gray-800 p-1 rounded">🐔រកា</div>
                <div class="bg-gray-800 p-1 rounded">🐶ច</div><div class="bg-gray-800 p-1 rounded">🐷កុរ</div>
            </div>
        </div>
    </div>

    <div id="pass-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-6 rounded-2xl w-full max-w-xs border border-gray-600 text-center">
            <h3 class="mb-4 font-bold">បញ្ចូលពាក្យសម្ងាត់</h3>
            <input type="password" id="pass-input" class="w-full bg-gray-900 p-2 rounded mb-4 text-center border border-gray-700" placeholder="••••">
            <div class="flex gap-2">
                <button onclick="closeModals()" class="flex-1 bg-red-600 py-2 rounded font-bold">បោះបង់</button>
                <button onclick="checkPassword()" class="flex-1 bg-blue-600 py-2 rounded font-bold">ចូល</button>
            </div>
        </div>
    </div>

    <div id="deposit-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-6 rounded-2xl w-full max-w-sm border border-gray-600">
            <h3 class="mb-4 text-center font-bold">ជ្រើសរើសទឹកប្រាក់ ($)</h3>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="setAmount(10)" class="bg-gray-700 py-2 rounded text-sm hover:bg-green-600">10$</button>
                <button onclick="setAmount(50)" class="bg-gray-700 py-2 rounded text-sm hover:bg-green-600">50$</button>
                <button onclick="setAmount(100)" class="bg-gray-700 py-2 rounded text-sm hover:bg-green-600">100$</button>
            </div>
            <input type="number" id="manual-amount" class="w-full bg-gray-900 p-2 rounded mb-4 text-center border border-gray-700" placeholder="វាយទឹកប្រាក់...">
            <div class="flex gap-2">
                <button onclick="closeModals()" class="flex-1 bg-red-600 py-2 rounded font-bold">បោះបង់</button>
                <button onclick="confirmDeposit()" class="flex-1 bg-green-600 py-2 rounded font-bold">យល់ព្រម</button>
            </div>
        </div>
    </div>

    <script>
        // ផ្ទុកសមតុល្យពី LocalStorage
        let balance = parseFloat(localStorage.getItem('userBalance')) || 0;
        document.getElementById('wallet-balance').innerText = "$" + balance.toFixed(2);

        // នាឡិកា
        setInterval(() => { document.getElementById('server-time').innerText = new Date().toLocaleTimeString(); }, 1000);

        function showPasswordModal() { document.getElementById('pass-modal').style.display = 'flex'; }
        function closeModals() { 
            document.getElementById('pass-modal').style.display = 'none'; 
            document.getElementById('deposit-modal').style.display = 'none'; 
        }
        
        function checkPassword() {
            if(document.getElementById('pass-input').value === "Qq1280") {
                document.getElementById('pass-modal').style.display = 'none';
                document.getElementById('deposit-modal').style.display = 'flex';
                document.getElementById('pass-input').value = '';
            } else { alert("ពាក្យសម្ងាត់ខុស!"); }
        }

        function setAmount(v) { document.getElementById('manual-amount').value = v; }

        function confirmDeposit() {
            const amt = parseFloat(document.getElementById('manual-amount').value);
            if(amt > 0) {
                balance += amt;
                localStorage.setItem('userBalance', balance);
                document.getElementById('wallet-balance').innerText = "$" + balance.toFixed(2);
                closeModals();
            } else { alert("សូមបញ្ចូលទឹកប្រាក់ឱ្យបានត្រឹមត្រូវ"); }
        }
    </script>
</body>
</html>
