<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិក</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Khmer OS', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 480px;
            animation: fadeInUp 0.6s ease-out;
            max-height: 98vh;
            overflow-y: auto;
        }

        .container::-webkit-scrollbar {
            width: 4px;
        }
        .container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
            line-height: 1.6;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin: 5px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.15);
        }

        .input-group {
            position: relative;
        }
        .input-group input {
            padding-right: 45px;
        }
        .input-group .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }
        .input-group .toggle-pwd:hover {
            color: #fff;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 3px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            width: 100%;
            text-align: center;
        }
        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            color: #1a1a2e;
        }
        .btn-gold:hover {
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #48bb78, #38a169);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 12px 35px rgba(72, 187, 120, 0.5);
        }

        .btn-danger {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            box-shadow: 0 8px 25px rgba(252, 129, 129, 0.3);
        }
        .btn-danger:hover {
            box-shadow: 0 12px 35px rgba(252, 129, 129, 0.5);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
            width: auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 16px;
            margin: 10px 0;
            text-align: left;
            transition: all 0.3s ease;
        }
        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }
        .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
        }
        .badge-purple {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            color: #fff;
        }

        .admin-panel {
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
        }
        .admin-panel h3 {
            color: #ffd700;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .top-bar .left-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }
        .top-bar .right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        .top-bar h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .back-link {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .back-link:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .clock-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .clock-display {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.06);
            padding: 3px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 6px;
            font-variant-numeric: tabular-nums;
            flex-wrap: wrap;
        }
        .clock-display .date-part {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            font-size: 10px;
        }
        .clock-display .time-part {
            color: #ffd700;
            font-weight: 700;
            font-size: 14px;
        }
        .clock-display .seconds {
            color: rgba(255, 215, 0, 0.4);
            font-size: 11px;
        }

        .btn-logout {
            background: rgba(252, 129, 129, 0.15);
            border: 1px solid rgba(252, 129, 129, 0.2);
            color: #fc8181;
            padding: 3px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            background: rgba(252, 129, 129, 0.25);
            transform: scale(1.05);
            border-color: #fc8181;
        }

        .role-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }
        .role-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .role-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: #667eea;
        }
        .role-card .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }
        .role-card .title {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }
        .role-card .desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 2px;
        }
        .role-card.admin-card {
            border-color: rgba(255, 215, 0, 0.2);
        }
        .role-card.admin-card:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }
        .role-card.super-card {
            border-color: rgba(255, 215, 0, 0.1);
            background: rgba(255, 215, 0, 0.03);
        }
        .role-card.super-card:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        .footer-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-info h4 {
            color: rgba(255, 215, 0, 0.7);
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .footer-info .role-desc {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 5px 0;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }
        .footer-info .role-desc .r-icon {
            font-size: 18px;
        }
        .footer-info .role-desc .r-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }
        .footer-info .role-desc .r-text strong {
            color: #fff;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 10px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 13px;
        }
        .list-item .info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex: 1;
            min-width: 100px;
        }
        .list-item .info .name {
            color: #fff;
            font-weight: 600;
        }
        .list-item .info .sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }
        .list-item .info .id {
            font-size: 10px;
            color: rgba(255, 215, 0, 0.5);
        }
        .list-item .info .pwd {
            font-size: 11px;
            color: #48bb78;
        }
        .list-item .balance {
            color: #48bb78;
            font-weight: 600;
            font-size: 14px;
        }
        .list-item .actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .text-center {
            text-align: center;
        }
        .mt-10 { margin-top: 10px; }
        .mt-15 { margin-top: 15px; }
        .mt-20 { margin-top: 20px; }
        .op-3 { opacity: 0.3; }
        .fs-12 { font-size: 12px; }
        .fs-13 { font-size: 13px; }

        #message .success {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
            border: 1px solid rgba(72, 187, 120, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin-top: 8px;
            font-size: 13px;
        }
        #message .error {
            background: rgba(252, 129, 129, 0.2);
            color: #fc8181;
            border: 1px solid rgba(252, 129, 129, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin-top: 8px;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .container { padding: 12px 10px; border-radius: 16px; }
            h1 { font-size: 1.6rem; }
            h2 { font-size: 1.1rem; }
            .btn { font-size: 13px; padding: 10px 20px; }
            .role-card { padding: 12px; }
            .role-card .icon { font-size: 26px; }
            .footer-info .role-desc { padding: 6px 10px; }
            .footer-info .role-desc .r-text { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div id="pageContent"></div>
    </div>

    <script>
        // ================================================================
        // ===== DATA LAYER =====
        // ================================================================

        let data = JSON.parse(localStorage.getItem('memberSystemData')) || {
            superAdmins: {},
            subAdmins: {},
            members: {},
            activityLogs: [],
            transactions: [],
            memberCounter: 0,
            adminCounter: 0,
            superAdminOTP: null,
            superAdminOTPTime: null
        };

        function saveData() {
            localStorage.setItem('memberSystemData', JSON.stringify(data));
        }

        function generateMemberId() {
            data.memberCounter++;
            saveData();
            return 'M-' + String(data.memberCounter).padStart(4, '0');
        }

        function generateOTP() {
            return String(Math.floor(100000 + Math.random() * 900000));
        }

        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('currentUser') || 'null');
        }

        function setCurrentUser(user) {
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
            } else {
                localStorage.removeItem('currentUser');
            }
        }

        function logoutUser() {
            if (confirm('តើអ្នកចង់ចាកចេញមែនទេ?')) {
                setCurrentUser(null);
                renderPage('home');
            }
        }

        function logActivity(adminId, adminName, action, actionType, target, amount, details) {
            const log = {
                id: 'LOG-' + String(data.activityLogs.length + 1).padStart(4, '0'),
                adminId: adminId || 'unknown',
                adminName: adminName || 'Unknown',
                action: action || 'unknown',
                actionType: actionType || 'general',
                target: target || null,
                amount: amount || null,
                timestamp: new Date().toISOString(),
                status: 'success',
                details: details || ''
            };
            data.activityLogs.unshift(log);
            if (data.activityLogs.length > 500) data.activityLogs = data.activityLogs.slice(0, 500);
            saveData();
            return log;
        }

        function createTransaction(type, memberPhone, adminId, amount, status, description, screenshot) {
            if (!data.transactions) data.transactions = [];
            const tx = {
                id: 'TX-' + String(data.transactions.length + 1).padStart(6, '0'),
                type: type,
                memberPhone: memberPhone,
                adminId: adminId || null,
                amount: amount || 0,
                status: status || 'pending',
                description: description || '',
                screenshot: screenshot || null,
                timestamp: new Date().toISOString()
            };
            data.transactions.unshift(tx);
            saveData();
            return tx;
        }

        function getMemberTransactions(phone) {
            if (!data.transactions) return [];
            return data.transactions.filter(t => t.memberPhone === phone);
        }

        function calculateTotals(transactions) {
            let totalDeposits = 0, totalWithdraws = 0;
            transactions.forEach(t => {
                if (t.status === 'completed') {
                    if (t.type === 'deposit') totalDeposits += t.amount;
                    else if (t.type === 'withdraw') totalWithdraws += t.amount;
                }
            });
            return { totalDeposits, totalWithdraws, netBalance: totalDeposits - totalWithdraws };
        }

        // ================================================================
        // ===== CLOCK =====
        // ================================================================

        let clockInterval = null;

        function startClock() {
            if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
            function updateClock() {
                const now = new Date();
                const days = ['អាទិត្យ', 'ចន្ទ', 'អង្គារ', 'ពុធ', 'ព្រហស្បតិ៍', 'សុក្រ', 'សៅរ៍'];
                const dayName = days[now.getDay()];
                const dateStr = now.getDate().toString().padStart(2, '0');
                const monthStr = (now.getMonth() + 1).toString().padStart(2, '0');
                const yearStr = now.getFullYear();
                const fullDate = `${dayName} ${dateStr}/${monthStr}/${yearStr}`;
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const seconds = now.getSeconds().toString().padStart(2, '0');

                const dateEl = document.getElementById('clockDate');
                const timeEl = document.getElementById('clockTime');
                const secEl = document.getElementById('clockSeconds');
                if (dateEl) dateEl.textContent = fullDate;
                if (timeEl) timeEl.textContent = `${hours}:${minutes}`;
                if (secEl) secEl.textContent = seconds;
            }
            updateClock();
            clockInterval = setInterval(updateClock, 1000);
        }

        // ================================================================
        // ===== RENDER ENGINE =====
        // ================================================================

        function renderPage(page, params) {
            const container = document.getElementById('pageContent');
            let html = '';

            const showClock = !['home', 'login', 'register', 'super-login', 'super-otp'].includes(page);
            
            let clockHtml = '';
            if (showClock) {
                clockHtml = `
                    <div class="clock-container">
                        <div class="clock-display" id="clockDisplay">
                            <span class="date-part" id="clockDate">--/--/----</span>
                            <span class="time-part" id="clockTime">--:--:--</span>
                            <span class="seconds" id="clockSeconds">--</span>
                        </div>
                        <button onclick="logoutUser()" class="btn-logout">🚪 ចាកចេញ</button>
                    </div>
                `;
            }

            switch (page) {
                case 'home': html = getHomePage(); break;
                case 'login': html = getLoginPage(params); break;
                case 'register': html = getRegisterPage(); break;
                case 'super-login': html = getSuperLoginPage(); break;
                case 'super-otp': html = getSuperOTPPage(params); break;
                case 'dashboard': html = getDashboardPage(); break;
                case 'admin-dashboard': html = getAdminDashboardPage(); break;
                case 'super-dashboard': html = getSuperDashboardPage(); break;
                default: html = getHomePage();
            }

            if (showClock) {
                html = html.replace(/<button onclick="logoutUser\(\)" class="btn btn-danger btn-sm">🚪 ចាកចេញ<\/button>/g, '');
                html = html.replace(/(<div class="top-bar">)/, '$1<div class="right-section">' + clockHtml + '</div>');
            }

            container.innerHTML = html;
            attachEvents(page, params);
            if (showClock) startClock();
        }

        // ================================================================
        // ===== PAGE BUILDERS =====
        // ================================================================

        function getHomePage() {
            return `
                <div class="text-center">
                    <div style="margin-bottom:4px;"><span class="badge badge-gold">🚀 v3.0</span></div>
                    <h1>ស្វាគមន៍!</h1>
                    <p style="font-size:0.9rem;color:rgba(255,255,255,0.5);">ប្រព័ន្ធគ្រប់គ្រងសមាជិក</p>
                    <div style="height:2px;width:40px;background:linear-gradient(90deg,#667eea,transparent);margin:10px auto;"></div>

                    <div class="role-selector">
                        <div class="role-card" onclick="renderPage('login', {role:'member'})">
                            <span class="icon">👤</span>
                            <div class="title">ចូលប្រើជាសមាជិក</div>
                            <div class="desc">សម្រាប់អ្នកប្រើប្រាស់ទូទៅ</div>
                        </div>
                        <div class="role-card admin-card" onclick="renderPage('login', {role:'sub_admin'})">
                            <span class="icon">👑</span>
                            <div class="title">ចូលប្រើជា Sub Admin</div>
                            <div class="desc">សម្រាប់អ្នកគ្រប់គ្រង</div>
                        </div>
                        <div class="role-card super-card" onclick="renderPage('super-login')">
                            <span class="icon">⭐</span>
                            <div class="title">ចូលប្រើជា Super Admin</div>
                            <div class="desc">សម្រាប់អ្នកគ្រប់គ្រងកំពូល</div>
                        </div>
                    </div>

                    <div style="margin-top:8px;">
                        <button onclick="renderPage('register')" class="btn btn-secondary">📝 ចុះឈ្មោះជាសមាជិក</button>
                    </div>

                    <div class="footer-info">
                        <h4>📖 ការពិពណ៌នាអំពីតួនាទី</h4>
                        <div class="role-desc">
                            <span class="r-icon">👤</span>
                            <span class="r-text"><strong>សមាជិក៖</strong> អាចចុះឈ្មោះ, ចូលប្រើ, មើលប្រាក់, ស្នើដាក់/ដកប្រាក់, និងមើលប្រវត្តិប្រតិបត្តិការផ្ទាល់ខ្លួន</span>
                        </div>
                        <div class="role-desc" style="border-left-color:#ffd700;">
                            <span class="r-icon">👑</span>

                    </div>
                    <div style="background:rgba(255,255,255,0.04);padding:6px;border-radius:8px;text-align:center;">
                        <div style="color:#ffd700;font-weight:700;font-size:16px;">${Object.keys(data.subAdmins).length}</div>
                        <div style="font-size:9px;color:rgba(255,255,255,0.3);">Sub Admin</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.04);padding:6px;border-radius:8px;text-align:center;">
                        <div style="color:#ffd700;font-weight:700;font-size:16px;">$${totalBalance.toFixed(0)}</div>
                        <div style="font-size:9px;color:rgba(255,255,255,0.3);">ប្រាក់សរុប</div>
                    </div>
                </div>

                <div class="card admin-panel">
                    <h3>👑 បង្កើត Sub Admin</h3>
                    <form id="createAdminForm">
                        <input type="text" id="newAdminName" placeholder="👤 ឈ្មោះ" required>
                        <input type="tel" id="newAdminPhone" placeholder="📱 លេខទូរសព្ទ" required>
                        <div class="input-group">
                            <input type="password" id="newAdminPassword" placeholder="🔒 ពាក្យសម្ងាត់" required>
                            <button type="button" class="toggle-pwd" onclick="togglePassword('newAdminPassword', this)">👁️</button>
                        </div>
                        <input type="number" id="newAdminBalance" placeholder="💰 ប្រាក់ដំបូង" min="0" step="0.01">
                        <button type="submit" class="btn btn-gold">👑 បង្កើត Sub Admin</button>
                    </form>
                    <div id="createAdminMessage"></div>
                </div>

                <div class="card"><h3>📋 Sub Admin</h3>${adminInfo}</div>

                <div class="card"><h3>📋 សមាជិក</h3><div style="max-height:200px;overflow-y:auto;">${memberListHtml || '<p style="opacity:0.4;">មិនទាន់មាន</p>'}</div></div>

                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">
                    <button onclick="renderPage('activity-log')" class="btn btn-sm">📋 កំណត់ត្រា</button>
                    <button onclick="exportData()" class="btn btn-secondary btn-sm">📤 នាំចេញ</button>
                </div>
            `;
        }

        // ================================================================
        // ===== HELPER FUNCTIONS =====
        // ================================================================

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        function assignAdmin(memberPhone) {
            const member = data.members[memberPhone];
            if (!member) { alert('មិនឃើញសមាជិក!'); return; }

            // Check if there's a sub admin
            const adminList = Object.values(data.subAdmins);
            if (adminList.length === 0) {
                alert('មិនទាន់មាន Sub Admin! សូមបង្កើតមុន');
                return;
            }

            // Use the first (and only) sub admin
            const admin = adminList[0];

            if (member.adminId === admin.id) {
                alert('សមាជិកនេះត្រូវបានចាត់តាំងឲ្យ Admin នេះរួចហើយ!');
                return;
            }

            if (member.adminId) {
                const oldAdmin = Object.values(data.subAdmins).find(a => a.id === member.adminId);
                if (oldAdmin) {
                    oldAdmin.members = oldAdmin.members.filter(p => p !== memberPhone);
                }
            }

            member.adminId = admin.id;
            if (!admin.members.includes(memberPhone)) {
                admin.members.push(memberPhone);
            }

            saveData();
            logActivity('SUPER-001', 'Super Admin', 'assign_admin', 'administration', memberPhone, null,
                'ចាត់តាំង ' + admin.username + ' ឲ្យ ' + (member.username || memberPhone));

            alert('✅ ចាត់តាំងជោគជ័យ!');
            renderPage('super-dashboard');
        }

        function resetAdminPassword(phone) {
            const newPwd = prompt('ពាក្យសម្ងាត់ថ្មីសម្រាប់ Sub Admin:');
            if (!newPwd || newPwd.length < 4) { alert('ត្រូវមានយ៉ាងតិច ៤ តួ!'); return; }
            const admin = data.subAdmins[phone];
            if (!admin) return;
            admin.password = newPwd;
            saveData();
            logActivity('SUPER-001', 'Super Admin', 'reset_password', 'administration', phone, null, 'កំណត់ពាក្យសម្ងាត់ថ្មីឲ្យ ' + admin.username);
            alert('✅ ជោគជ័យ!');
            renderPage('super-dashboard');
        }

        function resendOTP(phone) {
            const superAdmin = Object.values(data.superAdmins)[0];
            if (!superAdmin) { alert('មិនឃើញ Super Admin!'); return; }
            const otp = generateOTP();
            data.superAdminOTP = otp;
            data.superAdminOTPTime = Date.now();
            saveData();
            console.log('📤 OTP: ' + otp);
            alert('📤 OTP ថ្មី: ' + otp);
        }

        function exportData() {
            const str = JSON.stringify(data, null, 2);
            const blob = new Blob([str], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ================================================================
        // ===== EVENT ATTACHMENT =====
        // ================================================================

        function attachEvents(page, params) {
            // ---- SUPER LOGIN ----
            const superLoginForm = document.getElementById('superLoginForm');
            if (superLoginForm) {
                superLoginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const phone = document.getElementById('superPhone').value.trim();
                    const email = document.getElementById('superEmail').value.trim();
                    const password = document.getElementById('superPassword').value.trim();
                    const msg = document.getElementById('message');

                    const superAdmin = Object.values(data.superAdmins)[0];
                    if (!superAdmin) {
                        msg.innerHTML = `<div class="error">មិនឃើញ Super Admin!</div>`;
                        return;
                    }

                    if (password !== superAdmin.password) {
                        msg.innerHTML = `<div class="error">❌ ពាក្យសម្ងាត់មិនត្រឹមត្រូវ!</div>`;
                        return;
                    }

                    const otp = generateOTP();
                    data.superAdminOTP = otp;
                    data.superAdminOTPTime = Date.now();
                    saveData();

                    console.log('📤 OTP: ' + otp);
                    msg.innerHTML = `
                        <div class="success">
                            ✅ OTP ត្រូវបានផ្ញើរួច!<br>
                            📱 ${phone} | 📧 ${email}<br>
                            ⏱️ ផុតកំណត់ ៥ នាទី<br>
                            <span style="font-size:12px;opacity:0.5;">(សាកល្បង: ${otp})</span>
                        </div>
                    `;
                    renderPage('super-otp', { phone: phone });
                });
            }

            // ---- SUPER OTP ----
            const superOTPForm = document.getElementById('superOTPForm');
            if (superOTPForm) {
                document.querySelectorAll('.otp-digit').forEach((input, index, arr) => {
                    input.addEventListener('input', function() {
                        if (this.value.length === 1 && index < arr.length - 1) arr[index + 1].focus();
                    });
                    input.addEventListener('keydown', function(e) {
                        if (e.key === 'Backspace' && this.value.length === 0 && index > 0) arr[index - 1].focus();
                    });
                });

                superOTPForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const phone = document.getElementById('otpPhone').value;
                    const msg = document.getElementById('message');

                    let otp = '';
                    document.querySelectorAll('.otp-digit').forEach(inp => otp += inp.value);

                    if (otp.length !== 6) {
                        msg.innerHTML = `<div class="error">សូមបញ្ចូល ៦ ខ្ទង់!</div>`;
                        return;
                    }

                    const superAdmin = Object.values(data.superAdmins)[0];
                    if (!superAdmin) {
                        msg.innerHTML = `<div class="error">មិនឃើញ Super Admin!</div>`;
                        return;
                    }

                    const storedOTP = data.superAdminOTP;
                    const otpTime = data.superAdminOTPTime || 0;
                    const now = Date.now();

                    if (!storedOTP || now - otpTime > 5 * 60 * 1000) {
                        msg.innerHTML = `<div class="error">⏱️ OTP ផុតកំណត់!</div>`;
                        return;
                    }

                    if (otp !== storedOTP) {
                        msg.innerHTML = `<div class="error">❌ OTP មិនត្រឹមត្រូវ!</div>`;
                        return;
                    }

                    setCurrentUser({
                        phone: superAdmin.phone,
                        role: 'super_admin',
                        name: 'Super Admin'
                    });
                    logActivity('SUPER-001', 'Super Admin', 'login', 'authentication', null, null, 'ចូលប្រើដោយ OTP');
                    data.superAdminOTP = null;
                    data.superAdminOTPTime = null;
                    saveData();
                    renderPage('super-dashboard');
                });
            }

            // ---- LOGIN ----
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const role = document.getElementById('loginRole').value;
                    const phone = document.getElementById('loginPhone').value.trim();
                    const password = document.getElementById('loginPassword').value.trim();
                    const msg = document.getElementById('message');

                    if (!phone || !password) {
                        msg.innerHTML = `<div class="error">សូមបំពេញព័ត៌មាន!</div>`;
                        return;
                    }

                    if (role === 'sub_admin') {
                        const admin = data.subAdmins[phone];
                        if (!admin || admin.password !== password) {
                            msg.innerHTML = `<div class="error">❌ មិនត្រឹមត្រូវ!</div>`;
                            return;
                        }
                        setCurrentUser({ phone: phone, role: 'sub_admin', name: admin.username });
                        logActivity(admin.id, admin.username, 'login', 'authentication', null, null, 'ចូលប្រើជា Sub Admin');
                        renderPage('admin-dashboard');
                    } else {
                        const member = data.members[phone];
                        if (!member || member.password !== password) {
                            msg.innerHTML = `<div class="error">❌ មិនត្រឹមត្រូវ!</div>`;
                            return;
                        }
                        setCurrentUser({ phone: phone, role: 'member', name: member.username || phone });
                        logActivity(member.id, member.username || phone, 'login', 'authentication', null, null, 'ចូលប្រើជាសមាជិក');
                        renderPage('dashboard');
                    }
                });
            }

            // ---- REGISTER ----
            const registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const username = document.getElementById('regUsername').value.trim();
                    const phone = document.getElementById('regPhone').value.trim();
                    const password = document.getElementById('regPassword').value.trim();
                    const confirm = document.getElementById('regConfirmPassword').value.trim();
                    const msg = document.getElementById('message');

                    if (!phone || !password || !confirm) {
                        msg.innerHTML = `<div class="error">សូមបំពេញព័ត៌មាន!</div>`;
                        return;
                    }
                    if (!/^\d{9,}$/.test(phone)) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទមិនត្រឹមត្រូវ!</div>`;
                        return;
                    }
                    if (password !== confirm) {
                        msg.innerHTML = `<div class="error">ពាក្យសម្ងាត់មិនដូចគ្នា!</div>`;
                        return;
                    }
                    if (data.members[phone]) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទមានរួចហើយ!</div>`;
                        return;
                    }

                    const newId = generateMemberId();
                    data.members[phone] = {
                        username: username || phone,
                        password: password,
                        phone: phone,
                        id: newId,
                        role: 'member',
                        balance: 0,
                        benefits: ['✨ សមាជិកថ្មី'],
                        adminId: null,
                        createdAt: new Date().toISOString()
                    };
                    saveData();
                    msg.innerHTML = `<div class="success">✅ ចុះឈ្មោះជោគជ័យ! 🆔 ${newId}<br><span onclick="renderPage('home')" style="color:#667eea;cursor:pointer;">🔑 ចូលប្រើ</span></div>`;
                    registerForm.reset();
                });
            }

            // ---- CREATE ADMIN ----
            const createAdminForm = document.getElementById('createAdminForm');
            if (createAdminForm) {
                createAdminForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('newAdminName').value.trim();
                    const phone = document.getElementById('newAdminPhone').value.trim();
                    const password = document.getElementById('newAdminPassword').value.trim();
                    const balance = parseFloat(document.getElementById('newAdminBalance').value) || 0;
                    const msg = document.getElementById('createAdminMessage');

                    if (!name || !phone || !password) {
                        msg.innerHTML = `<div class="error">សូមបំពេញព័ត៌មាន!</div>`;
                        return;
                    }
                    if (!/^\d{9,}$/.test(phone)) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទមិនត្រឹមត្រូវ!</div>`;
                        return;
                    }
                    if (data.subAdmins[phone]) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទមានរួចហើយ!</div>`;
                        return;
                    }

                    // Only allow one sub admin
                    if (Object.keys(data.subAdmins).length >= 1) {
                        msg.innerHTML = `<div class="error">ប្រព័ន្ធអនុញ្ញាតតែ Sub Admin ម្នាក់ប៉ុណ្ណោះ!</div>`;
                        return;
                    }

                    const newId = 'A-0001';
                    data.adminCounter++;
                    data.subAdmins[phone] = {
                        username: name,
                        password: password,
                        phone: phone,
                        id: newId,
                        role: 'sub_admin',
                        balance: balance,
                        totalReceived: balance,
                        totalTransferred: 0,
                        members: [],
                        createdBy: 'super_admin',
                        createdAt: new Date().toISOString()
                    };
                    saveData();
                    logActivity('SUPER-001', 'Super Admin', 'create_admin', 'administration', phone, null, 'បង្កើត Sub Admin "' + name + '" (' + newId + ')');
                    msg.innerHTML = `<div class="success">✅ បង្កើតជោគជ័យ! 🆔 ${newId}<br>🔒 ${password}</div>`;
                    createAdminForm.reset();
                    setTimeout(() => renderPage('super-dashboard'), 2000);
                });
            }
        }

        // ================================================================
        // ===== INIT =====
        // ================================================================

        if (!data.superAdminExists) {
            data.superAdmins['066817407'] = {
                username: 'Super Admin',
                password: 'super123',
                phone: '066817407',
                email: 'narith128080@gmail.com',
                id: 'SUPER-001',
                role: 'super_admin',
                balance: 10000,
                createdAt: new Date().toISOString()
            };
            data.superAdminExists = true;
            saveData();
            logActivity('SUPER-001', 'Super Admin', 'system_init', 'system', null, null, 'បង្កើតប្រព័ន្ធ Super Admin');
        }

        const currentUser = getCurrentUser();
        if (currentUser) {
            if (currentUser.role === 'super_admin') renderPage('super-dashboard');
            else if (currentUser.role === 'sub_admin' && data.subAdmins[currentUser.phone]) renderPage('admin-dashboard');
            else if (currentUser.role === 'member' && data.members[currentUser.phone]) renderPage('dashboard');
            else { setCurrentUser(null); renderPage('home'); }
        } else {
            renderPage('home');
        }
    </script>
</body>
</html>
