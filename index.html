<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងម៉ោង និងដកប្រាក់រង្វាន់</title>
    <style>
        /* កំណត់ទម្រង់ទូទៅ */
        body {
            font-family: 'Khmer OS Battambang', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* ==========================================
           ផ្នែកប្រអប់ម៉ោង (Time Boxes with Animation)
           ========================================== */
        .time-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .time-box {
            position: relative;
            width: 280px;
            height: 140px;
            border-radius: 16px;
            overflow: hidden; /* លាក់ background ដែលរេចេញក្រៅ */
            background: linear-gradient(135deg, #1e1e2f, #252538);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ខ្លឹមសារអក្សរនៅក្នុងប្រអប់ម៉ោង */
        .time-box .content {
            position: relative;
            z-index: 2; /* ឱ្យអក្សរនៅពីលើ background ជានិច្ច */
            text-align: center;
        }

        .time-box h3 {
            margin: 0 0 12px 0;
            font-size: 1.2rem;
            font-weight: 500;
            color: #dddddd;
        }

        .time-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            font-family: monospace;
        }

        /* ពណ៌/រូបភាព Background ដែលរេចុះឡើង ឆ្វេងស្តាំ */
        .floating-bg {
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            z-index: 1;
            /* អាចដូរទៅជា url('រូបភាពរបស់អ្នក') បាន */
            background-image: radial-gradient(circle, rgba(0, 255, 204, 0.18) 0%, transparent 60%), 
                              radial-gradient(circle, rgba(255, 0, 128, 0.12) 0%, transparent 75%);
            background-size: cover;
            filter: blur(15px);
            animation: floatEffect 10s ease-in-out infinite;
        }

        /* ចលនារេចុះឡើង ឆ្វេងស្តាំ លើក្រោម */
        @keyframes floatEffect {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(20px, -15px) scale(1.08); }
            50% { transform: translate(-15px, 20px) scale(0.95); }
            75% { transform: translate(15px, 15px) scale(1.04); }
            100% { transform: translate(0, 0) scale(1); }
        }


        /* ==========================================
           ផ្នែកទម្រង់ស្នើសុំដកប្រាក់ (Withdrawal Form)
           ========================================== */
        .form-container {
            background-color: #1a1a24;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .form-container h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4rem;
            text-align: center;
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #0f0f14;
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00ffcc;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00ffcc, #00b3ff);
            border: none;
            border-radius: 8px;
            color: #121214;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* សម្រាប់តេស្ត៖ ប៊ូតុងសាកល្បងស្ថានភាពឈ្នះឆ្នោត */
        .test-panel {
            margin-top: 30px;
            padding: 15px;
            background-color: #222;
            border-radius: 8px;
            text-align: center;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .status-false { background-color: #ff3333; color: white; }
        .status-true { background-color: #00cc66; color: white; }
    </style>
</head>
<body>

    <!-- ១. ផ្នែកបង្ហាញម៉ោងដែលមាន Background រេចុះឡើង -->
    <div class="time-container">
        
        <!-- ប្រអប់ម៉ោងបច្ចុប្បន្ន -->
        <div class="time-box">
            <div class="floating-bg"></div>
            <div class="content">
                <h3>🕒 ម៉ោងបច្ចុប្បន្ន</h3>
                <div class="time-display" id="currentTime">00:00:00</div>
            </div>
        </div>

        <!-- ប្រអប់ម៉ោងរាប់ថយក្រោយ -->
        <div class="time-box">
            <div class="floating-bg"></div>
            <div class="content">
                <h3>⏳ ម៉ោងរាប់ថយក្រោយ</h3>
                <div class="time-display" id="countdown">00:00:00</div>
            </div>
        </div>

    </div>

    <!-- ២. ផ្នែកទម្រង់ស្នើសុំដកប្រាក់រង្វាន់ -->
    <div class="form-container">
        <h2>🏦 ស្នើសុំដកប្រាក់រង្វាន់</h2>
        <form id="withdrawForm" onsubmit="return handleWithdrawalRequest(event)">
            <div class="form-group">
                <label for="username">ឈ្មោះគណនី</label>
                <input type="text" id="username" required placeholder="បញ្ចូលឈ្មោះរបស់អ្នក">
            </div>
            <div class="form-group">
                <label for="amount">ចំនួនទឹកប្រាក់ដែលត្រូវដក</label>
                <input type="number" id="amount" required placeholder="ឧទាហរណ៍៖ 100">
            </div>
            <button type="submit" class="btn-submit">ផ្ញើការស្នើសុំដកប្រាក់</button>
        </form>
    </div>

    <!-- ៣. ផ្ទាំងសម្រាប់តេស្តសាកល្បង (Test Toggle) -->
    <div class="test-panel">
        <p style="margin: 0 0 10px 0; font-size: 0.9rem; color: #aaa;">សាកល្បងប្តូរលទ្ធផលចាក់របស់អ្នកនៅទីនេះ៖</p>
        Status: <span id="statusLabel" class="status-badge status-false">មិនទាន់មានលទ្ធផលឈ្នះ</span>
        <br>
        <button onclick="toggleWinStatus()" style="padding: 5px 10px; cursor: pointer;">ប្តូរស្ថានភាព (ឈ្នះ / មិនឈ្នះ)</button>
    </div>

    <script>
        // ==========================================
        // SCRIPT គ្រប់គ្រងលក្ខខណ្ឌដកប្រាក់រង្វាន់
        // ==========================================
        
        // variable សម្គាល់លទ្ធផលឈ្នះ (false = មិនទាន់ឈ្នះ, true = ឈ្នះបន្ទាប់ពីចាក់)
        let hasWonAfterBet = false; 

        // មុខងារត្រួតពិនិត្យពេល user ចុច submit form
        function handleWithdrawalRequest(event) {
            event.preventDefault(); // ទប់ស្កាត់ការ reload page

            // លក្ខខណ្ឌ៖ បើមិនទាន់មានលទ្ធផលឈ្នះបន្ទាប់ពីការចាក់ មិនឱ្យដកដាច់ខាត
            if (!hasWonAfterBet) {
                alert("❌ មិនអាចផ្ញើការស្នើសុំបានទេ! លោកអ្នកមិនទាន់មានលទ្ធផលឈ្នះបន្ទាប់ពីការចាក់នោះឡើយ។");
                return false;
            }

            // ប្រសិនបើមានលទ្ធផលឈ្នះ ទើបឱ្យឆ្លងកាត់
            alert("🎉 ការស្នើសុំដកប្រាក់រង្វាន់របស់អ្នកត្រូវបានបញ្ជូនទៅកាន់ប្រព័ន្ធជោគជ័យ!");
            document.getElementById("withdrawForm").reset(); // សម្អាត form
            return true;
        }

        // មុខងារសម្រាប់ចុចតេស្តប្តូរស្ថានភាព ឈ្នះ/មិនឈ្នះ (សម្រាប់តែការសាកល្បង)
        function toggleWinStatus() {
            hasWonAfterBet = !hasWonAfterBet;
            const label = document.getElementById("statusLabel");
            if(hasWonAfterBet) {
                label.innerText = "មានលទ្ធផលឈ្នះហើយ";
                label.className = "status-badge status-true";
            } else {
                label.innerText = "មិនទាន់មានលទ្ធផលឈ្នះ";
                label.className = "status-badge status-false";
            }
        }


        // ==========================================
        // SCRIPT គ្រប់គ្រងម៉ោង និង ម៉ោងរាប់ថយក្រោយ
        // ==========================================

        // ១. ដំណើរការម៉ោងបច្ចុប្បន្ន
        function updateCurrentTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; // ម៉ោង '0' ត្រូវប្តូរជា '12'
            
            // បន្ថែមលេខ 0 ពីមុខបើទាបជាង 10
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            document.getElementById('currentTime').innerText = `${hours}:${minutes}:${seconds} ${ampm}`;
        }
        setInterval(updateCurrentTime, 1000);
        updateCurrentTime(); // ហៅឱ្យដំណើរការភ្លាមៗពេលបើក page


        // ២. ដំណើរការម៉ោងរាប់ថយក្រោយ (ឧបមាថាថយក្រោយរយៈពេល ៥ នាទីរហូត)
        let countdownTime = 5 * 60; // ៥ នាទីគិតជាវិនាទី
        function updateCountdown() {
            let minutes = Math.floor(countdownTime / 60);
            let seconds = countdownTime % 60;

            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            document.getElementById('countdown').innerText = `${minutes}:${seconds}`;

            if (countdownTime <= 0) {
                countdownTime = 5 * 60; // រាប់សារជាថ្មីពេលអស់ម៉ោង
            } else {
                countdownTime--;
            }
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
