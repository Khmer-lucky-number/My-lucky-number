<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិក v4.1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Khmer OS', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            transition: background 0.5s ease;
        }

        body.light-mode {
            background: #f0f2f5;
        }

        body.light-mode .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: none;
            border: 1px solid rgba(0,0,0,0.1);
        }

        body.light-mode h2,
        body.light-mode .card h3,
        body.light-mode .list-item .info .name,
        body.light-mode .clock-display .time-part,
        body.light-mode .clock-display .date-part {
            color: #1a1a2e;
        }

        body.light-mode p,
        body.light-mode .clock-display {
            color: rgba(0,0,0,0.6);
        }

        body.light-mode .card {
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.08);
        }

        body.light-mode input, 
        body.light-mode select, 
        body.light-mode textarea {
            background: rgba(0,0,0,0.05);
            color: #1a1a2e;
            border-color: rgba(0,0,0,0.1);
        }

        body.light-mode .list-item {
            background: rgba(0,0,0,0.04);
            border-left-color: #667eea;
        }

        body.light-mode .role-card {
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.08);
        }

        body.light-mode .role-card:hover {
            background: rgba(0,0,0,0.08);
        }

        body.light-mode .footer-info {
            background: rgba(0,0,0,0.03);
            border-color: rgba(0,0,0,0.05);
        }

        body.light-mode .footer-info .role-desc {
            background: rgba(0,0,0,0.03);
            border-left-color: #667eea;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 560px;
            max-height: 98vh;
            overflow-y: auto;
            animation: fadeInUp 0.6s ease-out;
            transition: all 0.3s ease;
        }

        .container::-webkit-scrollbar {
            width: 4px;
        }
        .container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.2); }
            50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.6); }
        }

        .animate-float {
            animation: pulse 2s ease-in-out infinite;
        }

        .animate-glow {
            animation: glow 2s ease-in-out infinite;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
            line-height: 1.6;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 5px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.15);
            transform: scale(1.01);
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 50px;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            padding-right: 45px;
        }

        .input-group .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: all 0.3s ease;
        }

        .input-group .toggle-pwd:hover {
            color: #fff;
            transform: translateY(-50%) scale(1.1);
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 3px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            color: #1a1a2e;
        }

        .btn-gold:hover {
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #48bb78, #38a169);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.3);
        }

        .btn-secondary:hover {
            box-shadow: 0 12px 35px rgba(72, 187, 120, 0.5);
        }

        .btn-danger {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            box-shadow: 0 8px 25px rgba(252, 129, 129, 0.3);
        }

        .btn-danger:hover {
            box-shadow: 0 12px 35px rgba(252, 129, 129, 0.5);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f6ad55, #ed8936);
            box-shadow: 0 8px 25px rgba(246, 173, 85, 0.3);
            color: #fff;
        }

        .btn-warning:hover {
            box-shadow: 0 12px 35px rgba(246, 173, 85, 0.5);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
            width: auto;
        }

        .btn-purple {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            box-shadow: 0 8px 25px rgba(159, 122, 234, 0.3);
        }

        .btn-purple:hover {
            box-shadow: 0 12px 35px rgba(159, 122, 234, 0.5);
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 16px;
            margin: 10px 0;
            text-align: left;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideInRight 0.5s ease-out;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
        }

        .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
        }

        .badge-purple {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            color: #fff;
        }

        .badge-green {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: #fff;
        }

        .badge-red {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            color: #fff;
        }

        .admin-panel {
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
        }

        .admin-panel h3 {
            color: #ffd700;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .top-bar .left-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .top-bar .right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .top-bar h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .back-link {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: translateX(-3px);
        }

        .clock-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .clock-display {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.06);
            padding: 3px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 6px;
            font-variant-numeric: tabular-nums;
            flex-wrap: wrap;
        }

        .clock-display .date-part {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            font-size: 10px;
        }

        .clock-display .time-part {
            color: #ffd700;
            font-weight: 700;
            font-size: 14px;
        }

        .clock-display .seconds {
            color: rgba(255, 215, 0, 0.4);
            font-size: 11px;
        }

        .btn-logout {
            background: rgba(252, 129, 129, 0.15);
            border: 1px solid rgba(252, 129, 129, 0.2);
            color: #fc8181;
            padding: 3px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(252, 129, 129, 0.25);
            transform: scale(1.05);
            border-color: #fc8181;
        }

        .role-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }

        .role-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideInLeft 0.5s ease-out;
        }

        .role-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-8px) scale(1.02);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .role-card .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }

        .role-card .title {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }

        .role-card .desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 2px;
        }

        .role-card.admin-card {
            border-color: rgba(255, 215, 0, 0.2);
        }

        .role-card.admin-card:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }

        .role-card.super-card {
            border-color: rgba(255, 215, 0, 0.1);
            background: rgba(255, 215, 0, 0.03);
        }

        .role-card.super-card:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        .footer-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-info h4 {
            color: rgba(255, 215, 0, 0.7);
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-info .role-desc {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 5px 0;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border-left: 3px solid #667eea;
            transition: all 0.3s ease;
        }

        .footer-info .role-desc:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .footer-info .role-desc .r-icon {
            font-size: 18px;
        }

        .footer-info .role-desc .r-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-info .role-desc .r-text strong {
            color: #fff;
        }

        .payment-section {
            margin: 12px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            animation: fadeIn 0.6s ease-out;
        }

        .payment-section h4 {
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bank-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }

        .bank-info .info-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 14px;
            border-radius: 10px;
            border-left: 3px solid #ffd700;
            transition: all 0.3s ease;
        }

        .bank-info .info-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .bank-info .info-item .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        .bank-info .info-item .value {
            font-size: 15px;
            color: #fff;
            font-weight: 600;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 2px dashed rgba(255, 215, 0, 0.15);
            min-height: 100px;
            margin: 10px 0;
            transition: all 0.3s ease;
        }

        .qr-container:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.05);
        }

        .qr-container img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .qr-container img:hover {
            transform: scale(1.05);
        }

        .qr-container .qr-placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
        }

        .file-upload {
            position: relative;
            padding: 15px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            margin: 5px 0;
        }

        .file-upload:hover {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.01);
        }

        .file-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload .upload-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        .file-upload .upload-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .file-upload .file-name {
            color: #48bb78;
            font-size: 12px;
            margin-top: 4px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 100px;
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .preview-image:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .amount-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0;
        }

        .amount-btn {
            padding: 6px 14px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 8px;
            color: #ffd700;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .amount-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
        }

        .amount-btn.active {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .list-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 10px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .list-item .info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex: 1;
            min-width: 100px;
        }

        .list-item .info .name {
            color: #fff;
            font-weight: 600;
        }

        .list-item .info .sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .list-item .info .id {
            font-size: 10px;
            color: rgba(255, 215, 0, 0.5);
        }

        .list-item .info .pwd {
            font-size: 11px;
            color: #48bb78;
        }

        .list-item .balance {
            color: #48bb78;
            font-weight: 600;
            font-size: 14px;
        }

        .list-item .actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .transaction-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 6px;
        }

        .transaction-list::-webkit-scrollbar {
            width: 4px;
        }

        .transaction-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
            flex-wrap: wrap;
            gap: 4px;
            transition: all 0.3s ease;
        }

        .transaction-item:hover {
            background: rgba(255,255,255,0.03);
            padding-left: 10px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin: 6px 0;
        }

        .summary-stats .summary-box {
            background: rgba(255, 255, 255, 0.04);
            padding: 6px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .summary-stats .summary-box:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.08);
        }

        .summary-stats .summary-box .number {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .summary-stats .summary-box .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-stats .summary-box .number.green {
            color: #48bb78;
        }

        .summary-stats .summary-box .number.red {
            color: #fc8181;
        }

        .summary-stats .summary-box .number.gold {

        .toast {

        .theme-toggle {

</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" title="ប្តូរពណ៌">🌓</button>

    <div id="modalOverlay">
        <div id="modalContent">
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="container" id="app">
        <div id="pageContent"></div>
    </div>

    <script>
        // ================================================================
        // DATA LAYER - ប្រើ var ជំនួស let
        // ================================================================

        var data = JSON.parse(localStorage.getItem('memberSystemData')) || {
            superAdmins: {},
            subAdmins: {},
            members: {},
            activityLogs: [],
            transactions: [],
            commissions: [],
            notifications: [],
            memberCounter: 0,
            adminCounter: 0,
            superAdminOTP: null,
            superAdminOTPTime: null,
            exchangeRate: 4000,
            systemName: 'ប្រព័ន្ធគ្រប់គ្រងសមាជិក'
        };

        function saveData() {
            localStorage.setItem('memberSystemData', JSON.stringify(data));
        }

        function generateMemberId() {
            data.memberCounter = data.memberCounter + 1;
            saveData();
            var num = data.memberCounter;
            var str = String(num);
            while (str.length < 4) str = '0' + str;
            return 'M-' + str;
        }

        function generateAdminId() {
            data.adminCounter = data.adminCounter + 1;
            saveData();
            var num = data.adminCounter;
            var str = String(num);
            while (str.length < 4) str = '0' + str;
            return 'A-' + str;
        }

        function generateOTP() {
            return String(Math.floor(100000 + Math.random() * 900000));
        }

        function getCurrentUser() {
            var user = localStorage.getItem('currentUser');
            if (user) {
                return JSON.parse(user);
            }
            return null;
        }

        function setCurrentUser(user) {
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
            } else {
                localStorage.removeItem('currentUser');
            }
        }

        function logoutUser() {
            showModal(`
                <div style="text-align:center;">
                    <div style="font-size:48px;margin-bottom:10px;">🚪</div>
                    <h3 style="color:#fff;margin-bottom:10px;">ចាកចេញ</h3>
                    <p style="color:rgba(255,255,255,0.6);">តើអ្នកចង់ចាកចេញមែនទេ?</p>
                    <div style="display:flex;gap:10px;margin-top:20px;">
                        <button onclick="hideModal(); setCurrentUser(null); renderPage('home');" class="btn btn-danger" style="flex:1;">✅ ចាកចេញ</button>
                        <button onclick="hideModal()" class="btn" style="flex:1;background:rgba(255,255,255,0.1);">❌ បោះបង់</button>
                    </div>
                </div>
            `);
        }

        function logActivity(adminId, adminName, action, actionType, target, amount, details) {
            var log = {
                id: 'LOG-' + String(data.activityLogs.length + 1).padStart(4, '0'),
                adminId: adminId || 'unknown',
                adminName: adminName || 'Unknown',
                action: action || 'unknown',
                actionType: actionType || 'general',
                target: target || null,
                amount: amount || null,
                timestamp: new Date().toISOString(),
                status: 'success',
                details: details || ''
            };
            data.activityLogs.unshift(log);
            if (data.activityLogs.length > 500) data.activityLogs = data.activityLogs.slice(0, 500);
            saveData();
            return log;
        }

        function createTransaction(type, memberPhone, adminId, amount, status, description, screenshot) {
            if (!data.transactions) data.transactions = [];
            var tx = {
                id: 'TX-' + String(data.transactions.length + 1).padStart(6, '0'),
                type: type,
                memberPhone: memberPhone,
                adminId: adminId || null,
                amount: amount || 0,
                status: status || 'pending',
                description: description || '',
                screenshot: screenshot || null,
                timestamp: new Date().toISOString()
            };
            data.transactions.unshift(tx);
            saveData();
            return tx;
        }

        function getMemberTransactions(phone) {
            if (!data.transactions) return [];
            var result = [];
            for (var i = 0; i < data.transactions.length; i++) {
                if (data.transactions[i].memberPhone === phone) {
                    result.push(data.transactions[i]);
                }
            }
            return result;
        }

        function calculateTotals(transactions) {
            var totalDeposits = 0, totalWithdraws = 0;
            for (var i = 0; i < transactions.length; i++) {
                var t = transactions[i];
                if (t.status === 'completed') {
                    if (t.type === 'deposit') totalDeposits += t.amount;
                    else if (t.type === 'withdraw') totalWithdraws += t.amount;
                }
            }
            return { totalDeposits: totalDeposits, totalWithdraws: totalWithdraws, netBalance: totalDeposits - totalWithdraws };
        }

        // ===== COMMISSION =====
        function calculateCommission(amount, rate) {
            return amount * (rate || 0.05);
        }

        function addCommission(memberPhone, transactionId, amount) {
            var member = data.members[memberPhone];
            if (!member) return null;
            var rate = member.commissionRate || 0.05;
            var commission = calculateCommission(amount, rate);
            if (commission <= 0) return null;
            member.totalCommission = (member.totalCommission || 0) + commission;
            var commRecord = {
                id: 'C-' + String(data.commissions.length + 1).padStart(4, '0'),
                memberPhone: memberPhone,
                transactionId: transactionId,
                amount: amount,
                commission: commission,
                rate: rate,
                timestamp: new Date().toISOString(),
                status: 'pending'
            };
            data.commissions.push(commRecord);
            saveData();
            return commRecord;
        }

        function approveCommission(commId) {
            var comm = null;
            for (var i = 0; i < data.commissions.length; i++) {
                if (data.commissions[i].id === commId) {
                    comm = data.commissions[i];
                    break;
                }
            }
            if (!comm) return false;
            comm.status = 'approved';
            var member = data.members[comm.memberPhone];
            if (member) {
                member.balance += comm.commission;
                member.benefits.push('💰 បានទទួលកម្រៃ $' + comm.commission.toFixed(2) + ' ពីប្រតិបត្តិការ ' + comm.transactionId);
            }
            saveData();
            return true;
        }

        // ===== CURRENCY =====
        function formatCurrency(amount, currency) {
            if (currency === 'riel') {
                var riel = Math.round(amount * (data.exchangeRate || 4000));
                return riel.toLocaleString('km-KH') + ' ៛';
            }
            return '$' + amount.toFixed(2);
        }

        function convertToRiel(usd) {
            return usd * (data.exchangeRate || 4000);
        }

        function convertToUSD(riel) {
            return riel / (data.exchangeRate || 4000);
        }

        // ===== NOTIFICATION =====
        function sendNotification(type, recipient, message) {
            if (!data.notifications) data.notifications = [];
            data.notifications.push({
                id: 'N-' + String(data.notifications.length + 1).padStart(4, '0'),
                type: type,
                recipient: recipient,
                message: message,
                read: false,
                timestamp: new Date().toISOString()
            });
            saveData();
            showToast(message, 'info');
            console.log('📨 [' + type + '] ទៅ ' + recipient + ': ' + message);
        }

        function showToast(message, type) {
            var existing = document.querySelector('.toast');
            if (existing) existing.remove();
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100px)';
                setTimeout(function() { toast.remove(); }, 500);
            }, 4000);
        }

        // ===== CAPTCHA =====
        var currentCaptcha = '';

        function generateCaptcha() {
            var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            var result = '';
            for (var i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = result;
            return result;
        }

        function refreshCaptcha() {
            var captchaText = document.getElementById('captchaText');
            if (captchaText) {
                captchaText.textContent = generateCaptcha();
            }
        }

        function verifyCaptcha() {
            var input = document.getElementById('captchaInput');
            if (!input) return true;
            return input.value.toUpperCase() === currentCaptcha;
        }

        // ===== EXPORT TO EXCEL =====
        function exportToExcel() {
            try {
                var csvRows = [];
                csvRows.push(['លេខរៀង', 'ឈ្មោះ', 'លេខទូរសព្ទ', 'ID', 'សមតុល្យ', 'រូបិយប័ណ្ណ', 'កម្រៃសរុប', 'អត្ថប្រយោជន៍', 'កាលបរិច្ឆេទបង្កើត']);
                
                var memberKeys = Object.keys(data.members);
                for (var i = 0; i < memberKeys.length; i++) {
                    var m = data.members[memberKeys[i]];
                    csvRows.push([
                        i + 1,
                        m.username || '',
                        m.phone || '',
                        m.id || '',
                        m.balance || 0,
                        m.preferredCurrency || 'usd',
                        m.totalCommission || 0,
                        (m.benefits || []).join('; '),
                        m.createdAt ? new Date(m.createdAt).toLocaleDateString('km-KH') : ''
                    ]);
                }
                
                csvRows.push([]);
                csvRows.push(['=== ប្រវត្តិប្រតិបត្តិការ ===']);
                csvRows.push(['លេខប្រតិបត្តិការ', 'ប្រភេទ', 'សមាជិក', 'ចំនួន', 'ស្ថានភាព', 'កាលបរិច្ឆេទ']);
                
                var txList = data.transactions || [];
                for (var j = 0; j < txList.length; j++) {
                    var tx = txList[j];
                    var member = data.members[tx.memberPhone];
                    csvRows.push([
                        tx.id || '',
                        tx.type || '',
                        member ? member.username || member.phone : tx.memberPhone || '',
                        tx.amount || 0,
                        tx.status || '',
                        tx.timestamp ? new Date(tx.timestamp).toLocaleString('km-KH') : ''
                    ]);
                }
                
                csvRows.push([]);
                csvRows.push(['=== Sub Admins ===']);
                csvRows.push(['ឈ្មោះ', 'លេខទូរសព្ទ', 'ID', 'សមតុល្យ', 'បានទទួល', 'បានផ្ទេរ', 'ចំនួនសមាជិក']);
                
                var adminList = Object.values(data.subAdmins);
                for (var k = 0; k < adminList.length; k++) {
                    var a = adminList[k];
                    csvRows.push([
                        a.username || '',
                        a.phone || '',
                        a.id || '',
                        a.balance || 0,
                        a.totalReceived || 0,
                        a.totalTransferred || 0,
                        Object.keys(data.members).length
                    ]);
                }
                
                var csvString = '';
                for (var r = 0; r < csvRows.length; r++) {
                    var row = csvRows[r];
                    var rowStr = '';
                    for (var c = 0; c < row.length; c++) {
                        var cell = row[c];
                        if (typeof cell === 'string' && (cell.indexOf(',') !== -1 || cell.indexOf('"') !== -1 || cell.indexOf('\n') !== -1)) {
                            cell = '"' + cell.replace(/"/g, '""') + '"';
                        }
                        if (c > 0) rowStr += ',';
                        rowStr += cell;
                    }
                    csvString += rowStr + '\n';
                }
                
                var blob = new Blob(['\uFEFF' + csvString], { type: 'text/csv;charset=utf-8;' });
                var link = document.createElement('a');
                var url = URL.createObjectURL(blob);
                link.href = url;
                link.download = 'របាយការណ៍_' + new Date().toISOString().slice(0,10) + '.csv';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast('📤 នាំចេញរបាយការណ៍ជោគជ័យ!', 'success');
            } catch (err) {
                showToast('កំហុសក្នុងការនាំចេញ!', 'error');
                console.error(err);
            }
        }

        // ===== EDIT BALANCE =====
        function editBalance(type, phone) {
            var entity;
            var entityName;
            var isMember = type === 'member';
            if (isMember) {
                entity = data.members[phone];
                if (!entity) { showToast('មិនឃើញសមាជិក!', 'error'); return; }
                entityName = entity.username || entity.phone;
            } else {
                entity = data.subAdmins[phone];
                if (!entity) { showToast('មិនឃើញ Sub Admin!', 'error'); return; }
                entityName = entity.username;
            }

            showModal(`
                <div style="text-align:center;">
                    <h3 style="color:#ffd700;margin-bottom:15px;">✏️ កែសម្រួលទឹកប្រាក់</h3>
                    <p style="color:rgba(255,255,255,0.6);">${isMember ? 'សមាជិក' : 'Sub Admin'}: <strong>${entityName}</strong></p>
                    <p style="color:rgba(255,255,255,0.4);font-size:12px;">បច្ចុប្បន្ន: ${formatCurrency(entity.balance, entity.preferredCurrency || 'usd')}</p>
                    <form id="editBalanceForm">
                        <input type="hidden" id="editBalanceType" value="${type}">
                        <input type="hidden" id="editBalancePhone" value="${phone}">
                        <select id="editBalanceAction" style="width:100%;padding:10px;border-radius:10px;background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.1);">
                            <option value="add">➕ បញ្ចូល</option>
                            <option value="subtract">➖ ដក</option>
                            <option value="set">🎯 កំណត់តម្លៃថ្មី</option>
                        </select>
                        <input type="number" id="editBalanceAmount" placeholder="💰 ចំនួនប្រាក់" min="0" step="0.01" required>
                        <select id="editBalanceCurrency" style="width:100%;padding:10px;border-radius:10px;background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.1);">
                            <option value="usd">$ USD</option>
                            <option value="riel">៛ Riel</option>
                        </select>
                        <textarea id="editBalanceReason" placeholder="📝 មូលហេតុ (ស្រេចចិត្ត)" rows="2"></textarea>
                        <div style="display:flex;gap:10px;margin-top:15px;">
                            <button type="submit" class="btn btn-gold" style="flex:1;">💾 រក្សាទុក</button>
                            <button onclick="hideModal()" class="btn" style="flex:1;background:rgba(255,255,255,0.1);">❌ បោះបង់</button>
                        </div>
                    </form>
                    <div id="editBalanceMessage"></div>
                </div>
            `);

            document.getElementById('editBalanceForm').addEventListener('submit', function(e) {
                e.preventDefault();
                var type = document.getElementById('editBalanceType').value;
                var phone = document.getElementById('editBalancePhone').value;
                var action = document.getElementById('editBalanceAction').value;
                var amount = parseFloat(document.getElementById('editBalanceAmount').value);
                var currency = document.getElementById('editBalanceCurrency').value;
                var reason = document.getElementById('editBalanceReason').value.trim();
                var msg = document.getElementById('editBalanceMessage');

                if (!amount || amount <= 0) {
                    msg.innerHTML = '<div class="error">សូមបញ្ចូលចំនួនត្រឹមត្រូវ!</div>';
                    return;
                }

                var amountUSD = amount;
                if (currency === 'riel') {
                    amountUSD = convertToUSD(amount);
                }

                var entity;
                var entityName;
                var isMember = type === 'member';
                if (isMember) {
                    entity = data.members[phone];
                } else {
                    entity = data.subAdmins[phone];
                }

                if (!entity) {
                    msg.innerHTML = '<div class="error">មិនឃើញ ' + (isMember ? 'សមាជិក' : 'Sub Admin') + '!</div>';
                    return;
                }

                var oldBalance = entity.balance;
                var newBalance = oldBalance;

                if (action === 'add') {
                    newBalance = oldBalance + amountUSD;
                } else if (action === 'subtract') {
                    if (amountUSD > oldBalance) {
                        msg.innerHTML = '<div class="error">មិនគ្រប់គ្រាន់! (នៅសល់ ' + formatCurrency(oldBalance, entity.preferredCurrency || 'usd') + ')</div>';
                        return;
                    }
                    newBalance = oldBalance - amountUSD;
                } else if (action === 'set') {
                    newBalance = amountUSD;
                }

                entity.balance = newBalance;

                var adminUser = getCurrentUser();
                var adminId = adminUser ? adminUser.phone : 'unknown';
                var adminName = adminUser ? adminUser.name : 'Unknown';

                logActivity(
                    adminId,
                    adminName,
                    action === 'add' ? 'balance_add' : action === 'subtract' ? 'balance_subtract' : 'balance_set',
                    'financial',
                    phone,
                    amountUSD,
                    (isMember ? 'សមាជិក' : 'Sub Admin') + ' ' + entityName + ': ' + action + ' ' + formatCurrency(amountUSD, entity.preferredCurrency || 'usd') + (reason ? ' (' + reason + ')' : '')

                if (isMember) {
                    var actionText = action === 'add' ? 'បញ្ចូល' : action === 'subtract' ? 'ដក' : 'កំណត់';
                    entity.benefits.push('💰 ' + actionText + ' ' + formatCurrency(amountUSD, entity.preferredCurrency || 'usd') + (reason ? ' - ' + reason : ''));

                saveData();
                msg.innerHTML = '<div class="success">✅ កែសម្រួលជោគជ័យ!<br>ចាស់: ' + formatCurrency(oldBalance, entity.preferredCurrency || 'usd') + '<br>ថ្មី: ' + formatCurrency(newBalance, entity.preferredCurrency || 'usd') + '</div>';

                setTimeout(function() {

        // ===== CLOCK =====
        var clockInterval = null;

        function startClock() {
            if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }

            function updateClock() {
                var now = new Date();
                var days = ['អាទិត្យ', 'ចន្ទ', 'អង្គារ', 'ពុធ', 'ព្រហស្បតិ៍', 'សុក្រ', 'សៅរ៍'];
                var dayName = days[now.getDay()];
                var dateStr = now.getDate().toString().padStart(2, '0');
                var monthStr = (now.getMonth() + 1).toString().padStart(2, '0');
                var yearStr = now.getFullYear();
                var fullDate = dayName + ' ' + dateStr + '/' + monthStr + '/' + yearStr;
                var hours = now.getHours().toString().padStart(2, '0');
                var minutes = now.getMinutes().toString().padStart(2, '0');
                var seconds = now.getSeconds().toString().padStart(2, '0');

                var dateEl = document.getElementById('clockDate');
                var timeEl = document.getElementById('clockTime');
                var secEl = document.getElementById('clockSeconds');
                if (dateEl) dateEl.textContent = fullDate;
                if (timeEl) timeEl.textContent = hours + ':' + minutes;
                if (secEl) secEl.textContent = seconds;
            }
            updateClock();
            clockInterval = setInterval(updateClock, 1000);
        }

        // ===== MODAL =====
        function showModal(html, options) {
            var overlay = document.getElementById('modalOverlay');
            var body = document.getElementById('modalBody');
            var content = document.getElementById('modalContent');

            body.innerHTML = html;
            overlay.style.display = 'flex';

            setTimeout(function() {
                content.classList.add('show');
            }, 10);

            if (options && options.closeOnOverlay !== false) {
                overlay.onclick = function(e) {
                    if (e.target === overlay) hideModal();
                };
            }

            document.addEventListener('keydown', function handler(e) {
                if (e.key === 'Escape') {
                    hideModal();
                    document.removeEventListener('keydown', handler);
                }
            });
        }

        function hideModal() {
            var overlay = document.getElementById('modalOverlay');
            var content = document.getElementById('modalContent');
            content.classList.remove('show');
            setTimeout(function() {
                overlay.style.display = 'none';
            }, 300);
        }

        // ===== THEME =====
        function toggleTheme() {
            document.body.classList.toggle('light-mode');

        // ================================================================
        // PAYMENT FUNCTIONS
        // ================================================================

        function selectAmount(amount) {
            var input = document.getElementById('withdrawAmount');
            if (input) {
                input.value = amount;
                var btns = document.querySelectorAll('.amount-btn');
                for (var i = 0; i < btns.length; i++) {
                    btns[i].classList.remove('active');
                    if (btns[i].textContent.trim() === '$' + amount) {
                        btns[i].classList.add('active');
                    }
                }
            }
        }

        function handleDepositQRUpload(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var fileName = document.getElementById('depositFileName');
                if (fileName) fileName.textContent = '✅ ' + file.name;
                var preview = document.getElementById('depositQRPreview');
                if (preview) preview.innerHTML = '<img src="' + e.target.result + '" class="preview-image" alt="Deposit">';
                var qrInput = document.getElementById('depositQRInput');
                if (qrInput) qrInput.dataset.qrData = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleWithdrawQRUpload(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var fileName = document.getElementById('withdrawFileName');
                if (fileName) fileName.textContent = '✅ ' + file.name;
                var preview = document.getElementById('withdrawQRPreview');
                if (preview) preview.innerHTML = '<img src="' + e.target.result + '" class="preview-image" alt="Withdraw QR">';
                var qrInput = document.getElementById('withdrawQRInput');
                if (qrInput) qrInput.dataset.qrData = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleAdminQRUpload(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var fileName = document.getElementById('qrAdminFileName');
                if (fileName) fileName.textContent = '✅ ' + file.name;
                var preview = document.getElementById('qrAdminPreview');
                if (preview) preview.innerHTML = '<img src="' + e.target.result + '" class="preview-image" alt="Admin QR">';
                var qrInput = document.getElementById('qrAdminInput');
                if (qrInput) qrInput.dataset.qrData = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function showDepositConfirm() {
            var amountInput = document.getElementById('depositAmount');
            var currencySelect = document.getElementById('depositCurrency');
            var amount = amountInput ? parseFloat(amountInput.value) : 0;
            var currency = currencySelect ? currencySelect.value : 'usd';
            var qrInput = document.getElementById('depositQRInput');
            var hasScreenshot = qrInput && qrInput.dataset.qrData;

            if (!amount || amount <= 0) {
                showModal(`
                    <div style="text-align:center;">
                        <div style="font-size:48px;margin-bottom:10px;">⚠️</div>
                        <h3 style="color:#fff;margin-bottom:10px;">កំហុស!</h3>
                        <p style="color:rgba(255,255,255,0.6);">សូមបញ្ចូលចំនួនប្រាក់ដែលអ្នកបានផ្ទេរ!</p>
                        <button onclick="hideModal()" class="btn" style="margin-top:15px;">យល់ព្រម</button>
                    </div>
                `);
                return;
            }

            if (!hasScreenshot) {
                showModal(`
                    <div style="text-align:center;">
                        <div style="font-size:48px;margin-bottom:10px;">⚠️</div>
                        <h3 style="color:#fff;margin-bottom:10px;">ត្រូវការរូបភាព!</h3>
                        <p style="color:rgba(255,255,255,0.6);">សូមបញ្ចូលរូបភាពថតអេក្រង់បន្ទាប់ពីផ្ទេរប្រាក់រួច!</p>
                        <button onclick="hideModal()" class="btn" style="margin-top:15px;">យល់ព្រម</button>
                    </div>
                `);
                return;
            }

            var amountUSD = amount;
            if (currency === 'riel') {
                amountUSD = convertToUSD(amount);
            }

            var user = getCurrentUser();
            var member = user ? data.members[user.phone] : null;
            var preferredCurrency = member ? member.preferredCurrency || 'usd' : 'usd';

            showModal(`
                <div style="text-align:center;">
                    <div style="font-size:48px;margin-bottom:10px;">💳</div>
                    <h3 style="color:#fff;margin-bottom:10px;">បញ្ជាក់ការដាក់ប្រាក់</h3>
                    <p style="color:rgba(255,255,255,0.6);margin-bottom:5px;">អ្នកបានផ្ទេរប្រាក់</p>
                    <p style="font-size:32px;font-weight:700;color:#ffd700;margin:10px 0;">${formatCurrency(amountUSD, preferredCurrency)}</p>
                    <div style="display:flex;gap:10px;margin-top:20px;">
                        <button onclick="hideModal(); confirmDeposit(${amountUSD});" class="btn btn-gold" style="flex:1;">✅ បញ្ជាក់</button>
                        <button onclick="hideModal()" class="btn" style="flex:1;background:rgba(255,255,255,0.1);">❌ បោះបង់</button>
                    </div>
                </div>
            `);
        }

        function confirmDeposit(amount) {
            var user = getCurrentUser();
            if (user) {
                var member = data.members[user.phone];
                if (member) {
                    var qrInput = document.getElementById('depositQRInput');
                    var tx = createTransaction(
                        'deposit',
                        member.phone,
                        null,
                        amount,
                        'pending',
                        'ស្នើដាក់ប្រាក់ $' + amount.toFixed(2),
                        qrInput.dataset.qrData
                    );

                    logActivity(member.id || 'member', member.username || member.phone, 'deposit_request', 'financial', null, amount,
                        'ស្នើដាក់ប្រាក់ $' + amount.toFixed(2) + ' (TX: ' + tx.id + ')');

                    sendNotification('email', member.phone + '@example.com', 
                        'សំណើដាក់ប្រាក់ $' + amount.toFixed(2) + ' ត្រូវបានផ្ញើរួច! TX: ' + tx.id);

                    showModal(`
                        <div style="text-align:center;">
                            <div style="font-size:48px;margin-bottom:10px;">✅</div>
                            <h3 style="color:#48bb78;margin-bottom:10px;">ជោគជ័យ!</h3>
                            <p style="color:rgba(255,255,255,0.6);">សំណើរដាក់ប្រាក់ ${formatCurrency(amount, member.preferredCurrency || 'usd')} របស់អ្នកត្រូវបានផ្ញើរួច!</p>
                            <p style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:5px;">លេខប្រតិបត្តិការ: ${tx.id}</p>
                            <button onclick="hideModal(); renderPage('dashboard');" class="btn" style="margin-top:15px;">ទៅកាន់ Dashboard</button>
                        </div>
                    `);

                    document.getElementById('depositQRInput').value = '';
                    document.getElementById('depositFileName').textContent = '';
                    document.getElementById('depositQRPreview').innerHTML = '';
                    if (qrInput) qrInput.dataset.qrData = '';
                    if (document.getElementById('depositAmount')) document.getElementById('depositAmount').value = '';
                }
            }
        }

        function submitWithdraw() {
            var name = document.getElementById('withdrawName').value.trim();
            var phone = document.getElementById('withdrawPhone').value.trim();
            var amount = parseFloat(document.getElementById('withdrawAmount').value);
            var currency = document.getElementById('withdrawCurrency').value;
            var qrInput = document.getElementById('withdrawQRInput');
            var hasQR = qrInput && qrInput.dataset.qrData;

            if (!name) { showToast('សូមបញ្ចូលឈ្មោះ!', 'error'); return; }
            if (!phone) { showToast('សូមបញ្ចូលលេខទូរសព្ទ!', 'error'); return; }
            if (!amount || amount <= 0) { showToast('សូមបញ្ចូលចំនួនប្រាក់ត្រឹមត្រូវ!', 'error'); return; }
            if (!hasQR) { showToast('សូមបញ្ចូលរូបភាព QR Code!', 'error'); return; }

            var amountUSD = amount;

            `);

        function confirmApprove(txId) {
            var tx = null;
            for (var i = 0; i < data.transactions.length; i++) {
                if (data.transactions[i].id === txId) {
                    tx = data.transactions[i];
                    break;
                }
            }
            if (!tx) { showToast('មិនឃើញប្រតិបត្តិការ!', 'error'); return; }

            tx.status = 'completed';

            var member = data.members[tx.memberPhone];
            if (member) {
                if (tx.type === 'deposit') {
                    member.balance += tx.amount;
                    member.benefits.push('💰 បានដាក់ប្រាក់ $' + tx.amount.toFixed(2) + ' នៅថ្ងៃ ' + new Date().toLocaleDateString('km-KH'));

                    var comm = addCommission(tx.memberPhone, tx.id, tx.amount);
                    if (comm) {
                        approveCommission(comm.id);
                    }

                } else if (tx.type === 'withdraw') {
                    member.balance -= tx.amount;
                    member.benefits.push('🏦 បានដកប្រាក់ $' + tx.amount.toFixed(2) + ' នៅថ្ងៃ ' + new Date().toLocaleDateString('km-KH'));
                }
            }

            saveData();

            var adminUser = getCurrentUser();
            if (adminUser) {
                var admin = data.subAdmins[adminUser.phone];
                if (admin) {
                    logActivity(admin.id, admin.username, 'approve_transaction', 'financial', tx.memberPhone, tx.amount,
                        'យល់ព្រមលើប្រតិបត្តិការ ' + tx.id + ' ($' + tx.amount.toFixed(2) + ')');
                }
            }

            sendNotification('email', tx.memberPhone + '@example.com',
                'ប្រតិបត្តិការ ' + tx.id + ' ត្រូវបានអនុម័ត! ចំនួន: $' + tx.amount.toFixed(2));

            showToast('✅ ប្រតិបត្តិការត្រូវបានយល់ព្រម!', 'success');
            renderPage('admin-dashboard');
        }

        function searchMembersLive(query) {
            var container = document.getElementById('memberListContainer');

                renderMemberList();
                return;

            var members = Object.values(data.members);
            var filtered = [];
            for (var i = 0; i < members.length; i++) {
                var m = members[i];
                if ((m.username && m.username.toLowerCase().indexOf(q) !== -1) ||
                    m.phone.indexOf(q) !== -1 ||
                    m.id.toLowerCase().indexOf(q) !== -1) {
                    filtered.push(m);

        function generateReport(period) {
            var now = new Date();
            var startDate = new Date();

            if (period === 'daily') {
                startDate.setHours(0, 0, 0, 0);
            } else if (period === 'weekly') {
                startDate.setDate(now.getDate() - 7);
            } else if (period === 'monthly') {
                startDate.setMonth(now.getMonth() - 1);
            }

            var filtered = [];
            for (var i = 0; i < data.transactions.length; i++) {
                var t = data.transactions[i];
                if (new Date(t.timestamp) >= startDate &&
                    new Date(t.timestamp) <= now &&
                    t.status === 'completed') {
                    filtered.push(t);
                }
            }

            var totals = calculateTotals(filtered);
            var totalCommissions = 0;
            for (var j = 0; j < data.commissions.length; j++) {
                totalCommissions += data.commissions[j].commission;
            }

            return {
                period: period,
                startDate: startDate,
                endDate: now,
                transactions: filtered,
                totalDeposits: totals.totalDeposits,
                totalWithdraws: totals.totalWithdraws,
                netBalance: totals.netBalance,
                totalMembers: Object.keys(data.members).length,
                totalCommissions: totalCommissions
            };
        }

                    var msg = document.getElementById('message');

                    if (!phone || !password || !confirm) {
                        msg.innerHTML = '<div class="error">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }

                    if (!verifyCaptcha()) {
                        msg.innerHTML = '<div class="error">❌ Captcha មិនត្រឹមត្រូវ!</div>';
                        refreshCaptcha();
                        return;
                    }

                    if (!/^\d{9,}$/.test(phone)) {
                        msg.innerHTML = '<div class="error">លេខទូរសព្ទមិនត្រឹមត្រូវ!</div>';
                        return;
                    }
                    if (password !== confirm) {
                        msg.innerHTML = '<div class="error">ពាក្យសម្ងាត់មិនដូចគ្នា!</div>';
                        return;
                    }
                    if (data.members[phone]) {
                        msg.innerHTML = '<div class="error">លេខទូរសព្ទមានរួចហើយ!</div>';
                        return;
                    }

                    var admin = Object.values(data.subAdmins)[0];
                    var adminId = admin ? admin.id : null;
                    if (admin && admin.members.indexOf(phone) === -1) {
                        admin.members.push(phone);
                    }

                    var newId = generateMemberId();
                    data.members[phone] = {
                        username: username || phone,
                        password: password,
                        phone: phone,
                        id: newId,
                        role: 'member',
                        balance: 0,
                        benefits: ['✨ សមាជិកថ្មី'],
                        adminId: adminId,
                        preferredCurrency: preferredCurrency || 'usd',
                        createdAt: new Date().toISOString(),
                        commissionRate: 0.05,
                        totalCommission: 0
                    };
                    saveData();

                    setCurrentUser({
                        phone: phone,
                        role: 'member',
                        name: username || phone,
                        preferredCurrency: preferredCurrency || 'usd'
                    });

                    msg.innerHTML = `
                        <div class="success">
                            ✅ ចុះឈ្មោះជោគជ័យ!<br>
                            🆔 ${newId}<br>
                            📱 ${phone}<br>
                            🔑 ${password}<br>
                            <span style="color:#ffd700;">⚠️ សូមចំណាំលេខទូរសព្ទ និងពាក្យសម្ងាត់សម្រាប់ចូលប្រើនៅពេលក្រោយ!</span>
                        </div>
                    `;
                    registerForm.reset();

                    sendNotification('email', phone + '@example.com',
                        'ស្វាគមន៍ ' + (username || phone) + '! អ្នកបានចុះឈ្មោះជោគជ័យ។');

                    setTimeout(function() {
                        renderPage('dashboard');
                    }, 2000);
                });
            }

            // Create Admin
            var createAdminForm = document.getElementById('createAdminForm');
            if (createAdminForm) {
                createAdminForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var name = document.getElementById('newAdminName').value.trim();
                    var phone = document.getElementById('newAdminPhone').value.trim();
                    var password = document.getElementById('newAdminPassword').value.trim();
                    var msg = document.getElementById('createAdminMessage');

                    if (!name || !phone || !password) {
                        msg.innerHTML = '<div class="error">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }
                    if (!/^\d{9,}$/.test(phone)) {
                        msg.innerHTML = '<div class="error">លេខទូរសព្ទមិនត្រឹមត្រូវ!</div>';
                        return;
                    }
                    if (data.subAdmins[phone]) {
                        msg.innerHTML = '<div class="error">លេខទូរសព្ទមានរួចហើយ!</div>';
                        return;
                    }

                    var newId = generateAdminId();
                    data.subAdmins[phone] = {
                        username: name,
                        password: password,
                        phone: phone,
                        id: newId,
                        role: 'sub_admin',
                        balance: 0,
                        totalReceived: 0,
                        totalTransferred: 0,
                        members: Object.keys(data.members),
                        createdBy: 'super_admin',
                        createdAt: new Date().toISOString(),
                        commissionRate: 0.05,
                        bankName: '',
                        bankAccount: '',
                        qrCode: ''
                    };

                    // Update all members to use this admin
                    var memberKeys = Object.keys(data.members);
                    for (var i = 0; i < memberKeys.length; i++) {
                        data.members[memberKeys[i]].adminId = newId;
                    }

                    saveData();
                    logActivity('SUPER-001', 'Super Admin', 'create_admin', 'administration', phone, null, 'បង្កើត Sub Admin "' + name + '" (' + newId + ')');

                    sendNotification('email', phone + '@example.com',
                        'អ្នកត្រូវបានតែងតាំងជា Sub Admin! ឈ្មោះ: ' + name + ', ពាក្យសម្ងាត់: ' + password);

                    msg.innerHTML = '<div class="success">✅ បង្កើតជោគជ័យ! 🆔 ' + newId + '<br>🔒 ' + password + '</div>';
                    createAdminForm.reset();
                    setTimeout(function() { renderPage('super-dashboard'); }, 2000);
                });
            }

            // Transfer Money
            var transferForm = document.getElementById('transferForm');
            if (transferForm) {
                transferForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var user = getCurrentUser();
                    if (!user || user.role !== 'sub_admin') {
                        showToast('សូមចូលប្រើជា Sub Admin!', 'error');
                        return;
                    }

                    var admin = data.subAdmins[user.phone];
                    if (!admin) {
                        showToast('មិនឃើញព័ត៌មាន Admin!', 'error');
                        return;
                    }

                    var phone = document.getElementById('transferPhone').value;
                    var amount = parseFloat(document.getElementById('transferAmount').value);
                    var currency = document.getElementById('transferCurrency').value;
                    var msg = document.getElementById('transferMessage');

                    var amountUSD = amount;
                    if (currency === 'riel') {
                        amountUSD = convertToUSD(amount);
                    }

                    if (!amountUSD || amountUSD <= 0) {
                        msg.innerHTML = '<div class="error">សូមបញ្ចូលចំនួនត្រឹមត្រូវ!</div>';
                        return;
                    }
                    if (amountUSD > admin.balance) {
                        msg.innerHTML = '<div class="error">មិនគ្រប់គ្រាន់! (នៅសល់ $' + admin.balance.toFixed(2) + ')</div>';
                        return;
                    }

                    var member = data.members[phone];
                    if (!member) {
                        msg.innerHTML = '<div class="error">មិនឃើញសមាជិក!</div>';
                        return;
                    }

                    admin.balance -= amountUSD;
                    admin.totalTransferred = (admin.totalTransferred || 0) + amountUSD;
                    member.balance += amountUSD;
                    var date = new Date().toLocaleDateString('km-KH');
                    member.benefits.push('💰 បានទទួល $' + amountUSD.toFixed(2) + ' នៅថ្ងៃ ' + date);
                    if (admin.members.indexOf(phone) === -1) admin.members.push(phone);

                    saveData();
                    logActivity(admin.id, admin.username, 'member_transfer', 'financial', member.username || member.phone, amountUSD,
                        'ផ្ទេរ $' + amountUSD.toFixed(2) + ' ទៅ ' + (member.username || member.phone));

                    createTransaction(
                        'transfer',
                        member.phone,
                        admin.id,
                        amountUSD,
                        'completed',
                        'ផ្ទេរប្រាក់ $' + amountUSD.toFixed(2) + ' ពី ' + admin.username,
                        null
                    );

                    sendNotification('email', member.phone + '@example.com',
                        'អ្នកបានទទួលប្រាក់ $' + amountUSD.toFixed(2) + ' ពី ' + admin.username);

                    msg.innerHTML = `
                        <div class="success">
                            ✅ ផ្ទេរ $${amountUSD.toFixed(2)} ទៅ ${member.username || member.phone} ជោគជ័យ!<br>
                            💰 ប្រាក់ដែលនៅសល់: $${admin.balance.toFixed(2)}
                        </div>
                    `;
                    document.getElementById('transferAmount').value = '';
                    setTimeout(function() { renderPage('admin-dashboard'); }, 1500);
                });
            }

            // Bank Info
            var bankInfoForm = document.getElementById('bankInfoForm');
            if (bankInfoForm) {
                bankInfoForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    saveBankInfo();
                });
            }

            // Commission
            var commissionForm = document.getElementById('commissionForm');
            if (commissionForm) {
                commissionForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    saveCommissionSettings();
                });
            }

            // Exchange Rate
            var exchangeRateForm = document.getElementById('exchangeRateForm');
            if (exchangeRateForm) {
                exchangeRateForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    updateExchangeRate();
                });
            }
        }

        // ================================================================
        // INIT
        // ================================================================

        if (!data.superAdminExists) {
            data.superAdmins['066817407'] = {
                username: 'Super Admin',
                password: 'super123',
                phone: '066817407',
                email: 'narith128080@gmail.com',
                id: 'SUPER-001',
                role: 'super_admin',
                balance: 10000,
                createdAt: new Date().toISOString()
            };
            data.superAdminExists = true;
            saveData();
            logActivity('SUPER-001', 'Super Admin', 'system_init', 'system', null, null, 'បង្កើតប្រព័ន្ធ Super Admin');
        }

        var currentUser = getCurrentUser();
        if (currentUser) {
            if (currentUser.role === 'super_admin') renderPage('super-dashboard');
            else if (currentUser.role === 'sub_admin' && data.subAdmins[currentUser.phone]) renderPage('admin-dashboard');
            else if (currentUser.role === 'member' && data.members[currentUser.phone]) renderPage('dashboard');
            else { setCurrentUser(null); renderPage('home'); }
        } else {
            renderPage('home');
        }

        setInterval(function() {
            var pending = data.transactions ? data.transactions.filter(function(t) { return t.status === 'pending'; }) : [];
            if (pending.length > 0) {
                var badge = document.querySelector('.notification-badge');
                if (badge) {
                    badge.textContent = pending.length;
                    badge.style.display = pending.length > 0 ? 'block' : 'none';
                }
            }
        }, 10000);

        console.log('🚀 ប្រព័ន្ធគ្រប់គ្រងសមាជិក v4.1 បានដំណើរការ!');
        console.log('📊 ទិន្នន័យបច្ចុប្បន្ន:', data);
        console.log('👤 អ្នកប្រើបច្ចុប្បន្ន:', currentUser);
    </script>
</body>
</html>
