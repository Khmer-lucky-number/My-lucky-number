<body>

            © 2026 អាជីវករខ្មែរឆ្លាតវៃ — ប្រព័ន្ធគ្រប់គ្រងហិរញ្ញវត្ថុឆ្លាតវៃ

    <script>
        // ============================================================
        //  1. DATA LAYER
        // ============================================================
        const DB = {
            get(key, def) {
                try {
                    const raw = localStorage.getItem('ak_' + key);
                    return raw ? JSON.parse(raw) : def;
                } catch { return def; }
            },
            set(key, val) {
                localStorage.setItem('ak_' + key, JSON.stringify(val));
            },
            remove(key) {
                localStorage.removeItem('ak_' + key);
            },
            getUsers() { return this.get('users', []); },
            setUsers(u) { this.set('users', u); },
            getTx() { return this.get('tx', []); },
            setTx(t) { this.set('tx', t); },
            getWithdraws() { return this.get('withdraws', []); },
            setWithdraws(w) { this.set('withdraws', w); },
            getDeposits() { return this.get('deposits', []); },
            setDeposits(d) { this.set('deposits', d); },
            getRewards() { return this.get('rewards', []); },
            setRewards(r) { this.set('rewards', r); },
            getSession() { return this.get('session', null); },
            setSession(s) { this.set('session', s); },
            clearSession() { localStorage.removeItem('ak_session'); },
            getNextId() {
                let current = this.get('nextId', 1000);
                this.set('nextId', current + 1);
                return current;
            },
            resetAll() {
                const admin = this.getUsers().find(u => u.role === 'admin');
                this.remove('users');
                this.remove('tx');
                this.remove('withdraws');
                this.remove('deposits');
                this.remove('rewards');
                this.remove('nextId');
                this.remove('adminBankInfo');
                this.remove('session');
                if (admin) {
                    this.setUsers([admin]);
                }
            },
            deleteMember(phone) {
                let users = this.getUsers();
                users = users.filter(u => u.phone !== phone);
                this.setUsers(users);
                let tx = this.getTx();
                tx = tx.filter(t => t.phone !== phone);
                this.setTx(tx);
                let deposits = this.getDeposits();
                deposits = deposits.filter(d => d.phone !== phone);
                this.setDeposits(deposits);
                let withdraws = this.getWithdraws();
                withdraws = withdraws.filter(w => w.phone !== phone);
                this.setWithdraws(withdraws);
                let rewards = this.getRewards();
                rewards = rewards.filter(r => r.phone !== phone);
                this.setRewards(rewards);
            }
        };

        // ============================================================
        //  2. HELPERS
        // ============================================================
        function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

        function formatMoney(n) {
            if (n === undefined || n === null || isNaN(n)) return '0.00 ៛';
            if (n <= 0) return '0.00 ៛';
            return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',') + ' ៛';
        }

        function getDate() {
            return new Date().toLocaleString('km-KH', { timeZone: 'Asia/Phnom_Penh' });
        }

        // ============================================================
        //  2.1 TELEGRAM HELPERS - USING FETCH API WITH PROXY
        // ============================================================
        const DEPOSIT_BOT_TOKEN = '8364652665:AAESgPsrL-Q2D3ZYtLTN6IzdkQ1pLYnc5vw';
        const DEPOSIT_CHAT_ID = '-5410896989';
        const WITHDRAW_BOT_TOKEN = '8790558091:AAGwRivgCppOxQNgMdngSdC1u8U6mz6pwwc';
        const WITHDRAW_CHAT_ID = '-5338881653';

        // Send text message to Telegram using Fetch API with CORS handling
        async function sendToTelegram(botToken, chatId, message) {
            try {
                console.log('📤 Sending to Telegram: chat=' + chatId);
                
                // Try using fetch directly
                const url = 'https://api.telegram.org/bot' + botToken + '/sendMessage';
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });

                if (!response.ok) {
                    console.error('❌ HTTP error:', response.status);
                    return false;
                }

                const data = await response.json();
                if (data.ok) {
                    console.log('✅ Telegram sent successfully');
                    return true;
                } else {
                    console.error('❌ Telegram error:', data.description);
                    return false;
                }
            } catch (err) {
                console.error('❌ Telegram send error:', err);
                // Try alternative method using XMLHttpRequest as fallback
                return await sendToTelegramXHR(botToken, chatId, message);
            }
        }

        // Fallback: Send using XMLHttpRequest
        function sendToTelegramXHR(botToken, chatId, message) {
            return new Promise((resolve) => {
                try {
                    const url = 'https://api.telegram.org/bot' + botToken + '/sendMessage';
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', url, true);
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    xhr.timeout = 30000;
                    xhr.onload = function() {
                        if (xhr.status === 200) {
                            try {
                                const response = JSON.parse(xhr.responseText);
                                resolve(response.ok || false);
                            } catch (e) {
                                resolve(false);
                            }
                        } else {
                            resolve(false);
                        }
                    };
                    xhr.onerror = function() { resolve(false); };
                    xhr.ontimeout = function() { resolve(false); };
                    xhr.send(JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    }));
                } catch (err) {
                    console.error('XHR error:', err);
                    resolve(false);
                }
            });

        // Send photo to Telegram
        async function sendPhotoToTelegram(botToken, chatId, photoBase64, caption) {
            try {
                console.log('📤 Sending photo to Telegram');
                
                // Convert base64 to blob
                const byteString = atob(photoBase64.split(',')[1]);
                const mimeString = photoBase64.split(',')[0].split(':')[1].split(';')[0];
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                for (let i = 0; i < byteString.length; i++) {
                    ia[i] = byteString.charCodeAt(i);
                }
                const blob = new Blob([ab], { type: mimeString });
                
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'screenshot.jpg');
                formData.append('caption', caption);
                formData.append('parse_mode', 'HTML');

                const response = await fetch('https://api.telegram.org/bot' + botToken + '/sendPhoto', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    console.error('❌ HTTP error:', response.status);
                    return false;
                }

                const data = await response.json();
                if (data.ok) {
                    console.log('✅ Photo sent successfully');
                    return true;
                } else {
                    console.error('❌ Photo error:', data.description);
                    return false;
                }
            } catch (err) {
                console.error('❌ Photo send error:', err);
                return false;
            }
        }

        // ============================================================
        function registerUser(phone, name, password, memberId) {
            var users = DB.getUsers();
            if (users.find(function(u) { return u.phone === phone; })) return { ok: false, msg: 'លេខទូរសព្ទមានរួចហើយ!' };
            if (users.find(function(u) { return u.memberId === parseInt(memberId); })) return { ok: false, msg: 'លេខ ID នេះមានរួចហើយ!' };
            users.push({ 
                phone: phone, 
                name: name, 
                password: password, 
                balance: 0, 
                status: 'active', 
                role: 'user',
                memberId: parseInt(memberId)
            });
            DB.setUsers(users);
            return { ok: true, memberId: memberId };
        }

        function loginUser(phone, password) {
            var users = DB.getUsers();
            var u = users.find(function(u) { return u.phone === phone && u.password === password; });
            if (!u) return { ok: false, msg: 'លេខទូរសព្ទ ឬ ពាក្យសម្ងាត់មិនត្រឹមត្រូវ' };
            if (u.status === 'suspended') return { ok: false, msg: 'គណនីត្រូវបានផ្អាក!' };
            DB.setSession({ phone: u.phone, name: u.name, role: u.role || 'user' });
            return { ok: true };
        }

        function getCurrentUser() {
            var sess = DB.getSession();
            if (!sess) return null;
            var users = DB.getUsers();
            return users.find(function(u) { return u.phone === sess.phone; }) || null;
        }

        function logout() {
            DB.clearSession();
            renderPage('login');
        }

        //  6. TRANSACTIONS - FIXED: Proper admin balance update
        // ============================================================
        function addTransaction(phone, type, amount, note, account) {
            note = note || '';
            account = account || '';
            
            var tx = DB.getTx();
            tx.push({
                id: genId(),
                phone: phone,
                type: type,
                amount: amount,
                status: 'completed',
                date: getDate(),
                note: note,
                account: account
            });
            DB.setTx(tx);
            
            var users = DB.getUsers();
            var u = users.find(function(u) { return u.phone === phone; });
            var admin = users.find(function(u) { return u.role === 'admin'; });
            
            if (u) {
                if (type === 'deposit') {
                    u.balance += amount;
                } else if (type === 'withdraw') {
                    u.balance -= amount;
                }
                DB.setUsers(users);
            }
            
            // Update admin balance
            if (admin) {
                if (type === 'deposit') {
                    admin.balance += amount;
                } else if (type === 'withdraw') {
                    admin.balance -= amount;
                }
                DB.setUsers(users);
            }
        }

                    showToast('សូមបញ្ចូលចំនួនទឹកប្រាក់ឲ្យបានត្រឹមត្រូវ!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-gift mr-2"></i> ផ្ដល់ប្រាក់រង្វាន់';
                    return;
                }

                var users = DB.getUsers();
                var admin = users.find(function(u) { return u.role === 'admin'; });
                var member = users.find(function(u) { return u.phone === phone; });

                if (!member) {
                    showToast('មិនរកឃើញសមាជិក!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-gift mr-2"></i> ផ្ដល់ប្រាក់រង្វាន់';
                    return;
                }

                if (admin.balance < amount) {
                    showToast('❌ សមតុល្យ Admin មិនគ្រប់គ្រាន់!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-gift mr-2"></i> ផ្ដល់ប្រាក់រង្វាន់';
                    return;
                }

                admin.balance -= amount;
                member.balance += amount;
                DB.setUsers(users);
                
                var rewards = DB.getRewards();
                rewards.push({
                    id: genId(),
                    phone: member.phone,
                    name: member.name,
                    amount: amount,
                    note: note,
                    date: getDate()
                });
                DB.setRewards(rewards);
                
                addTransaction(member.phone, 'deposit', amount, 'ប្រាក់រង្វាន់: ' + note);

                var depositData = {
                    name: member.name,
                    memberId: member.memberId,
                    phone: member.phone,
                    bank: 'ប្រាក់រង្វាន់',
                    sender: 'Admin',
                    amount: amount,
                    note: note,
                    date: getDate()
                };
                await sendDepositTelegram(depositData, null);

                showToast('✅ បានផ្ដល់ប្រាក់រង្វាន់ ' + formatMoney(amount) + ' ដល់ ' + member.name, 'success');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-gift mr-2"></i> ផ្ដល់ប្រាក់រង្វាន់';
                renderPage('adminReward');
            };
        }

        // ============================================================
        //  21. PAGE: ADMIN INCOME
        // ============================================================
        function renderAdminIncome(container, user) {
            if (!user || user.role !== 'admin') { renderPage('login'); return; }
            var allUsers = DB.getUsers().filter(function(u) { return u.role !== 'admin'; });

            container.innerHTML = '\n            <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow p-6">\n                <div class="page-header">\n                    <h2><i class="fas fa-hand-holding-usd text-blue-500 mr-2"></i>ផ្ដល់ប្រាក់ចំណូល</h2>\n                    <button onclick="renderPage(\'admin\')" class="back-btn"><i class="fas fa-arrow-left"></i> ត្រឡប់</button>\n                </div>\n                <p class="text-gray-500 text-sm mb-4">សូមបំពេញព័ត៌មានខាងក្រោមដើម្បីផ្ដល់ប្រាក់ចំណូលដល់សមាជិក</p>\n\n                <div class="search-box mb-3">\n                    <i class="fas fa-search"></i>\n                    <input type="text" id="incomeSearch" placeholder="ស្វែងរកសមាជិក (ឈ្មោះ, ID, ទូរសព្ទ)..." class="w-full px-4 py-3 pl-10 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" oninput="filterIncomeMembers()" />\n                </div>\n\n                <form id="incomeForm">\n                    <div class="mb-3">\n                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-user text-blue-500 mr-2"></i>ជ្រើសរើសសមាជិក</label>\n                        <select id="incomeMember" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">\n                            ' + allUsers.map(function(u) {
                                return '<option value="' + u.phone + '" data-name="' + u.name + '" data-id="' + u.memberId + '" data-phone="' + u.phone + '">' + u.name + ' (ID: ' + u.memberId + ') - ' + formatMoney(u.balance) + '</option>';
                            }).join('') + '\n                        </select>\n                    </div>\n                    <div class="mb-3">\n                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-dollar-sign text-blue-500 mr-2"></i>ចំនួនប្រាក់ចំណូល (៛)</label>\n                        <input type="number" id="incomeAmount" placeholder="50000" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />\n                    </div>\n                    <div class="mb-4">\n                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-pen text-blue-500 mr-2"></i>កំណត់សម្គាល់ (ស្រេចចិត្ត)</label>\n                        <input type="text" id="incomeNote" placeholder="ឧទាហរណ៍: ចំណូលប្រចាំខែ" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />\n                    </div>\n                    <button type="submit" id="incomeSubmitBtn" class="w-full btn-primary text-white font-semibold py-3 rounded-xl transition">\n                        <i class="fas fa-hand-holding-usd mr-2"></i> ផ្ដល់ប្រាក់ចំណូល\n                    </button>\n                </form>\n            </div>\n            ';

            window.filterIncomeMembers = function() {
                var search = document.getElementById('incomeSearch').value.toLowerCase().trim();
                var select = document.getElementById('incomeMember');
                var options = select.querySelectorAll('option');
                options.forEach(function(opt) {
                    var text = opt.getAttribute('data-name') + opt.getAttribute('data-id') + opt.getAttribute('data-phone');
                    if (text.toLowerCase().includes(search) || search === '') {
                        opt.style.display = '';
                    } else {
                        opt.style.display = 'none';
                    }
                });
            };

            document.getElementById('incomeForm').onsubmit = async function(e) {
                e.preventDefault();
                var btn = document.getElementById('incomeSubmitBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> កំពុងផ្ញើ...';

                var phone = document.getElementById('incomeMember').value;
                var amount = parseInt(document.getElementById('incomeAmount').value.trim());
                var note = document.getElementById('incomeNote').value.trim() || 'ប្រាក់ចំណូលពី Admin';

                if (!amount || amount <= 0) {
                    showToast('សូមបញ្ចូលចំនួនទឹកប្រាក់ឲ្យបានត្រឹមត្រូវ!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-hand-holding-usd mr-2"></i> ផ្ដល់ប្រាក់ចំណូល';
                    return;
                }

                var users = DB.getUsers();
                var admin = users.find(function(u) { return u.role === 'admin'; });
                var member = users.find(function(u) { return u.phone === phone; });

                if (!member) {
                    showToast('មិនរកឃើញសមាជិក!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-hand-holding-usd mr-2"></i> ផ្ដល់ប្រាក់ចំណូល';
                    return;
                }

                if (admin.balance < amount) {
                    showToast('❌ សមតុល្យ Admin មិនគ្រប់គ្រាន់!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-hand-holding-usd mr-2"></i> ផ្ដល់ប្រាក់ចំណូល';
                    return;
                }

                admin.balance -= amount;
                member.balance += amount;
                DB.setUsers(users);
                addTransaction(member.phone, 'deposit', amount, 'ប្រាក់ចំណូល: ' + note);

                var depositData = {
                    name: member.name,
                    memberId: member.memberId,
                    phone: member.phone,
                    bank: 'ប្រាក់ចំណូល',
                    sender: 'Admin',
                    amount: amount,
                    note: note,
                    date: getDate()
                };
                await sendDepositTelegram(depositData, null);

                showToast('✅ បានផ្ដល់ប្រាក់ចំណូល ' + formatMoney(amount) + ' ដល់ ' + member.name, 'success');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-hand-holding-usd mr-2"></i> ផ្ដល់ប្រាក់ចំណូល';
                renderPage('adminIncome');
            };
        }

        // ============================================================
        //  22. ADMIN ACTIONS - Approve/Reject - FIXED: Update admin balance
        // ============================================================
        window.approveDeposit = function(id) {
            var deposits = DB.getDeposits();
            var idx = deposits.findIndex(function(d) { return d.id === id; });
            if (idx === -1) return;
            var d = deposits[idx];
            d.status = 'approved';
            DB.setDeposits(deposits);

            var users = DB.getUsers();
            var u = users.find(function(u) { return u.phone === d.phone; });
            var admin = users.find(function(u) { return u.role === 'admin'; });
            
            if (u) {
                u.balance += d.amount;
                if (admin) {
                    admin.balance += d.amount;
                }
                DB.setUsers(users);
                addTransaction(d.phone, 'deposit', d.amount, 'បញ្ចូលតាម Admin (' + d.bank + ')', d.account || '');

                var depositData = {
                    name: u.name,
                    memberId: u.memberId,
                    phone: u.phone,
                    bank: d.bank,
                    sender: d.sender || u.name,
                    amount: d.amount,
                    note: '✅ បានអនុម័តដោយ Admin',
                    date: getDate()
                };
                sendDepositTelegram(depositData, null);

                showToast('✅ បានអនុម័តបញ្ចូល ' + formatMoney(d.amount), 'success');
            }
            renderPage('adminDeposit');
        };

        window.rejectDeposit = function(id) {
            var deposits = DB.getDeposits();
            var idx = deposits.findIndex(function(d) { return d.id === id; });
            if (idx === -1) return;
            deposits[idx].status = 'rejected';
            DB.setDeposits(deposits);
            showToast('❌ បានបដិសេធ', 'error');
            renderPage('adminDeposit');
        };

        window.approveWithdraw = function(id) {
            var withdraws = DB.getWithdraws();
            var idx = withdraws.findIndex(function(w) { return w.id === id; });
            if (idx === -1) return;
            var w = withdraws[idx];
            w.status = 'approved';
            DB.setWithdraws(withdraws);

            var users = DB.getUsers();
            var u = users.find(function(u) { return u.phone === w.phone; });
            var admin = users.find(function(u) { return u.role === 'admin'; });
            
            if (u) {
                if (u.balance >= w.amount) {
                    u.balance -= w.amount;
                    if (admin) {
                        admin.balance -= w.amount;
                    }
                    DB.setUsers(users);
                    addTransaction(w.phone, 'withdraw', w.amount, 'ដកតាម Admin (' + w.bank + ')', w.account || '');

                    var withdrawData = {
                        name: u.name,
                        memberId: u.memberId,
                        phone: u.phone,
                        bank: w.bank,
                        accName: w.accName,
                        account: w.account,
                        amount: w.amount,
                        date: getDate()
                    };
                    sendWithdrawTelegram(withdrawData, null);

                    showToast('✅ បានអនុម័តដក ' + formatMoney(w.amount), 'success');
                } else {
                    showToast('❌ សមតុល្យមិនគ្រប់!', 'error');
                    return;
                }
            }
            renderPage('adminWithdraw');
        };

        window.rejectWithdraw = function(id) {
            var withdraws = DB.getWithdraws();
            var idx = withdraws.findIndex(function(w) { return w.id === id; });
            if (idx === -1) return;
            withdraws[idx].status = 'rejected';
            DB.setWithdraws(withdraws);
            showToast('❌ បានបដិសេធ', 'error');
            renderPage('adminWithdraw');
        };

        // ============================================================
        //  23. INIT
        // ============================================================
        (function init() {
            var users = DB.getUsers();
            if (!users.find(function(u) { return u.role === 'admin'; })) {
                users.push({
                    phone: '0987654321',
                    name: 'Admin',
                    password: 'admin123',
                    balance: 0,
                    status: 'active',
                    role: 'admin',
                    memberId: 0
                });
                DB.setUsers(users);
            }
            var sess = DB.getSession();
            if (sess) {
                var user = getCurrentUser();
                if (user) {
                    if (user.role === 'admin') renderPage('admin');
                    else renderPage('dashboard');
                    return;
                }
            }
            renderPage('login');
        })();

        // Make functions globally accessible
        window.renderPage = renderPage;
        window.logout = logout;
        window.showModal = showModal;
        window.closeModal = closeModal;
        window.showToast = showToast;
        window.showImageViewer = showImageViewer;
        window.closeImageViewer = closeImageViewer;
        window.filterRewardMembers = filterRewardMembers;
        window.filterIncomeMembers = filterIncomeMembers;
        window.closeAdminDepositModal = closeAdminDepositModal;
        window.processAdminDeposit = processAdminDeposit;
        window.showAdminDeleteBalanceModal = showAdminDeleteBalanceModal;
        window.closeAdminDeleteBalanceModal = closeAdminDeleteBalanceModal;
        window.processAdminDeleteBalance = processAdminDeleteBalance;
        window.previewDepositScreenshot = function() {};
        window.previewWithdrawScreenshot = function() {};
        window.confirmDeleteMember = confirmDeleteMember;
        window.deleteMember = deleteMember;
        window.confirmReset = confirmReset;
        window.resetSystem = resetSystem;
        window.approveDeposit = approveDeposit;
        window.rejectDeposit = rejectDeposit;
        window.approveWithdraw = approveWithdraw;
        window.rejectWithdraw = rejectWithdraw;
    </script>
