<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>អាជីវករខ្មែរឆ្លាតវៃ - ប្រព័ន្ធគ្រប់គ្រងហិរញ្ញវត្ថុ</title>
    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Battambang:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * { font-family: 'Battambang', 'Khmer', sans-serif; }
        body { background: #f8fafc; color: #1e293b; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col">

    <div id="app" class="min-h-screen flex flex-col">
        <nav class="sticky top-0 z-50 glass-card shadow-sm border-b px-4 py-3.5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-blue-600 to-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-md shadow-blue-200">
                    <i class="fas fa-store text-white text-lg"></i>
                </div>
                <div>
                    <span class="text-lg font-bold text-gray-900 block leading-tight">អាជីវករខ្មែរឆ្លាតវៃ</span>
                    <span class="text-[11px] text-gray-400 font-medium">ប្រព័ន្ធគ្រប់គ្រងហិរញ្ញវត្ថុឆ្លាតវៃ</span>
                </div>
            </div>
            <div id="navUser" class="flex items-center gap-3"></div>
        </nav>

        <main class="flex-1 max-w-6xl mx-auto w-full p-4 md:p-6">
            <div id="pageContent" class="animate-fade-in"></div>
        </main>

        <footer class="bg-white border-t text-center text-xs text-gray-400 py-4">
            &copy; 2026 អាជីវករខ្មែរឆ្លាតវៃ &mdash; គ្រប់គ្រងដោយទំនុកចិត្ត
        </footer>
    </div>

    <div id="modalContainer"></div>
    <div id="imageViewer" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[1000] flex items-center justify-center p-4" onclick="closeImageViewer()"></div>
    <div id="toastContainer" class="fixed bottom-5 right-5 z-[2000] flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // ==========================================
        // 1. CENTRALIZED STORAGE & DATA LAYER
        // ==========================================
        const DB = {
            get(key, def) {
                try { const r = localStorage.getItem('ak_' + key); return r ? JSON.parse(r) : def; } 
                catch { return def; }
            },
            set(key, val) { localStorage.setItem('ak_' + key, JSON.stringify(val)); },
            remove(key) { localStorage.removeItem('ak_' + key); },
            getUsers() { return this.get('users', []); },
            setUsers(u) { this.set('users', u); },
            getTx() { return this.get('tx', []); },
            setTx(t) { this.set('tx', t); },
            getWithdraws() { return this.get('withdraws', []); },
            setWithdraws(w) { this.set('withdraws', w); },
            getDeposits() { return this.get('deposits', []); },
            setDeposits(d) { this.set('deposits', d); },
            getRewards() { return this.get('rewards', []); },
            setRewards(r) { this.set('rewards', r); },
            getSession() { return this.get('session', null); },
            setSession(s) { this.set('session', s); },
            getNextId() { let id = this.get('nextId', 1000); this.set('nextId', id + 1); return id; },
            resetAll() {
                const admin = this.getUsers().find(u => u.role === 'admin');
                ['users','tx','withdraws','deposits','rewards','nextId','adminBankInfo','session'].forEach(k => this.remove(k));
                if (admin) this.setUsers([admin]);
            },
            deleteMember(phone) {
                this.setUsers(this.getUsers().filter(u => u.phone !== phone));
                this.setTx(this.getTx().filter(t => t.phone !== phone));
                this.setDeposits(this.getDeposits().filter(d => d.phone !== phone));
                this.setWithdraws(this.getWithdraws().filter(w => w.phone !== phone));
                this.setRewards(this.getRewards().filter(r => r.phone !== phone));
            }
        };

        // ==========================================
        // 2. CORE HELPERS & UTILITIES
        // ==========================================
        const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
        const formatMoney = (n) => (n <= 0 ? '0.00' : n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')) + ' ៛';
        const getDate = () => new Date().toLocaleString('km-KH', { timeZone: 'Asia/Phnom_Penh' });

        // TELEGRAM BOT CONFIGURATION
        const BOT_CONFIG = {
            deposit: { token: '8364652665:AAESgPsrL-Q2D3ZYtLTN6IzdkQ1pLYnc5vw', chat: '-5410896989' },
            withdraw: { token: '8790558091:AAGwRivgCppOxQNgMdngSdC1u8U6mz6pwwc', chat: '-5338881653' }
        };

        function sendTelegramXHR(token, chat, text, photo = null) {
            return new Promise((resolve) => {
                const isPhoto = !!photo;
                const url = `https://api.telegram.org/bot${token}/${isPhoto ? 'sendPhoto' : 'sendMessage'}`;
                const xhr = new XMLHttpRequest();
                xhr.open('POST', url, true);

                let body;
                if (isPhoto) {
                    const byteString = atob(photo.split(',')[1]);
                    const mime = photo.split(',')[0].split(':')[1].split(';')[0];
                    const ab = new ArrayBuffer(byteString.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                    
                    body = new FormData();
                    body.append('chat_id', chat);
                    body.append('photo', new Blob([ab], { type: mime }), 'screenshot.jpg');
                    body.append('caption', text);
                    body.append('parse_mode', 'HTML');
                } else {
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    body = JSON.stringify({ chat_id: chat, text: text, parse_mode: 'HTML' });
                }

                xhr.onload = () => resolve(xhr.status === 200 && JSON.parse(xhr.responseText).ok);
                xhr.onerror = () => resolve(false);
                xhr.send(body);
            });
        }

        // ==========================================
        // 3. UI NOTIFICATIONS & ALERTS
        // ==========================================
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bg = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-rose-600' : 'bg-blue-600';
            toast.className = `p-4 rounded-xl text-white text-sm font-semibold shadow-xl flex items-center gap-2 pointer-events-auto transition-all duration-300 transform translate-y-4 opacity-0 ${bg}`;
            toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle'}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => { toast.classList.remove('translate-y-4', 'opacity-0'); }, 10);
            setTimeout(() => {
                toast.classList.add('translate-y-4', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function showModal(title, msg, onConfirm = null, onCancel = null) {
            const container = document.getElementById('modalContainer');
            container.innerHTML = `
                <div class="fixed inset-0 bg-black/50 backdrop-blur-xs z-[1500] flex items-center justify-center p-4" onclick="if(event.target===this) closeModal()">
                    <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl animate-fade-in">
                        <h3 class="text-lg font-bold text-gray-900 mb-2">${title}</h3>
                        <p class="text-sm text-gray-500 mb-5 leading-relaxed">${msg}</p>
                        <div class="flex gap-2.5 justify-end">
                            ${onCancel !== false ? `<button onclick="closeModal()" class="px-4 py-2 text-xs font-semibold bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200 transition">បោះបង់</button>` : ''}
                            <button onclick="closeModal(); ${onConfirm ? onConfirm + '()' : ''}" class="px-4 py-2 text-xs font-semibold bg-blue-600 text-white rounded-xl hover:bg-blue-700 shadow-md shadow-blue-100 transition">យល់ព្រម</button>
                        </div>
                    </div>
                </div>`;
        }
        const closeModal = () => document.getElementById('modalContainer').innerHTML = '';

        function showImageViewer(src) {
            if (!src) return showToast('មិនមានរូបភាព QR Code ទេ', 'error');
            const el = document.getElementById('imageViewer');
            el.innerHTML = `
                <div class="relative max-w-md w-full flex items-center justify-center" onclick="event.stopPropagation()">
                    <button class="absolute -top-12 right-0 text-white text-2xl hover:text-gray-300" onclick="closeImageViewer()"><i class="fas fa-times"></i></button>
                    <img src="${src}" class="max-w-full max-h-[80vh] rounded-2xl shadow-2xl bg-white p-2" />
                </div>`;
            el.classList.remove('hidden');
        }
        const closeImageViewer = () => document.getElementById('imageViewer').classList.add('hidden');

        // ==========================================
        // 4. AUTHENTICATION CONTROLLER
        // ==========================================
        const getCurrentUser = () => {
            const sess = DB.getSession();
            return sess ? DB.getUsers().find(u => u.phone === sess.phone) || null : null;
        };
        const logout = () => { DB.remove('session'); renderPage('login'); };

        window.togglePassword = function(id, icon) {
            const inp = document.getElementById(id);
            const isPass = inp.type === 'password';
            inp.type = isPass ? 'text' : 'password';
            icon.className = `fas ${isPass ? 'fa-eye-slash' : 'fa-eye'} absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer hover:text-gray-600 text-xs`;
        };

        // ==========================================
        // 5. RENDER ENGINE & CORE ROUTER
        // ==========================================
        function renderPage(page, data = null) {
            const container = document.getElementById('pageContent');
            const user = getCurrentUser();
            const navUser = document.getElementById('navUser');

            if (user) {
                navUser.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-right hidden md:block">
                            <span class="text-xs font-bold text-gray-800 block">${user.name}</span>
                            <span class="text-[10px] font-medium px-2 py-0.5 rounded-md ${user.role==='admin'?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-600'}">ID: ${user.memberId || 'N/A'}</span>
                        </div>
                        <div class="px-3 py-1.5 bg-emerald-50 rounded-xl text-center border border-emerald-100">
                            <span class="text-xs font-bold text-emerald-600 block">${formatMoney(user.balance)}</span>
                        </div>
                        <button onclick="logout()" class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-400 hover:text-rose-600 hover:bg-rose-50 transition"><i class="fas fa-sign-out-alt"></i></button>
                    </div>`;
            } else {
                navUser.innerHTML = `<button onclick="renderPage('login')" class="px-4 py-1.5 text-xs font-semibold bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl shadow-md hover:shadow-lg transition">ចូលប្រើ</button>`;
            }

            // Route execution
            switch (page) {
                case 'login': renderLoginView(container); break;
                case 'dashboard': renderDashboardView(container, user); break;
                default: renderLoginView(container);
            }
        }

        // ==========================================
        // 6. MODERN LOGIN & REGISTER VIEW
        // ==========================================
        function renderLoginView(container) {
            container.innerHTML = `
                <div class="flex items-center justify-center min-h-[70vh]">
                    <div class="bg-white rounded-3xl border shadow-xl p-6 md:p-8 w-full max-w-sm">
                        <div class="text-center mb-6">
                            <div class="bg-blue-50 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-3 text-blue-600 text-2xl shadow-xs"><i class="fas fa-shield-alt"></i></div>
                            <h2 class="text-xl font-bold text-gray-900">សូមស្វាគមន៍មកកាន់ប្រព័ន្ធ</h2>
                            <p class="text-xs text-gray-400 mt-1">បំពេញព័ត៌មានខាងក្រោមដើម្បីបន្ត</p>
                        </div>

                        <div class="flex bg-slate-100 rounded-xl p-1 mb-5">
                            <button id="tabL" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-xs text-blue-600">ចូលប្រើ</button>
                            <button id="tabR" class="flex-1 py-2 text-xs font-bold rounded-lg text-gray-400 hover:text-gray-600">ចុះឈ្មោះ</button>
                        </div>

                        <form id="fLogin" class="space-y-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1.5"><i class="fas fa-phone mr-1.5 text-blue-500"></i>លេខទូរសព្ទ</label>
                                <input type="text" id="lPhone" required class="w-full text-xs px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-blue-100 focus:border-blue-500 outline-none transition" placeholder="ឧទាហរណ៍៖ 096xxxxxxx">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1.5"><i class="fas fa-lock mr-1.5 text-blue-500"></i>ពាក្យសម្ងាត់</label>
                                <div class="relative">
                                    <input type="password" id="lPass" required class="w-full text-xs px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-blue-100 focus:border-blue-500 outline-none transition" placeholder="••••••••">
                                    <i class="fas fa-eye absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-xs cursor-pointer" onclick="togglePassword('lPass', this)"></i>
                                </div>
                            </div>
                            <button type="submit" class="w-full py-2.5 bg-blue-600 text-white rounded-xl text-xs font-bold shadow-md shadow-blue-100 hover:bg-blue-700 transition">ចូលទៅកាន់ប្រព័ន្ធ</button>
                        </form>

                        <form id="fReg" class="space-y-3.5 hidden">
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1"><i class="fas fa-id-badge mr-1.5 text-indigo-500"></i>លេខ ID សមាជិក</label>
                                <input type="number" id="rId" required class="w-full text-xs px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition" placeholder="បញ្ចូលលេខ ID">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1"><i class="fas fa-user mr-1.5 text-indigo-500"></i>ឈ្មោះពេញ</label>
                                <input type="text" id="rName" required class="w-full text-xs px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition" placeholder="ឈ្មោះសាមីខ្លួន">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1"><i class="fas fa-phone mr-1.5 text-indigo-500"></i>លេខទូរសព្ទ</label>
                                <input type="text" id="rPhone" required class="w-full text-xs px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition" placeholder="លេខទូរសព្ទទំនាក់ទំនង">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1"><i class="fas fa-lock mr-1.5 text-indigo-500"></i>ពាក្យសម្ងាត់</label>
                                <div class="relative">
                                    <input type="password" id="rPass" required class="w-full text-xs px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition" placeholder="កំណត់ពាក្យសម្ងាត់">
                                    <i class="fas fa-eye absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-xs cursor-pointer" onclick="togglePassword('rPass', this)"></i>
                                </div>
                            </div>
                            <button type="submit" class="w-full py-2.5 bg-indigo-600 text-white rounded-xl text-xs font-bold shadow-md shadow-indigo-100 hover:bg-indigo-700 transition">បង្កើតគណនីថ្មី</button>
                        </form>
                    </div>
                </div>`;

            // Form Toggle Setup
            const tL = document.getElementById('tabL'), tR = document.getElementById('tabR');
            const fL = document.getElementById('fLogin'), fR = document.getElementById('fReg');

            tL.onclick = () => {
                tL.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-xs text-blue-600";
                tR.className = "flex-1 py-2 text-xs font-bold rounded-lg text-gray-400 hover:text-gray-600";
                fL.classList.remove('hidden'); fR.classList.add('hidden');
            };
            tR.onclick = () => {
                tR.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-xs text-indigo-600";
                tL.className = "flex-1 py-2 text-xs font-bold rounded-lg text-gray-400 hover:text-gray-600";
                fR.classList.remove('hidden'); fL.classList.add('hidden');
            };

            // Form Logic Submit Handles
            fL.onsubmit = (e) => {
                e.preventDefault();
                const p = document.getElementById('lPhone').value.trim(), pass = document.getElementById('lPass').value;
                let users = DB.getUsers();
                
                // Set default Admin credentials on initialization
                if(users.length === 0 && p === 'admin' && pass === 'admin123') {
                    users.push({ phone: 'admin', name: 'ម្ចាស់ប្រព័ន្ធ', password: 'admin123', role: 'admin', balance: 0, status: 'active', memberId: 999 });
                    DB.setUsers(users);
                }

                let u = users.find(x => x.phone === p && x.password === pass);
                if (!u) return showToast('លេខទូរសព្ទ ឬ ពាក្យសម្ងាត់មិនត្រឹមត្រូវ!', 'error');
                if (u.status === 'suspended') return showToast('គណនីត្រូវបានផ្អាកជាបណ្តោះអាសន្ន!', 'error');

                DB.setSession({ phone: u.phone, name: u.name, role: u.role || 'user' });
                showToast('ស្វាគមន៍ការចូលមកកាន់ប្រព័ន្ធ!', 'success');
                renderPage('dashboard');
            };

            fR.onsubmit = (e) => {
                e.preventDefault();
                const mid = parseInt(document.getElementById('rId').value), name = document.getElementById('rName').value.trim();
                const ph = document.getElementById('rPhone').value.trim(), pas = document.getElementById('rPass').value;
                let users = DB.getUsers();

                if(users.find(x => x.phone === ph)) return showToast('លេខទូរសព្ទនេះមានរួចហើយ!', 'error');
                if(users.find(x => x.memberId === mid)) return showToast('លេខ ID សមាជិកនេះមានរួចហើយ!', 'error');

                users.push({ phone: ph, name, password: pas, balance: 0, status: 'active', role: 'user', memberId: mid });
                DB.setUsers(users);
                showToast('ចុះឈ្មោះបានជោគជ័យ! សូមចូលប្រើប្រាស់គណនី។', 'success');
                tL.click();
            };
        }

        // ==========================================
        // 7. MODERN USER DASHBOARD VIEW
        // ==========================================
        function renderDashboardView(container, user) {
            if(!user) return renderPage('login');
            
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-white p-5 border rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-xs">
                        <div>
                            <h2 class="text-xl font-bold text-gray-900">សួស្តី, ${user.name}! 👋</h2>
                            <p class="text-xs text-gray-400 mt-0.5">សូមរីករាយជាមួយប្រព័ន្ធគ្រប់គ្រងការដាក់ប្រាក់ និងដកប្រាក់រហ័សទាន់ចិត្ត</p>
                        </div>
                        ${user.role === 'admin' ? `
                            <button onclick="showToast('មុខងារ Admin កំពុងត្រូវបានកែលម្អ...', 'info')" class="px-4 py-2 bg-slate-900 text-white font-semibold text-xs rounded-xl shadow-md shadow-slate-200 transition-all hover:bg-slate-800">
                                <i class="fas fa-sliders-h mr-1.5"></i> ផ្ទាំងគ្រប់គ្រង Admin
                            </button>
                        ` : ''}
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-white p-6 border rounded-2xl shadow-xs hover:border-blue-400 transition-all group">
                            <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center text-lg mb-4 group-hover:bg-blue-600 group-hover:text-white transition-all"><i class="fas fa-wallet"></i></div>
