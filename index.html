<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Year System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-4">

    <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-2xl shadow-xl relative">
        <button onclick="toggleLanguage()" class="absolute top-4 right-4 flex items-center space-x-2 bg-white/10 backdrop-blur-md hover:bg-white/20 border border-white/20 px-3 py-1.5 rounded-full text-[10px] font-bold transition-all duration-300 shadow-lg">
            <span id="lang-icon">🇰🇭</span> <span id="lang-text">ខ្មែរ</span>
        </button>

        <h1 id="main-title" class="text-2xl font-bold text-center mb-2">ឆ្នាំសំណាងទាំង 12 🎁🎉</h1>
        <p id="sub-title" class="text-center text-gray-400 text-sm mb-4">ប្រព័ន្ធទស្សន៍ទាយ និងកត់ត្រាលេខសំណាង</p>
        
        <div id="server-time" class="bg-blue-900/50 p-2 rounded-lg text-center border border-blue-700 mb-4 text-sm font-mono">📅 កំពុងផ្ទុកពេលវេលា...</div>

        <div class="bg-purple-900/30 p-4 rounded-xl border border-purple-700 mb-6 flex justify-between items-center">
            <div><p id="wallet-text" class="text-gray-400 text-xs">សមតុល្យទឹកប្រាក់បច្ចុប្បន្ន</p><h2 class="text-xl font-bold text-green-400">$0.00</h2></div>
            <button id="deposit-btn" class="bg-green-500 px-3 py-1 rounded-lg text-xs font-bold">💰 បញ្ចូលលុយ</button>
        </div>

        <div class="text-center mb-4">
            <h3 id="result-label" class="text-sm font-bold text-gray-300">🔮 ឆ្នាំសំណាងសម្រាប់ម៉ោងនេះគឺ៖</h3>
            <div class="bg-gray-700/50 p-3 rounded-xl border border-gray-600 inline-block mt-2">
                <span class="text-3xl">🐔</span><p id="lucky-year" class="font-bold">ឆ្នាំរកា</p>
            </div>
        </div>
        <div class="bg-yellow-900/20 p-3 rounded-xl border border-yellow-700/50 mb-6 text-center">
            <p id="next-result-label" class="text-[10px] text-yellow-500">⏳ លទ្ធផលបន្ទាប់នឹងចេញក្នុងរយៈពេល៖</p>
            <div id="countdown" class="text-xl font-mono font-bold text-yellow-400">59:59</div>
        </div>

        <button id="predict-btn" class="w-full bg-pink-500 py-3 rounded-full font-bold mb-6 text-sm">🎲 ចុចដើម្បីទស្សន៍ទាយ</button>
    </div>

    <div id="deposit-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-6 rounded-2xl w-full max-w-sm border border-gray-700 shadow-2xl">
            <h3 class="text-lg font-bold mb-4 text-center">បញ្ចូលទឹកប្រាក់</h3>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="setAmount(10)" class="bg-gray-700 hover:bg-gray-600 p-2 rounded-lg text-sm">10$</button>
                <button onclick="setAmount(20)" class="bg-gray-700 hover:bg-gray-600 p-2 rounded-lg text-sm">20$</button>
                <button onclick="setAmount(30)" class="bg-gray-700 hover:bg-gray-600 p-2 rounded-lg text-sm">30$</button>
                <button onclick="setAmount(40)" class="bg-gray-700 hover:bg-gray-600 p-2 rounded-lg text-sm">40$</button>
                <button onclick="setAmount(50)" class="bg-gray-700 hover:bg-gray-600 p-2 rounded-lg text-sm">50$</button>
                <button onclick="setAmount(100)" class="bg-gray-700 hover:bg-gray-600 p-2 rounded-lg text-sm">100$</button>
            </div>
            <input type="number" id="manual-amount" placeholder="ទឹកប្រាក់ផ្សេងទៀត ($)" class="w-full bg-gray-900 p-3 rounded-lg mb-6 text-center border border-gray-600">
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold">បោះបង់</button>
                <button onclick="confirmDeposit()" class="flex-1 bg-green-500 py-2 rounded-lg font-bold">យល់ព្រម</button>
            </div>
        </div>
    </div>

    <script>
        // មុខងារហៅ Modal ជាមួយពាក្យសម្ងាត់
        document.getElementById('deposit-btn').onclick = function() {
            const password = prompt("សូមវាយពាក្យសម្ងាត់ (Qq1280):");
            if (password === "Qq1280") {
                document.getElementById('deposit-modal').style.display = 'flex';
            } else if (password !== null) {
                alert("ពាក្យសម្ងាត់មិនត្រឹមត្រូវ!");
            }
        };

        function closeModal() { document.getElementById('deposit-modal').style.display = 'none'; }
        function setAmount(val) { document.getElementById('manual-amount').value = val; }
        
        function confirmDeposit() {
            const amount = document.getElementById('manual-amount').value;
            if(amount > 0) {
                alert("បានបញ្ចូលទឹកប្រាក់ចំនួន " + amount + "$ ដោយជោគជ័យ!");
                closeModal();
            } else {
                alert("សូមជ្រើសរើស ឬវាយបញ្ចូលទឹកប្រាក់!");
            }
        }
    </script>
</body>
</html>
