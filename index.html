<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Year System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-4">

    <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-2xl shadow-xl relative">
        <button onclick="toggleLanguage()" class="absolute top-4 right-4 bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded-lg text-xs font-bold transition">🇰🇭/🇬🇧 EN</button>

        <h1 id="title" class="text-2xl font-bold text-center mb-6">ឆ្នាំសំណាងទាំង 12 🎁🎉</h1>

        <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700">
            <div class="flex space-x-1 mb-4 overflow-x-auto pb-2">
                <button onclick="showTab('results')" id="tab1" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">លទ្ធផលម៉ោង</button>
                <button onclick="showTab('deposit')" id="tab2" class="bg-gray-700 px-3 py-1 rounded text-[10px] font-bold">ប្រវត្តិបញ្ចូលលុយ</button>
                <button onclick="showTab('predict')" id="tab3" class="bg-gray-700 px-3 py-1 rounded text-[10px] font-bold">ប្រវត្តិទស្សន៍ទាយ</button>
            </div>

            <div id="content-area" class="h-48 overflow-y-auto space-y-2">
                <div class="bg-gray-800 p-2 rounded flex justify-between items-center text-xs border-l-4 border-green-500">
                    <div>
                        <p class="font-bold">ម៉ោង 14:00</p>
                        <p class="text-gray-400">5/6/2026</p>
                    </div>
                    <div class="bg-gray-700 px-2 py-1 rounded">🐔 ឆ្នាំរកា (១០)</div>
                </div>
            </div>

            <button onclick="toggleContent()" id="toggle-btn" class="w-full mt-4 bg-gray-700 hover:bg-gray-600 py-2 rounded text-xs font-bold">👁️ លាក់ប្រវត្តិ</button>
        </div>
    </div>

    <script>
        let isVisible = true;
        let lang = 'km';

        function toggleContent() {
            const area = document.getElementById('content-area');
            const btn = document.getElementById('toggle-btn');
            isVisible = !isVisible;
            area.style.display = isVisible ? 'block' : 'none';
            btn.innerText = isVisible ? (lang === 'km' ? '👁️ លាក់ប្រវត្តិ' : '👁️ Hide History') : (lang === 'km' ? '👁️ បង្ហាញប្រវត្តិ' : '👁️ Show History');
        }

        function showTab(tab) {
            const content = document.getElementById('content-area');
            content.innerHTML = `<p class="text-center text-gray-500 py-10">បង្ហាញ៖ ${tab}</p>`;
        }

        function toggleLanguage() {
            lang = lang === 'km' ? 'en' : 'km';
            document.getElementById('title').innerText = lang === 'km' ? "ឆ្នាំសំណាងទាំង 12 🎁🎉" : "12 Lucky Years 🎁🎉";
            document.getElementById('tab1').innerText = lang === 'km' ? "លទ្ធផលម៉ោង" : "Hourly Results";
            document.getElementById('tab2').innerText = lang === 'km' ? "ប្រវត្តិបញ្ចូលលុយ" : "Deposit History";
            document.getElementById('tab3').innerText = lang === 'km' ? "ប្រវត្តិទស្សន៍ទាយ" : "Prediction History";
            document.getElementById('toggle-btn').innerText = isVisible ? (lang === 'km' ? '👁️ លាក់ប្រវត្តិ' : '👁️ Hide History') : (lang === 'km' ? '👁️ បង្ហាញប្រវត្តិ' : '👁️ Show History');
        }
    </script>
</body>
</html>
