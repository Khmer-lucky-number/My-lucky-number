<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ហាងលក់ទំនិញអនឡាញ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
        }

        header {
            background-color: #1a1a1a;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 22px;
        }

        .distributor-btn {
            background-color: #ff9900;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .distributor-btn:hover {
            background-color: #e68a00;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 20px;
            font-weight: 700;
            color: #e44d26;
            margin-bottom: 15px;
        }

        .buy-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: #fff;
            text-align: center;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #fff;
            padding: 25px 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
        }

        .modal h2 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #ff9900;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #ff9900;
        }

        .address-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-address-box {
            background-color: #f8f9fa;
            border: 1px dashed #ff9900;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #2b2b2b;
            min-height: 44px;
            word-break: break-word;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            padding: 30px;
            background-color: #1a1a1a;
            color: #888;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>ហាងលក់ទំនិញអនឡាញ</h1>
        <button class="distributor-btn" onclick="openModal()">ចុះឈ្មោះជាតំណាងចែកចាយ</button>
    </header>

    <div class="container">
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="https://via.placeholder.com/300x250?text=Product" alt="ផលិតផល">
                </div>
                <div class="product-info">
                    <div class="product-title">ផលិតផលលក់ដាច់</div>
                    <div class="product-price">$0.00</div>
                    <button class="buy-btn">បញ្ជាទិញឥឡូវនេះ</button>
