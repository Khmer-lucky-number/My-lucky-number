<!DOCTYPE html>
<html lang="km">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>គេហទំព័រលទ្ធផលសំណាង</title>
 <style>
 body {
 margin: 0;
 padding: 0;
 font-family: 'Khmer OS Siemreap', sans-serif;
 background-color: #1a1a2e;
 color: #ffffff;
 display: flex;
 justify-content: center;
 align-items: center;
 min-height: 100vh;
 }
 .container {
 width: 90%;
 max-width: 600px;
 background-color: #252545;
 padding: 20px;
 border-radius: 20px;
 box-shadow: 0 10px 30px rgba(0,0,0,0.5);
 text-align: center;
 }
 h1 { color: #ffd700; }
 .clock-container {
 font-size: 1.5rem;
 margin: 20px 0;
 padding: 15px;
 background: #161625;
 border-radius: 10px;
 }
 .grid {
 display: grid;
 grid-template-columns: repeat(3, 1fr);
 gap: 10px;
 margin-top: 20px;
 }
 .item {
 padding: 15px;
 background: #303055;
 border-radius: 10px;
 }
 @media (max-width: 480px) {
 .grid { grid-template-columns: repeat(2, 1fr); }
 }
 </style>
</head>
<body>
 <div class="container">
 <h1>លទ្ធផលប្រចាំថ្ងៃ</h1>
 <div class="clock-container" id="clock">កំពុងផ្ទុកម៉ោង...</div>
 <div class="grid">
 <div class="item">ឆ្នាំជូត</div>
 <div class="item">ឆ្នាំឆ្លូវ</div>
 <div class="item">ឆ្នាំខាល</div>
 <div class="item">ឆ្នាំថោះ</div>
 <div class="item">ឆ្នាំរោង</div>
 <div class="item">ឆ្នាំម្សាញ់</div>
 <div class="item">ឆ្នាំមមី</div>
 <div class="item">ឆ្នាំមមែ</div>
 <div class="item">ឆ្នាំវក</div>
 <div class="item">ឆ្នាំរកា</div>
 <div class="item">ឆ្នាំច</div>
 <div class="item">ឆ្នាំកុរ</div>
 </div>
 </div>
 <script>
 function updateClock() {
 const now = new Date();
 document.getElementById('clock').innerText = now.toLocaleTimeString('km-KH');
 }
 setInterval(updateClock, 1000);
 updateClock();
 </script>
</body>
</html>
