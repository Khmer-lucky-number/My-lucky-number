<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>រចនាគេហទំព័រលទ្ធផល</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 20px;
            font-family: 'Khmer OS Siemreap', sans-serif; 
            background-color: #0f0f1a; 
            color: #ffffff; 
        }
        .container { 
            max-width: 800px; 
            margin: auto; 
        }
        .header { text-align: center; color: #ffd700; margin-bottom: 20px; }
        
        /* ការរចនាសម្រាប់តារាង និងប្រអប់ */
        .card { 
            background: #1e1e30; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid #303055;
        }
        
        /* សម្រាប់ទូរស័ព្ទ (Screen < 600px) */
        @media (max-width: 600px) {
            .card { flex-direction: column; text-align: center; }
            .card span { margin: 5px 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="header">ប្រវត្តិលទ្ធផល</h2>
    
    <div class="date-section">ថ្ងៃទី ៥ ខែ ៦ ឆ្នាំ ២០២៦</div>
    <div class="card">
        <span>ម៉ោង 23:00</span>
        <span style="color: #ffaa00;">កំពុងរង់ចាំលទ្ធផល...</span>
    </div>

    <div class="date-section">ថ្ងៃទី ៦ ខែ ៦ ឆ្នាំ ២០២៦</div>
    <div class="card">
        <span>ម៉ោង 00:00</span>
        <span style="color: #ffaa00;">កំពុងរង់ចាំលទ្ធផល...</span>
    </div>
</div>

</body>
</html>
