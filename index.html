function calculateTotals(txs){
var td=0,tw=0;if(!txs)return{totalDeposits:0,totalWithdraws:0,netBalance:0};
for(var i=0;i<txs.length;i++){var t=txs[i];if(t.status==='completed'){if(t.type==='deposit')td+=t.amount;else if(t.type==='withdraw')tw+=t.amount;}}
return{totalDeposits:td,totalWithdraws:tw,netBalance:td-tw};
}

function addCommission(memberPhone,transactionId,amount){

var rate=member.commissionRate||0.05;var commission=amount*rate;if(commission<=0)return null;

}

function approveTransaction(txId){
showModal('<div style="text-align:center;"><div style="font-size:48px;margin-bottom:10px;">✅</div><h3 style="color:#fff;margin-bottom:10px;">យល់ព្រមប្រតិបត្តិការ</h3><p style="color:rgba(255,255,255,0.6);">តើអ្នកចង់យល់ព្រមលើប្រតិបត្តិការនេះមែនទេ?</p><div style="display:flex;gap:10px;margin-top:20px;"><button onclick="hideModal();confirmApprove(\''+txId+'\');" class="btn btn-gold" style="flex:1;">✅ យល់ព្រម</button><button onclick="hideModal()" class="btn" style="flex:1;background:rgba(255,255,255,0.1);">❌ បោះបង់</button></div></div>');
}

function confirmApprove(txId){
var tx=null;for(var i=0;i<data.transactions.length;i++){if(data.transactions[i].id===txId){tx=data.transactions[i];break;}}
if(!tx){showToast('មិនឃើញប្រតិបត្តិការ!','error');return;}
tx.status='completed';
var member=data.members[tx.memberPhone];if(member){if(tx.type==='deposit'){member.balance+=tx.amount;member.benefits.push('💰 បានដាក់ប្រាក់ $'+tx.amount.toFixed(2)+' នៅថ្ងៃ '+new Date().toLocaleDateString('km-KH'));var comm=addCommission(tx.memberPhone,tx.id,tx.amount);if(comm){member.benefits.push('🎁 បានទទួលកម្រៃ $'+comm.commission.toFixed(2));}}else if(tx.type==='withdraw'){member.balance-=tx.amount;member.benefits.push('🏦 បានដកប្រាក់ $'+tx.amount.toFixed(2)+' នៅថ្ងៃ '+new Date().toLocaleDateString('km-KH'));}}
saveData();
var au=getCurrentUser();if(au){var ad=data.subAdmins[au.phone];if(ad){logActivity(ad.id,ad.username,'approve_transaction','financial',tx.memberPhone,tx.amount,'យល់ព្រមលើប្រតិបត្តិការ '+tx.id+' ($'+tx.amount.toFixed(2)+')');}}
sendNotification('email',tx.memberPhone+'@example.com','ប្រតិបត្តិការ '+tx.id+' ត្រូវបានអនុម័ត! ចំនួន: $'+tx.amount.toFixed(2));showToast('✅ ប្រតិបត្តិការត្រូវបានយល់ព្រម!','success');renderPage('admin-dashboard');
}

function exportData(){var str=JSON.stringify(data,null,2);var blob=new Blob([str],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);showToast('📤 នាំចេញទិន្នន័យជោគជ័យ!','success');}

function importData(){var input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=function(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){try{var imported=JSON.parse(ev.target.result);if(!imported.members||!imported.transactions){showToast('ទម្រង់ទិន្នន័យមិនត្រឹមត្រូវ!','error');return;}if(confirm('តើអ្នកចង់ជំនួសទិន្នន័យបច្ចុប្បន្នមែនទេ?')){data=imported;saveData();showToast('📥 នាំចូលទិន្នន័យជោគជ័យ!','success');renderPage('super-dashboard');}}catch(err){showToast('កំហុសក្នុងការនាំចូលទិន្នន័យ!','error');}};reader.readAsText(file);};input.click();}

function searchMembersLive(query){var container=document.getElementById('memberListContainer');var res=document.getElementById('searchResults');if(!container)return;var q=query.toLowerCase().trim();if(!q){if(res){res.innerHTML='';res.style.display='none';}renderMemberList();return;}var members=Object.values(data.members);var filtered=[];for(var i=0;i<members.length;i++){var m=members[i];if((m.username&&m.username.toLowerCase().indexOf(q)!==-1)||m.phone.indexOf(q)!==-1||m.id.toLowerCase().indexOf(q)!==-1)filtered.push(m);}
if(res){res.style.display='block';if(filtered.length===0){res.innerHTML='<p style="opacity:0.4;padding:10px;text-align:center;">មិនឃើញលទ្ធផល</p>';}else{var html='';for(var j=0;j<filtered.length;j++){var m=filtered[j];var curr=m.preferredCurrency||'usd';html+='<div class="list-item"><div class="info"><span class="name">'+(m.username||m.phone)+'</span><span class="id">🆔 '+m.id+'</span><span class="sub">📱 '+m.phone+'</span></div><div><span class="balance">'+formatCurrency(m.balance,curr)+'</span></div><div class="actions"><button onclick="editBalance(\'member\',\''+m.phone+'\')" class="btn btn-gold btn-sm">💰</button><button onclick="addCommissionToMember(\''+m.phone+'\')" class="btn btn-commission btn-sm">🎁 កម្រៃ</button><button onclick="superEditMember(\''+m.phone+'\')" class="btn btn-warning btn-sm">✏️</button><button onclick="superDeleteMember(\''+m.phone+'\')" class="btn btn-danger btn-sm">🗑️</button><button onclick="resetMemberPassword(\''+m.phone+'\')" class="btn btn-secondary btn-sm">🔑</button></div></div>';}res.innerHTML=html;}}
if(q){container.style.display='none';}else{container.style.display='block';}}

container.innerHTML=html||'<p style="opacity:0.4;">មិនទាន់មាន</p>';var res=document.getElementById('searchResults');if(res){res.innerHTML='';res.style.display='none';}}

function generateReportDisplay(period){var container=document.getElementById('reportContent');if(!container)return;var report=generateReport(period);var html='<div class="card"><h3>📊 របាយការណ៍ '+(period==='daily'?'ប្រចាំថ្ងៃ':period==='weekly'?'ប្រចាំសប្តាហ៍':'ប្រចាំខែ')+'</h3><div style="font-size:12px;color:rgba(255,255,255,0.4);">ពី '+report.startDate.toLocaleDateString('km-KH')+' ដល់ '+report.endDate.toLocaleDateString('km-KH')+'</div><div class="summary-stats" style="margin-top:10px;"><div class="summary-box"><div class="number green">$'+report.totalDeposits.toFixed(2)+'</div><div class="label">ប្រាក់ដាក់</div></div><div class="summary-box"><div class="number red">$'+report.totalWithdraws.toFixed(2)+'</div><div class="label">ប្រាក់ដក</div></div><div class="summary-box"><div class="number gold">$'+report.netBalance.toFixed(2)+'</div><div class="label">ប្រាក់សល់</div></div><div class="summary-box"><div class="number gold">'+report.totalMembers+'</div><div class="label">សមាជិក</div></div><div class="summary-box"><div class="number gold">$'+report.totalCommissions.toFixed(2)+'</div><div class="label">កម្រៃសរុប</div></div><div class="summary-box"><div class="number gold">'+report.transactions.length+'</div><div class="label">ប្រតិបត្តិការ</div></div></div><div style="margin-top:10px;max-height:150px;overflow-y:auto;">'+report.transactions.slice(0,10).map(function(tx){return '<div class="transaction-item"><div><span style="font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,0.06);">'+tx.type+'</span><span style="opacity:0.5;font-size:11px;">'+(tx.description||'')+'</span></div><div style="color:'+(tx.type==='deposit'?'#48bb78':'#fc8181')+';font-weight:600;">'+(tx.type==='deposit'?'+':'-')+'$'+tx.amount.toFixed(2)+'</div></div>';}).join('')+(report.transactions.length>10?'<p style="text-align:center;font-size:10px;color:rgba(255,255,255,0.2);padding-top:4px;">បង្ហាញ ១០ ចុងក្រោយ</p>':'')+'</div></div>';container.innerHTML=html;}

function generateReport(period){var now=new Date();var start=new Date();if(period==='daily'){start.setHours(0,0,0,0);}else if(period==='weekly'){start.setDate(now.getDate()-7);}else if(period==='monthly'){start.setMonth(now.getMonth()-1);}
var filtered=[];for(var i=0;i<data.transactions.length;i++){var t=data.transactions[i];if(new Date(t.timestamp)>=start&&new Date(t.timestamp)<=now&&t.status==='completed')filtered.push(t);}
var totals=calculateTotals(filtered);var tc=0;for(var j=0;j<data.commissions.length;j++)tc+=data.commissions[j].commission;
return{period:period,startDate:start,endDate:now,transactions:filtered,totalDeposits:totals.totalDeposits,totalWithdraws:totals.totalWithdraws,netBalance:totals.netBalance,totalMembers:Object.keys(data.members).length,totalCommissions:tc};}

var tf=document.getElementById('transferForm');if(tf){tf.addEventListener('submit',function(e){e.preventDefault();var user=getCurrentUser();if(!user||user.role!=='sub_admin'){showToast('សូមចូលប្រើជា Sub Admin!','error');return;}var admin=data.subAdmins[user.phone];if(!admin){showToast('មិនឃើញព័ត៌មាន Admin!','error');return;}var phone=document.getElementById('transferPhone').value;var amount=parseFloat(document.getElementById('transferAmount').value);var currency=document.getElementById('transferCurrency').value;var msg=document.getElementById('transferMessage');var amountUSD=currency==='riel'?convertToUSD(amount):amount;if(!amountUSD||amountUSD<=0){msg.innerHTML='<div class="error">សូមបញ្ចូលចំនួនត្រឹមត្រូវ!</div>';return;}if(amountUSD>admin.balance){msg.innerHTML='<div class="error">មិនគ្រប់គ្រាន់! (នៅសល់ $'+admin.balance.toFixed(2)+')</div>';return;}var member=data.members[phone];if(!member){msg.innerHTML='<div class="error">មិនឃើញសមាជិក!</div>';return;}admin.balance-=amountUSD;admin.totalTransferred=(admin.totalTransferred||0)+amountUSD;member.balance+=amountUSD;var date=new Date().toLocaleDateString('km-KH');member.benefits.push('💰 បានទទួល $'+amountUSD.toFixed(2)+' នៅថ្ងៃ '+date);if(admin.members.indexOf(phone)===-1)admin.members.push(phone);saveData();logActivity(admin.id,admin.username,'member_transfer','financial',member.username||member.phone,amountUSD,'ផ្ទេរ $'+amountUSD.toFixed(2)+' ទៅ '+(member.username||member.phone));createTransaction('transfer',member.phone,admin.id,amountUSD,'completed','ផ្ទេរប្រាក់ $'+amountUSD.toFixed(2)+' ពី '+admin.username,null);sendNotification('email',member.phone+'@example.com','អ្នកបានទទួលប្រាក់ $'+amountUSD.toFixed(2)+' ពី '+admin.username);msg.innerHTML='<div class="success">✅ ផ្ទេរ $'+amountUSD.toFixed(2)+' ទៅ '+(member.username||member.phone)+' ជោគជ័យ!<br>💰 ប្រាក់ដែលនៅសល់: $'+admin.balance.toFixed(2)+'</div>';document.getElementById('transferAmount').value='';setTimeout(function(){renderPage('admin-dashboard');},1500);});}
