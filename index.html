<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>គេហទំព័រឆ្នាំសំណាង</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-4">

    <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-center mb-2">ឆ្នាំសំណាងទាំង 12 🎁🎉</h1>
        <p class="text-center text-gray-400 text-sm mb-4">ប្រព័ន្ធទស្សន៍ទាយ និងកត់ត្រាលេខសំណាង</p>
        
        <div class="bg-blue-900/50 p-3 rounded-lg text-center border border-blue-700 mb-6">
            📅 5/6/2026 | ⏰ 14:23:22
        </div>

        <div class="bg-purple-900/30 p-4 rounded-xl border border-purple-700 mb-6 flex justify-between items-center">
            <div>
                <p class="text-gray-400 text-sm">សមតុល្យទឹកប្រាក់បច្ចុប្បន្ន</p>
                <h2 class="text-2xl font-bold text-green-400">$0.00</h2>
            </div>
            <button class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-lg text-sm font-bold">💰 បញ្ចូលទឹកប្រាក់</button>
        </div>

        <div class="text-center">
            <button class="w-full bg-orange-500 hover:bg-orange-600 py-3 rounded-full font-bold mb-3 shadow-lg">🐔 ឆ្នាំរកា</button>
            <button class="w-full bg-pink-500 hover:bg-pink-600 py-3 rounded-full font-bold">🎲 ចុចដើម្បីទស្សន៍ទាយ</button>
        </div>
    </div>

</body>
</html>
