<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>សមាគមន៍ផលិតផលខ្មែរ v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); min-height: 100vh; }

        /* Header Layout */
        header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 18px 5%; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-bottom: 3px solid #d4af37;
        }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        header h1 { font-size: 24px; font-weight: 700; color: #d4af37; letter-spacing: 0.5px; }
        header h1 span { font-size: 14px; color: #94a3b8; font-weight: 400; margin-left: 5px; }
        
        .header-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .distributor-btn { background-color: #d4af37; color: #0f172a; border: none; padding: 10px 18px; font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .distributor-btn:hover { background-color: #f3f0df; transform: translateY(-1px); }
        .admin-btn { background-color: #334155; color: #f8fafc; border: 1px solid #475569; padding: 10px 15px; font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .admin-btn:hover { background-color: #475569; color: #d4af37; }
        .album-manager-btn { background-color: #10b981; color: white; border: none; padding: 10px 18px; font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .album-manager-btn:hover { background-color: #059669; transform: translateY(-1px); }
        .add-product-btn { background-color: #d4af37; color: #0f172a; border: none; padding: 10px 18px; font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .add-product-btn:hover { background-color: #f3f0df; transform: translateY(-1px); }

        .search-container { display: flex; background-color: #fff; border-radius: 6px; overflow: hidden; padding: 3px; border: 1px solid #cbd5e1; }
        .search-container input { width: 100%; padding: 10px 15px; border: none; outline: none; font-size: 14px; color: #334155; }
        .search-btn { background-color: #0f172a; color: #d4af37; border: none; padding: 0 25px; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 4px; }

        /* Album Tabs */
        .album-section { max-width: 1200px; margin: 20px auto 0 auto; padding: 0 20px; }
        .album-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; }
        .album-tabs::-webkit-scrollbar { display: none; }
        .album-tab {
            background-color: #fff; color: #64748b; padding: 8px 20px; border-radius: 20px; border: 1px solid #e2e8f0;
            font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .album-tab.active, .album-tab:hover { background-color: #0f172a; color: #d4af37; border-color: #0f172a; }
        .album-count { background: #e2e8f0; padding: 0 6px; border-radius: 12px; font-size: 11px; color: #475569; }
        .album-tab.active .album-count { background: #d4af37; color: #0f172a; }

        /* Categories (keep original) */
        .category-tabs { max-width: 1200px; margin: 15px auto 0 auto; padding: 0 20px; display: flex; gap: 10px; overflow-x: auto; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background-color: #fff; color: #64748b; padding: 8px 20px; border-radius: 20px; border: 1px solid #e2e8f0; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .tab-btn.active, .tab-btn:hover { background-color: #0f172a; color: #d4af37; border-color: #0f172a; }

        /* Grid */
        .container { max-width: 1200px; margin: 20px auto 60px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        
        .product-card {
            background-color: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0; transition: all 0.25s ease; display: flex; flex-direction: column; justify-content: space-between; position: relative;
        }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-color: #d4af37; }
        .product-image-area { width: 100%; height: 200px; background-color: #f8fafc; overflow: hidden; }
        .product-image-area img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
        .product-code { font-size: 11px; background-color: #f1f5f9; color: #475569; padding: 3px 8px; border-radius: 4px; align-self: flex-start; margin-bottom: 8px; font-weight: 700; }
        .product-title { font-size: 14px; font-weight: 600; line-height: 1.5; height: 42px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: #1e293b; margin-bottom: 10px; }
        .product-price { font-size: 18px; font-weight: 700; color: #dc2626; margin-bottom: 12px; }
        .product-album-badge { font-size: 10px; color: #d4af37; background: #fef3c7; display: inline-block; padding: 2px 8px; border-radius: 12px; margin-bottom: 8px; }
        .view-detail-btn { display: block; width: 100%; padding: 10px; background-color: #fff; color: #0f172a; text-align: center; border: 1px solid #0f172a; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .view-detail-btn:hover { background-color: #0f172a; color: #d4af37; }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background-color: #fff; padding: 30px; border-radius: 12px; width: 100%; max-width: 550px; position: relative; max-height: 95vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; font-weight: bold; color: #94a3b8; cursor: pointer; }
        .close-btn:hover { color: #0f172a; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #334155; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; padding: 11px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; 
            outline: none; background: #fff; color: #1e293b;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { 
            border-color: #d4af37; box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15); 
        }
        .submit-btn-gold {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #0f172a, #1e293b); color: #d4af37;
            border: 1px solid #d4af37; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
            margin-top: 10px; transition: all 0.2s;
        }
        .submit-btn-gold:hover { background: #d4af37; color: #0f172a; transform: translateY(-1px); }
        .image-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .image-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid #e2e8f0; }

        .album-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8fafc; border-radius: 12px; margin-bottom: 10px; }
        .btn-small { padding: 5px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; }
        .btn-edit { background: #0f172a; color: #d4af37; }
        .btn-delete { background: #fee2e2; color: #dc2626; }

        /* Toast */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #d4af37; padding: 12px 24px; border-radius: 50px; font-weight: 600; z-index: 1100; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        footer { text-align: center; padding: 30px; background-color: #fff; color: #64748b; margin-top: 60px; border-top: 1px solid #e2e8f0; font-size: 13px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="top-row">
                <h1>សមាគមន៍ផលិតផលខ្មែរ <span>v2.0</span></h1>
                <div class="header-buttons">
                    <button class="add-product-btn" onclick="openAddProductModal()"><i class="fa-solid fa-plus"></i> បង្ហោះផលិតផល</button>
                    <button class="album-manager-btn" onclick="openAlbumManagerModal()"><i class="fa-solid fa-folder-plus"></i> គ្រប់គ្រង Album</button>
                    <button class="distributor-btn" onclick="openDistributorModal()"><i class="fa-solid fa-handshake"></i> ចុះឈ្មោះតំណាងចែកចាយ</button>
                    <button class="admin-btn" onclick="openLoginModal()">🔐 គ្រប់គ្រងប្រព័ន្ធ</button>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" oninput="searchProducts()" placeholder="ស្វែងរកផលិតផលនៅទីនេះ...">
                <button class="search-btn" onclick="searchProducts()">ស្វែងរក</button>
            </div>
        </div>
    </header>

    <!-- Album Tabs (NEW) -->
    <div class="album-section">
        <div class="album-tabs" id="albumTabs"></div>
    </div>

    <!-- Original Categories -->
    <div class="category-tabs" id="categoryTabs">
        <button class="tab-btn active" onclick="filterCategory('all', this)">📦 ទាំងអស់</button>
        <button class="tab-btn" onclick="filterCategory('food', this)">🍲 ចំណីអាហារ & ភេសជ្ជៈ</button>
        <button class="tab-btn" onclick="filterCategory('handicraft', this)">🏺 សិប្បកម្មខ្មែរ</button>
        <button class="tab-btn" onclick="filterCategory('silk', this)">🧣 សូត្រ & សម្លៀកបំពាក់</button>
        <button class="tab-btn" onclick="filterCategory('souvenir', this)">🎁 វត្ថុអនុស្សាវរីយ៍</button>
    </div>

    <div class="container">
        <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- Modal: Add/Edit Product -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeProductModal()">&times;</span>
            <h2 style="margin-bottom:20px;"><i class="fa-solid fa-cloud-upload-alt"></i> បង្ហោះផលិតផល</h2>
            <form id="productForm" onsubmit="saveProduct(event)">
                <div class="form-group">
                    <label>ជ្រើសរើស Album</label>
                    <select id="productAlbum" required></select>
                </div>
                <div class="form-group">
                    <label>ឈ្មោះផលិតផល</label>
                    <input type="text" id="productTitle" placeholder="ឧ. ម្រេចកំពត" required>
                </div>
                <div class="form-group">
                    <label>តម្លៃ ($)</label>
                    <input type="number" id="productPrice" step="0.01" placeholder="ឧ. 12.50" required>
                </div>
                <div class="form-group">
                    <label>ការពិពណ៌នា</label>
                    <textarea id="productDesc" rows="3" placeholder="ពិពណ៌នាអំពីផលិតផល..." required></textarea>
                </div>
                <div class="form-group">
                    <label>ប្រភេទ (សម្រាប់ច្រោះប្រភេទដើម)</label>
                    <select id="productCategory">
                        <option value="food">🍲 ចំណីអាហារ</option>
                        <option value="handicraft">🏺 សិប្បកម្ម</option>
                        <option value="silk">🧣 សូត្រ</option>
                        <option value="souvenir">🎁 វត្ថុអនុស្សាវរីយ៍</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>រូបភាព</label>
                    <input type="file" id="productImageFile" accept="image/*" onchange="previewProductImage(this)">
                    <div class="image-preview" id="productImagePreview"></div>
                    <small style="color:#64748b;">ឬបញ្ចូល URL រូបភាព</small>
                    <input type="text" id="productImageUrl" placeholder="https://..." style="margin-top:5px;">
                </div>
                <button type="submit" class="submit-btn-gold"><i class="fa-solid fa-save"></i> រក្សាទុក</button>
            </form>
        </div>
    </div>

    <!-- Modal: Album Manager -->
    <div id="albumModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAlbumModal()">&times;</span>
            <h2 style="margin-bottom:20px;"><i class="fa-solid fa-folder-plus"></i> គ្រប់គ្រង Album</h2>
            <form id="albumForm" onsubmit="saveAlbum(event)">
                <div class="form-group">
                    <label>ឈ្មោះ Album</label>
                    <input type="text" id="albumName" placeholder="ឧ. ផលិតផលកសិកម្ម" required>
                </div>
                <div class="form-group">
                    <label>រូបតំណាង</label>
                    <select id="albumIcon">
                        <option value="🌾">🌾 កសិកម្ម</option>
                        <option value="🍲">🍲 ចំណីអាហារ</option>
                        <option value="🏺">🏺 សិប្បកម្ម</option>
                        <option value="🧣">🧣 សូត្រ</option>
                        <option value="🎁">🎁 វត្ថុអនុស្សាវរីយ៍</option>
                        <option value="🎨">🎨 សិល្បៈ</option>
                        <option value="📚">📚 ផ្សេងៗ</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn-gold"><i class="fa-solid fa-check"></i> បង្កើត Album</button>
            </form>
            <div id="albumList" style="margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 20px;"></div>
        </div>
    </div>

    <!-- Original Modals (Login, Distributor, Admin, Detail, Success) -->
    <div id="loginModal" class="modal">
        <div class="login-card" style="background:white; border-radius:16px; padding:35px 30px; max-width:400px; text-align:center;">
            <span class="close-btn" onclick="closeLoginModal()">&times;</span>
            <h3>ផ្ទៀងផ្ទាត់អ្នកគ្រប់គ្រង</h3>
            <p style="margin:15px 0;">សូមបញ្ចូលលេខកូដសម្ងាត់បច្ចេកទេស</p>
            <form onsubmit="verifyAdminPassword(event)">
                <div class="form-group">
                    <input type="password" id="adminPassInput" placeholder="លេខសម្ងាត់..." required>
                </div>
                <button type="submit" class="submit-btn-gold">🔐 ផ្ទៀងផ្ទាត់</button>
            </form>
        </div>
    </div>

    <div id="distributorModal" class="modal"><div class="modal-content" style="max-width:600px;"><span class="close-btn" onclick="closeDistributorModal()">&times;</span><h2>ចុះឈ្មោះជាតំណាងចែកចាយ</h2><form id="distForm" onsubmit="submitDistForm(event)"><div class="form-group"><input type="text" id="distName" placeholder="ឈ្មោះពេញ" required></div><div class="form-group"><input type="number" id="distAge" placeholder="អាយុ" required></div><div class="form-group"><input type="text" id="distJob" placeholder="មុខរបរ" required></div><div class="form-group"><input type="text" id="distTel" placeholder="លេខទូរសព្ទ / Telegram" required></div><button type="submit" class="submit-btn-gold">បញ្ជូន</button></form></div></div>

    <div id="adminModal" class="modal"><div class="modal-content" style="max-width:680px;"><span class="close-btn" onclick="closeAdminModal()">&times;</span><h2>ផ្ទាំងគ្រប់គ្រង</h2><div id="adminEditor"><input type="text" id="adminSearchCode" placeholder="ស្វែងរកតាមកូដ"><button onclick="loadToEdit()">ស្វែងរក</button><div id="editArea"></div></div></div></div>

    <div id="detailModal" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeDetail()">&times;</span><div id="detailCode"></div><div id="sliderArea" style="height:250px; position:relative;"><div id="sliderWrap" style="display:flex; height:100%;"></div><button onclick="moveSlide(-1)">❮</button><button onclick="moveSlide(1)">❯</button></div><h3 id="detailTitle"></h3><div id="detailPrice"></div><p id="detailDesc"></p><div class="order-form-section"><h4>បំពេញព័ត៌មានទិញទំនិញ</h4><form onsubmit="submitOrder(event)"><input type="text" id="orderName" placeholder="ឈ្មោះ" required><input type="text" id="orderTel" placeholder="លេខទូរសព្ទ" required><textarea id="orderAddr" rows="2" placeholder="អាសយដ្ឋាន"></textarea><input type="file" id="orderReceipt" accept="image/*" required><button type="submit" class="submit-btn-gold">យល់ព្រមទិញ</button></form></div></div></div>

    <div id="successModal" class="modal"><div class="success-card"><h3 id="succTitle"></h3><p id="succMsg"></p><button onclick="closeSuccess()">យល់ព្រម</button></div></div>

    <footer><p>&copy; 2026 សមាគមន៍ផលិតផលខ្មែរ - រក្សាសិទ្ធិគ្រប់យ៉ាង</p></footer>

        let qrZoomScale = parseFloat(localStorage.getItem('kpa_v1_qr_zoom')) || 1.0;
        let qrPosX = parseInt(localStorage.getItem('kpa_v1_qr_pos_x')) || 0;
        let qrPosY = parseInt(localStorage.getItem('kpa_v1_qr_pos_y')) || 0;
        let accountName = localStorage.getItem('kpa_v1_acc_name') || 'គណនី៖ សមាគមន៍ផលិតផលខ្មែរ';
        let accountNumber = localStorage.getItem('kpa_v1_acc_num') || 'លេខគណនី៖ 000 555 999';
        
        // Helper Functions
        function saveAllData() {
            localStorage.setItem('kpa_albums', JSON.stringify(albums));
            localStorage.setItem('kpa_products', JSON.stringify(products));
            // Also sync to original format for backward compatibility
            syncToOriginalDB();
        }
        
        function syncToOriginalDB() {
            const allProductsForDisplay = [...originalDB, ...products.map(p => ({
                id: parseInt(p.id.replace('prod_', '')) || Date.now(),
                category: p.category || 'food',
                code: p.code || `KP-${String(Date.now()).slice(-6)}`,
                title: p.title,
                price: `$${p.price.toFixed(2)}`,
                desc: p.desc,
                images: [p.image, p.image, p.image, p.image]
            }))];
            localStorage.setItem('kpa_v1_db', JSON.stringify(allProductsForDisplay));
        }
        
        function getCombinedProducts() {
            const originalProducts = originalDB.map(p => ({
                id: p.id,
                albumId: null,
                title: p.title,
                price: parseFloat(p.price.replace('$', '')),
                desc: p.desc,
                image: p.images[0],
                category: p.category,
                code: p.code,
                isOriginal: true
            }));
            return [...originalProducts, ...products];
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Render Albums
        function renderAlbums() {
            const container = document.getElementById('albumTabs');
            if (!container) return;
            let html = `<button class="album-tab ${currentAlbumFilter === 'all' ? 'active' : ''}" data-album="all">📦 ទាំងអស់ <span class="album-count">${getCombinedProducts().length}</span></button>`;
            albums.forEach(album => {
                const count = products.filter(p => p.albumId === album.id).length;
                html += `<button class="album-tab ${currentAlbumFilter === album.id ? 'active' : ''}" data-album="${album.id}">${album.icon} ${album.name} <span class="album-count">${count}</span></button>`;
            });
            container.innerHTML = html;
            document.querySelectorAll('.album-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentAlbumFilter = tab.dataset.album;
                    renderAlbums();
                    renderProducts();
                });
            });
        }
        
        // Render Products (combines original + new products)
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            if (!grid) return;
            
            let allProducts = getCombinedProducts();
            let filtered = allProducts;
            
            // Filter by Album (only for new products)
            if (currentAlbumFilter !== 'all') {
                filtered = allProducts.filter(p => p.albumId === currentAlbumFilter);
            }
            
            // Filter by Category (original categories)
            if (currentCategoryFilter !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategoryFilter || (p.isOriginal && p.category === currentCategoryFilter));
            }
            
            // Search
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(p => p.title.toLowerCase().includes(searchTerm) || (p.code && p.code.toLowerCase().includes(searchTerm)));
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;"><i class="fa-solid fa-box-open" style="font-size:48px; color:#cbd5e1;"></i><h3>មិនទាន់មានផលិតផលនៅឡើយទេ</h3><button class="add-product-btn" onclick="openAddProductModal()">បង្ហោះផលិតផលដំបូង</button></div>`;
                return;
            }
            
            grid.innerHTML = filtered.map(p => {
                const album = p.albumId ? albums.find(a => a.id === p.albumId) : null;
                return `
                    <div class="product-card">
                        <div class="product-image-area"><img src="${p.image}" onerror="this.src='https://placehold.co/400x400?text=No+Image'"></div>
                        <div class="product-info">
                            <div class="product-code">${p.code || 'កូដថ្មី'}</div>
                            ${album ? `<div class="product-album-badge">${album.icon} ${album.name}</div>` : ''}
                            <div class="product-title">${escapeHtml(p.title)}</div>
                            <div class="product-price">$${p.price.toFixed(2)}</div>
                            <button class="view-detail-btn" onclick="openDetailForProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})">មើលលម្អិត</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        function searchProducts() { renderProducts(); }
        function filterCategory(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategoryFilter = cat;
            renderProducts();
        }
        
        // Product CRUD
        function openAddProductModal() {
            if (!isAdminLoggedIn) { showToast('សូមចូលប្រើប្រាស់ជាអ្នកគ្រប់គ្រងមុនសិន!'); openLoginModal(); return; }
            editingProductId = null;
            document.getElementById('productForm').reset();
            document.getElementById('productImagePreview').innerHTML = '';
            populateAlbumSelect();
            document.getElementById('productModal').style.display = 'flex';
        }
        
        function populateAlbumSelect(selectedId = '') {
            const select = document.getElementById('productAlbum');
            select.innerHTML = albums.map(a => `<option value="${a.id}" ${selectedId === a.id ? 'selected' : ''}>${a.icon} ${a.name}</option>`).join('');
        }
        
        function previewProductImage(input) {
            const preview = document.getElementById('productImagePreview');
            preview.innerHTML = '';
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { preview.innerHTML = `<img src="${e.target.result}">`; document.getElementById('productImageUrl').value = ''; };
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        function saveProduct(event) {
            event.preventDefault();
            const albumId = document.getElementById('productAlbum').value;
            const title = document.getElementById('productTitle').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const desc = document.getElementById('productDesc').value;
            const category = document.getElementById('productCategory').value;
            let image = document.getElementById('productImageUrl').value;
            const imageFile = document.getElementById('productImageFile').files[0];
            
            if (imageFile && !image) {
                const reader = new FileReader();
                reader.onload = e => { saveToDB(albumId, title, price, desc, category, e.target.result); };
                reader.readAsDataURL(imageFile);
            } else {
                if (!image) image = 'https://placehold.co/400x400?text=Product';
                saveToDB(albumId, title, price, desc, category, image);
            }
        }
        
        function saveToDB(albumId, title, price, desc, category, image) {
            const newProduct = {
                id: 'prod_' + Date.now(),
                albumId,
                title,
                price,
                desc,
                category,
                image,
                code: `KP-${String(Date.now()).slice(-6)}`,
                createdAt: Date.now()
            };
            products.push(newProduct);
            saveAllData();
            closeProductModal();
            renderAlbums();
            renderProducts();
            showToast('បង្ហោះផលិតផលជោគជ័យ!');
        }
        
        // Album CRUD
        function openAlbumManagerModal() {
            if (!isAdminLoggedIn) { showToast('សូមចូលប្រើប្រាស់ជាអ្នកគ្រប់គ្រងមុនសិន!'); openLoginModal(); return; }
            editingAlbumId = null;
            document.getElementById('albumForm').reset();
            renderAlbumList();
            document.getElementById('albumModal').style.display = 'flex';
        }
        
        function renderAlbumList() {
            const container = document.getElementById('albumList');
            if (albums.length === 0) { container.innerHTML = '<p>មិនទាន់មាន Album</p>'; return; }
            container.innerHTML = '<h4>បញ្ជី Album</h4>';
            albums.forEach(album => {
                const count = products.filter(p => p.albumId === album.id).length;
                container.innerHTML += `
                    <div class="album-list-item">
                        <div><span style="font-size:20px;">${album.icon}</span> <strong>${album.name}</strong> (${count} ផលិតផល)</div>
                        <div>
                            <button class="btn-small btn-edit" onclick="editAlbum('${album.id}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-small btn-delete" onclick="deleteAlbum('${album.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }
        
        function editAlbum(albumId) {
            const album = albums.find(a => a.id === albumId);
            if (album) {
                editingAlbumId = albumId;
                document.getElementById('albumName').value = album.name;
                document.getElementById('albumIcon').value = album.icon;
            }
        }
        
        function saveAlbum(event) {
            event.preventDefault();
            const name = document.getElementById('albumName').value;
            const icon = document.getElementById('albumIcon').value;
            if (editingAlbumId) {
                const index = albums.findIndex(a => a.id === editingAlbumId);
                if (index !== -1) albums[index] = { ...albums[index], name, icon };
                editingAlbumId = null;
            } else {
                albums.push({ id: 'album_' + Date.now(), name, icon });
            }
            saveAllData();
            document.getElementById('albumForm').reset();
            renderAlbumList();
            renderAlbums();
            showToast('រក្សាទុក Album ជោគជ័យ!');
        }
        
        function deleteAlbum(albumId) {
            if (confirm('តើចង់លុប Album នេះទេ? ផលិតផលក្នុង Album នឹងនៅដដែល')) {
                albums = albums.filter(a => a.id !== albumId);
                saveAllData();
                renderAlbumList();
                renderAlbums();
                showToast('លុប Album ជោគជ័យ!');
            }
        }
        
        // Original Functions (Telegram, QR, Distributor, etc.)
        function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
        function verifyAdminPassword(e) { e.preventDefault(); if(document.getElementById('adminPassInput').value === 'Qq128080') { isAdminLoggedIn = true; closeLoginModal(); showToast('ចូលប្រព័ន្ធជោគជ័យ!'); } else { showToast('លេខសម្ងាត់មិនត្រឹមត្រូវ!'); } }
        function openDistributorModal() { document.getElementById('distributorModal').style.display = 'flex'; }
        function closeDistributorModal() { document.getElementById('distributorModal').style.display = 'none'; }
        function closeProductModal() { document.getElementById('productModal').style.display = 'none'; }
        function closeAlbumModal() { document.getElementById('albumModal').style.display = 'none'; }
        function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }
        function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }
        function closeSuccess() { document.getElementById('successModal').style.display = 'none'; }
        
        function submitDistForm(e) { e.preventDefault(); const name = document.getElementById('distName').value; const age = document.getElementById('distAge').value; const job = document.getElementById('distJob').value; const tel = document.getElementById('distTel').value; fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: CHAT_ID, text: `🤝 តំណាងចែកចាយថ្មី\nឈ្មោះ: ${name}\nអាយុ: ${age}\nមុខរបរ: ${job}\nទំនាក់ទំនង: ${tel}`, parse_mode: 'Markdown' }) }).then(() => { closeDistributorModal(); showToast('ដាក់ពាក្យជោគជ័យ!'); }); }
        
        let actP = null, curS = 0;
        function openDetailForProduct(p) { actP = p; curS = 0; document.getElementById('detailCode').innerText = p.code || 'កូដថ្មី'; document.getElementById('detailTitle').innerText = p.title; document.getElementById('detailPrice').innerText = `$${p.price.toFixed(2)}`; document.getElementById('detailDesc').innerText = p.desc; document.getElementById('sliderWrap').innerHTML = `<img src="${p.image}" style="width:100%; height:100%; object-fit:contain;">`; document.getElementById('detailModal').style.display = 'flex'; }
        function moveSlide(d) { curS += d; updateS(); }
        function updateS() { document.getElementById('sliderWrap').style.transform = `translateX(-${curS * 100}%)`; }
        
        function submitOrder(e) { e.preventDefault(); const name = document.getElementById('orderName').value; const tel = document.getElementById('orderTel').value; const addr = document.getElementById('orderAddr').value; const file = document.getElementById('orderReceipt').files[0]; if (!file) { showToast('សូមភ្ជាប់រូបភាពបង្កាន់ដៃ!'); return; } const fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('photo', file); fd.append('caption', `🛍️ កម្ម៉ង់ថ្មី\nផលិតផល: ${actP.title}\nតម្លៃ: $${actP.price}\nឈ្មោះ: ${name}\nទូរសព្ទ: ${tel}\nអាសយដ្ឋាន: ${addr}\n\n*សូមពិនិត្យបង្កាន់ដៃខាងលើ*`, 'parse_mode': 'Markdown'); fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd }).then(() => { closeDetail(); showToast('បញ្ជាទិញជោគជ័យ!'); }).catch(() => showToast('មានបញ្ហា សូមព្យាយាមម្តងទៀត')); }
        
        function loadToEdit() { alert('មុខងារកែប្រែកំពុងអភិវឌ្ឍន៍'); }
        
        // Initialize
        renderAlbums();
        renderProducts();
    </script>
</body>
</html>
