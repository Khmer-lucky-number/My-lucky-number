<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិក</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Khmer OS', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 95vh;
            overflow-y: auto;
            color: #fff;
        }
        .container::-webkit-scrollbar { width: 4px; }
        .container::-webkit-scrollbar-thumb { background: #667eea; border-radius: 10px; }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        h2 { font-size: 1.2rem; margin-bottom: 8px; color: #fff; }
        p { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 10px; }

        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            margin: 5px 0;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        input:focus, select:focus {
            border-color: #667eea;
            background: rgba(255,255,255,0.1);
        }
        input::placeholder { color: rgba(255,255,255,0.3); }
        select option { background: #1a1a2e; color: #fff; }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px 0;
            text-align: center;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .btn-gold { background: linear-gradient(135deg, #ffd700, #f59e0b); color: #1a1a2e; }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(255,215,0,0.4); }
        .btn-green { background: linear-gradient(135deg, #48bb78, #38a169); color: #fff; }
        .btn-green:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(72,187,120,0.4); }
        .btn-red { background: linear-gradient(135deg, #fc8181, #e53e3e); color: #fff; }
        .btn-red:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(252,129,129,0.4); }
        .btn-sm { padding: 6px 12px; font-size: 12px; width: auto; display: inline-block; }

        .card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 14px;
            border-radius: 12px;
            margin: 10px 0;
        }
        .card h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 5px;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
        .badge-gold { background: #ffd700; color: #1a1a2e; }
        .badge-purple { background: #9f7aea; color: #fff; }
        .badge-green { background: #48bb78; color: #fff; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .back-link {
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 13px;
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            transition: 0.3s;
        }
        .back-link:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .list-item {
            background: rgba(255,255,255,0.04);
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 13px;
        }
        .list-item .info { flex: 1; min-width: 100px; }
        .list-item .info .name { color: #fff; font-weight: 600; }
        .list-item .info .sub { font-size: 11px; color: rgba(255,255,255,0.4); }
        .list-item .balance { color: #48bb78; font-weight: 600; }
        .list-item .actions { display: flex; gap: 4px; flex-wrap: wrap; }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin: 6px 0;
        }
        .summary-stats .box {
            background: rgba(255,255,255,0.04);
            padding: 6px;
            border-radius: 8px;
            text-align: center;
        }
        .summary-stats .box .num { font-size: 16px; font-weight: 700; }
        .summary-stats .box .label { font-size: 9px; color: rgba(255,255,255,0.3); text-transform: uppercase; }
        .summary-stats .box .green { color: #48bb78; }
        .summary-stats .box .red { color: #fc8181; }
        .summary-stats .box .gold { color: #ffd700; }

        .file-upload {
            border: 2px dashed rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px 0;
        }
        .file-upload:hover { border-color: #667eea; background: rgba(255,255,255,0.03); }
        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .file-upload { position: relative; }
        .file-upload .icon { font-size: 24px; display: block; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            max-width: 300px;
        }
        .toast-success { background: #48bb78; }
        .toast-error { background: #fc8181; }
        .toast-info { background: #667eea; }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #modalOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9998;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        #modalOverlay.show { display: flex; }
        #modalContent {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 90vh;
            overflow-y: auto;
        }
        #modalContent h3 { color: #ffd700; margin-bottom: 10px; }
        #modalContent .btn { margin-top: 8px; }

        .text-center { text-align: center; }
        .mt-10 { margin-top: 10px; }
        .mt-20 { margin-top: 20px; }
        .fs-12 { font-size: 12px; }
        .op-3 { opacity: 0.3; }
        .flex { display: flex; gap: 8px; flex-wrap: wrap; }
        .flex .btn { flex: 1; }

        .amount-btn {
            padding: 5px 12px;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 6px;
            color: #ffd700;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        .amount-btn:hover { background: rgba(255,215,0,0.2); }
        .amount-btn.active { background: rgba(255,215,0,0.3); border-color: #ffd700; }

        @media (max-width: 480px) {
            .container { padding: 12px; }
            .summary-stats { grid-template-columns: 1fr 1fr 1fr; }
            .list-item { flex-direction: column; align-items: stretch; }
            .list-item .actions { justify-content: flex-end; }
        }
    </style>
</head>
<body>

    <div id="modalOverlay">
        <div id="modalContent"></div>
    </div>

    <div class="container" id="app">
        <div id="pageContent"></div>
    </div>

    <script>
        // ================================================================
        // DATA
        // ================================================================

        var data = JSON.parse(localStorage.getItem('memberData')) || {
            superAdmin: {
                phone: '066817407',
                password: 'super123',
                email: 'narith128080@gmail.com'
            },
            subAdmins: {},
            members: {},
            transactions: [],
            commissions: [],
            memberCounter: 0,
            adminCounter: 0
        };

        function save() {
            localStorage.setItem('memberData', JSON.stringify(data));
        }

        function getCurrentUser() {
            var user = localStorage.getItem('currentUser');
            return user ? JSON.parse(user) : null;
        }

        function setCurrentUser(user) {
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
            } else {
                localStorage.removeItem('currentUser');
            }
        }

        function genId(prefix) {
            var count = data.memberCounter + 1;
            data.memberCounter = count;
            save();
            var str = String(count);
            while (str.length < 4) str = '0' + str;
            return prefix + '-' + str;
        }

        function genAdminId() {
            var count = data.adminCounter + 1;
            data.adminCounter = count;
            save();
            var str = String(count);
            while (str.length < 4) str = '0' + str;
            return 'A-' + str;
        }

        function formatCurrency(amount, currency) {
            if (currency === 'riel') {
                return Math.round(amount * 4000).toLocaleString('km-KH') + ' ៛';
            }
            return '$' + amount.toFixed(2);
        }

        function showToast(msg, type) {
            var old = document.querySelector('.toast');
            if (old) old.remove();
            var el = document.createElement('div');
            el.className = 'toast toast-' + (type || 'info');
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(function() {
                el.style.opacity = '0';
                el.style.transform = 'translateX(100px)';
                setTimeout(function() { el.remove(); }, 300);
            }, 3000);
        }

        function showModal(html) {
            var overlay = document.getElementById('modalOverlay');
            var content = document.getElementById('modalContent');
            content.innerHTML = html;
            overlay.classList.add('show');
            overlay.onclick = function(e) {
                if (e.target === overlay) hideModal();
            };
        }

        function hideModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // ================================================================
        // RENDER
        // ================================================================

        function renderPage(page) {
            var container = document.getElementById('pageContent');
            var html = '';

            switch (page) {
                case 'home': html = renderHome(); break;
                case 'login': html = renderLogin(); break;
                case 'register': html = renderRegister(); break;
                case 'super-login': html = renderSuperLogin(); break;
                case 'super-dashboard': html = renderSuperDashboard(); break;
                case 'admin-dashboard': html = renderAdminDashboard(); break;
                case 'member-dashboard': html = renderMemberDashboard(); break;
                case 'transfer': html = renderTransfer(); break;
                case 'activity': html = renderActivity(); break;
                case 'report': html = renderReport(); break;
                default: html = renderHome();
            }

            container.innerHTML = html;
            attachEvents(page);
        }

        // ===== HOME =====
        function renderHome() {
            return `
                <div class="text-center">
                    <h1>🏦 ស្វាគមន៍!</h1>
                    <p>ប្រព័ន្ធគ្រប់គ្រងសមាជិក</p>
                    <div style="height:2px;width:40px;background:linear-gradient(90deg,#667eea,transparent);margin:10px auto;"></div>

                    <div style="margin:15px 0;">
                        <div onclick="renderPage('login')" style="background:rgba(255,255,255,0.05);padding:15px;border-radius:12px;margin:8px 0;cursor:pointer;border:2px solid rgba(255,255,255,0.05);">
                            <div style="font-size:28px;">👤</div>
                            <div style="font-weight:600;">ចូលប្រើជាសមាជិក</div>
                            <div style="font-size:12px;color:rgba(255,255,255,0.4);">សម្រាប់អ្នកប្រើប្រាស់ទូទៅ</div>
                        </div>
                        <div onclick="renderPage('login')" style="background:rgba(255,215,0,0.05);padding:15px;border-radius:12px;margin:8px 0;cursor:pointer;border:2px solid rgba(255,215,0,0.1);">
                            <div style="font-size:28px;">👑</div>
                            <div style="font-weight:600;">ចូលប្រើជា Sub Admin</div>
                            <div style="font-size:12px;color:rgba(255,255,255,0.4);">សម្រាប់អ្នកគ្រប់គ្រង</div>
                        </div>
                        <div onclick="renderPage('super-login')" style="background:rgba(255,215,0,0.08);padding:15px;border-radius:12px;margin:8px 0;cursor:pointer;border:2px solid rgba(255,215,0,0.2);">
                            <div style="font-size:28px;">⭐</div>
                            <div style="font-weight:600;">ចូលប្រើជា Super Admin</div>
                            <div style="font-size:12px;color:rgba(255,255,255,0.4);">សម្រាប់អ្នកគ្រប់គ្រងកំពូល</div>
                        </div>
                    </div>

                    <button onclick="renderPage('register')" class="btn btn-green">📝 ចុះឈ្មោះជាសមាជិក</button>
                </div>
            `;
        }

        // ===== LOGIN =====
        function renderLogin() {
            return `
                <div class="top-bar">
                    <h2>🔑 ចូលប្រើ</h2>
                    <span class="back-link" onclick="renderPage('home')">← ត្រឡប់</span>
                </div>
                <p>បញ្ចូលលេខទូរសព្ទ និងពាក្យសម្ងាត់</p>

                <form id="loginForm">
                    <input type="tel" id="loginPhone" placeholder="📱 លេខទូរសព្ទ" required>
                    <input type="password" id="loginPassword" placeholder="🔒 ពាក្យសម្ងាត់" required>
                    <button type="submit" class="btn btn-primary">🔑 ចូលប្រើ</button>
                </form>
                <div id="loginMsg"></div>
                <p class="text-center mt-10 fs-12">មិនទាន់មានគណនី? <span onclick="renderPage('register')" style="color:#667eea;cursor:pointer;">ចុះឈ្មោះ</span></p>
            `;
        }

        // ===== REGISTER =====
        function renderRegister() {
            return `
                <div class="top-bar">
                    <h2>📝 ចុះឈ្មោះ</h2>
                    <span class="back-link" onclick="renderPage('home')">← ត្រឡប់</span>
                </div>
                <p>បង្កើតគណនីថ្មី</p>

                <form id="registerForm">
                    <input type="text" id="regName" placeholder="👤 ឈ្មោះ">
                    <input type="tel" id="regPhone" placeholder="📱 លេខទូរសព្ទ" required>
                    <input type="password" id="regPassword" placeholder="🔒 ពាក្យសម្ងាត់" required>
                    <input type="password" id="regConfirm" placeholder="🔑 បញ្ជាក់ពាក្យសម្ងាត់" required>
                    <select id="regCurrency">
                        <option value="usd">$ USD</option>
                        <option value="riel">៛ Riel</option>
                    </select>
                    <button type="submit" class="btn btn-green">📝 ចុះឈ្មោះ</button>
                </form>
                <div id="regMsg"></div>
                <p class="text-center mt-10 fs-12 op-3">⚠️ សូមចំណាំលេខទូរសព្ទ និងពាក្យសម្ងាត់!</p>
            `;
        }

        // ===== SUPER LOGIN =====
        function renderSuperLogin() {
            return `
                <div class="top-bar">
                    <h2>⭐ Super Admin</h2>
                    <span class="back-link" onclick="renderPage('home')">← ត្រឡប់</span>
                </div>
                <p>បញ្ចូលព័ត៌មានដើម្បីចូល</p>

                <form id="superLoginForm">
                    <input type="tel" id="superPhone" placeholder="📱 លេខទូរសព្ទ" value="066817407">
                    <input type="password" id="superPassword" placeholder="🔒 ពាក្យសម្ងាត់" required>
                    <button type="submit" class="btn btn-gold">⭐ ចូលប្រើ</button>
                </form>
                <div id="superLoginMsg"></div>
            `;
        }

        // ================================================================
        // DASHBOARDS
        // ================================================================

        // ===== MEMBER DASHBOARD =====
        function renderMemberDashboard() {
            var user = getCurrentUser();
            if (!user || user.role !== 'member') {
                renderPage('home');
                return '';
            }

            var member = data.members[user.phone];
            if (!member) { showToast('មិនឃើញព័ត៌មាន!', 'error'); renderPage('home'); return ''; }

            var admin = Object.values(data.subAdmins)[0];
            var currency = member.currency || 'usd';

            // ប្រវត្តិប្រតិបត្តិការ
            var txs = data.transactions.filter(function(t) { return t.memberPhone === member.phone; });
            var txHtml = '';
            if (txs.length === 0) {
                txHtml = '<p style="opacity:0.4;font-size:12px;">មិនទាន់មានប្រតិបត្តិការ</p>';
            } else {
                var totalDeposit = 0, totalWithdraw = 0;
                for (var i = 0; i < txs.length; i++) {
                    if (txs[i].status === 'completed') {
                        if (txs[i].type === 'deposit') totalDeposit += txs[i].amount;
                        else if (txs[i].type === 'withdraw') totalWithdraw += txs[i].amount;
                    }
                }
                txHtml = `
                    <div class="summary-stats">
                        <div class="box"><div class="num green">${formatCurrency(totalDeposit, currency)}</div><div class="label">ដាក់</div></div>
                        <div class="box"><div class="num red">${formatCurrency(totalWithdraw, currency)}</div><div class="label">ដក</div></div>
                        <div class="box"><div class="num gold">${formatCurrency(totalDeposit - totalWithdraw, currency)}</div><div class="label">សល់</div></div>
                    </div>
                `;
                for (var j = 0; j < Math.min(txs.length, 10); j++) {
                    var t = txs[j];
                    var sign = t.type === 'deposit' ? '+' : '-';
                    var color = t.type === 'deposit' ? '#48bb78' : '#fc8181';
                    txHtml += `
                        <div class="transaction-item">
                            <div>
                                <span style="font-size:10px;padding:1px 6px;border-radius:6px;background:rgba(255,255,255,0.06);">${t.type}</span>
                                <span style="opacity:0.4;font-size:10px;">${t.status === 'completed' ? '✅' : t.status === 'pending' ? '⏳' : '❌'}</span>
                                <span style="opacity:0.5;font-size:11px;">${t.description || ''}</span>
                            </div>
                            <div style="color:${color};font-weight:600;">${sign}${formatCurrency(t.amount, currency)}</div>
                        </div>
                    `;
                }
                if (txs.length > 10) {
                    txHtml += '<p style="text-align:center;font-size:10px;color:rgba(255,255,255,0.2);padding-top:4px;">បង្ហាញ ១០ ចុងក្រោយ</p>';
                }
            }

            // Commission
            var comms = data.commissions.filter(function(c) { return c.memberPhone === member.phone; });
            var commHtml = '';
            if (comms.length === 0) {
                commHtml = '<p style="opacity:0.4;font-size:12px;">មិនទាន់មានកម្រៃ</p>';
            } else {
                var totalComm = 0;
                for (var k = 0; k < comms.length; k++) {
                    totalComm += comms[k].amount;
                }
                commHtml = '<div style="color:#9f7aea;font-weight:600;">កម្រៃសរុប: ' + formatCurrency(totalComm, currency) + '</div>';
                for (var l = 0; l < Math.min(comms.length, 5); l++) {
                    var c = comms[l];
                    commHtml += `
                        <div class="transaction-item">
                            <div><span style="opacity:0.5;font-size:11px;">${new Date(c.date).toLocaleDateString('km-KH')}</span></div>
                            <div style="color:#9f7aea;">+${formatCurrency(c.amount, currency)}</div>
                        </div>
                    `;
                }
            }

            // Benefits
            var benefitsHtml = '';
            if (member.benefits && member.benefits.length > 0) {
                for (var b = 0; b < member.benefits.length; b++) {

        // ================================================================

        function renderActivity() {
            var logs = data.activityLogs || [];
            var html = `
                <div class="top-bar">
                    <h2>📋 កំណត់ត្រាសកម្មភាព</h2>
                    <span class="back-link" onclick="goBack()">← ត្រឡប់</span>
                </div>
                <p style="font-size:12px;color:rgba(255,255,255,0.3);">សរុប ${logs.length} កំណត់ត្រា</p>
            `;
            if (logs.length === 0) {
                html += '<p style="opacity:0.4;">មិនទាន់មានសកម្មភាព</p>';
            } else {
                for (var i = 0; i < Math.min(logs.length, 30); i++) {
                    var log = logs[i];
                    var d = new Date(log.date);
                    html += `
                        <div class="list-item">
                            <div class="info">
                                <span class="name">${log.admin || 'System'}</span>
                                <span class="sub">${log.action}</span>
                                ${log.details ? '<span class="sub" style="color:rgba(255,255,255,0.3);">' + log.details + '</span>' : ''}
                            </div>
                            <div style="font-size:10px;color:rgba(255,255,255,0.3);text-align:right;">
                                ${d.toLocaleDateString('km-KH')}<br>${d.toLocaleTimeString('km-KH')}
                            </div>
                        </div>
                    `;
                }
            }
            return html;
        }

                        id: id,

                        totalReceived: 0,

                        date: new Date().toISOString()
                    };

                    save();
                    addLog('system', 'បង្កើត Sub Admin', name + ' (' + phone + ')');
                    msg.innerHTML = '<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ បង្កើតជោគជ័យ!<br>🆔 ' + id + '</div>';
                    setTimeout(function() { renderPage('super-dashboard'); }, 1000);

                    e.preventDefault();

                    var currency = document.getElementById('fundCurrency').value;

                        msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">មិនទាន់មាន Sub Admin!</div>';

                        return;

                    document.getElementById('fundAmount').value = '';
                    setTimeout(function() { renderPage('super-dashboard'); }, 1000);

                    e.preventDefault();

                    if (!user || user.role !== 'sub_admin') { showToast('សូមចូលប្រើជា Sub Admin!', 'error'); return; }

                transferForm.onsubmit = function(e) {
                    e.preventDefault();
                    var user = getCurrentUser();
                    if (!user || user.role !== 'sub_admin') { showToast('សូមចូលប្រើជា Sub Admin!', 'error'); return; }

                    var admin = data.subAdmins[user.phone];
                    var phone = document.getElementById('transferPhone').value;
                    var amount = parseFloat(document.getElementById('transferAmount').value);

                        msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបញ្ចូលចំនួនត្រឹមត្រូវ!</div>';
                        return;
                    }
                    if (usdAmount > admin.balance) {
                        msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">មិនគ្រប់គ្រាន់! (នៅសល់ $' + admin.balance.toFixed(2) + ')</div>';
                        return;

                        return;
                    }

                    admin.balance -= usdAmount;
                    member.balance += usdAmount;
                    member.benefits.push('💰 បានទទួល $' + usdAmount.toFixed(2) + ' នៅថ្ងៃ ' + new Date().toLocaleDateString('km-KH'));

                    var tx = {
                        id: 'TX-' + String(data.transactions.length + 1).padStart(6, '0'),
                        type: 'transfer',
                        memberPhone: member.phone,
                        amount: usdAmount,
                        status: 'completed',
                        description: 'ផ្ទេរពី ' + admin.name,
                        date: new Date().toISOString()
                    };
                    data.transactions.push(tx);

                    save();
                    addLog('admin', 'ផ្ទេរប្រាក់', 'ផ្ទេរ $' + usdAmount.toFixed(2) + ' ទៅ ' + (member.name || member.phone));

                    msg.innerHTML = '<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ ផ្ទេរ $' + usdAmount.toFixed(2) + ' ទៅ ' + (member.name || member.phone) + ' ជោគជ័យ!</div>';
                    document.getElementById('transferAmount').value = '';
                    setTimeout(function() { renderPage('admin-dashboard'); }, 1000);
                };
            }

            var withdrawForm = document.getElementById('withdrawForm');
            if (withdrawForm) {
                withdrawForm.onsubmit = function(e) {
                    e.preventDefault();
                    submitWithdraw();
                };
            }
        }

        // ================================================================
        // FUNCTIONS
        // ================================================================

        function setWithdrawAmount(amount) {
            document.getElementById('withdrawAmount').value = amount;
            var btns = document.querySelectorAll('.amount-btn');
            btns.forEach(function(b) { b.classList.remove('active'); });
            btns.forEach(function(b) {
                if (b.textContent.trim() === '$' + amount) b.classList.add('active');
            });
        }

        function handleDepositFile(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('depositFileName').textContent = '✅ ' + file.name;
                document.getElementById('depositPreview').innerHTML = '<img src="' + e.target.result + '" style="max-width:100px;max-height:100px;border-radius:6px;margin-top:4px;">';
                input.dataset.qrData = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleWithdrawFile(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('withdrawFileName').textContent = '✅ ' + file.name;
                document.getElementById('withdrawPreview').innerHTML = '<img src="' + e.target.result + '" style="max-width:100px;max-height:100px;border-radius:6px;margin-top:4px;">';
                input.dataset.qrData = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleQRFile(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('qrFileName').textContent = '✅ ' + file.name;
                document.getElementById('qrPreview').innerHTML = '<img src="' + e.target.result + '" style="max-width:100px;max-height:100px;border-radius:6px;margin-top:4px;">';
                input.dataset.qrData = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function submitDeposit() {
            var amount = parseFloat(document.getElementById('depositAmount').value);
            var currency = document.getElementById('depositCurrency').value;
            var fileInput = document.getElementById('depositFile');
            var hasImage = fileInput && fileInput.dataset.qrData;
            var msg = document.getElementById('depositMsg');

            if (!amount || amount <= 0) {
                msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបញ្ចូលចំនួន!</div>';
                return;
            }
            if (!hasImage) {
                msg.innerHTML = '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបញ្ចូលរូបភាព!</div>';
                return;
            }

            var usdAmount = currency === 'riel' ? amount / 4000 : amount;
            var user = getCurrentUser();
            var member = data.members[user.phone];

            var tx = {
                id: 'TX-' + String(data.transactions.length + 1).padStart(6, '0'),
                type: 'deposit',
                memberPhone: member.phone,
                amount: usdAmount,
                status: 'pending',
                description: 'ស្នើដាក់ប្រាក់ $' + usdAmount.toFixed(2),
                date: new Date().toISOString(),
                screenshot: fileInput.dataset.qrData
            };
            data.transactions.push(tx);
            save();
            addLog('member', 'ស្នើដាក់ប្រាក់', '$' + usdAmount.toFixed(2));

            showModal(`
                <div style="text-align:center;">
                    <div style="font-size:48px;">✅</div>
                    <h3>ជោគជ័យ!</h3>
                    <p style="color:rgba(255,255,255,0.6);">សំណើរដាក់ប្រាក់ $${usdAmount.toFixed(2)} ត្រូវបានផ្ញើរួច!</p>
                    <p style="font-size:12px;color:rgba(255,255,255,0.3);">លេខ: ${tx.id}</p>
                    <button onclick="hideModal(); renderPage('member-dashboard');" class="btn btn-gold">ទៅកាន់ Dashboard</button>
                </div>
            `);

            document.getElementById('depositAmount').value = '';
            document.getElementById('depositFileName').textContent = '';
            document.getElementById('depositPreview').innerHTML = '';
            fileInput.dataset.qrData = '';
            fileInput.value = '';
            msg.innerHTML = '';
        }

        function confirmApprove(txId) {
            for (var i = 0; i < data.transactions.length; i++) {
                if (data.transactions[i].id === txId) {
                    var tx = data.transactions[i];
                    tx.status = 'completed';

                    var member = data.members[tx.memberPhone];
                    if (member) {
                        if (tx.type === 'deposit') {
                            member.balance += tx.amount;
                            member.benefits.push('💰 បានដាក់ប្រាក់ $' + tx.amount.toFixed(2) + ' នៅថ្ងៃ ' + new Date().toLocaleDateString('km-KH'));

                            // Add commission (5%)
                            var commission = tx.amount * 0.05;
                            if (commission > 0) {
                                data.commissions.push({
                                    id: 'C-' + String(data.commissions.length + 1).padStart(4, '0'),
                                    memberPhone: member.phone,
                                    amount: commission,
                                    date: new Date().toISOString()
                                });
                                member.balance += commission;
                                member.benefits.push('🎁 បានទទួលកម្រៃ $' + commission.toFixed(2));
                            }
                        } else if (tx.type === 'withdraw') {
                            member.balance -= tx.amount;
                            member.benefits.push('🏦 បានដកប្រាក់ $' + tx.amount.toFixed(2) + ' នៅថ្ងៃ ' + new Date().toLocaleDateString('km-KH'));
                        }
                    }

                    save();
                    addLog('admin', 'យល់ព្រមប្រតិបត្តិការ', tx.id + ' ($' + tx.amount.toFixed(2) + ')');
                    showToast('✅ ប្រតិបត្តិការត្រូវបានយល់ព្រម!', 'success');
                    renderPage('admin-dashboard');
                    return;
                }
            }
            showToast('មិនឃើញប្រតិបត្តិការ!', 'error');
        }

        function searchMembers(query) {
            var container = document.getElementById('memberList');
            if (!container) return;
            var q = query.toLowerCase().trim();
            var members = Object.values(data.members);
            var filtered = members.filter(function(m) {
                return (m.name && m.name.toLowerCase().indexOf(q) !== -1) ||
                       m.phone.indexOf(q) !== -1 ||
                       m.id.toLowerCase().indexOf(q) !== -1;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p style="opacity:0.4;font-size:12px;">មិនឃើញលទ្ធផល</p>';
                return;
            }

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var m = filtered[i];
                var currency = m.currency || 'usd';
                html += `
                    <div class="list-item">
                        <div class="info">
                            <span class="name">${m.name || m.phone}</span>
                            <span class="sub">🆔 ${m.id} | 📱 ${m.phone}</span>
                        </div>
                        <div><span class="balance">${formatCurrency(m.balance, currency)}</span></div>
                        <div class="actions">
                            <button onclick="editMemberBalance('${m.phone}')" class="btn btn-gold btn-sm">💰</button>
                            <button onclick="deleteMember('${m.phone}')" class="btn btn-red btn-sm">🗑️</button>
                            <button onclick="resetMemberPwd('${m.phone}')" class="btn btn-primary btn-sm">🔑</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function showReport(period) {
            var container = document.getElementById('reportContent');
            if (!container) return;

            var now = new Date();
            var start = new Date();
            if (period === 'daily') {
                start.setHours(0, 0, 0, 0);
            } else if (period === 'weekly') {
                start.setDate(now.getDate() - 7);
            } else if (period === 'monthly') {
                start.setMonth(now.getMonth() - 1);
            }

            var filtered = data.transactions.filter(function(t) {
                var d = new Date(t.date);
                return d >= start && d <= now && t.status === 'completed';
            });

            var totalDep = 0, totalWit = 0;
            for (var i = 0; i < filtered.length; i++) {
                if (filtered[i].type === 'deposit') totalDep += filtered[i].amount;
                else if (filtered[i].type === 'withdraw') totalWit += filtered[i].amount;
            }

            container.innerHTML = `
                <div class="card">
                    <h3>📊 របាយការណ៍ ${period === 'daily' ? 'ប្រចាំថ្ងៃ' : period === 'weekly' ? 'ប្រចាំសប្តាហ៍' : 'ប្រចាំខែ'}</h3>
                    <div style="font-size:12px;color:rgba(255,255,255,0.3);">
                        ពី ${start.toLocaleDateString('km-KH')} ដល់ ${now.toLocaleDateString('km-KH')}
                    </div>
                    <div class="summary-stats" style="margin-top:10px;">
                        <div class="box"><div class="num green">$${totalDep.toFixed(2)}</div><div class="label">ដាក់</div></div>
                        <div class="box"><div class="num red">$${totalWit.toFixed(2)}</div><div class="label">ដក</div></div>
                        <div class="box"><div class="num gold">$${(totalDep - totalWit).toFixed(2)}</div><div class="label">សល់</div></div>
                        <div class="box"><div class="num gold">${Object.keys(data.members).length}</div><div class="label">សមាជិក</div></div>
                        <div class="box"><div class="num gold">${filtered.length}</div><div class="label">ប្រតិបត្តិការ</div></div>
                        <div class="box"><div class="num gold">${data.commissions.length}</div><div class="label">កម្រៃ</div></div>
                    </div>
                    <div style="max-height:150px;overflow-y:auto;margin-top:8px;">
                        ${filtered.slice(0, 10).map(function(t) {
                            return '<div class="transaction-item"><div>' + t.type + ' - ' + (t.description || '') + '</div><div style="color:' + (t.type === 'deposit' ? '#48bb78' : '#fc8181') + ';">' + (t.type === 'deposit' ? '+' : '-') + '$' + t.amount.toFixed(2) + '</div></div>';
                        }).join('')}
                        ${filtered.length > 10 ? '<p style="text-align:center;font-size:10px;color:rgba(255,255,255,0.2);padding-top:4px;">បង្ហាញ ១០ ចុងក្រោយ</p>' : ''}
                    </div>
                </div>
            `;
        }

        function addLog(admin, action, details) {
            if (!data.activityLogs) data.activityLogs = [];
            data.activityLogs.unshift({
                admin: admin,
                action: action,
                details: details || '',
                date: new Date().toISOString()
            });
            if (data.activityLogs.length > 200) data.activityLogs = data.activityLogs.slice(0, 200);
            save();
        }

        function exportData() {
            var str = JSON.stringify(data, null, 2);
            var blob = new Blob([str], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'backup_' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('📤 នាំចេញជោគជ័យ!', 'success');
        }

                else if (user.role === 'sub_admin') renderPage('admin-dashboard');
                else renderPage('member-dashboard');

            setCurrentUser(null);
            renderPage('home');
            showToast('🚪 ចាកចេញជោគជ័យ!', 'info');
        }

        // ================================================================
        // INIT
        // ================================================================

        var user = getCurrentUser();
        if (user) {
            if (user.role === 'super_admin') renderPage('super-dashboard');
            else if (user.role === 'sub_admin' && data.subAdmins[user.phone]) renderPage('admin-dashboard');
            else if (user.role === 'member' && data.members[user.phone]) renderPage('member-dashboard');
            else { setCurrentUser(null); renderPage('home'); }
        } else {
            renderPage('home');
        }

        console.log('🚀 ប្រព័ន្ធបានដំណើរការ!');
        console.log('📊 ទិន្នន័យ:', data);
    </script>
</body>
</html>
