<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>អាជីវករខ្មែរ - វេទិកាហិរញ្ញវត្ថុ</title>

    <!-- Font ខ្មែរពេញនិយម: មូល និង បាត់ដំបង -->
    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Battambang:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* កំណត់ Font ខ្មែរជាសកល */
        * {
            font-family: 'Battambang', 'Khmer', sans-serif;
        }
        body {
            background: #f0f2f5;
        }
        .khmer-text {
            font-family: 'Battambang', cursive;
        }
        /* Card hover effect */
        .card-hover:hover {
            transform: translateY(-4px);
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }
        /* Scrollbar style */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- =============================== -->
    <!-- APP CONTAINER                  -->
    <!-- =============================== -->
    <div id="app" class="min-h-screen flex flex-col">

        <!-- ===== NAVBAR ===== -->
        <nav class="bg-white shadow-md border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center shadow">
                    <i class="fas fa-store text-white text-xl"></i>
                </div>
                <span class="text-xl font-bold text-gray-800 khmer-text">អាជីវករខ្មែរ</span>
            </div>
            <div id="navUser" class="flex items-center gap-3">
                <!-- Will be filled by JS -->
            </div>
        </nav>

        <!-- ===== MAIN CONTENT ===== -->
        <div class="flex-1 max-w-7xl mx-auto w-full p-4">

            <!-- ===== PAGE RENDER AREA ===== -->
            <div id="pageContent">
                <!-- Dynamic content rendered by JS -->
            </div>

        </div>

        <!-- ===== FOOTER ===== -->
        <footer class="bg-white border-t border-gray-200 text-center text-sm text-gray-400 py-4">
            © 2026 អាជីវករខ្មែរ — គ្រប់គ្រងហិរញ្ញវត្ថុឆ្លាតវៃ
        </footer>
    </div>

    <!-- =============================== -->
    <!-- JAVASCRIPT - FULL APPLICATION  -->
    <!-- =============================== -->
    <script>
        // ============================================================
        //  1. DATA LAYER (LocalStorage)
        // ============================================================
        const DB = {
            get(key, def) {
                try {
                    const raw = localStorage.getItem('ak_' + key);
                    return raw ? JSON.parse(raw) : def;
                } catch { return def; }
            },
            set(key, val) {
                localStorage.setItem('ak_' + key, JSON.stringify(val));
            },
            // Users: { phone, name, password, balance, status }
            getUsers() { return this.get('users', []); },
            setUsers(u) { this.set('users', u); },
            // Transactions: { id, phone, type, amount, status, date, note }
            getTx() { return this.get('tx', []); },
            setTx(t) { this.set('tx', t); },
            // Withdraw requests: { id, phone, amount, bank, account, status, date }
            getWithdraws() { return this.get('withdraws', []); },
            setWithdraws(w) { this.set('withdraws', w); },
            // Deposit requests (user → admin)
            getDeposits() { return this.get('deposits', []); },
            setDeposits(d) { this.set('deposits', d); },
            // Current logged in user
            getSession() { return this.get('session', null); },
            setSession(s) { this.set('session', s); },
            clearSession() { localStorage.removeItem('ak_session'); }
        };

        // ============================================================
        //  2. HELPERS
        // ============================================================
        function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

        function formatMoney(n) {
            return n.toLocaleString('km-KH') + ' ៛';
        }

        function getDate() {
            return new Date().toLocaleString('km-KH', { timeZone: 'Asia/Phnom_Penh' });
        }

        // Simulate Telegram Bot (for demo)
        function sendTelegram(msg) {
            console.log('📱 [Telegram] ' + msg);
            alert('📱 បានផ្ញើទៅ Telegram:\n' + msg);
            // In real: fetch(`https://api.telegram.org/bot8832988912:AAHopQQf21daUcFIzM4Bl20h9Gzd4IbQ_pI/sendMessage?chat_id=-5387523552&text=${encodeURIComponent(msg)}`)
        }

        // ============================================================
        //  3. AUTH
        // ============================================================
        function registerUser(phone, name, password) {
            let users = DB.getUsers();
            if (users.find(u => u.phone === phone)) return { ok: false, msg: 'លេខទូរសព្ទមានរួចហើយ!' };
            users.push({ phone, name, password, balance: 0, status: 'active', role: 'user' });
            DB.setUsers(users);
            return { ok: true };
        }

        function loginUser(phone, password) {
            let users = DB.getUsers();
            let u = users.find(u => u.phone === phone && u.password === password);
            if (!u) return { ok: false, msg: 'លេខទូរសព្ទ ឬ ពាក្យសម្ងាត់មិនត្រឹមត្រូវ' };
            if (u.status === 'suspended') return { ok: false, msg: 'គណនីត្រូវបានផ្អាក!' };
            DB.setSession({ phone: u.phone, name: u.name, role: u.role || 'user' });
            return { ok: true };
        }

        function getCurrentUser() {
            const sess = DB.getSession();
            if (!sess) return null;
            const users = DB.getUsers();
            return users.find(u => u.phone === sess.phone) || null;
        }

        function logout() {
            DB.clearSession();
            renderPage('login');
        }

        // ============================================================
        //  4. TRANSACTIONS
        // ============================================================
        function addTransaction(phone, type, amount, note = '') {
            let tx = DB.getTx();
            tx.push({
                id: genId(),
                phone,
                type, // 'deposit' or 'withdraw'
                amount,
                status: 'completed',
                date: getDate(),
                note
            });
            DB.setTx(tx);
            // Update user balance
            let users = DB.getUsers();
            let u = users.find(u => u.phone === phone);
            if (u) {
                if (type === 'deposit') u.balance += amount;
                else if (type === 'withdraw') u.balance -= amount;
                DB.setUsers(users);
            }
        }

        // ============================================================
        //  5. RENDER ENGINE (SPA)
        // ============================================================
        function renderPage(page, data = null) {
            const container = document.getElementById('pageContent');
            const user = getCurrentUser();

            // Update Navbar
            const navUser = document.getElementById('navUser');
            if (user) {
                navUser.innerHTML = `
                    <span class="text-sm text-gray-600 hidden sm:inline"><i class="fas fa-user-circle mr-1"></i> ${user.name}</span>
                    <span class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">${user.role === 'admin' ? 'Admin' : 'សមាជិក'}</span>
                    <span class="text-sm font-bold text-green-600">${formatMoney(user.balance)}</span>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-sign-out-alt"></i></button>
                `;
            } else {
                navUser.innerHTML = `<button onclick="renderPage('login')" class="bg-blue-600 text-white px-4 py-1 rounded-xl text-sm hover:bg-blue-700">ចូលប្រើ</button>`;
            }

            // ---- ROUTING ----
            switch (page) {
                case 'login': renderLogin(container); break;
                case 'dashboard': renderDashboard(container, user); break;
                case 'deposit': renderDeposit(container, user); break;
                case 'withdraw': renderWithdraw(container, user); break;
                case 'admin': renderAdmin(container, user); break;
                case 'adminDeposit': renderAdminDeposit(container, user); break;
                case 'adminWithdraw': renderAdminWithdraw(container, user); break;
                default: renderLogin(container);
            }
        }

        // ============================================================
        //  6. PAGE: LOGIN / REGISTER
        // ============================================================
        function renderLogin(container) {
            container.innerHTML = `
            <div class="flex items-center justify-center min-h-[70vh]">
                <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
                    <div class="text-center mb-6">
                        <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-store text-white text-3xl"></i>
                        </div>
                        <h1 class="text-2xl font-bold text-gray-800 khmer-text">អាជីវករខ្មែរ</h1>
                        <p class="text-gray-500 text-sm">ចូលប្រើ ឬ ចុះឈ្មោះ</p>
                    </div>

                    <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
                        <button id="loginTab" class="flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-md text-blue-600">ចូលប្រើ</button>
                        <button id="registerTab" class="flex-1 py-2 rounded-lg text-sm font-semibold text-gray-500">ចុះឈ្មោះ</button>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-phone text-blue-500 mr-2"></i>លេខទូរសព្ទ</label>
                            <input type="tel" id="loginPhone" placeholder="០៩៧ ៨៧ ៦៥ ៤៣" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-lock text-blue-500 mr-2"></i>ពាក្យសម្ងាត់</label>
                            <input type="password" id="loginPass" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">ចូលប្រើ</button>
                    </form>

                    <!-- Register Form -->
                    <form id="registerForm" class="hidden mt-4">
                        <div class="mb-3">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-user text-blue-500 mr-2"></i>ឈ្មោះពេញ</label>
                            <input type="text" id="regName" placeholder="សុខ សុខា" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <div class="mb-3">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-phone text-blue-500 mr-2"></i>លេខទូរសព្ទ</label>
                            <input type="tel" id="regPhone" placeholder="០៩៧ ៨៧ ៦៥ ៤៣" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <div class="mb-3">
                            <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-lock text-blue-500 mr-2"></i>ពាក្យសម្ងាត់</label>
                            <input type="password" id="regPass" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
                        </div>
                        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition">ចុះឈ្មោះ</button>
                    </form>
                </div>
            </div>
            `;

            // ---- Event Listeners ----
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            loginTab.onclick = () => {
                loginTab.className = 'flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-md text-blue-600';
                registerTab.className = 'flex-1 py-2 rounded-lg text-sm font-semibold text-gray-500';
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            };
            registerTab.onclick = () => {
                registerTab.className = 'flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-md text-blue-600';
                loginTab.className = 'flex-1 py-2 rounded-lg text-sm font-semibold text-gray-500';
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            };

            loginForm.onsubmit = (e) => {
                e.preventDefault();
                const phone = document.getElementById('loginPhone').value.trim();
                const pass = document.getElementById('loginPass').value.trim();
                const result = loginUser(phone, pass);
                if (result.ok) {
                    const user = getCurrentUser();
                    if (user.role === 'admin') renderPage('admin');
                    else renderPage('dashboard');
                } else {
                    alert('❌ ' + result.msg);
                }
            };

            registerForm.onsubmit = (e) => {
                e.preventDefault();
                const name = document.getElementById('regName').value.trim();
                const phone = document.getElementById('regPhone').value.trim();
                const pass = document.getElementById('regPass').value.trim();
                if (!name || !phone || !pass) return alert('សូមបំពេញព័ត៌មានឲ្យពេញលេញ!');
                const result = registerUser(phone, name, pass);
                if (result.ok) {
                    alert('✅ ចុះឈ្មោះជោគជ័យ! សូមចូលប្រើ។');
                    loginTab.click();
                } else {
                    alert('❌ ' + result.msg);
                }
            };
        }

        // ============================================================
        //  7. PAGE: DASHBOARD (User)
        // ============================================================
        function renderDashboard(container, user) {
            if (!user) { renderPage('login'); return; }
            const tx = DB.getTx().filter(t => t.phone === user.phone).slice(-5).reverse();
            const totalIn = DB.getTx().filter(t => t.phone === user.phone && t.type === 'deposit').reduce((s, t) => s + t.amount, 0);
            const totalOut = DB.getTx().filter(t => t.phone === user.phone && t.type === 'withdraw').reduce((s, t) => s + t.amount, 0);

            container.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-white rounded-2xl shadow p-5 border-l-4 border-blue-500 card-hover">
                    <p class="text-gray-400 text-sm">សមតុល្យ</p>
                    <p class="text-2xl font-bold text-gray-800">${formatMoney(user.balance)}</p>
                </div>
                <div class="bg-white rounded-2xl shadow p-5 border-l-4 border-green-500 card-hover">
                    <p class="text-gray-400 text-sm">ចំណូលសរុប</p>
                    <p class="text-2xl font-bold text-green-600">${formatMoney(totalIn)}</p>
                </div>
                <div class="bg-white rounded-2xl shadow p-5 border-l-4 border-red-500 card-hover">
                    <p class="text-gray-400 text-sm">ចំណាយសរុប</p>
                    <p class="text-2xl font-bold text-red-500">${formatMoney(totalOut)}</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <button onclick="renderPage('deposit')" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl shadow transition flex items-center justify-center gap-2">
                    <i class="fas fa-plus-circle"></i> បញ្ចូលប្រាក់
                </button>
                <button onclick="renderPage('withdraw')" class="bg-red-600 hover:bg-red-700 text-white font-semibold py-4 rounded-2xl shadow transition flex items-center justify-center gap-2">
                    <i class="fas fa-minus-circle"></i> ដកប្រាក់
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow p-6">
                <h3 class="font-semibold text-gray-700 mb-4"><i class="fas fa-history text-blue-500 mr-2"></i>ប្រតិបត្តិការថ្មីៗ</h3>
                ${tx.length === 0 ? '<p class="text-gray-400 text-sm">មិនមានប្រតិបត្តិការទេ</p>' :
                    tx.map(t => `
                        <div class="flex justify-between border-b border-gray-100 py-2 text-sm">
                            <span>${t.note || (t.type === 'deposit' ? 'បញ្ចូល' : 'ដក')}</span>
                            <span class="${t.type === 'deposit' ? 'text-green-600' : 'text-red-500'}">${t.type === 'deposit' ? '+' : '-'} ${formatMoney(t.amount)}</span>
                            <span class="text-gray-400 text-xs">${t.date}</span>
                        </div>
                    `).join('')
                }
            </div>
            `;
        }

        // ============================================================
        //  8. PAGE: DEPOSIT (User)
        // ============================================================
        function renderDeposit(container, user) {
            if (!user) { renderPage('login'); return; }
            container.innerHTML = `
            <div class="max-w-lg mx-auto bg-white rounded-2xl shadow p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fas fa-money-bill-wave text-green-500 mr-2"></i>បញ្ចូលប្រាក់</h2>
                <p class="text-gray-500 text-sm mb-4">សូមបំពេញទម្រង់ខាងក្រោម បន្ទាប់ពីអ្នកបានផ្ទេរប្រាក់រួច</p>

                <form id="depositForm">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-university text-blue-500 mr-2"></i>ធនាគារ</label>
                        <select id="depBank" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-400 outline-none">
                            <option value="ABA">ABA Bank</option>
                            <option value="ACLEDA">ACLEDA</option>
                            <option value="WING">Wing</option>
                            <option value="TRUE">True Money</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-qrcode text-blue-500 mr-2"></i>QR Code / លេខគណនី</label>
                        <input type="text" id="depAccount" placeholder="លេខគណនី ឬ ផ្ញើ QR" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-400 outline-none" />
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-dollar-sign text-blue-500 mr-2"></i>ចំនួនទឹកប្រាក់ (៛)</label>
                        <input type="number" id="depAmount" placeholder="100000" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-400 outline-none" />
                    </div>
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition">
                        <i class="fas fa-paper-plane mr-2"></i> ផ្ញើសំណើទៅ Admin
                    </button>
                </form>
                <button onclick="renderPage('dashboard')" class="mt-4 text-blue-600 text-sm hover:underline">← ត្រឡប់</button>
            </div>
            `;

            document.getElementById('depositForm').onsubmit = (e) => {
                e.preventDefault();
                const bank = document.getElementById('depBank').value;
                const account = document.getElementById('depAccount').value.trim();
                const amount = parseInt(document.getElementById('depAmount').value.trim());
                if (!account || !amount || amount <= 0) return alert('សូមបំពេញព័ត៌មានឲ្យត្រឹមត្រូវ!');

                let deposits = DB.getDeposits();
                deposits.push({
                    id: genId(),
                    phone: user.phone,
                    name: user.name,
                    bank,
                    account,
                    amount,
                    status: 'pending',
                    date: getDate()
                });
                DB.setDeposits(deposits);

                // Notify Admin (simulate Telegram)
                sendTelegram(`📥 សំណើបញ្ចូលប្រាក់
        អ្នកប្រើ: ${user.name} (${user.phone})
        ធនាគារ: ${bank}
        គណនី: ${account}
        ចំនួន: ${formatMoney(amount)}
        ស្ថានភាព: រង់ចាំអនុម័ត`);

                alert('✅ សំណើបញ្ចូលប្រាក់ត្រូវបានផ្ញើទៅ Admin ហើយ!');
                renderPage('dashboard');
            };
        }

        // ============================================================
        //  9. PAGE: WITHDRAW (User)
        // ============================================================
        function renderWithdraw(container, user) {
            if (!user) { renderPage('login'); return; }
            container.innerHTML = `
            <div class="max-w-lg mx-auto bg-white rounded-2xl shadow p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fas fa-hand-holding-usd text-red-500 mr-2"></i>ដកប្រាក់</h2>
                <p class="text-gray-500 text-sm mb-4">សមតុល្យបច្ចុប្បន្ន: <strong>${formatMoney(user.balance)}</strong></p>

                <form id="withdrawForm">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-university text-blue-500 mr-2"></i>ធនាគារទទួល</label>
                        <select id="wdBank" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-400 outline-none">
                            <option value="ABA">ABA Bank</option>
                            <option value="ACLEDA">ACLEDA</option>
                            <option value="WING">Wing</option>
                            <option value="TRUE">True Money</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-user-circle text-blue-500 mr-2"></i>ឈ្មោះគណនី</label>
                        <input type="text" id="wdName" placeholder="ឈ្មោះពេញ" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-400 outline-none" />
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-hashtag text-blue-500 mr-2"></i>លេខគណនី</label>
                        <input type="text" id="wdAccount" placeholder="លេខគណនី" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-400 outline-none" />
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2"><i class="fas fa-dollar-sign text-blue-500 mr-2"></i>ចំនួនដក (៛)</label>
                        <input type="number" id="wdAmount" placeholder="50000" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-400 outline-none" />
                    </div>
                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-xl transition">
                        <i class="fas fa-paper-plane mr-2"></i> ផ្ញើសំណើដកប្រាក់
                    </button>
                </form>
                <button onclick="renderPage('dashboard')" class="mt-4 text-blue-600 text-sm hover:underline">← ត្រឡប់</button>
            </div>
            `;

            document.getElementById('withdrawForm').onsubmit = (e) => {
                e.preventDefault();
                const bank = document.getElementById('wdBank').value;
                const accName = document.getElementById('wdName').value.trim();
                const account = document.getElementById('wdAccount').value.trim();
                const amount = parseInt(document.getElementById('wdAmount').value.trim());
                if (!accName || !account || !amount || amount <= 0) return alert('សូមបំពេញព័ត៌មានឲ្យត្រឹមត្រូវ!');
                if (amount > user.balance) return alert('❌ សមតុល្យមិនគ្រប់គ្រាន់!');

                let withdraws = DB.getWithdraws();
                withdraws.push({
                    id: genId(),
                    phone: user.phone,
                    name: user.name,
                    bank,
                    accName,
                    account,
                    amount,
                    status: 'pending',
                    date: getDate()
                });
                DB.setWithdraws(withdraws);

                // Notify Admin + Telegram
                sendTelegram(`📤 សំណើដកប្រាក់
        អ្នកប្រើ: ${user.name} (${user.phone})
        ធនាគារ: ${bank}
        គណនី: ${account}
        ឈ្មោះ: ${accName}
        ចំនួន: ${formatMoney(amount)}
        ស្ថានភាព: រង់ចាំអនុម័ត`);

                alert('✅ សំណើដកប្រាក់ត្រូវបានផ្ញើទៅ Admin ហើយ!');
                renderPage('dashboard');
            };
        }

        // ============================================================
        //  10. PAGE: ADMIN DASHBOARD
        // ============================================================
        function renderAdmin(container, user) {
            if (!user || user.role !== 'admin') { renderPage('login'); return; }
            const users = DB.getUsers();
            const deposits = DB.getDeposits().filter(d => d.status === 'pending');
            const withdraws = DB.getWithdraws().filter(w => w.status === 'pending');
            const totalBalance = users.reduce((s, u) => s + u.balance, 0);

            container.innerHTML = `
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white rounded-2xl shadow p-4 card-hover"><p class="text-gray-400 text-sm">អ្នកប្រើសរុប</p><p class="text-2xl font-bold">${users.length}</p></div>
                <div class="bg-white rounded-2xl shadow p-4 card-hover"><p class="text-gray-400 text-sm">សំណើបញ្ចូល</p><p class="text-2xl font-bold text-green-600">${deposits.length}</p></div>
                <div class="bg-white rounded-2xl shadow p-4 card-hover"><p class="text-gray-400 text-sm">សំណើដក</p><p class="text-2xl font-bold text-red-500">${withdraws.length}</p></div>
                <div class="bg-white rounded-2xl shadow p-4 card-hover"><p class="text-gray-400 text-sm">សមតុល្យសរុប</p><p class="text-2xl font-bold text-blue-600">${formatMoney(totalBalance)}</p></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <button onclick="renderPage('adminDeposit')" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl shadow transition flex items-center justify-center gap-2">
                    <i class="fas fa-plus-circle"></i> អនុម័តបញ្ចូលប្រាក់
                </button>
                <button onclick="renderPage('adminWithdraw')" class="bg-red-600 hover:bg-red-700 text-white font-semibold py-4 rounded-2xl shadow transition flex items-center justify-center gap-2">
                    <i class="fas fa-minus-circle"></i> អនុម័តដកប្រាក់
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow overflow-hidden">
                <div class="px-6 py-3 border-b border-gray-200 font-semibold text-gray-700"><i class="fas fa-users mr-2"></i>បញ្ជីសមាជិក</div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 text-sm">
                        <thead class="bg-gray-50">
                            <tr><th class="px-4 py-2 text-left">ឈ្មោះ</th><th class="px-4 py-2 text-left">ទូរសព្ទ</th><th class="px-4 py-2 text-left">សមតុល្យ</th><th class="px-4 py-2 text-left">ស្ថានភាព</th></tr>
                        </thead>
                        <tbody>
                            ${users.map(u => `
                                <tr class="border-b border-gray-100">
                                    <td class="px-4 py-2">${u.name}</td>
                                    <td class="px-4 py-2">${u.phone}</td>
                                    <td class="px-4 py-2">${formatMoney(u.balance)}</td>
                                    <td class="px-4 py-2"><span class="px-2 py-0.5 rounded-full text-xs ${u.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${u.status === 'active' ? 'សកម្ម' : 'ផ្អាក'}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
            `;
        }

        // ============================================================
        //  11. PAGE: ADMIN DEPOSIT APPROVAL
        // ============================================================
        function renderAdminDeposit(container, user) {
            if (!user || user.role !== 'admin') { renderPage('login'); return; }
            const pending = DB.getDeposits().filter(d => d.status === 'pending');

            container.innerHTML = `
            <div class="bg-white rounded-2xl shadow p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fas fa-check-circle text-green-500 mr-2"></i>អនុម័តបញ្ចូលប្រាក់</h2>
                ${pending.length === 0 ? '<p class="text-gray-400">មិនមានសំណើរង់ចាំទេ</p>' :
                    pending.map(d => `
                        <div class="border border-gray-200 rounded-xl p-4 mb-3 flex flex-wrap justify-between items-center">
                            <div>
                                <p><strong>${d.name}</strong> (${d.phone})</p>
                                <p class="text-sm text-gray-500">${d.bank} - ${d.account}</p>
                                <p class="text-lg font-bold text-green-600">${formatMoney(d.amount)}</p>
                                <p class="text-xs text-gray-400">${d.date}</p>
                            </div>
                            <div class="flex gap-2 mt-2 sm:mt-0">
                                <button onclick="approveDeposit('${d.id}')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl text-sm">យល់ព្រម</button>
                                <button onclick="rejectDeposit('${d.id}')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl text-sm">បដិសេធ</button>
                            </div>
                        </div>
                    `).join('')
                }
                <button onclick="renderPage('admin')" class="mt-4 text-blue-600 text-sm hover:underline">← ត្រឡប់</button>
            </div>
            `;
        }

        // ============================================================
        //  12. PAGE: ADMIN WITHDRAW APPROVAL
        // ============================================================
        function renderAdminWithdraw(container, user) {
            if (!user || user.role !== 'admin') { renderPage('login'); return; }
            const pending = DB.getWithdraws().filter(w => w.status === 'pending');

            container.innerHTML = `
            <div class="bg-white rounded-2xl shadow p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fas fa-check-circle text-red-500 mr-2"></i>អនុម័តដកប្រាក់</h2>
                ${pending.length === 0 ? '<p class="text-gray-400">មិនមានសំណើរង់ចាំទេ</p>' :
                    pending.map(w => `
                        <div class="border border-gray-200 rounded-xl p-4 mb-3 flex flex-wrap justify-between items-center">
                            <div>
                                <p><strong>${w.name}</strong> (${w.phone})</p>
                                <p class="text-sm text-gray-500">${w.bank} - ${w.account} (${w.accName})</p>
                                <p class="text-lg font-bold text-red-500">${formatMoney(w.amount)}</p>
                                <p class="text-xs text-gray-400">${w.date}</p>
                            </div>
                            <div class="flex gap-2 mt-2 sm:mt-0">
                                <button onclick="approveWithdraw('${w.id}')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl text-sm">យល់ព្រម</button>
                                <button onclick="rejectWithdraw('${w.id}')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl text-sm">បដិសេធ</button>
                            </div>
                        </div>
                    `).join('')
                }
                <button onclick="renderPage('admin')" class="mt-4 text-blue-600 text-sm hover:underline">← ត្រឡប់</button>
            </div>
            `;
        }

        // ============================================================
        //  13. ADMIN ACTIONS
        // ============================================================
        window.approveDeposit = function(id) {
            let deposits = DB.getDeposits();
            const idx = deposits.findIndex(d => d.id === id);
            if (idx === -1) return;
            const d = deposits[idx];
            d.status = 'approved';
            DB.setDeposits(deposits);

            // Add money to user
            let users = DB.getUsers();
            const u = users.find(u => u.phone === d.phone);
            if (u) {
                u.balance += d.amount;
                DB.setUsers(users);
                addTransaction(d.phone, 'deposit', d.amount, `បញ្ចូលតាម Admin (${d.bank})`);
                sendTelegram(`✅ បញ្ចូលប្រាក់ជោគជ័យ!
        អ្នកប្រើ: ${d.name} (${d.phone})
        ចំនួន: ${formatMoney(d.amount)}
        សមតុល្យថ្មី: ${formatMoney(u.balance)}`);
            }
            alert('✅ បានអនុម័តបញ្ចូលប្រាក់!');
            renderPage('adminDeposit');
        };

        window.rejectDeposit = function(id) {
            let deposits = DB.getDeposits();
            const idx = deposits.findIndex(d => d.id === id);
            if (idx === -1) return;
            deposits[idx].status = 'rejected';
            DB.setDeposits(deposits);
            alert('❌ បានបដិសេធ');
            renderPage('adminDeposit');
        };

        window.approveWithdraw = function(id) {
            let withdraws = DB.getWithdraws();
            const idx = withdraws.findIndex(w => w.id === id);
            if (idx === -1) return;
            const w = withdraws[idx];
            w.status = 'approved';
            DB.setWithdraws(withdraws);

            // Deduct from user
            let users = DB.getUsers();
            const u = users.find(u => u.phone === w.phone);
            if (u) {
                if (u.balance >= w.amount) {
                    u.balance -= w.amount;
                    DB.setUsers(users);
                    addTransaction(w.phone, 'withdraw', w.amount, `ដកតាម Admin (${w.bank})`);
                    sendTelegram(`✅ ដកប្រាក់ជោគជ័យ!
        អ្នកប្រើ: ${w.name} (${w.phone})
        ចំនួន: ${formatMoney(w.amount)}
        សមតុល្យថ្មី: ${formatMoney(u.balance)}`);
                } else {
                    alert('❌ សមតុល្យមិនគ្រប់!');
                    return;
                }
            }
            alert('✅ បានអនុម័តដកប្រាក់!');
            renderPage('adminWithdraw');
        };

        window.rejectWithdraw = function(id) {
            let withdraws = DB.getWithdraws();
            const idx = withdraws.findIndex(w => w.id === id);
            if (idx === -1) return;
            withdraws[idx].status = 'rejected';
            DB.setWithdraws(withdraws);
            alert('❌ បានបដិសេធ');
            renderPage('adminWithdraw');
        };

        // ============================================================
        //  14. INIT
        // ============================================================
        // Create default admin if none exists
        (function init() {
            let users = DB.getUsers();
            if (!users.find(u => u.role === 'admin')) {
                users.push({
                    phone: '0987654321',
                    name: 'Admin',
                    password: 'admin123',
                    balance: 0,
                    status: 'active',
                    role: 'admin'
                });
                DB.setUsers(users);
            }
            // Auto-login demo user
            const sess = DB.getSession();
            if (sess) {
                const user = getCurrentUser();
                if (user) {
                    if (user.role === 'admin') renderPage('admin');
                    else renderPage('dashboard');
                    return;
                }
            }
            renderPage('login');
        })();

        // Make renderPage global for onclick
        window.renderPage = renderPage;
        window.logout = logout;
    </script>
</body>
</html>
