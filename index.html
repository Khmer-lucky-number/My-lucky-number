<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិក v7.0</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>
    <style>
        /* ===== CSS Styles ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Khmer OS', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            transition: background 0.5s ease;
        }

        body.light-mode {
            background: #f0f2f5;
        }

        body.light-mode .container {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        body.light-mode h2,
        body.light-mode .card h3,
        body.light-mode .list-item .info .name {
            color: #1a1a2e;
        }

        body.light-mode p {
            color: rgba(0, 0, 0, 0.6);
        }

        body.light-mode .card {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        body.light-mode input,
        body.light-mode select,
        body.light-mode textarea {
            background: rgba(0, 0, 0, 0.05);
            color: #1a1a2e;
            border-color: rgba(0, 0, 0, 0.1);
        }

        body.light-mode .list-item {
            background: rgba(0, 0, 0, 0.04);
            border-left-color: #667eea;
        }

        body.light-mode .notification-item {
            background: rgba(0, 0, 0, 0.04);
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            max-height: 98vh;
            overflow-y: auto;
            animation: fadeInUp 0.6s ease-out;
        }

        .container::-webkit-scrollbar {
            width: 4px;
        }
        .container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes glow {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
            }
            50% {
                box-shadow: 0 0 40px rgba(102, 126, 234, 0.6);
            }
        }

        @keyframes notificationPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .animate-glow {
            animation: glow 2s ease-in-out infinite;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            color: #fff;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
            line-height: 1.6;
            font-size: 14px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 5px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.15);
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 50px;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: 0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 3px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s ease;
            opacity: 0;
        }

        .btn:hover::after {
            opacity: 1;
            transform: rotate(45deg) translateX(100%);
        }

        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            color: #1a1a2e;
        }

        .btn-gold:hover {
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
        }

        .btn-green {
            background: linear-gradient(135deg, #48bb78, #38a169);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.3);
            color: #fff;
        }

        .btn-green:hover {
            box-shadow: 0 12px 35px rgba(72, 187, 120, 0.5);
        }

        .btn-red {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            box-shadow: 0 8px 25px rgba(252, 129, 129, 0.3);
            color: #fff;
        }

        .btn-red:hover {
            box-shadow: 0 12px 35px rgba(252, 129, 129, 0.5);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f6ad55, #ed8936);
            box-shadow: 0 8px 25px rgba(246, 173, 85, 0.3);
            color: #fff;
        }

        .btn-warning:hover {
            box-shadow: 0 12px 35px rgba(246, 173, 85, 0.5);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
            width: auto;
        }

        .btn-purple {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            box-shadow: 0 8px 25px rgba(159, 122, 234, 0.3);
            color: #fff;
        }

        .btn-purple:hover {
            box-shadow: 0 12px 35px rgba(159, 122, 234, 0.5);
        }

        .btn-cloud {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.3);
            color: #fff;
        }

        .btn-cloud:hover {
            box-shadow: 0 12px 35px rgba(0, 210, 255, 0.5);
        }

        .btn-commission {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
            color: #fff;
        }

        .btn-commission:hover {
            box-shadow: 0 12px 35px rgba(245, 87, 108, 0.5);
        }

        .btn-payment {
            background: linear-gradient(135deg, #fa709a, #fee140);
            box-shadow: 0 8px 25px rgba(250, 112, 154, 0.3);
            color: #1a1a2e;
        }

        .btn-payment:hover {
            box-shadow: 0 12px 35px rgba(250, 112, 154, 0.5);
        }

        .btn-notification {
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            box-shadow: 0 8px 25px rgba(168, 237, 234, 0.3);
            color: #1a1a2e;
        }

        .btn-notification:hover {
            box-shadow: 0 12px 35px rgba(168, 237, 234, 0.5);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: none;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: none;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 16px;
            margin: 10px 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideInRight 0.5s ease-out;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
        }

        .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
        }

        .badge-purple {
            background: #9f7aea;
            color: #fff;
        }

        .badge-green {
            background: #48bb78;
            color: #fff;
        }

        .badge-red {
            background: #fc8181;
            color: #fff;
        }

        .badge-new {
            background: #ff6b6b;
            color: #fff;
            animation: notificationPulse 1.5s ease-in-out infinite;
        }

        .admin-panel {
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
        }

        .admin-panel h3 {
            color: #ffd700;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .top-bar .left-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .top-bar .right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .top-bar h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .back-link {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: translateX(-3px);
        }

        .clock-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .clock-display {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.06);
            padding: 3px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .clock-display .date-part {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            font-size: 10px;
        }

        .clock-display .time-part {
            color: #ffd700;
            font-weight: 700;
            font-size: 14px;
        }

        .clock-display .seconds {
            color: rgba(255, 215, 0, 0.4);
            font-size: 11px;
        }

        .btn-logout {
            background: rgba(252, 129, 129, 0.15);
            border: 1px solid rgba(252, 129, 129, 0.2);
            color: #fc8181;
            padding: 3px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(252, 129, 129, 0.25);
            transform: scale(1.05);
            border-color: #fc8181;
        }

        .login-container {
            padding: 10px 0;
        }

        .login-container .login-logo {
            font-size: 60px;
            text-align: center;
            margin-bottom: 10px;
        }

        .login-container .login-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .login-container .login-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .login-container .login-option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }

        .login-container .login-option:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px) scale(1.02);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .login-container .login-option .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }

        .login-container .login-option .title {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }

        .login-container .login-option .desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 2px;
        }

        .login-container .login-option.admin-option {
            border-color: rgba(255, 215, 0, 0.2);
        }

        .login-container .login-option.admin-option:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }

        .login-container .login-option.super-option {
            border-color: rgba(255, 215, 0, 0.1);
            background: rgba(255, 215, 0, 0.03);
        }

        .login-container .login-option.super-option:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        .file-upload {
            position: relative;
            padding: 15px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            margin: 5px 0;
        }

        .file-upload:hover {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.01);
        }

        .file-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload .upload-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        .file-upload .upload-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .file-upload .file-name {
            color: #48bb78;
            font-size: 12px;
            margin-top: 4px;
        }

        .image-viewer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }

        .image-viewer-overlay.show {
            display: flex;
        }

        .image-viewer-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s ease;
        }

        .image-viewer-overlay .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            transition: .3s;
            z-index: 1;
        }

        .image-viewer-overlay .close-btn:hover {
            transform: scale(1.2);
            color: #ffd700;
        }

        .preview-image {
            max-width: 100%;
            max-height: 100px;
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .preview-image:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .list-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 10px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .list-item .info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex: 1;
            min-width: 100px;
        }

        .list-item .info .name {
            color: #fff;
            font-weight: 600;
        }

        .list-item .info .sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .list-item .info .id {
            font-size: 10px;
            color: rgba(255, 215, 0, 0.5);
        }

        .list-item .info .pwd {
            font-size: 11px;
            color: #48bb78;
        }

        .list-item .balance {
            color: #48bb78;
            font-weight: 600;
            font-size: 14px;
        }

        .list-item .actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .transaction-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 6px;
        }

        .transaction-list::-webkit-scrollbar {
            width: 4px;
        }

        .transaction-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            flex-wrap: wrap;
            gap: 4px;
            transition: all 0.3s ease;
        }

        .transaction-item:hover {
            background: rgba(255, 255, 255, 0.03);
            padding-left: 10px;
        }

        .payment-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 12px;
            border-radius: 10px;
            margin: 6px 0;
            border-left: 3px solid #fa709a;
            transition: all 0.3s ease;
        }

        .payment-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .payment-item .amount {
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
        }

        .payment-item .status-pending {
            color: #f6ad55;
            font-size: 11px;
        }

        .payment-item .status-approved {
            color: #48bb78;
            font-size: 11px;
        }

        .payment-item .status-rejected {
            color: #fc8181;
            font-size: 11px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin: 6px 0;
        }

        .summary-stats .summary-box {
            background: rgba(255, 255, 255, 0.04);
            padding: 6px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .summary-stats .summary-box:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.08);
        }

        .summary-stats .summary-box .number {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .summary-stats .summary-box .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .summary-stats .summary-box .number.green {
            color: #48bb78;
        }

        .summary-stats .summary-box .number.red {
            color: #fc8181;
        }

        .summary-stats .summary-box .number.gold {
            color: #ffd700;
        }

        .notification-item {
            background: rgba(255, 215, 0, 0.08);
            border-left: 4px solid #ffd700;
            padding: 10px 14px;
            border-radius: 8px;
            margin: 5px 0;
            font-size: 13px;
            transition: all 0.3s ease;
            animation: slideInRight 0.5s ease-out;
        }

        .notification-item:hover {
            background: rgba(255, 215, 0, 0.12);
            transform: translateX(5px);
        }

        .notification-item .time {
            font-size: 10px;

<body>

    <!-- Image Viewer -->
    <div class="image-viewer-overlay" id="imageViewer" onclick="closeImageViewer()">
        <span class="close-btn" onclick="closeImageViewer()">×</span>
        <img id="viewerImage" src="" alt="View Image">
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <!-- Modal -->
    <div id="modalOverlay">
        <div id="modalContent">
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Main App -->
    <div class="container" id="app">
        <div id="pageContent"></div>
        <div class="text-center mt-10" style="font-size:10px;color:rgba(255,255,255,0.2);">
            <span id="cloudStatus">
                <span class="cloud-status disconnected">⏳ កំពុងភ្ជាប់...</span>
            </span>
            <span style="margin-left:8px;opacity:0.5;">v7.0</span>
        </div>
    </div>

    <script>
        // ================================================================
        // FIREBASE CONFIG - បញ្ចូល Config របស់អ្នកនៅទីនេះ!
        // ================================================================

        const firebaseConfig = {
            apiKey: "AIzaSyDY6EzS_tUgma7z5z8LpK4Te5WcF3msqx4",
            authDomain: "access-and-management-system.firebaseapp.com",
            databaseURL: "https://access-and-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "access-and-management-system",
            storageBucket: "access-and-management-system.firebasestorage.app",
            messagingSenderId: "183584626258",
            appId: "1:183584626258:web:c87cc50820672aea12318b"
        };

        // ================================================================
        // INIT FIREBASE
        // ================================================================

        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        // ================================================================
        // DATA LAYER
        // ================================================================

        var localData = {
            members: {},
            subAdmins: {},
            superAdmins: {},
            transactions: [],
            paymentRequests: [],
            commissions: [],
            memberNotifications: [],
            activityLogs: [],
            memberRegistrations: [],
            memberCounter: 0,
            adminCounter: 0,
            exchangeRate: 4000,
            version: '7.0',
            lastUpdated: null
        };

        var isConnected = false;
        var isLoading = false;
        var isSaving = false;
        var currentUser = null;
        var logoutTimer = null;
        var sessionTimeout = 30 * 60 * 1000; // 30 minutes

        // ================================================================
        // FIREBASE FUNCTIONS
        // ================================================================

        function updateCloudStatus(connected) {
            isConnected = connected;
            var statusEl = document.getElementById('cloudStatus');
            if (statusEl) {
                statusEl.innerHTML = connected ?
                    '<span class="cloud-status connected">✅ ដំណើរការ</span>' :
                    '<span class="cloud-status disconnected">⏳ កំពុងភ្ជាប់...</span>';
            }
        }

        function saveToFirebase() {
            if (isSaving) { showToast('⏳ កំពុងដំណើរការ...', 'info'); return; }
            isSaving = true;
            showToast('⏳ កំពុងរក្សាទុក...', 'info');

            var dataToSave = {
                members: localData.members || {},
                subAdmins: localData.subAdmins || {},
                superAdmins: localData.superAdmins || {},
                transactions: localData.transactions || [],
                paymentRequests: localData.paymentRequests || [],
                commissions: localData.commissions || [],
                memberNotifications: localData.memberNotifications || [],
                activityLogs: localData.activityLogs || [],
                memberRegistrations: localData.memberRegistrations || [],
                memberCounter: localData.memberCounter || 0,
                adminCounter: localData.adminCounter || 0,
                exchangeRate: localData.exchangeRate || 4000,
                version: '7.0',
                lastUpdated: new Date().toISOString()
            };

            database.ref('memberSystem').set(dataToSave)
                .then(function() {
                    updateCloudStatus(true);
                    showToast('💾 រក្សាទុកជោគជ័យ!', 'success');
                    isSaving = false;
                })
                .catch(function(error) {
                    showToast('⚠️ កំហុស: ' + error.message, 'error');
                    updateCloudStatus(false);
                    isSaving = false;
                });
        }

        function loadFromFirebase() {
            if (isLoading) { showToast('⏳ កំពុងដំណើរការ...', 'info'); return; }
            isLoading = true;
            showToast('⏳ កំពុងទាញយកទិន្នន័យ...', 'info');

            database.ref('memberSystem').once('value')
                .then(function(snapshot) {
                    var data = snapshot.val();
                    if (data) {
                        localData.members = data.members || {};
                        localData.subAdmins = data.subAdmins || {};
                        localData.superAdmins = data.superAdmins || {};
                        localData.transactions = data.transactions || [];
                        localData.paymentRequests = data.paymentRequests || [];
                        localData.commissions = data.commissions || [];
                        localData.memberNotifications = data.memberNotifications || [];
                        localData.activityLogs = data.activityLogs || [];
                        localData.memberRegistrations = data.memberRegistrations || [];
                        localData.memberCounter = data.memberCounter || 0;
                        localData.adminCounter = data.adminCounter || 0;
                        localData.exchangeRate = data.exchangeRate || 4000;

                        updateCloudStatus(true);
                        showToast('📥 ទាញយកទិន្នន័យជោគជ័យ!', 'success');
                        refreshCurrentPage();
                    } else {
                        showToast('ℹ️ មិនទាន់មានទិន្នន័យ', 'info');
                        updateCloudStatus(false);
                    }
                    isLoading = false;
                })
                .catch(function(error) {
                    showToast('⚠️ កំហុស: ' + error.message, 'error');
                    updateCloudStatus(false);
                    isLoading = false;
                });
        }

        function setupRealtimeListeners() {
            database.ref('memberSystem').on('value', function(snapshot) {
                var data = snapshot.val();
                if (data) {
                    var oldCount = Object.keys(localData.members || {}).length;
                    localData.members = data.members || {};
                    localData.subAdmins = data.subAdmins || {};
                    localData.superAdmins = data.superAdmins || {};
                    localData.transactions = data.transactions || [];
                    localData.paymentRequests = data.paymentRequests || [];
                    localData.commissions = data.commissions || [];
                    localData.memberNotifications = data.memberNotifications || [];
                    localData.activityLogs = data.activityLogs || [];
                    localData.memberRegistrations = data.memberRegistrations || [];
                    localData.memberCounter = data.memberCounter || 0;
                    localData.adminCounter = data.adminCounter || 0;
                    localData.exchangeRate = data.exchangeRate || 4000;
                    updateCloudStatus(true);

                    var newCount = Object.keys(localData.members || {}).length;
                    if (newCount !== oldCount && oldCount > 0) {
                        showToast('🔄 មានសមាជិកថ្មីចុះឈ្មោះ!', 'info');
                    }
                    refreshCurrentPage();
                }
            });
        }

        // ================================================================
        // SESSION MANAGEMENT
        // ================================================================

        function resetSessionTimer() {
            if (logoutTimer) {
                clearTimeout(logoutTimer);
                logoutTimer = null;
            }
            var user = getCurrentUser();
            if (user) {
                logoutTimer = setTimeout(function() {
                    showToast('⏰ សេវាកម្មផុតកំណត់ សូមចូលប្រើឡើងវិញ', 'warning');
                    logoutUser();
                }, sessionTimeout);
            }
        }

        function logoutUser() {
            setCurrentUser(null);
            if (logoutTimer) {
                clearTimeout(logoutTimer);
                logoutTimer = null;
            }
            renderPage('login');
            showToast('🚪 ចាកចេញដោយស្វ័យប្រវត្តិ', 'info');
        }

        // ================================================================
        // BASIC FUNCTIONS
        // ================================================================

        function generateMemberId() {
            localData.memberCounter = (localData.memberCounter || 0) + 1;
            var num = localData.memberCounter;
            var str = String(num);
            while (str.length < 4) str = '0' + str;
            return 'M-' + str;
        }

        function generateAdminId() {
            localData.adminCounter = (localData.adminCounter || 0) + 1;
            var num = localData.adminCounter;
            var str = String(num);
            while (str.length < 4) str = '0' + str;
            return 'A-' + str;
        }

        function getCurrentUser() {
            var user = localStorage.getItem('firebaseCurrentUser');
            return user ? JSON.parse(user) : null;
        }

        function setCurrentUser(user) {
            currentUser = user;
            if (user) {
                localStorage.setItem('firebaseCurrentUser', JSON.stringify(user));
                resetSessionTimer();
            } else {
                localStorage.removeItem('firebaseCurrentUser');
                if (logoutTimer) {
                    clearTimeout(logoutTimer);
                    logoutTimer = null;
                }
            }
        }

        function showToast(message, type) {
            var old = document.querySelector('.toast');
            if (old) old.remove();
            var t = document.createElement('div');
            t.className = 'toast toast-' + (type || 'info');
            t.textContent = message;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                t.style.transform = 'translateX(100px)';
                setTimeout(function() { t.remove(); }, 500);
            }, 4000);
        }

        function showModal(html, options) {
            var overlay = document.getElementById('modalOverlay');
            var body = document.getElementById('modalBody');
            var content = document.getElementById('modalContent');
            body.innerHTML = html;
            overlay.style.display = 'flex';
            setTimeout(function() { content.classList.add('show'); }, 10);
            if (options && options.closeOnOverlay !== false) {
                overlay.onclick = function(e) { if (e.target === overlay) hideModal(); };
            }
            document.addEventListener('keydown', function handler(e) {
                if (e.key === 'Escape') { hideModal();
                    document.removeEventListener('keydown', handler); }
            });
        }

        function addCommission(memberPhone, transactionId, amount, reason) {
            if (!localData.commissions) localData.commissions = [];
            var member = localData.members[memberPhone];
            if (!member) return null;
            var rate = member.commissionRate || 0.05;
            var commission = amount * rate;
            if (commission <= 0) return null;
            member.totalCommission = (member.totalCommission || 0) + commission;
            var rec = {
                id: 'C-' + String(localData.commissions.length + 1).padStart(4, '0'),
                memberPhone: memberPhone,
                transactionId: transactionId,
                amount: amount,
                commission: commission,
                rate: rate,
                timestamp: new Date().toISOString(),
                status: 'approved',
                reason: reason || 'កម្រៃពីប្រតិបត្តិការ'

            localData.commissions.push(rec);

        function markNotificationRead(notiId) {
            for (var i = 0; i < localData.memberNotifications.length; i++) {
                if (localData.memberNotifications[i].id === notiId) {
                    localData.memberNotifications[i].read = true;

                }
            }
        }

        function getUnreadNotificationCount(phone) {
            var notis = getMemberNotifications(phone);
            var count = 0;
            for (var i = 0; i < notis.length; i++) {
                if (!notis[i].read) count++;
            }
            return count;
        }

        function calculateTotals(transactions) {
            var totalDeposits = 0,
                totalWithdraws = 0;
            if (!transactions) return { totalDeposits: 0, totalWithdraws: 0, netBalance: 0 };
            for (var i = 0; i < transactions.length; i++) {
                var t = transactions[i];
                if (t.status === 'completed' || t.status === 'approved') {
                    if (t.type === 'deposit') totalDeposits += t.amount;
                    else if (t.type === 'withdraw') totalWithdraws += t.amount;
                }
            }
            return { totalDeposits: totalDeposits, totalWithdraws: totalWithdraws, netBalance: totalDeposits - totalWithdraws };
        }

                    break;

                    break;
                case 'admin-dashboard':

                    break;

                    break;

        function renderReport() {
            var user = getCurrentUser();
            if (!user) {
                renderPage('login');
                return '';
            }

            return `
                    <div class="top-bar">
                        <h2>📊 របាយការណ៍</h2>

                        <button onclick="generateReport('weekly')" class="btn btn-sm btn-purple">📅 ប្រចាំសប្តាហ៍</button>
                        <button onclick="generateReport('monthly')" class="btn btn-sm btn-green">📅 ប្រចាំខែ</button>
                    </div>
                    <div id="reportContent"></div>
                `;
        }

        function generateReport(period) {
            var container = document.getElementById('reportContent');
            if (!container) return;

            var now = new Date();
            var start = new Date();

            if (period === 'daily') {
                start.setHours(0, 0, 0, 0);
            } else if (period === 'weekly') {
                start.setDate(now.getDate() - 7);
            } else if (period === 'monthly') {
                start.setMonth(now.getMonth() - 1);
            }

            var filtered = [];
            for (var i = 0; i < localData.transactions.length; i++) {
                var t = localData.transactions[i];
                if (new Date(t.timestamp) >= start && new Date(t.timestamp) <= now && (t.status === 'completed' || t.status ===
                        'approved')) {
                    filtered.push(t);
                }
            }

            var totals = { totalDeposits: 0, totalWithdraws: 0 };
            for (var j = 0; j < filtered.length; j++) {
                if (filtered[j].type === 'deposit') totals.totalDeposits += filtered[j].amount;
                else if (filtered[j].type === 'withdraw') totals.totalWithdraws += filtered[j].amount;
            }

            var tc = 0;
            for (var k = 0; k < localData.commissions.length; k++) {
                tc += localData.commissions[k].commission || 0;
            }

            var html = `
                    <div class="card">
                        <h3>📊 របាយការណ៍ ${period === 'daily' ? 'ប្រចាំថ្ងៃ' : period === 'weekly' ? 'ប្រចាំសប្តាហ៍' : 'ប្រចាំខែ'}</h3>
                        <div style="font-size:12px;color:rgba(255,255,255,0.3);">
                            ពី ${start.toLocaleDateString('km-KH')} ដល់ ${now.toLocaleDateString('km-KH')}
                        </div>
                        <div class="summary-stats" style="margin-top:10px;">
                            <div class="summary-box"><div class="number green">$${totals.totalDeposits.toFixed(2)}</div><div class="label">ដាក់</div></div>
                            <div class="summary-box"><div class="number red">$${totals.totalWithdraws.toFixed(2)}</div><div class="label">ដក</div></div>
                            <div class="summary-box"><div class="number gold">$${(totals.totalDeposits - totals.totalWithdraws).toFixed(2)}</div><div class="label">សល់</div></div>
                            <div class="summary-box"><div class="number gold">${Object.keys(localData.members).length}</div><div class="label">សមាជិក</div></div>
                            <div class="summary-box"><div class="number gold">${filtered.length}</div><div class="label">ប្រតិបត្តិការ</div></div>
                            <div class="summary-box"><div class="number gold">$${tc.toFixed(2)}</div><div class="label">កម្រៃ</div></div>
                        </div>
                        <div style="max-height:150px;overflow-y:auto;margin-top:8px;">
                            ${filtered.slice(0, 10).map(function(tx) {
                                return '<div class="transaction-item"><div>' + tx.type + ' - ' + (tx.description || '') + '</div><div style="color:' + (tx.type === 'deposit' ? '#48bb78' : '#fc8181') + ';">' + (tx.type === 'deposit' ? '+' : '-') + '$' + tx.amount.toFixed(2) + '</div></div>';
                            }).join('')}
                            ${filtered.length > 10 ? '<p style="text-align:center;font-size:10px;color:rgba(255,255,255,0.2);padding-top:4px;">បង្ហាញ ១០ ចុងក្រោយ</p>' : ''}
                        </div>
                    </div>
                `;

            container.innerHTML = html;
        }

        function handleDepositFile(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var fn = document.getElementById('depositFileName');
                if (fn) fn.textContent = '✅ ' + file.name;
                var pv = document.getElementById('depositPreview');
                if (pv) pv.innerHTML = '<img src="' + e.target.result +
                    '" class="preview-image" alt="Deposit" onclick="event.stopPropagation();openImageViewer(\'' + e.target
                    .result + '\')">';
                input.dataset.imageData = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleWithdrawFile(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var fn = document.getElementById('withdrawFileName');
                if (fn) fn.textContent = '✅ ' + file.name;

        function submitDeposit() {
            var user = getCurrentUser();

        function approvePaymentRequest(prId) {
            var pr = null;
            for (var i = 0; i < localData.paymentRequests.length; i++) {
                if (localData.paymentRequests[i].id === prId) {
                    pr = localData.paymentRequests[i];
                    break;
                }
            }

            if (!pr) { showToast('មិនឃើញសំណើ!', 'error'); return; }

            pr.status = 'approved';

            var amountUSD = pr.currency === 'riel' ? convertToUSD(pr.amount) : pr.amount;

            if (pr.type === 'deposit') {
                var target = localData.members[pr.to];
                if (target) {
                    target.balance += amountUSD;
                    if (!target.benefits) target.benefits = [];
                    target.benefits.push('💰 បានទទួលទូទាត់ ' + formatCurrency(amountUSD, target.currency || 'usd') +
                        ' (សំណើ: ' + pr.id + ')');

                    var comm = addCommission(pr.to, pr.id, amountUSD);
                    if (comm) {
                        target.benefits.push('🎁 បានទទួលកម្រៃ ' + formatCurrency(comm.commission, target.currency ||
                            'usd'));
                        sendMemberNotification(pr.to, 'commission', 'កម្រៃថ្មី',
                            'អ្នកបានទទួលកម្រៃ ' + formatCurrency(comm.commission, target.currency || 'usd') +
                            ' ពីការដាក់ប្រាក់', '🎁');
                    }

                    updateTransactionStatus(pr.id, 'completed');

                    sendMemberNotification(pr.to, 'payment', 'ការទូទាត់ត្រូវបានអនុម័ត',
                        'អ្នកបានទទួលទូទាត់ ' + formatCurrency(amountUSD, target.currency || 'usd') + ' (សំណើ: ' +
                        pr.id + ')', '✅');
                }
                var source = localData.subAdmins[pr.from];
                if (source) {
                    source.balance -= amountUSD;
                }
            } else if (pr.type === 'withdraw') {
                var target = localData.members[pr.from];
                if (target) {
                    target.balance -= amountUSD;
                    if (!target.benefits) target.benefits = [];
                    target.benefits.push('🏦 បានដកប្រាក់ ' + formatCurrency(amountUSD, target.currency || 'usd') +
                        ' (សំណើ: ' + pr.id + ')');

                    updateTransactionStatus(pr.id, 'completed');

                    sendMemberNotification(pr.from, 'payment', 'ការដកប្រាក់ត្រូវបានអនុម័ត',
                        'អ្នកបានដកប្រាក់ ' + formatCurrency(amountUSD, target.currency || 'usd') + ' (សំណើ: ' +
                        pr.id + ')', '✅');
                }
                var source = localData.subAdmins[pr.to];
                if (source) {
                    source.balance += amountUSD;
                }

        function searchMembers(query) {
            var container = document.getElementById('adminMemberList');
            var res = document.getElementById('adminSearchResults');
            if (!container) return;

            var q = query.toLowerCase().trim();

            if (!q) {
                if (res) { res.innerHTML = '';
                    res.style.display = 'none'; }
                container.style.display = 'block';
                return;
            }

            var members = Object.values(localData.members);
            var filtered = [];
            for (var i = 0; i < members.length; i++) {
                var m = members[i];
                if (m.phone === '066817407') continue; // Exclude super admin
                if ((m.name && m.name.toLowerCase().indexOf(q) !== -1) ||
                    m.phone.indexOf(q) !== -1 ||
                    m.id.toLowerCase().indexOf(q) !== -1) {
                    filtered.push(m);
                }
            }

            if (res) {
                res.style.display = 'block';
                container.style.display = 'none';
                if (filtered.length === 0) {
                    res.innerHTML =
                    '<p style="opacity:0.4;padding:10px;text-align:center;">មិនឃើញលទ្ធផល</p>';
                } else {
                    var html = '';
                    for (var j = 0; j < filtered.length; j++) {
                        var m = filtered[j];
                        var curr = m.currency || 'usd';
                        html += `
                                <div class="list-item">
                                    <div class="info">
                                        <span class="name">${m.name || m.phone}</span>
                                        <span class="sub">🆔 ${m.id} | 📱 ${m.phone}</span>
                                    </div>
                                    <div><span class="balance">${formatCurrency(m.balance, curr)}</span></div>
                                    <div class="actions">
                                        <button onclick="approveMemberRequests('${m.phone}')" class="btn btn-gold btn-sm">✅</button>
                                        <button onclick="addCommissionToMember('${m.phone}')" class="btn btn-commission btn-sm">🎁</button>
                                        <button onclick="sendNotificationForm('${m.phone}')" class="btn btn-notification btn-sm">🔔</button>
                                        <button onclick="addMoneyToMember('${m.phone}')" class="btn btn-green btn-sm">💰</button>
                                    </div>
                                </div>
                            `;
                    }
                    res.innerHTML = html;
                }
            }
        }

        function logout() {
            setCurrentUser(null);
            renderPage('login');
            showToast('🚪 ចាកចេញជោគជ័យ!', 'info');
        }

        function goBack() {
            var user = getCurrentUser();
            if (user) {
                if (user.role === 'super_admin') renderPage('super-dashboard');
                else if (user.role === 'sub_admin') renderPage('admin-dashboard');
                else renderPage('dashboard');
            } else {
                renderPage('login');
            }
        }

        // ================================================================
        // EVENT ATTACHMENT
        // ================================================================

        function attachEvents(page) {
            // Register
            var registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.onsubmit = function(e) {
                    e.preventDefault();
                    var name = document.getElementById('regName').value.trim();
                    var phone = document.getElementById('regPhone').value.trim();
                    var password = document.getElementById('regPassword').value.trim();
                    var confirm = document.getElementById('regConfirm').value.trim();
                    var currency = document.getElementById('regCurrency').value;
                    var msg = document.getElementById('regMsg');

                    if (!phone || !password || !confirm) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }
                    if (password !== confirm) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">ពាក្យសម្ងាត់មិនដូចគ្នា!</div>';
                        return;
                    }
                    if (localData.members[phone]) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">លេខទូរសព្ទមានរួចហើយ!</div>';
                        return;
                    }

                    var id = generateMemberId();
                    localData.members[phone] = {
                        name: name || phone,
                        phone: phone,
                        password: password,
                        id: id,
                        currency: currency,
                        balance: 0,
                        commissionRate: 0.05,
                        totalCommission: 0,
                        benefits: ['✨ សមាជិកថ្មី'],
                        date: new Date().toISOString()
                    };

                    // Add registration record
                    addMemberRegistration(name || phone, phone, id, 'member');

                    // Auto create sub admin if none exists
                    if (Object.keys(localData.subAdmins).length === 0) {
                        var adminId = generateAdminId();
                        localData.subAdmins[phone] = {
                            name: name || phone,
                            phone: phone,
                            password: password,
                            id: adminId,
                            balance: 0,
                            totalReceived: 0,
                            totalTransferred: 0,
                            members: [phone]
                        };
                        // Add admin registration
                        addMemberRegistration(name || phone, phone, adminId, 'sub_admin');
                    }

                    logActivity('system', 'System', 'register', 'authentication', phone, null, 'សមាជិកថ្មី ' + phone);
                    saveToFirebase();

                    // Auto login
                    setCurrentUser({ phone: phone, role: 'member', name: name || phone });
                    msg.innerHTML =
                        '<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ ចុះឈ្មោះជោគជ័យ!<br>🆔 ' +
                        id + '<br>📱 ' + phone + '</div>';
                    setTimeout(function() { renderPage('dashboard'); }, 1500);
                };
            }

            // Login
            var loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.onsubmit = function(e) {
                    e.preventDefault();
                    var role = document.getElementById('loginRole').value;
                    var phone = document.getElementById('loginPhone').value.trim();
                    var password = document.getElementById('loginPassword').value.trim();
                    var msg = document.getElementById('loginMsg');

                    if (!phone || !password) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }

                    // Check Super Admin
                    if (role === 'super_admin') {
                        if (localData.superAdmins[phone] && localData.superAdmins[phone].password === password) {
                            setCurrentUser({ phone: phone, role: 'super_admin', name: 'Super Admin' });
                            logActivity('SUPER-001', 'Super Admin', 'login', 'authentication', null, null,
                                'ចូលប្រើ Super Admin');
                            renderPage('super-dashboard');
                            return;
                        }
                    }

                    // Check Sub Admin
                    if (role === 'sub_admin') {
                        if (localData.subAdmins[phone] && localData.subAdmins[phone].password === password) {
                            setCurrentUser({ phone: phone, role: 'sub_admin', name: localData.subAdmins[phone]
                                    .name || localData.subAdmins[phone].username });
                            logActivity(localData.subAdmins[phone].id, localData.subAdmins[phone].name ||
                                localData.subAdmins[phone].username, 'login', 'authentication', null, null,
                                'ចូលប្រើ Sub Admin');
                            renderPage('admin-dashboard');
                            return;
                        }
                    }

                    // Check Member
                    if (role === 'member') {
                        if (localData.members[phone] && localData.members[phone].password === password) {
                            setCurrentUser({ phone: phone, role: 'member', name: localData.members[phone].name ||
                                    phone });
                            logActivity(localData.members[phone].id, localData.members[phone].name || phone,
                                'login', 'authentication', null, null, 'ចូលប្រើជាសមាជិក');
                            renderPage('dashboard');
                            return;
                        }
                    }

                    msg.innerHTML =
                        '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">❌ មិនត្រឹមត្រូវ!</div>';
                };
            }

            // Create Admin
            var createAdminForm = document.getElementById('createAdminForm');
            if (createAdminForm) {
                createAdminForm.onsubmit = function(e) {
                    e.preventDefault();
                    var name = document.getElementById('newAdminName').value.trim();
                    var phone = document.getElementById('newAdminPhone').value.trim();
                    var password = document.getElementById('newAdminPassword').value.trim();
                    var msg = document.getElementById('createAdminMsg');

                    if (!name || !phone || !password) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបំពេញព័ត៌មាន!</div>';
                        return;
                    }
                    if (localData.subAdmins[phone]) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">លេខទូរសព្ទមានរួចហើយ!</div>';
                        return;
                    }

                    var id = generateAdminId();
                    localData.subAdmins[phone] = {
                        name: name,
                        phone: phone,
                        password: password,
                        id: id,
                        balance: 0,
                        totalReceived: 0,
                        totalTransferred: 0,
                        members: Object.keys(localData.members)
                    };

                    // Add registration record
                    addMemberRegistration(name, phone, id, 'sub_admin');

                    // Send notification to new admin
                    sendMemberNotification(phone, 'system', 'អ្នកត្រូវបានតែងតាំងជា Sub Admin',
                        'ឈ្មោះ: ' + name + ', ពាក្យសម្ងាត់: ' + password, '👑');

                    logActivity('SUPER-001', 'Super Admin', 'create_admin', 'administration', phone, null,
                        'បង្កើត Sub Admin "' + name + '" (' + id + ')');
                    saveToFirebase();

                    msg.innerHTML =
                        '<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ បង្កើតជោគជ័យ!<br>🆔 ' +
                        id + '<br>🔒 ' + password + '</div>';
                    createAdminForm.reset();
                    setTimeout(function() { renderPage('super-dashboard'); }, 1500);
                };
            }

            // Fund Admin
            var fundAdminForm = document.getElementById('fundAdminForm');
            if (fundAdminForm) {
                fundAdminForm.onsubmit = function(e) {
                    e.preventDefault();
                    var phone = document.getElementById('fundTarget').value;
                    var amount = parseFloat(document.getElementById('fundAmount').value);
                    var currency = document.getElementById('fundCurrency').value;
                    var msg = document.getElementById('fundAdminMsg');

                    if (!phone) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">មិនទាន់មាន Sub Admin!</div>';
                        return;
                    }

                    if (!amount || amount <= 0) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">សូមបញ្ចូលចំនួន!</div>';
                        return;
                    }

                    var amountUSD = currency === 'riel' ? convertToUSD(amount) : amount;
                    var admin = localData.subAdmins[phone];
                    if (!admin) {
                        msg.innerHTML =
                            '<div style="color:#fc8181;padding:8px;background:rgba(252,129,129,0.1);border-radius:8px;">មិនឃើញ Sub Admin!</div>';
                        return;
                    }

                    admin.balance += amountUSD;
                    admin.totalReceived = (admin.totalReceived || 0) + amountUSD;

                    logActivity('SUPER-001', 'Super Admin', 'fund_admin', 'financial', admin.phone, amountUSD,
                        'បញ្ចូល $' + amountUSD.toFixed(2) + ' ទៅ ' + admin.name);

                    sendMemberNotification(admin.phone, 'payment', 'បញ្ចូលប្រាក់ពី Super Admin',
                        'អ្នកបានទទួលប្រាក់ $' + amountUSD.toFixed(2) + ' ពី Super Admin', '💰');

                    saveToFirebase();
                    msg.innerHTML =
                        '<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ ជោគជ័យ!</div>';
                    document.getElementById('fundAmount').value = '';
                    setTimeout(function() { renderPage('super-dashboard'); }, 1500);
                };
            }

            // Bank Info
            var bankInfoForm = document.getElementById('bankInfoForm');
            if (bankInfoForm) {
                bankInfoForm.onsubmit = function(e) {
                    e.preventDefault();
                    var user = getCurrentUser();
                    if (!user || user.role !== 'sub_admin') {
                        showToast('សូមចូលប្រើជា Sub Admin!', 'error');
                        return;
                    }

                    var admin = localData.subAdmins[user.phone];
                    if (!admin) { showToast('មិនឃើញព័ត៌មាន Admin!', 'error'); return; }

                    var bankName = document.getElementById('bankName').value.trim();
                    var bankAccount = document.getElementById('bankAccount').value.trim();
                    var qrInput = document.getElementById('qrAdminInput');
                    var qrData = qrInput ? qrInput.dataset.imageData : null;

                    admin.bankName = bankName || admin.bankName || '';
                    admin.bankAccount = bankAccount || admin.bankAccount || '';
                    if (qrData) admin.qrCode = qrData;

                    saveToFirebase();
                    logActivity(admin.id, admin.name || admin.username, 'update_bank_info', 'administration', null,
                        null, 'ធ្វើបច្ចុប្បន្នភាពព័ត៌មានទូទាត់');

                    var msg = document.getElementById('bankInfoMsg');
                    msg.innerHTML =
                        '<div style="color:#48bb78;padding:8px;background:rgba(72,187,120,0.1);border-radius:8px;">✅ រក្សាទុកជោគជ័យ!</div>';
                    setTimeout(function() { msg.innerHTML = ''; }, 3000);
                };
            }
        }

        // ================================================================
        // INIT
        // ================================================================

        // Initialize Super Admin
        if (Object.keys(localData.superAdmins).length === 0) {
            localData.superAdmins['066817407'] = {
                name: 'Super Admin',
                phone: '066817407',
                password: 'super123',
                id: 'SUPER-001',
                balance: 10000,
                createdAt: new Date().toISOString()
            };
            // Add registration record
            addMemberRegistration('Super Admin', '066817407', 'SUPER-001', 'super_admin');
        }

        // Initialize default member if none exists
        if (Object.keys(localData.members).length === 0) {
            var defaultId = generateMemberId();
            localData.members['066817407'] = {
                name: 'Super Admin',
                phone: '066817407',
                password: 'super123',
                id: defaultId,
                currency: 'usd',
                balance: 10000,
                commissionRate: 0.05,
                totalCommission: 0,
                benefits: ['⭐ Super Admin'],
                date: new Date().toISOString()
            };
        }

        // Initialize sub admin from first member if none exists
        if (Object.keys(localData.subAdmins).length === 0) {
            var firstMember = Object.values(localData.members)[0];
            if (firstMember) {
                var adminId = generateAdminId();
                localData.subAdmins[firstMember.phone] = {
                    name: firstMember.name || firstMember.phone,
                    phone: firstMember.phone,
                    password: firstMember.password,
                    id: adminId,
                    balance: 0,
                    totalReceived: 0,
                    totalTransferred: 0,
                    members: Object.keys(localData.members)
                };
                // Add registration record
                addMemberRegistration(firstMember.name || firstMember.phone, firstMember.phone, adminId,
                'sub_admin');
            }
        }

        saveToFirebase();

        var cu = getCurrentUser();
        if (cu) {
            if (cu.role === 'super_admin') renderPage('super-dashboard');
            else if (cu.role === 'sub_admin' && localData.subAdmins[cu.phone]) renderPage('admin-dashboard');
            else if (cu.role === 'member' && localData.members[cu.phone]) renderPage('dashboard');
            else { setCurrentUser(null);
                renderPage('login'); }
        } else {
            renderPage('login');
        }

        // Firebase connection
        database.ref('.info/connected').on('value', function(snap) {
            updateCloudStatus(snap.val());
            if (snap.val()) {
                setTimeout(function() { loadFromFirebase(); }, 1000);
            }
        });

        setupRealtimeListeners();

        // Reset session timer on user interaction
        document.addEventListener('click', resetSessionTimer);
        document.addEventListener('keydown', resetSessionTimer);
        document.addEventListener('touchstart', resetSessionTimer);

        console.log('🚀 ប្រព័ន្ធគ្រប់គ្រងសមាជិក v7.0 បានដំណើរការ!');
        console.log('📊 ទិន្នន័យបច្ចុប្បន្ន:', localData);
        console.log('👤 អ្នកប្រើបច្ចុប្បន្ន:', cu);
    </script>
</body>
