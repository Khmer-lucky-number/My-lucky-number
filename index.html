<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ប្រព័ន្ធគ្រប់គ្រងសមាជិក និង Admin</title>
    <style>
        /* ===== CSS ទាំងអស់ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Khmer OS', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 650px;
            animation: fadeInUp 0.6s ease-out;
            max-height: 98vh;
            overflow-y: auto;
        }

        .container::-webkit-scrollbar {
            width: 6px;
        }
        .container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1,
        h2,
        h3 {
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h2 {
            font-size: 1.8rem;
            color: #fff;
        }
        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        input,
        select {
            width: 100%;
            padding: 14px 18px;
            margin: 6px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        input:focus,
        select:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.15);
        }
        select option {
            background: #1a1a2e;
            color: #fff;
        }
        input[type="number"]::-webkit-inner-spin-button {
            opacity: 0.5;
        }

        .btn {
            display: inline-block;
            padding: 13px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 4px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #48bb78, #38a169);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 12px 35px rgba(72, 187, 120, 0.5);
        }
        .btn-danger {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            box-shadow: 0 8px 25px rgba(252, 129, 129, 0.3);
        }
        .btn-danger:hover {
            box-shadow: 0 12px 35px rgba(252, 129, 129, 0.5);
        }
        .btn-warning {
            background: linear-gradient(135deg, #f6ad55, #ed8936);
            box-shadow: 0 8px 25px rgba(246, 173, 85, 0.3);
        }
        .btn-warning:hover {
            box-shadow: 0 12px 35px rgba(246, 173, 85, 0.5);
        }
        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            color: #1a1a2e;
        }
        .btn-gold:hover {
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }
        .btn-block {
            width: 100%;
            text-align: center;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px;
            border-radius: 18px;
            margin: 12px 0;
            text-align: left;
            transition: all 0.3s ease;
        }
        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }
        .card h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
        }
        .card .label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 4px;
        }

        .amount {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #48bb78, #38a169);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge {
            display: inline-block;
            padding: 3px 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .badge-gold {
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
        }
        .badge-green {
            background: linear-gradient(135deg, #48bb78, #38a169);
        }
        .badge-red {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
        }
        .badge-purple {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
        }

        .admin-panel {
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
        }
        .admin-panel h3 {
            color: #ffd700;
        }

        #memberList,
        #adminList {
            text-align: left;
            margin-top: 8px;
            max-height: 250px;
            overflow-y: auto;
        }
        #memberList::-webkit-scrollbar,
        #adminList::-webkit-scrollbar {
            width: 4px;
        }
        #memberList::-webkit-scrollbar-thumb,
        #adminList::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .member-item,
        .admin-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            margin: 5px 0;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            flex-wrap: wrap;
            gap: 5px;
        }
        .member-item:hover,
        .admin-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }
        .member-item .info,
        .admin-item .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .member-item .info .name,
        .admin-item .info .name {
            color: #fff;
            font-weight: 600;
        }
        .member-item .info .sub,
        .admin-item .info .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        .member-item .info .id {
            font-size: 11px;
            color: rgba(255, 215, 0, 0.6);
        }
        .member-item .balance,
        .admin-item .balance {
            color: #48bb78;
            font-weight: 600;
            font-size: 15px;
        }
        .member-item .actions,
        .admin-item .actions {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        #benefitsList {
            list-style: none;
            padding: 0;
        }
        #benefitsList li {
            padding: 8px 14px;
            margin: 4px 0;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.8);
            border-left: 3px solid #667eea;
            font-size: 13px;
        }

        #message .success {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
            border: 1px solid rgba(72, 187, 120, 0.3);
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
        }
        #message .error {
            background: rgba(252, 129, 129, 0.2);
            color: #fc8181;
            border: 1px solid rgba(252, 129, 129, 0.3);
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
        }
        #message .info {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .hidden {
            display: none !important;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .top-bar h2 {
            margin: 0;
        }
        .top-bar .back-link {
            font-size: 14px;
            opacity: 0.6;
            cursor: pointer;
        }
        .top-bar .back-link:hover {
            opacity: 1;
        }

        .text-center {
            text-align: center;
        }
        .mt-5 {
            margin-top: 5px;
        }
        .mt-10 {
            margin-top: 10px;
        }
        .mt-15 {
            margin-top: 15px;
        }
        .mt-20 {
            margin-top: 20px;
        }
        .mb-10 {
            margin-bottom: 10px;
        }
        .op-3 {
            opacity: 0.3;
        }
        .op-5 {
            opacity: 0.5;
        }
        .fs-11 {
            font-size: 11px;
        }
        .fs-12 {
            font-size: 12px;
        }
        .fs-14 {
            font-size: 14px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .flex-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .gap-5 {
            gap: 5px;
        }
        .gap-10 {
            gap: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            margin: 8px 0;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .stat-box .label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        .role-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .role-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }
        .role-card .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }
        .role-card .title {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }
        .role-card .desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 4px;
        }
        .role-card.admin-card {
            border-color: rgba(255, 215, 0, 0.3);
        }
        .role-card.admin-card:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        .notification-item {
            background: rgba(246, 173, 85, 0.1);
            border-left: 4px solid #f6ad55;
            padding: 12px 16px;
            border-radius: 10px;
            margin: 6px 0;
        }
        .notification-item .time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }

        .search-box {
            position: relative;
        }
        .search-box input {
            padding-right: 45px;
        }
        .search-box .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 18px;
        }
        .search-box .clear-btn:hover {
            color: #fff;
        }

        @media (max-width: 600px) {
            .container {
                padding: 18px 14px;
                border-radius: 20px;
            }
            h1 {
                font-size: 2rem;
            }
            h2 {
                font-size: 1.4rem;
            }
            .amount {
                font-size: 2.2rem;
            }
            .buttons {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
            .stats {
                grid-template-columns: 1fr 1fr;
            }
            .role-selector {
                grid-template-columns: 1fr;
            }
            .member-item,
            .admin-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .member-item .actions,
            .admin-item .actions {
                width: 100%;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div id="pageContent"></div>
    </div>

    <script>
        // ================================================================
        // ===== DATA LAYER =====
        // ================================================================

        let data = JSON.parse(localStorage.getItem('memberSystemData')) || {
            superAdmins: {},
            subAdmins: {},
            members: {},
            activityLogs: [],
            adminVerificationCode: 'ADMIN2026',
            memberCounter: 0,
            adminCounter: 0,
            superAdminExists: false
        };

        function saveData() {
            localStorage.setItem('memberSystemData', JSON.stringify(data));
        }

        function generateAdminId() {
            data.adminCounter++;
            saveData();
            return 'A-' + String(data.adminCounter).padStart(4, '0');
        }

        function generateMemberId() {
            data.memberCounter++;
            saveData();
            return 'M-' + String(data.memberCounter).padStart(4, '0');
        }

        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('currentUser') || 'null');
        }

        function setCurrentUser(user) {
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
            } else {
                localStorage.removeItem('currentUser');
            }
        }

        function logoutUser() {
            if (confirm('តើអ្នកចង់ចាកចេញមែនទេ?')) {
                setCurrentUser(null);
                renderPage('home');
            }
        }

        function logActivity(adminId, adminName, action, actionType, target, amount, details) {
            const log = {
                id: 'LOG-' + String(data.activityLogs.length + 1).padStart(4, '0'),
                adminId: adminId || 'unknown',
                adminName: adminName || 'Unknown',
                action: action || 'unknown',
                actionType: actionType || 'general',
                target: target || null,
                amount: amount || null,
                ip: 'local',
                device: navigator.userAgent || 'Unknown',
                timestamp: new Date().toISOString(),
                status: 'success',
                details: details || ''
            };
            data.activityLogs.unshift(log);
            if (data.activityLogs.length > 500) {
                data.activityLogs = data.activityLogs.slice(0, 500);
            }
            saveData();
            return log;
        }

        function initSuperAdmin() {
            if (!data.superAdminExists) {
                data.superAdmins['099999999'] = {
                    username: 'Super Admin',
                    password: 'super123',
                    phone: '099999999',
                    id: 'SUPER-001',
                    role: 'super_admin',
                    balance: 10000,
                    createdAt: new Date().toISOString()
                };
                data.superAdminExists = true;
                saveData();
                logActivity('SUPER-001', 'Super Admin', 'system_init', 'system', null, null, 'បង្កើតប្រព័ន្ធ Super Admin');
            }
        }

        // ================================================================
        // ===== RENDER ENGINE =====
        // ================================================================

        function renderPage(page, params) {
            const container = document.getElementById('pageContent');
            let html = '';

            switch (page) {
                case 'home':
                    html = getHomePage();
                    break;
                case 'role-select':
                    html = getRoleSelectPage();
                    break;
                case 'login':
                    html = getLoginPage(params);
                    break;
                case 'register':
                    html = getRegisterPage();
                    break;
                case 'dashboard':
                    html = getDashboardPage();
                    break;
                case 'admin-dashboard':
                    html = getAdminDashboardPage();
                    break;
                case 'super-dashboard':
                    html = getSuperDashboardPage();
                    break;
                case 'create-admin':
                    html = getCreateAdminPage();
                    break;
                case 'transfer-money':
                    html = getTransferMoneyPage(params);
                    break;
                case 'activity-log':
                    html = getActivityLogPage();
                    break;
                default:
                    html = getHomePage();
            }

            container.innerHTML = html;
            attachEvents(page, params);
        }

        // ================================================================
        // ===== PAGE BUILDERS =====
        // ================================================================

        function getHomePage() {
            const totalMembers = Object.keys(data.members).length;
            const totalAdmins = Object.keys(data.subAdmins).length;
            const totalBalance = Object.values(data.members).reduce((sum, m) => sum + m.balance, 0) +
                Object.values(data.subAdmins).reduce((sum, a) => sum + a.balance, 0);

            return `
                <div class="text-center">
                    <div style="margin-bottom:8px;"><span class="badge badge-gold">🚀 កំណែ 3.0</span></div>
                    <h1>ស្វាគមន៍!</h1>
                    <p style="font-size:1rem;color:rgba(255,255,255,0.6);">ប្រព័ន្ធគ្រប់គ្រងសមាជិក និង Admin</p>
                    <div style="height:2px;width:60px;background:linear-gradient(90deg,#667eea,transparent);margin:15px auto;"></div>

                    <div class="stats">
                        <div class="stat-box">
                            <div class="number">${totalMembers}</div>
                            <div class="label">សមាជិក</div>
                        </div>
                        <div class="stat-box">
                            <div class="number">${totalAdmins}</div>
                            <div class="label">Sub Admin</div>
                        </div>
                        <div class="stat-box">
                            <div class="number">$${totalBalance.toFixed(0)}</div>
                            <div class="label">ប្រាក់សរុប</div>
                        </div>
                        <div class="stat-box">
                            <div class="number">${Object.keys(data.members).filter(k => data.members[k].balance > 0).length}</div>
                            <div class="label">សកម្ម</div>
                        </div>
                    </div>

                    <div class="buttons">
                        <button onclick="renderPage('role-select')" class="btn">🔑 ចូលប្រើ</button>
                        <button onclick="renderPage('register')" class="btn btn-secondary">📝 ចុះឈ្មោះ</button>
                    </div>

                    <p style="font-size:0.8rem;color:rgba(255,255,255,0.2);margin-top:15px;">
                        👑 សម្រាប់ Super Admin 
                        <button onclick="renderPage('super-dashboard')" style="background:linear-gradient(135deg,#ffd700,#f59e0b);border:none;color:#1a1a2e;padding:6px 18px;border-radius:20px;font-weight:600;cursor:pointer;font-size:13px;box-shadow:0 4px 15px rgba(255,215,0,0.3);">
                            ⚡ ចូលដោយផ្ទាល់
                        </button>
                    </p>
                </div>
            `;
        }

        function getRoleSelectPage() {
            return `
                <div class="top-bar">
                    <h2>🔑 ជ្រើសរើសប្រភេទ</h2>
                    <span class="back-link" onclick="renderPage('home')">← ត្រឡប់</span>
                </div>
                <p>សូមជ្រើសរើសប្រភេទអ្នកប្រើប្រាស់</p>

                <div class="role-selector">
                    <div class="role-card" onclick="renderPage('login', {role:'member'})">
                        <span class="icon">👤</span>
                        <div class="title">សមាជិក</div>
                        <div class="desc">ចូលប្រើជាសមាជិក</div>
                    </div>
                    <div class="role-card admin-card" onclick="renderPage('login', {role:'sub_admin'})">
                        <span class="icon">👑</span>
                        <div class="title">Sub Admin</div>
                        <div class="desc">ចូលប្រើជាអ្នកគ្រប់គ្រង</div>
                    </div>
                </div>

                <div class="text-center mt-10">
                    <p style="font-size:0.8rem;color:rgba(255,255,255,0.2);">
                        👑 Super Admin: 
                        <button onclick="renderPage('super-dashboard')" style="background:linear-gradient(135deg,#ffd700,#f59e0b);border:none;color:#1a1a2e;padding:4px 16px;border-radius:20px;font-weight:600;cursor:pointer;font-size:12px;">
                            ⚡ ចូលដោយផ្ទាល់
                        </button>

                    e.preventDefault();
                    const role = document.getElementById('loginRole').value;
                    const phone = document.getElementById('loginPhone').value.trim();
                    const password = document.getElementById('loginPassword').value.trim();
                    const msg = document.getElementById('message');

                    if (!phone || !password) {
                        msg.innerHTML = `<div class="error">សូមបំពេញព័ត៌មានឲ្យពេញលេញ!</div>`;
                        return;
                    }

                    if (role === 'sub_admin') {
                        const admin = data.subAdmins[phone];
                        if (!admin || admin.password !== password) {
                            msg.innerHTML = `<div class="error">❌ លេខទូរសព្ទឬពាក្យសម្ងាត់មិនត្រឹមត្រូវ!</div>`;
                            return;
                        }
                        setCurrentUser({ phone: phone, role: 'sub_admin', name: admin.username });
                        logActivity(admin.id, admin.username, 'login', 'authentication', null, null, 'ចូលប្រើជា Sub Admin');
                        renderPage('admin-dashboard');
                    } else {
                        const member = data.members[phone];
                        if (!member || member.password !== password) {
                            msg.innerHTML = `<div class="error">❌ លេខទូរសព្ទឬពាក្យសម្ងាត់មិនត្រឹមត្រូវ!</div>`;
                            return;
                        }
                        setCurrentUser({ phone: phone, role: 'member', name: member.username || phone });
                        logActivity(member.id, member.username || phone, 'login', 'authentication', null, null,
                            'ចូលប្រើជាសមាជិក');
                        renderPage('dashboard');
                    }
                });
            }

            // ---- REGISTER ----
            const registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const username = document.getElementById('regUsername').value.trim();
                    const phone = document.getElementById('regPhone').value.trim();
                    const password = document.getElementById('regPassword').value.trim();
                    const confirmPassword = document.getElementById('regConfirmPassword').value.trim();
                    const msg = document.getElementById('message');

                    if (!phone || !password || !confirmPassword) {
                        msg.innerHTML = `<div class="error">សូមបំពេញព័ត៌មានឲ្យពេញលេញ!</div>`;
                        return;
                    }

                    if (!/^\d{9,}$/.test(phone)) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទមិនត្រឹមត្រូវ! (ត្រូវមានយ៉ាងតិច ៩ ខ្ទង់)</div>`;
                        return;
                    }

                    if (password !== confirmPassword) {
                        msg.innerHTML = `<div class="error">ពាក្យសម្ងាត់ទាំងពីរមិនដូចគ្នា!</div>`;
                        return;
                    }

                    if (data.members[phone]) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទនេះមានរួចហើយ!</div>`;
                        return;
                    }

                    const newId = generateMemberId();
                    data.members[phone] = {
                        username: username || phone,
                        password: password,
                        phone: phone,
                        id: newId,
                        role: 'member',
                        balance: 0,
                        benefits: ['✨ សមាជិកថ្មី'],
                        createdAt: new Date().toISOString()
                    };
                    saveData();

                    msg.innerHTML = `
                        <div class="success">
                            ✅ ចុះឈ្មោះជោគជ័យ!<br>
                            🆔 ID: ${newId}<br>
                            📱 លេខទូរសព្ទ: ${phone}<br>
                            <span onclick="renderPage('role-select')" style="color:#667eea;cursor:pointer;">🔑 ចូលប្រើ</span>
                        </div>
                    `;
                    registerForm.reset();
                });
            }

            // ---- CREATE ADMIN (Super Admin) ----
            const createAdminForm = document.getElementById('createAdminForm');
            if (createAdminForm) {
                createAdminForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('newAdminName').value.trim();
                    const phone = document.getElementById('newAdminPhone').value.trim();
                    const password = document.getElementById('newAdminPassword').value.trim();
                    const balance = parseFloat(document.getElementById('newAdminBalance').value) || 0;
                    const msg = document.getElementById('createAdminMessage');

                    if (!name || !phone || !password) {
                        msg.innerHTML = `<div class="error">សូមបំពេញព័ត៌មានឲ្យពេញលេញ!</div>`;
                        return;
                    }

                    if (!/^\d{9,}$/.test(phone)) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទមិនត្រឹមត្រូវ!</div>`;
                        return;
                    }

                    if (data.subAdmins[phone]) {
                        msg.innerHTML = `<div class="error">លេខទូរសព្ទនេះមានរួចហើយ!</div>`;
                        return;
                    }

                    const newId = generateAdminId();
                    data.subAdmins[phone] = {
                        username: name,
                        password: password,
                        phone: phone,
                        id: newId,
                        role: 'sub_admin',
                        balance: balance,
                        totalReceived: balance,
                        totalTransferred: 0,
                        members: [],
                        createdBy: 'super_admin',
                        createdAt: new Date().toISOString()
                    };
                    saveData();

                    logActivity('SUPER-001', 'Super Admin', 'create_admin', 'administration', phone, null,
                        `បង្កើត Sub Admin "${name}" (${newId})`);

                    msg.innerHTML = `
                        <div class="success">
                            ✅ បង្កើត Sub Admin ជោគជ័យ!<br>
                            🆔 ID: ${newId}<br>
                            👤 ឈ្មោះ: ${name}<br>
                            📱 លេខទូរសព្ទ: ${phone}<br>
                            🔒 ពាក្យសម្ងាត់: ${password}<br>
                            💰 ប្រាក់: $${balance.toFixed(2)}
                        </div>
                    `;
                    createAdminForm.reset();
                    setTimeout(() => renderPage('super-dashboard'), 3000);
                });
            }

            // ---- TRANSFER MONEY (Sub Admin) ----
            const transferForm = document.getElementById('transferForm');
            if (transferForm) {
                transferForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const user = getCurrentUser();
                    if (!user || user.role !== 'sub_admin') {
                        alert('សូមចូលប្រើជា Sub Admin!');
                        return;
                    }

                    const admin = data.subAdmins[user.phone];
                    const phone = document.getElementById('transferPhone').value;
                    const amount = parseFloat(document.getElementById('transferAmount').value);
                    const msg = document.getElementById('transferMessage');

                    if (!amount || amount <= 0) {
                        msg.innerHTML = `<div class="error">សូមបញ្ចូលចំនួនប្រាក់ឲ្យបានត្រឹមត្រូវ!</div>`;
                        return;
                    }

                    if (amount > admin.balance) {
                        msg.innerHTML =
                        `<div class="error">ប្រាក់របស់អ្នកមិនគ្រប់គ្រាន់! (នៅសល់ $${admin.balance.toFixed(2)})</div>`;
                        return;
                    }

                    const member = data.members[phone];
                    if (!member) {
                        msg.innerHTML = `<div class="error">មិនឃើញសមាជិកនេះទេ!</div>`;
                        return;
                    }

                    admin.balance -= amount;
                    admin.totalTransferred = (admin.totalTransferred || 0) + amount;
                    member.balance += amount;
                    const date = new Date().toLocaleDateString('km-KH', { day: '2-digit', month: '2-digit',
                        year: 'numeric' });
                    member.benefits.push('💰 បានទទួលប្រាក់ $' + amount.toFixed(2) + ' នៅថ្ងៃ ' + date);

                    if (!admin.members.includes(phone)) {
                        admin.members.push(phone);
                    }

                    saveData();
                    logActivity(admin.id, admin.username, 'member_transfer', 'financial', phone, amount,
                        `ផ្ទេរប្រាក់ $${amount.toFixed(2)} ទៅ ${member.username || phone}`);

                    msg.innerHTML = `
                        <div class="success">
                            ✅ ផ្ទេរប្រាក់ $${amount.toFixed(2)} ទៅ ${member.username || phone} ជោគជ័យ!<br>
                            💰 ប្រាក់ដែលនៅសល់: $${admin.balance.toFixed(2)}
                        </div>
                    `;
                    document.getElementById('transferAmount').value = '';
                    setTimeout(() => renderPage('admin-dashboard'), 2000);
                });
            }
        }

        // ================================================================
        // ===== EXPORT FUNCTIONS =====
        // ================================================================

        function exportData() {
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `member_system_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportLogs() {
            const logs = data.activityLogs;
            let csv = 'កាលបរិច្ឆេទ,សកម្មភាព,ព័ត៌មានលម្អិត,ចំនួនប្រាក់\n';
            logs.forEach(log => {
                const date = new Date(log.timestamp).toLocaleString('km-KH');
                csv += `${date},${log.action},${log.details || ''},${log.amount || ''}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `activity_logs_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ================================================================
        // ===== START APP =====
        // ================================================================

        initSuperAdmin();

        const currentUser = getCurrentUser();
        if (currentUser) {
            if (currentUser.role === 'super_admin') {
                renderPage('super-dashboard');
            } else if (currentUser.role === 'sub_admin') {
                if (data.subAdmins[currentUser.phone]) {
                    renderPage('admin-dashboard');
                } else {
                    setCurrentUser(null);
                    renderPage('home');
                }
            } else if (currentUser.role === 'member') {
                if (data.members[currentUser.phone]) {
                    renderPage('dashboard');
                } else {
                    setCurrentUser(null);
                    renderPage('home');
                }
            } else {
                renderPage('home');
            }
        } else {
            renderPage('home');
        }
    </script>

</body>
</html>
